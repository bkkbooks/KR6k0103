body:
  text: 佛説梵網經菩薩戒初津敘梵網經者是諸佛之本源衆生之自性戒網之宏網律宗之要關也我佛世尊往返八千應化百億無非為一大事因緣故出現於世總攝化機頓明佛性略開法門心地顯示自性圓明能令衆生才登戒品位同大覺者無尚此經矣釋其名則佛觀梵天王網為説無量世界猶如網孔此喻教門之廣大也究其實則光明金剛寶戒本來箇箇圓成此喻生佛之一體也良以衆生迷真逐妄不能顯發無上菩提故如來從天宮而下人間向凡夫而開佛戒説衆生心內之佛法度諸佛心內之衆生為妙海王子頓制菩薩五十八戒若生若佛皆入佛性戒中是色是心總歸本源心地大哉菩薩戒也為一切戒之本歟無教不收無機不攝也余從秉受已來以此戒經奉為日課第恨慧性疏淺義理難明幸得學戒之心無時暫息焚膏繼詳閲諸書又以法海洪深卒難測量因而略採數語為作津梁不意日久歲深積成八卷題云梵網初津然理雖未盡事相無殊聊備自明以資持誦非敢望傳於來學也時康熙三十八年九月吉旦菩薩戒弟子昭慶書玉識凡例此經心地一品乃分上下兩卷上卷三十心十地明菩薩修證之階位下卷十重四十八輕顯佛子當學之戒法然法雖從位顯而位必仗戒修故天台智者大師單疏下卷時所宗行以見戒為趣位之本也今仍舊貫以逗時機如欲具明上卷經義請閲餘解經前懸談者毗尼止持會集先和尚遵賢宗法式略開七門以明通局戒疏發隱雲棲大師據般若略疏預立五門融會他宗今準華嚴大疏開成十義用顯其要如或樂簡樂詳隨情去取古來經解有科者有不科者謂科能節文解能釋義故今加科節之然大小乘戒不出止行兩法離此便非律義今以止行分析重輕戒相俾未觀文句先知大槩其餘科式與諸家大同菩薩大戒舍那面授妙海親聞展轉傳來什師誦出而藏有南北增減不同今依流通本而釋經文不敢更改一字一則向所持誦流傳已久二恐後來倣俲經模漸失雖謂理長則就妄動聖典亦毋容也經文題目俱書頂格解釋則低一字科文又低一字一則敬重佛語二則經文科釋各有分別不宜混雜也消文釋義貴乎直捷暢快為妙若勉強扭揑則文義不顯事既不明理何能徹故此書不論各家先後但能發明本經文義則便隨録也然今人多厭其繁故解亦從簡不貴語備務在義周大乘律法自不同於小乘故其中開遮持犯輕重並不以聲聞戒而定惟依菩薩戒經也又條相內多緣成罪及果報引證等在十重則全具在輕戒則有無不定也三無漏學以戒為基菩薩木叉普被諸有但能解語悉皆得受故知梵網一經人天四衆凡有心者一切應瞻雖然如是要須受後始得若未受戒人預閲恐後來受戒不能發起殷重之心然渴而後飲則水之味愈甘暗而後然則燈之用愈大惟重在見機又則講時不揀者欲令發起善種故誦戒時須揀者恐生藐忽故適如融影等因見此經即發大心受菩薩大戒者則不須揀也降此不得覽者宜依經加意思之
