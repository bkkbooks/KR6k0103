body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述次釋迦勸發分二初經家敘事二釋尊自説初中三初佛欲結戒爾時釋迦牟尼佛初坐菩提樹下成無上覺初結菩薩波羅提木叉孝順父母師僧三寶孝順至道之法孝名為戒亦名制止爾時者復從天王宮下至閻浮提之時也釋迦是能誦戒之化主正報也菩提樹乃所誦戒之化土依報也無上覺者覺悟也謂三乘聖人所悟之法無有過於如來之上故云無上如聲聞辟支但悟我空未知法空名為偏覺三賢十聖等覺菩薩所覺雖正尚在因位名隨分覺猶為有上惟是如來成妙覺果智盡獨尊故言無上覺也初結菩薩波羅提木叉者結猶制也才成佛道即制此戒者正顯波羅提木叉是入道之急先務也又直言菩薩木叉者揀非聲聞戒也繇所被之機惟為大士不為二乘故然大士階位非二乘所行制戒輕重亦非小乘所學故為大士頓制五十八戒不同聲聞隨犯隨結也然聲聞厭怖生死以自利為急故制淫戒居首繇淫是輪回之本生死之源菩薩不怖生死以利生為要務故制殺戒在先况殺是斷佛性之種子違慈悲之本願理論關乎機宜事論凡有三義一大士深信頓聞不逆二大士利生事急不能恆侍如來左右隨事隨白三舍那為妙海王子授菩薩戒即頓説此五十八戒古制應爾也又聲聞隨事隨結皆悉集十句義今頓制諸戒戒戒亦應具之經雖不顯理必應然故今略出名相句義俾知其益以便習學也一攝取於僧謂制此重輕戒法攝受一切衆生引歸大乘數中令取大乘僧寶果故二令僧歡喜謂繇前攝取之力能令一切菩薩歡喜暢悅不滯小乘故三令僧安樂謂繇禁戒威力能令菩薩種族利益增長得安樂住故四未信者令生信謂繇禁戒威力能令性遮之業清淨發起一切衆生正信之心故五已信者令增長謂繇清淨律儀能令久淹佛法者益其堅固不退悔故六難調者令調順謂有一類假名菩薩雖發大心煩惱習強今以重輕諸戒調之懺悔訶責令不敢違法律故七慚愧者得安樂謂繇調順諸難調者則有慚愧人無擾亂故八斷現在有漏謂戒制三業十支令不漏落業煩惱故九斷未來有漏謂永斷二執漏種則菩提心不退失故十正法得以久住謂繇攝取大乘僧寶果故能令種性不斷建立弘通心地法門正法得以久住故是為十句義也有此十義故如來初成正覺先結戒也孝順父母師僧三寶者蓋佛雖已結菩薩戒法而未示其樞要故今以孝順為戒之綱領也孝順者善事奉養為孝承顏無逆為順父母者人之天地也生長色身其恩罔極故睒魔割目救父而沉疴愈於一朝慈心發願代苦而火輪消於頃刻戒相雖多孝順攝盡故總舉孝順以為宗也師者指秉戒和尚及阿闍黎此乃出世父母故經云生長法身養智慧命蓋師之力功莫大焉僧者指同學等衆師有訓誨成善之恩僧有爽輔資秉之德若能尊敬供養無違法訓是曰孝順三寶者佛法僧也佛是三界之慈父法乃出世之雄規僧是如來之弟子父母生我色身依之修道若無色身法身慧命無所依故事佛聞法亦無據故師僧生我戒身繇之成佛若無戒身為本修行則諸善功德皆不能發生故三寶生我慧命成就菩提若無三寶熏修慧命從何而得故須一一孝順也又孝順父母有三差別一冬溫夏凊昏定晨省奉養無方服勞靡間二立身行道不辱所生三善巧方便喻親於道孝順三寶亦三一供養承事不厭疲勞二如説修行不污法化三防非革弊建立弘通此乃順事而釋也若約法門解者方便為父智度為母不離深義以為和尚自心覺悟名佛自性理體為法理智一如名僧如理作意觀察名孝如理證入無背名順也至道之法者即無上至極之道法也謂繇前事理二種孝順決能得至無上大菩提道故此道清淨廣大猶若虗空體絶過非用無違礙孝順之心正合此意故云至道之法也如來纍劫報親恩積因成正覺故稱大孝釋迦尊也孝名為戒者謂能行孝之一事則諸戒無不備足故後之五十八戒中多言孝順心也又不悖十重四十八輕即是順本源心地亦即順三聚淨戒也如順止惡義恐辱其親名律儀戒順行善義思顯其親名善法戒順兼濟義錫類不匱名攝生戒總而言之但能行孝自然梵行具足所以名為戒也故法苑云戒即是孝謂衆生皆吾父母不殺不盜是即為孝義正同此亦名制止者制是嚴制止是禁止謂嚴制三業之不起禁止妄念之不生故名制止也又制者謂制善令行制惡令斷止者唯令止惡明開密遮也其孝順是標戒之體制止乃出戒之用體用雙彰即見本源心地矣二放光表瑞佛即口放無量光明佛即口放無量光明者謂如來欲説大法故先放光表瑞令在會聽衆深生敬信復顯此戒最勝出生無盡戒法故口放者表此戒如來金口親宣故無量者表此十無盡藏戒品無有限量故光明者表本源自性清淨無有染污故昔舍那付囑以光告授今釋迦秉教亦放光宣傳菩薩聽受此戒即從佛口親生是故名為真佛子也三大衆願聞是時百萬億大衆諸菩薩十八梵天六欲天子十六大國王合掌至心聽佛誦一切諸佛大乘戒百萬億者但舉大數而言然總敘有緣同集也大衆者人天共會凡聖交羅故諸菩薩者別指三十心十地位人也十八梵天者梵淨也謂其欲塵已淨尚存色身故妙玄云正報之身是清淨色不同欲界垢染之身故名曰梵大論云清淨光潔最勝最尊故名為天此別指色界而言也一梵衆乃所統之民二梵輔是輔弼梵王之臣三大梵得中間禪為世界主劫初先生劫盡後滅威德既勝褒美稱大主領大千然通論有萬億梵王惟此是大千世界之中王名尸棄得為大千世界之主降此不得此三總名初禪梵語禪那此翻為定攝心專注不散故坐得禪定是故名天四少光於二禪中光最少故五無量光光明轉增無限量故六光昔口絶言音光當語故此三名第二禪七少淨意地樂受離於喜貪故少分清淨八無量淨淨勝於前不可量故九遍淨樂受最勝淨周普故此三名第三禪十無雲下之三禪皆依雲住至此四禪方在空居十一福生具勝福力方得往生故十二廣果異生果報此最勝故此三屬第四禪凡夫所居修上品十善坐禪者得生其中十三無想外道所居計為涅槃但是一期中間心想不行故亦屬四禪十四無煩雜謂無見思煩惱雜故十五無熱惱謂意樂調柔離熱惱故十六善相見謂定障漸微見極明徹故十七善現相謂形色轉勝善能變現故十八究竟無極謂色法最極是究竟處故此五天亦屬四禪三果聖人所居名五不還天此十八天雖凡聖不同皆離欲穢得清淨定故名梵天也六欲天子者謂諸天具受微妙五塵欲樂故名欲界共有六天一四王居須彌山半二忉利居須彌山頂此二名地居三夜摩四兜率五化樂六他化自在此四天空居然六天雖則尚有五欲而果報自然不假營求故皆名天也言十六大國王者長阿含經云西域諸國最多舉其甚大者有十六國一史伽二摩竭提三迦尸四拘薩羅五跋祗六末羅七支提八跋沙九尼樓十槃闍羅十一阿濕波十二婆蹉十三蘇羅十四乾陀羅十五劍浮沙十六阿槃提也如來出興於世俱是有緣機感故人天凡聖雲集而為大衆也問菩提樹下何能雲集百萬大衆耶答如華嚴經云樹下宮殿樓閣充遍十方又以諸佛神力所加一念之間悉包法界是以涅槃會上娑羅雙樹間於一針鋒上坐無邊衆豈可以凡情測量識心思議耶合掌者手本左右合而為一表其至恭至敬身業淨也至心者專心一意意業淨也耳聽者而言自寂口業淨也如是三業肅清聽佛所説則戒光自朗於心源矣一切諸佛大乘戒者謂此戒乃佛佛相傳故也二釋尊自説三初明自誦勸人佛告諸菩薩言我今半月半月自誦諸佛法戒汝等一切發心菩薩亦誦乃至十發趣十長養十金剛十地諸菩薩亦誦佛告諸菩薩者佛告猶曉諭也諸菩薩乃總舉其名向後別列位次然如來説法人天共集但舉菩薩者有四義故一菩薩是當機人二為大衆綱領三人天所尊四大士雖位次不同而皆名菩薩故總舉菩薩而統攝人天大衆也半月半月者止持云黑白二半月也月勤二誦者謂善業惡業應自孝察故成實論云一日至十五智光漸增以表智德十六至三十邪光漸減以表斷德此二日誦戒者蓋欲令其白業圓而黑業盡也自誦諸佛法戒者謂顯佛佛尊重波羅提木叉故又此誦戒梵名布薩南山翻為淨住謂半月半月誦戒清淨身心如戒而住故正名褒灑陀褒灑是長養義陀是持義由集衆説戒能長養善法持自心故善見論云云何名為正法久住佛言布薩法不壞是汝等一切發心菩薩亦誦者乃別指位次菩薩亦當如是而誦也佛是果人尚且自誦何況菩薩因人之不誦耶此是諸佛常式故今如來亦半月自誦以法現前大衆及未來受戒者之成規也又發心諸菩薩者謂初發大心即十信位人也以信為三賢之初步十聖之先階信則不疑謂信此菩薩大戒決定是成佛種子故瓔珞經云從凡夫地值佛菩薩説法於教法中起一念信便發菩提心是人爾時住前為名字菩薩其人略行十心所謂信心念心精進心慧心定心不退心護法心回向心戒心願心行如是心故名發心菩薩也乃至者未盡之詞謂不但初發心菩薩乃至住行向地諸菩薩亦當如是而誦也十發趣者初十心也謂捨戒忍進定慧願護喜頂十心菩薩繇前十信為本以此十心從假入空心心開發趣向佛果故名發趣亦即十住位也以信立之後慧住於理得位不退故名為住十長養者中十心也謂慈悲喜捨施好語益同定慧十心菩薩以此十心從空入假精勤勇猛增長佛道養育衆生故名長養亦即十行位也由前十住發真悟理從此進趣故名為行十金剛者後十心也謂信念回向達直不退大乘無相慧不壞十心菩薩以此十心修習中觀降伏無明性如金剛不可沮壞故得此名又信等亦皆有發趣長養之義亦皆是體性法門三十心皆為種子惟此十心倍為堅固故名金剛皆以不壞為義亦即十向位也謂菩薩以此十心回事向理回因向果回自功德向於衆生回能修所修向於法界此居最後名金剛後心此心乃是能入聖地之智近解脫之門得入中道之正位已上三十心皆賢位也十地者從平等善慧光明爾𦦨慧照華光滿足佛吼華嚴入佛界此即聖位也地者荷負出生之義謂此菩薩住持佛智上荷佛法下載衆生功德智慧之所歸趣慈悲巧便之所從生故名為地又地地出生無量法門因位有淺深故分為十也然如來初為菩薩時修入佛果之根源繇誦諸佛法戒而起乃至令一切衆生開心地道入發趣長養金剛十地證當成果汝等從凡至聖一切菩薩亦當如我而行半月半月誦諸佛法戒令如來慧命不斷故云十地諸菩薩亦誦也二放光誡學是故戒光從口出有緣非無因故光光非青黃赤白黑非色非心非有非無非因果法是諸佛之本源行菩薩道之根本是大衆諸佛子之根本是故大衆諸佛子應受持應讀誦應善學是故戒光從口出者是故乃承上文佛口放無量光明而言也戒具生善滅惡之功光有揚輝破暗之用見者發菩提心聞者離生死苦戒光從口出者謂戒從口宣光從口出表此心地大戒是一乘無上之法更無異轍也前句直説放光之緣此光即表無作戒體此無作戒全以性德為因展轉傳誦為緣有緣非無因故光者佛種從緣起顯放此異光必説大法也然佛性戒正因也舍那誦緣因也釋迦誦了因也戒光從舍那口出有緣矣釋迦誦心地戒非無因也光非青黃赤白黑者破執情也恐凡外小乘聞見遂生執著不達自性圓明而向外馳求故又此心地戒光遍照法界其中有四料揀一非五方物色不墮影像凡愚遍計果也二非六入色心不墮情境人天妄想果也三非六師有無不墮斷常外道邪見果也四非二乘因果不墮修證小乘事相果也諸佛是出世間法真諦也大衆是世間法俗諦也菩薩上趣下順真俗雙融也又戒是渡苦海之浮囊復本源之寶筏諸佛正遍知海以此心地戒為本源故曰是諸佛之本源菩薩修行六度萬行開敷亦以此心地戒為根本故曰行菩薩道之根本大衆後當作佛亦無不以此心地戒而為根本故曰是大衆諸佛子之根本由是之故再三叮嚀勸誡受持誦學也領納在心曰受稟執不忘曰持口𮘗戒經曰讀誦熟玩戒文精徹其義曰善學如聞佛誦戒若不受持則無成佛因受之不讀則無滋長因讀之不學則無得證果故云是故大衆諸佛子應受持應讀誦應善學也言大衆諸佛子者揀非佛菩薩乃天人鬼畜次一等之通稱也三明普攝羣機佛子諦聽若受佛戒者國王王子百官宰相比丘比丘尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神金剛神畜生乃至變化人但解法師語盡受得戒皆名第一清淨者佛子諦聽者謂提醒大衆當至心而聽也若受佛戒者此指菩薩戒也謂比丘戒名曰僧戒菩薩戒名曰佛戒正顯佛慈平等戒法弘施也繇本源心地大戒一切衆生本具非染非淨故不擇貴賤賢愚人非人等但能領會授戒法師言語盡得受也此顯心地戒還從自心得不同比丘要具五緣方得成就倘一虧法無作不成復除十三難人不得受戒今此菩薩正戒惟揀七遮其餘皆名清淨法器然比丘稟佛制教剃髮染衣是世間住持三寶中之一數為世福田人天軌範苟其非器則戒體不發故須揀擇菩薩以成佛果為心或在家出家隱顯無定故非住持是以但能發菩提心即得受戒也其中不出三對六類一僧俗對俗分王臣僧分男女二天人對天分色欲人分好醜好醜者有根具根缺作主作從三幽顯對幽分鬼神顯分畜化也國王人主也王子青宮也百官者百司之官依公執政決斷是非名為官也宰相者謂宰執朝綱相助於君也比丘名含三義一破惡二怖魔三乞士尼者女也如來初成正覺未有出家二衆利生念切故預許之皆得受戒也不言式叉摩那沙彌沙彌尼者謂舉此二衆即攝小三衆也十八梵天色界天也六欲天子欲界天也庶民無位之衆也黃門是閹人即內宦也又黃者中也謂王使此人守內宮之中門備通使命故云黃門也淫男淫女賣色人也奴婢充役人也八部鬼神護法衆也金剛神亦名金剛力士謂有大威力喻如金剛執金剛杵隨侍諸佛能捍外魔護持佛法者也畜生三惡道之最下者乃至盡及之辭變化人者或天龍鬼神等謂本身不便入衆故變化為人形而來受戒如來大慈不捨一切衆生觀如上種類皆可作戒器但能解法師語者即復攝歸心地法門此顯不解則不能發菩提心以為勝因故須揀也問既不揀種類何不言無色界及地獄衆生耶答無色無身地獄苦具所障二皆非器故也又解則盡得受戒不解則雖受亦不得戒也故瓔珞經云始行菩薩若信男信女乃至奴婢變化人盡得受戒皆有心向故初發心出家欲紹菩薩位者當先受正法戒此戒是一切行功德藏之根本正向佛道果一切行木是戒能除一切大患是正法明鏡一切衆生盡得受之皆名第一清淨者謂未受戒前容有淨染高下貴賤之分優劣智愚之異一得此戒即入佛位咸成最上法器喻如衆流入海皆失本名同一鹽味故云皆名第一清淨也上明序分已竟二正宗分二初十重二四十八輕初中三初總標二別列三結示初復二初詳示佛告諸佛子言有十重波羅提木叉若受菩薩戒不誦此戒者非菩薩非佛種子我亦如是誦一切菩薩已學一切菩薩當學一切菩薩今學佛告諸佛子者乃呼召能誦之人而發起勸誦之語也十重波羅提木叉者十重是事波羅提木叉是法謂顯所受之法以能攝事也又先提十重者謂是菩薩根本故後言四十八輕者是其枝末故先本後末是故首宣也若受菩薩戒不誦此戒者謂不誦名犯學即名持若受而不誦如同漏器既不誦持則日就遺忘戒相寧識不識戒相則罔諳開遮開遮不諳則過犯由是而生現前失大乘之名位故曰非菩薩則當來成佛之極果亦失故曰非佛種子然既受須誦誦則知其持犯輕重時時法水所潤佛種自不乾枯也如來不忘舍那之始授半月半月自誦故曰我亦如是誦過去菩薩求大菩提先於中學故曰一切菩薩已學未來菩薩當如是行故曰一切菩薩當學汝等現在菩薩亦當如我所説半月半月誦此波羅提木叉故曰一切菩薩今學也如不誦則逆逆則非孝矣二略結我已略説菩薩波羅提木叉相貌應當學敬心奉持我已略説者言其才舉綱領未振毛目也菩薩木叉者顯非聲聞戒也相貌者十重四十八輕為相一一戒中開遮持犯輕重是非為貌戒雖無形然守持者得守持之相貌何以故謂內心既虔則外儀必敬故楞嚴經云心持禁戒舉身輕清是也略説者略具四句説該三大四句者一略中略謂孝敬心也二略中廣謂十重戒相也三廣中略謂四十八輕也四廣中廣謂十無盡藏戒品也三大者一菩薩用大謂行菩薩道之根本能出生大乘因果故二木叉體大謂戒是本源佛性種子故三相貌相大謂光明金剛寶戒猶如日月瓔珠故既然戒有持毀相狀諦聽者應當生信敬心以成聞慧時時勤學以成思慧刻刻行持以成修慧如是三慧自淑則道果圓成又何愁心地之不開明耶故曰應當學敬心奉持也釋此五十八戒雖則重輕二篇兼有方便等流合而明之共有六聚一逆二失戒重不任更受欲受須見好相三失戒重堪任更受四不失戒重五染污犯及方便重垢六非染污犯及方便輕垢也二列相十第一殺戒二初標人佛言佛子佛子者謂發菩提心受佛大戒即佛所生行當紹如來位故曰佛子母自輕也既受佛戒莫違佛制如違佛制便即結罪故呼其人而醒之也後皆準此二顯法三初作犯止持二作持止犯三違教結罪今初若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺殺因殺緣殺法殺業乃至一切有命者不得故殺若自殺者若乃設況之辭謂設或有人行此殺害事者如律定罪自殺者謂親身行殺也殺有三種或用內色謂以手足及餘身分等或用外色謂以刀杖木石等或用內外色謂手執刀杖木瓦石等蓋一切有情皆以五蘊而為身心若起瞋害壞彼五蘊者故名為殺教人殺者謂口教他人行殺害事或面教或遣使或作書等方便殺者謂以種種機巧方便令其必死如束縛捉繫及指示道路令前人捕獲等讚歎殺者讚謂讚其力勝謂前人本無殺心花言巧語種種讚譽令起殺心成就殺事也歎謂歎其不能謂前人先有殺心或作不作種種毀呰激發令作也又或於彼樂死人前稱其美德作如是言汝已作衆善功德生便受苦死當生天受無盡樂如是令其自死或口説或身現讚歎相或遣人説或遣人持書至彼令其自死見作隨喜者謂見他人行殺時心便隨彼而生歡喜故乃至者未盡之辭謂其中殺事多種不能盡舉或作火坑穽陷令墮或作機撥使死或作弶作桁或作羂索或與毒藥或墮胎等呪殺者謂以極惡呪術呪令彼死外國有起尸鬼呪名毗陀羅及未損壞全尸以召鬼呪呪二十九日令尸起立水洗著衣授與其刀載於車上教往殺人是為呪殺其自作方便身家造罪讚歎呪禱口家造罪見作隨喜意家造罪亦兼於口皆歸殺業也因者謂宿生種習不忘忽起一念現行殺心故名為因緣者謂殺心相續助成殺事故名為緣法者謂思惟造作方便資具故名為法如刀杖網呪坑穽等業者謂三緣和合斷彼命根故名為業此則因通過去緣法現在業兼未來展轉相資以致當來互相殺害故令輪回不絶也其初萌一念殺心名煩惱障事成命斷名業障招感當來三惡道苦名報障是則三障輪轉皆由初起一念不善之心而有初心若滅次心不續則無思惟造作而殺業不成報障無繇得矣後之九戒準此應知義疏云因親緣疏正因殺心為因餘者助成為緣親者造作招感當來果報如影隨形緣者助成故疏於因緣中造作皆是業義乃至者是承上害人及下微細物命而言也一切者除人道其餘鬼畜蜫蟲等是也有命者謂一切衆生以六根六識連持相續名為壽命此相續斷名之曰死不得二字最重此句始明其戒也故殺者謂有心害命非是無心誤殺也殺畜等雖可懺悔而要見好相罪方除滅菩薩了達業相等觀衆生無大小高下之分繇善業故生人天趣繇惡業故生地獄餓鬼畜生道中俱稟識性苦樂無殊故殺者悉皆得罪又一切衆生皆具佛性同一本源有佛性者皆當作佛殺彼還是害己及害未來諸佛也是故如來大慈一切俱制但有可殺之境一切不得作也二作持止犯是菩薩應起常住慈悲心孝順心方便救護一切衆生應起常住慈悲心者應當也起修行發起常住者了知心佛衆生三無差別其性常住故慈悲心者謂從體起用上合諸佛同一慈力下合衆生同一悲仰故云慈悲心也又慈能與樂保命為先悲能拔苦無殺為上然同體大悲愛念衆生如保赤子惟思拔苦與樂故也孝順心者孝謂孝於親順謂順於道謂尊重聖教無傷害心視六道衆生皆是我父母不敢輕於一切故也方便救護者謂權巧方法自作教人不惟不殺且要放生若見他殺時以種種方便教化解其苦難才順孝心方不違大士利生之本願也又應起二字總貫慈悲孝順救護三心謂一切衆生與佛同體皆有不生不滅常住之性今發起此心要常住在慈悲之地非謂暫時而已也以慈悲故自然孝順以孝順故自能救護衆生若不救護何名大士耶故不殺仍應救生不盜仍應布施也後皆例此然三心之中慈孝能治自殺之因方便救護所治教讚呪殺之緣正是大士度生之行成就法身德也三違教結罪而反恣心快意殺生者是菩薩波羅彝罪反者明其不應恣心者因貪起殺不知制止快意者因瞋起殺泄其怨恨暢快我心貪如市利宰牲瞋似酷刑虐民逆天悖理豈菩薩之所為且不作如上方便已乖大士本念而反恣心快意殺生者是菩薩波羅彝罪波羅彝者是梵語罪名也其義衆多故無正翻然是極惡重罪如世死刑或翻捐棄犯此戒者一切功德悉皆捐棄無道果分故或翻不共住法衆不容故喻如大海不宿死尸也或翻墮落謂犯此戒者墮落三途故或翻他勝處法謂受菩薩戒本欲破壞煩惱降伏魔軍今犯此戒反被煩惱魔軍所欺勝故法王之子受敗於他又被他淨行者所欺勝故或名墮不如意處即前三惡道中也如人壞心如地崩陷不復堪能修習善法增長菩提亦云是斷頭法如斷多羅樹心如針鼻缺如大石破為二分等聲聞律中明一人受比丘戒地神空神展轉傳告頃刻聲遍初禪魔則震恐若一人破比丘戒護身神出大歎息之聲亦復展轉傳告聲遍初禪魔則歡喜今菩薩戒羯磨文明一人受戒則十方諸佛菩薩前法爾相現繇此表示則諸佛菩薩眷念憐愍儻一人破戒寧不遍令法界聖賢咨嗟悲悼耶此非比丘罪名故云是菩薩波羅彝罪持戒者當審思之若以三聚攝歸不得故殺律儀戒慈悲孝順善法戒救護衆生攝生戒也此戒道俗同制如五八戒類大士以慈悲為本故先斷也七衆菩薩共制聲聞五衆大同小異同者同不許殺異者三事各異一開遮異二色心異三輕重異一開遮異者謂大士見機得作如菩薩戒本經云若諸菩薩安住淨戒律儀善權方便為利他故見劫盜賊為貪財故欲殺多生或復欲害大德聲聞獨覺菩薩或復欲造多無間業見是事已發心思惟我若斷彼惡衆生命墮那落迦如其不斷無間業成當受大苦我寧殺彼墮那落迦終不令其受無間苦如是菩薩意樂思惟於彼衆生為當來故深生慚愧以憐愍心而斷彼命繇是因緣於菩薩戒無所違犯生多功德此則大悲增上純以代苦之心而行殺業也深生慚愧者明其不自以為功能故以憐愍心者明其實無一念瞋忿故雖甘受犯戒之罪而究竟無所違犯故云見機得作也儻若反此難免性遮而聲聞雖見機不許作也問出家遠離害心殺戒易持王臣專主殺權有罪不誅何以安國答殺一人而救一鄉或殺多人而救一邑一國是菩薩善權方便見機得作也如陀羅尼經云若見作五無間罪謗大乘經背逆君主或亂正法於是等人起悲愍心應作降伏之法又涅槃經云往昔如來作大國王名曰仙豫愛念敬重大乘經典乃至二十年中供事諸婆羅門一切所須已告言師等今應發無上菩提心彼云大王菩提之性是無所有大乘經典亦復如是大王云何欲令人同於虗空時王心重大乘聞其誹謗大乘方等即斷其命而諸婆羅門命終生阿鼻地獄即便自知謗大乘經典不信因緣為王所殺而來生此知已於大乘經典生敬信心尋時命終生甘露鼓王如來世界於彼壽命具足十劫餘如經説然大乘菩薩以憐愍心利益衆生無一念瞋害私意儻有不達經旨以自利故瞋心害彼不但無益與他而且自墮不如意處無有出期矣二色心異者大士制心聲聞制色三輕重異者大士害師犯逆聲聞非逆故曰大士重重於聲聞重也此戒具性遮二業性業者性實也雖不受佛戒世間法爾有罪如輪王十善亦制殺生國制殺人會須償命遮業者佛制之所遮止犯者得破戒罪此之殺業不受戒人但得性罪已受戒者得性遮二罪此戒具四緣成重若少一緣罪便開輕一是衆生二衆生想三殺害心四命根斷一衆生中有上中下三品上品者諸佛聖人父母師僧佛不受害但令惡心出其身血即犯逆罪害阿羅漢犯逆害三果以下但犯重菩薩解行以上害者犯逆以下犯重中品者即人天害之犯重下品者四趣也此亦有二一云同重大士防殺最嚴重故解語受戒是道器故二云但犯輕垢以不解語非道器故二衆生想有當疑僻三法一是衆生實是想非衆生實非想是為當二是衆生疑非是非衆生疑是非是為疑三是衆生決非想非衆生決是想是為僻若衆生當衆生想衆生疑殺者犯重父母和尚闍黎想殺者犯逆若非衆生作衆生想疑如見繩士誤為蛇蟲斫捻雖無所害然有殺心犯輕垢罪父母師僧犯重例知若衆生僻作非衆生想本無殺心無犯戒罪若非衆生作非衆生想全無犯父母聖人例知三殺害心者謂惱害前境願其命斷正是業主繇此惡心或自身行殺或教人及遣使等殺心復二一通心二隔心通心者如漫作坑弩漫為燒斫隨有死者皆悉犯罪都無死者犯方便罪亦名不遂輕垢隔心者本為此人作殺方便誤傷彼人而於彼人都無殺心故不結罪仍於此人邊結方便罪四前人命斷者謂一切衆生皆以識息暖三種色心連持相續不斷名為命根今使不得相續名為命斷故成殺業也此有兩時一者於現生中見彼命斷二者作殺方便已先自捨命彼方命斷現生見彼命斷復有二句一者自身有戒二者自身捨戒若有戒時前人命斷結重若捨戒後前人命斷止於捨戒之前結方便罪後命斷時不復結罪但有世間性罪也先自捨命彼方命斷復有兩種一者後生自憶宿命二者不憶若自憶宿命者彼人或任勢命斷或更加方便令斷皆結重罪若不憶宿命者彼人任勢命斷結重以菩薩死後戒體不失故或更加方便令斷當知不因前方便死但結輕垢是為犯不犯者後加方便由夙業所牽不自憶知又不犯者菩薩未登不退或繇業報因緣得癡狂等優婆塞五戒相經云佛告諸比丘吾有二身一生身二戒身若善男子為吾生身起七寶塔至於梵天若人虧之其罪尚有可悔虧吾戒身其罪無量華嚴二地品云殺生之罪能令衆生墮於地獄畜生餓鬼若生人中得二種果報一者短命二者多病三途是正報人中是餘報上殺墮地獄中殺墮畜生下殺墮餓鬼楞嚴經云縱有多智禪定現前如不斷殺必落神道上品為大力鬼中品則為飛行夜叉下品當為地行羅剎昔波斯匿王有二大將歸依三寶修慈心觀所有兵器皆竹木為之後時邊境反叛王命往伐至彼邊境即入慈心三昧叛逆盡見四天王領無量天兵排空遂即歸降又昔中天竺戒日王令諸兵士弓頭悉挂水囊乃至馬飲盡以囊濾而諸國悉皆歸降此二皆是護生功德之所感也按此戒從菩薩心地法門戒心中慈心悲心及孝順心所出第二盜戒三初作犯止持若佛子自盜教人盜方便盜呪盜盜因盜緣盜法盜業乃至鬼神有主物劫賊物一切財物一針一草不得故盜佛子義如上前戒是害彼正報內命也此戒害彼依報外命也以財物能資養色身故屬外命自盜者自己親身取物教人盜者謂口教他人為我取物或遣使取或作相令知方便盜者或彼物自來以種種機巧方便藏舉或諂曲欺他不知或本無盜心唯見物生情或以勢以法臨時順便而取至於圭合銖兩事事欺瞞及移標占界等呪盜者謂有惡呪師能以邪術力攝取彼物自來或呪召鬼神遣鬼竊取也因緣法業者初起一念盜心為因盜心相續多種助成盜事為緣思惟算計盜物之方為法物離本處成業乃至者超略之辭鬼神有主物劫賊物者是指其財所屬主也一切財物一針一草者是論物之重輕也財謂金銀錢寶等物謂衣服銅鐵竹木器具等針草以輕況重不得二字遮止之辭正是戒體故盜者揀非無心也二作持止犯而菩薩應生佛性孝順心慈悲心常助一切人生福生樂佛性者即本源心地也謂一切衆生皆具此佛果之性而性本孝慈今云應生者是從體起用以財法二施常助人生福生樂即前戒中應起常住慈悲心之意此言孝順慈悲者謂菩薩應學此等善事利益衆生故曰應生孝順心慈悲心也如盜他財物奪人外命令彼窮乏違佛聖教是為不順又一切衆生皆是我多生父母如盜彼物即惱害父母是為不孝其心忍乎今依佛制故曰孝順不盜他財故曰慈悲令彼無有乏少故曰生福生樂當知此孝慈之心皆從佛性中之所出也三違教結罪而反更盜人財物者是菩薩波羅彝罪菩薩不修檀波羅蜜布施衆生已違佛制而反更盜人財物者是違本源體性令彼受貧乏苦即是造惡滅善故曰是菩薩波羅彝罪若盜三寶財物受苦倍多輕重條章詳載律藏若以三聚攝歸不得故盜律儀戒佛性悲心善法戒助人福樂攝生戒也此戒七衆菩薩共制聲聞五衆有同有異同者皆不應盜異者有開有遮如是機得不得等或復謂見機得取以無盜心故不結罪大士為物種種運為皆得聲聞自度必依規矩又大士不畏罪苦但令前人有益即便為之菩薩戒本經云菩薩見劫盜奪他財物縱情受用起憐愍心逼而奪取勿令受用如是財物當受長夜無義無利或給本主或作福事則誠為功德不然難免性遮又見衆生或園林主取僧伽物言自己有恣情受用不畏罪報菩薩見已思擇彼惡勿令因此邪受用業長夜受苦隨其所能廢其業主菩薩如是雖不與取而無違犯此二種多生功德聲聞人佛滅度後盜佛物輕菩薩恆重又本應與他外命而反竊取豈大士之心耶此具性遮二業以侵他依報奪他外命令他憂苦王法之所不容亦制罪故此戒具五緣成重一是有主物二有主想三盜心取四直五錢五離本處一有主物者主有上中下三品之分物有輕重四種之別主有三品者佛法僧君親師為上品官民人天為中品鬼神劫賊禽獸為下品物有四種者一體重價重如金銀等二體輕價重如紬綾等三體重價輕如木石等四體輕價輕如草葉等佛物者謂供佛塔像之物乃至香花器具及施主供佛餘資也法物者謂供養經典之物及造經典資財律云盜經書計直結罪盜佛像供養無益為利毀壞犯逆僧物者謂供養衆僧之物及常住物等常住物有四種一者常住常住謂衆僧房舍器具花果林樹田園僕畜等體局當處不通餘界故云常住但得受用不得分賣永遠存留故復云常住二者十方常住如寺中供僧常食等客比丘來皆得受用故云十方不得將此處飲食輒移他處故云常住此二名僧祇物三者現前現前謂有檀越施物惟施住此處者或復指名施若干人故云現前當時施與不復存留故重云現前四者十方現前如亡五衆輕物應羯磨分若未作羯磨前屬十方僧隨方來者悉皆有分若已作羯磨現前自分後來者無分若有盜者犍椎未鳴從十方僧得罪已鳴從現前僧得罪感報如盲龍女之受苦高法眼之現報莊椿録云盜常住一文錢一日一夜長利三分七𨤲第二夜利上長利來世作牛馬償還若一文入常住一日一夜長福倍上觀佛三昧經云盜常住物者過於殺八萬四千父母之罪方等經云花聚菩薩言五逆四重之罪我亦能救惟盜僧物我不能救諸經要集問曰何故盜用僧物罪偏重耶答施主本捨一毫一粒擬供十方犍椎一響遐邇同聞聖凡受用俱成道業冥資施主得福無邊招善既多獲罪寧少耶君物者謂屬國王之物及偷稅冒渡等律云應先報明後求方便讚歎三寶功德利益廣大如不應允納稅方過親物者謂父母之物及所掌資財若父母恁用量親知亦歡喜無犯師物者猶重於親物以物是檀越信心慕道所施故也官物者謂九品官職之物民物者謂百姓之物鬼神物者謂祠廟中供具有人守護之物劫賊物者若劫是我物已作失想是物已屬於他則與我無涉後有勢力而奪取此為賊復劫賊計錢定罪禽獸物者下至六畜所銜之物不得奪取按五戒相經云有主鳥犯重無主鳥犯輕若盜鳥獸計直定罪又盜法有五一對面強取二私竊偷取三調弄取四寄付取五與已更奪是中犯者若盜上品物及中品中人物則重盜中品中天物及下品物結輕或雖重不失戒二有主想者亦具當疑僻六句有主有主想有主疑二句結重無主有主想有主疑二句結輕有主無主想無主無主想二句無犯又人物人物想人物疑二句結重人物非人物想及非人物非人物想人物疑及人物想四句結輕三盜心取者非與想非己物想非糞掃想非暫用想非親厚想正是業主四直五錢者西國一大錢此方直十六小銅錢若取五錢若取直五錢物結重四錢以下結輕或雖重不失戒若所取物此處不直五錢取處直五錢結重若此處直過五錢取處不直五錢結輕五舉離本處者他物置在此處移動令出本界或自移或教他移或方便移或呪移從此時結成盜罪詳如五戒相經若抵債不還前人決作失想時結罪若受寄不還亦如上若偷稅已過關津不復受詰時結罪若教人盜前人受教取離本處時結罪若教取某處某物彼人於異處取或取異物彼人結重教者結方便罪若教者是盜心受教者無盜心謂是取彼所應取物取離處時教者犯重受教者無犯若教者非盜心受教者謂是盜心取離處時受教者犯教者無犯若教令盜五錢取得四錢以下二俱結輕若教盜四錢以下受教者取得五錢以上受教結重教者結輕若本意不論多少取離本處二人俱計錢定罪若二人共盜物取離本處直五錢分時雖各得減五錢俱犯重此生有戒無戒後生憶不憶等俱如殺戒中辨是為犯不犯者與想己物想糞掃想暫用想親厚想及癡狂等華嚴二地品云偷盜之罪亦令衆生墮三惡道若生人中得二種果報一者貧窮二者共財不得自在共財者世間財物五家所共謂王賊水火不肖子孫惟功德法財不共他有也楞嚴經云縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著按此戒從菩薩心地法門戒心中慈心悲心益心及孝順心所出第三淫戒三初作犯止持若佛子自淫教人淫乃至一切女人不得故淫淫因淫緣淫法淫業乃至畜生女諸天鬼神女及非道行淫淫者不淨行也謂污穢交媾鄙陋堪耻名非梵行梵淨也行既非淨則污自體性亦污他人心地正是生死正因輪回根本自淫者自作污穢行教人淫者勸他作污穢行自作教他其罪相等又大士之行當以淨法度人不應教為染污業也一切女人者無論貴賤妍老少親疏等故云乃至也不得者出家人槩不應為也在家分其邪正故淫者淫事豈有誤也或遇難緣強逼或為惡人強執有受樂心即犯問亦有呪淫如摩登伽先梵天呪今何不制答淫事易就非殺盜可比何待呪術故略之也楞嚴云佛告阿難彼雖呪汝心清淨故尚未淪溺是也又故者揀非強暴所逼及無心也因緣法業者初起一念淫心為因次心相續助成為緣作用方便為法事成為業又楞嚴經云汝愛我心因也我憐汝色緣也以是因緣經百千劫法也常在纏縛業也乃至畜生女者舉劣結過謂從人趣至餘趣中一切女也諸天鬼神女者或有化現而為婦故非道者除三道餘一切身分是也善生經云在家菩薩若於非時非處非女處女他婦若屬自身是名邪淫謂此六種皆不順世間道理故名非道問天神畜女奚能近耶答楞伽經云昔有一王乘馬遊獵馬驚奔逸入於山林有牝師子與同遊處遂行醜事生諸子息又如董永感天仙織女為妻又劉晨與阮肇入天台採藥遇二仙女留宿楚襄王夢會巫山神女然非受佛大戒故無罪犯二作持止犯而菩薩應生孝順心救度一切衆生淨法與人應生者謂當於本源心地發起自利利他之大用也孝順是自利行觀衆生皆吾父母息滅邪心是名孝順心也若作行淫則逆天悖理喪以失性即惱害我父母豈稱為孝順耶救度是利他行救謂救出煩惱愛河生死苦海度謂度到菩提涅槃彼岸也淨法與人者應教人修不淨觀斬斷愛根永離生死苦本方為大士妙用楞嚴經云根本成淫輪轉三途如來涅槃何路修證必使淫機身心俱斷於佛菩提斯可希冀是也三違教結罪而反更起一切人淫不擇畜生乃至母女姊妹六親行淫無慈悲心者是菩薩波羅彝罪不擇畜生者謂識性昏迷荒淫無度故乃至者謂從疏至親但有可淫之境皆不應為也六親有其二種一父六親謂伯叔兄弟子孫二母六親謂姑姨姊妹兒孫於六親中作非法事世所希有此恐有邪見之人謂於自親無有犯他之過佛慈故制如昔有子欲於母身作非法方至床前地即裂開生陷地獄母即急捉惟得髮一把而身已陷矣可不懼哉如上諸境分為三品畜女名下餘一切人名中母女姊妹六親名上慈悲心者慈則能與菩提涅槃之樂悲則能拔煩惱生死之苦而菩薩應當起如是之心説離染寂淨之法救度衆生豈可反生淫人之念故曰是菩薩波羅彝罪楞嚴云我滅度後多此魔民廣行貪淫令諸衆生落愛見坑失菩提路豈非邪淫即無慈悲心矣又云此等衆生不得真淨繇殺盜淫反則無生有名鬼倫無名天趣若得妙發三摩提者則妙常寂豈非斷淫即佛慈悲行耶大論云制聲聞戒消息人情多防起邊所以輕者多起是故重制重者起希輕罪制之淫欲非性罪殺是性罪大乘制殺當初淫居第三也若聲聞非梵行在初者人多起故地繫煩惱重故殺雖性罪出家人起此罪希亦易防斷制之在次淫既易起制之當初也若以二聚攝歸不得故淫律儀戒淨法與人善法戒救度衆生攝生戒也此戒七衆菩薩共制大小乘亦同而制有多少五衆邪正俱制二衆但制邪淫就己妻妾復制非時非處若受關戒時無復邪正一切俱制犯者皆結重而聲聞同異大略如前舊云非性惟遮以男女居室世法所不禁故今言正淫可爾若邪淫事罪亦不輕況出家人既不娶婦觸境皆邪故知亦具性遮二業若在家菩薩受八關齋一日一夜斷於正淫可云惟遮業耳此戒三緣成重一是道二淫心三事遂一是道者小便道大便道口道若於人女天女修羅女鬼神女畜生女三道中行淫皆波羅彝若於人男天男修羅男鬼神男畜生男大便道及口中行淫皆波羅彝若於人黃門乃至畜生黃門二道中行淫皆波羅彝若於人二根乃至畜生二根二道中行淫皆波羅彝乃至一切已死者但令三道未壞於中行淫皆波羅彝若令一切男子於自身二道行淫皆波羅彝二淫心者正是業主謂心生喜樂如飢得食如渴得飲非如熱鐵刺身三事遂者於三道中男根得入如胡麻許據此時結重罪失戒體未入而中止結方便罪又如媒嫁等事自無迷染但結輕垢是此戒兼制是為犯不犯者為怨家所執如熱鐵刺身惟苦無樂或熟睡不知或狂亂壞心或轉生不自憶大小乘略不同小乘夢中失精不犯或云但自責心大乘若夢行淫寤應生悔訶責煩惱倍於聲聞也華嚴二地品云邪淫之罪亦令衆生墮三惡道若生人中得二種果報一者妻不貞良二者不得隨意眷屬楞嚴云縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女按此戒從菩薩心地法門戒心中定心護心慈心悲心及孝順心所出音釋其音罔極罔無也謂言父母之恩猶如昊天無有窮極也割目救父睒魔王子父有疚醫謂惟無瞋人目煎藥服之可療王太子言我是無瞋人遂割目救父發願代苦慈心童子偶斷母髮一莖墮於火輪地獄見諸罪者受苦無量即立誓言從之所受我悉代之發是誓已火輪即滅奉養無方無方者在在處處時時刻刻皆當奉養有何方所也思顯其親孔子曰立身行道揚名於後世以顯父母孝之終也恐辱其親樂正子春曰一舉足而不敢忘父母一出言而不敢忘父母是故惡言不出於口忿言不及於身不辱其身不羞其親可謂孝矣錫類不匱錫賜也匱乏也謂言自行孝道欲賜一切衆生皆行孝道無有乏也三觀三者空假中也觀即照了之義謂觀達一念之心即具三諦之法也若觀心空則一切法皆空若觀心假則一切法皆假若觀心中則一切法皆中空即真諦假則俗諦中即中諦此之三觀全由性發實匪修成故於一心宛有三用所謂一心三觀也又空者離性離相之謂也假者無法不備之謂也中即中正絶二邊對待之謂也真諦真諦者彰一性本實之理也所謂實際理地不受一塵是非雙泯能所俱忘指萬象為真如會三乘歸實際也俗諦俗諦者顯一性緣起之事也所謂佛事門中不捨一法勸臣以忠勸子以孝勸國以治勸家以和弘善示天堂之樂徵惡顯地獄之苦也五緣成就五緣者謂人僧界法衣鉢也又云一能受之人是人道諸根具足非破重戒具出家相先受沙彌戒後與受具二結界成就白四羯磨如法僧數滿足無別衆過衣鉢具足三自稱法名誠心乞戒及和尚名四心境相應運想周遍五事成究竟始從請師終於受竟前後無違青宮太子之宮也神異記云東方東明山青石為墻門有銀榜以青石雕鏤曰天地長男之宮又曰東方屬震震為長子也昔晉王為太子帝曰吾兒方位東宮以宮事相委也未振毛目振舉也毛目微細條章也言其略説大綱尚未舉其微細律儀也三聚戒聚集也戒禁戒也此三種戒能攝一切大乘諸戒故名三聚戒法苑珠林云大聖度人功唯在戒莊嚴論云初律儀戒以禁防為體後攝善攝生二戒以勤勇為體一攝律儀戒謂一切律儀無不聚攝也律即法律是禁止之義儀即儀式是軌範之義法苑珠林云攝律儀戒者要唯有四一者不得為利養故自讚毀他二者不得故慳不施前人三者不得瞋心打罵衆生四者不得謗大乘經典持此四法無惡不離故名攝律儀戒二攝善法戒謂所行之行能攝一切善法也所行之行者謂身口意所作善法及聞思修三慧布施等六度之法無不聚攝故名攝善法戒三攝衆生戒謂能攝受一切衆生也能攝之行即是慈悲喜捨慈名愛念能與衆生樂故悲名憐愍能拔衆生苦故喜名喜慶慶一切衆生離苦得樂故捨名無憎無愛常念衆生同得無憎無愛故以此等法攝受衆生故名攝衆生戒也見機得作謂見當殺機宜則行殺無害如殺一人而救多人斷色身而全慧命乃大士之洪規非聲聞力量所及故菩薩開聲聞則遮也那落迦此云惡者那落是者義迦是惡義謂造惡之人生彼處故此標正報也大士制心謂大士不怖生死大悲普度併絶殺心也聲聞制色謂聲聞不起大悲惟怖生死則僅除殺事故也大士害師犯逆謂師能長養法身是佛種子故聲聞非逆謂聲聞無望成佛故但犯重若聲聞恃此而故害師則出於有心必墮無間地獄不可不慎也波斯匿王唐言勝軍淨法師譯為勝光仁王經云是波斯匿王已於過去十千劫龍光王佛法中為四地菩薩二大將一名梨師達此云仙授謂從仙人邊求得子故也一名富蘭那此翻故舊是仙授之兄此兄弟二人是波斯匿王大臣於拘薩羅國錢財巨富無與等者而能於佛及四部衆等共受用不計我所富蘭那專修梵行離欲清淨不著香華遠諸凡鄙持戒為勝梨師達不專精梵行然其知足達四聖諦智慧為勝後時二俱命終佛記二人一持戒勝一智慧勝二俱同生一趣同一受生同於後世得斯陀含生兜率天一來世間盡苦邊際具德經云而於信心中能具大智慧仙授優婆塞是於信心中能持梵行故舊優婆塞是因王命征伐故稱為將未登不退謂尚在六住位也解行以下謂三賢下位也僧祇物此云四方僧物或云十方四方但局凡僧十方通於賢聖盲龍女大集經云有一盲龍女白佛言世尊我本因地造何罪業今受此餓龍身常為諸蟲食噉膿血苦不堪忍求佛解脫佛言汝前世時曾往寺林盜取十枚菴摩羅果食之由是因緣地獄受苦惡業未盡今受其報此業大重罪畢得脫佛告大衆言若四方常住僧物若現前僧物篤信施物或華果樹園飲食湯藥牀蓐敷具一切所須私自費用或持與知識親里白衣此罪重於阿鼻地獄佛説偈曰寧吞大赤熱鐵丸而使口中光𦦨出所有衆僧飲食具不應於外私自用寧以利刀自屠膾身體皮膜而自噉其有在家諸俗人不應取受僧雜食菴羅果其果似桃非桃似奈非奈生熟難辨葉似柳而長尺妍上音延美好也下音鴟醜癡也三摩地此云定慧亦云等持離沉掉名等令心專注一境名持智論云一切禪定攝心皆名三摩地楞嚴云從聞思修入三摩地消息人情消息猶酌量也故酌量人情起淫多故不淨觀亦名九想觀佛為衆生貪著五欲以為美好耽戀沉迷輪回生死無有出期故令修此觀法想念純熟心不分散若得三昧成就自然貪欲殄除惑業盡消得證道果一肨脹想二青瘀想三壞想四血塗漫想五膿爛想六蟲噉想七散想八骨想九燒想此之九種雖是假想然用之能成大事譬如大海中死尸溺人附之即得渡也斬斷愛根繇愛見為本故愛者貪之異名舉貪以攝瞋癡等即思惑也見者謂身邊等見即見惑也見思屬意地內因為本本即根也身口屬外助為緣若內因不生則外緣不起故須修不淨觀斬斷愛根也三慧自淑一聞慧謂聞法而生智慧也二思慧謂思惟而生智慧也三修慧謂修習而生智慧也淑善也慧起惑除故云善也
