body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述四不贖等戒二初列相九第三十一不行救贖戒二初作持止犯二初見賣又二初能賣佛言佛子佛滅度後於惡世中若見外道一切惡人劫賊佛滅度後者正顯末法惡世佛在世時人皆知善無此等事也因不達自心生諸異見欲勝佛道故名外道起不善心欲興害一切斷佛慧命故名惡人強奪三寶父母形像害發菩提心人故名劫賊如是等人不敬三尊不孝父母橫行逆害故名惡世也二所賣賣佛菩薩父母形像及賣經律販賣比丘比丘尼亦賣發心菩薩道人或為官使與一切人作奴婢者言賣佛菩薩父母形像者謂人有信敬之心念報佛恩以貴價香材及七寶等物造立形像而為供養或人子思親劬勞罔極亦如上繪造供養因有可賣之境故預制也又父母與子有大恩德等於三寶故類聚之又佛為大慈父菩薩為大悲母能與眾生樂能拔眾生苦若被惡人強奪或劫賊盜賣者則破滅佛寶也經律者經以開心見性律制三業六根賣則破滅法寶也比丘比丘尼者是人天福田住世僧寶賣則破滅僧寶也雖舉二部該通七眾發心菩薩者謂初發大心受菩薩戒者道人廼久修菩薩道者智論云得道者名為道人餘出家人雖未得道以修出世道故亦名道人皆是三寶之屬也如上等人或被他劫擄盜賣而為官差使或與士農工商等驅役不得自在故云或為官使與一切人作奴婢也此謂破辱三寶陷沒良人故云惡事也二應贖而菩薩見是事已應生慈悲心方便救護處處教化取物贖佛菩薩形像及比丘比丘尼一切經律菩薩見是事者外遇境緣也生慈悲心者內發道意也謂興慈令得尊貴之樂運悲令離卑賤之苦也方便救護者謂見前境等事大士正當於此末劫惡世之中護持佛法廣行善事化導眾生善巧方便盡力救護如己無能勸化檀越贖脫不得隱忍坐視也然不救則失於二利救則具足二嚴若見三寶破壞懈怠不救贖者三寶從此斷滅人間慧命福田亦無賴也二違教結罪若不贖者犯輕垢罪是中犯者菩薩見機不救非大士行故結輕垢此是遮業繇損辱三寶父母故制四緣成罪一應贖境謂尊像經律僧人等二應贖想六句二重二輕二無犯三無救贖心四令彼褻辱隨事結過設力不及而漠不關心亦犯輕垢若以三聚攝歸見賣生慈律儀戒方便救護善法戒教化取贖攝生戒也七眾同大小不全共小乘不贖父母得罪餘不見制大士弘護為任一切應贖不犯者若力不及或如法流通經典等第三十二損害眾生戒二初作犯止持若佛子不得畜刀杖弓箭販賣輕秤小斗因官形勢取人財物害心繫縛破壞成功長養猫狸猪狗刀杖弓箭是損害之具不得収藏販賣輕秤小斗是欺誑之具亦不宜用一切皆當平等短尺例同因官形勢等謂事如逼奪非佛子所為若有所得亦屬盜戒害心繫縛者謂損其形體破壞成功者謂毀其已成事業皆由索取不遂故也長養者畜養也謂猫能捕鼠名為地行羅剎狸能擒物而有多種不同小者如鼠大者如猫善能捕鼠擒物皆不得畜也猪狗二種終須損害養生害生恩中具𬽦雖不殺他殺因具矣如上六種皆惡律儀害物傷慈非所應也小乘律中畜狗為守護住處故開二違教結罪若故養者犯輕垢罪是中犯者販賣殺具非義求財枉害一切故結輕垢此具性遮二業繇遠妨損害乖慈故制前第十畜殺具此則販賣繫害十二販賣良人棺木此則販賣刀杖等具十七單明恃勢此列六種兼制故前後各異若以三聚攝歸不販殺具律儀戒斗秤平用善法戒不因官勢攝生戒也七眾同善生經云若優婆塞為於身命若作市易斗秤賣物一說價已不得前却捨賤趣貴斗秤量物任前平用如其不平應語令平若不如是得失意罪在家尚爾況出家者大小俱制惟遮不開第三十三邪業覺觀戒二初止持作犯二初惡心若佛子以惡心故惡心者揀非見機益物直是邪思邪覺逐情流轉有違心地故也菩薩應當思惟出世道業不得參於世間雜事參於雜事正念昏迷無所不作業既非正其覺亦邪故名惡心也二列事五初觀鬪觀一切男女等鬪軍陣兵將劫賊等鬪觀即能觀之心一切乃所觀之境男女等鬪有其二種一男女戲舞鬪要二忿諍鬪毆軍陣等鬪亦二一兩國戰鬪二賊兵敵鬪大經云象馬牛犬及雞雉鸚鵡等鬪亦不得觀廼至𠒋酒無賴之徒等鬪亦不應看看則必有傷損亦令人生不善心自失威儀致俗譏議非行菩薩道者二聽樂亦不得聽吹貝鼓角琴瑟箏笛箜篌歌呌妓樂之聲貝即海螺吹以發樂鼓者斫木為匡革鞔兩面擊以助樂角即牛角軍中吹之以為號令又能驚馬琴即絃琴此方羲皇始作五絃後文王加少宮少商而為七絃瑟庖犧始作五十絃虞舜改為二十五絃箏十三絃蒙恬所作笛長一尺四寸七孔橫吹以竹為之丘仲所作箜篌二十四絃師延所作亦竹為之已上八事皆假物成聲也歌呌者男女自音唱咏也雖則人樂有異一入耳根使心流蕩無殊所以不得聽也妓樂者謂貝鼓廼至笙簧簫管琵琶三弦二弦等又倡妓等悉屬妓樂古人多使婦女作之故字從女斯皆放逸之門妨修道行但增欲樂無益身心縱是見機得宜示同邪業然業不自邪心惡故邪故以惡心首言也若志在導邪歸正則非邪惡之心盡屬菩薩遊戲神通三昧事也義疏雖開供養三寶得作自娛不許亦非許僧自為廼使俗人作也三雜戲不得樗蒱圍棋波羅塞戲彈棋六博拍毱擲石投壺牽道八道行城樗蒱廼博籌也圍棋即十九路大棋也波羅塞戲者波羅是梵語塞戲是華言塞音賽即博塞謂以采相勝曰塞說苑云行棋相塞謂之塞也彈棊按此方漢宮人以粧奩為戲或以棋子相擊亦曰彈棋也六博魏陳思王所作雙陸戲也拍毱即今踢毬也擲石投壺者古用石擲今用矢投也以中者為勝牽道八道行城者即四門八路棋也如上事雖各別而皆是賭博之類大士修習人空法空大道豈懷勝負之心而欺眾生耶四卜筮爪鏡蓍草楊枝鉢盂髑髏而作卜筮爪鏡者即圓光法也謂以藥塗指爪上或用呪術呪指使明如鏡故曰爪鏡照見人事以現吉凶也蓍草此方出羲文之墓上覆雲氣下守靈龜藂必滿百莖必長丈用之以占禍福然此方雖出羲文之墓而天竺先並有之皆以此草而䇿楊枝者或無蓍草即以楊枝為䇿如此方用巫師呪祭樟柳成神名樟柳神以報休咎之類等也鉢盂者以盂盛水口誦呪術用刀攪水令定以斷吉𠒋即攪水碗法也髑髏者取新亡髑髏以邪術呪祭之即能從人耳邊預說灾祥名耳報神也卜筮者龜曰卜蓍曰筮此總結上五事以占吉凶皆名卜筮也以卜筮之道雖聖賢趣吉避凶方便之法然受佛戒者不應為利而作也五賊使不得作盜賊使命一一不得作不得者謂盜賊尚不可近何況為彼作使耶是故遮止一一不得作者謂如上觀鬪能起凶惡心娛樂能起淫泆心雜戲能起散亂心卜筮能起惑著心使命能起奸詭心五種皆是邪命事事亂道故云一一不得作也二違教結罪若故作者犯輕垢罪是中犯者貪於觀聽心色俱迷賭術求財為利作使非行菩薩道者故結輕垢此是遮業若作盜賊使命具性遮二業繇所運為皆非正業故制若覺觀邪業則妨廢正道失二世利不覺觀邪業則離諸掉悔定慧易生也若以三聚攝歸不往觀聽律儀戒不作眾妓善法戒不作賊使攝生戒也夫為佛子無為無欲清淨自守若為賊使命則降志辱身敗壞佛門古云不事王侯高尚其事況乎形服超世而甘為賊使乎戒本經云若菩薩嬾惰懈怠耽樂睡眠若非時不知量是染污犯性利煩惱更數數起亦可此戒兼攝出家五眾同制在家供養三寶得作妓樂出家不得自作若供養三寶亦聽使白衣作大小俱制不犯者或見機益物等如昔慧全禪師雖坐禪積業外學未絕不免生婆羅門家故為害非小也賢愚經云佛言過去世時有一國王名曰法增有慈悲心政法治國無事閑暇共人博戲時有一人犯法諸臣白王外有一人犯於王法云何治罪王時慕戲便失答言臣即按律殺之王博戲已問諸臣言向者罪人今何所在臣白王言隨國法治今已殺竟王聞悶絕躃地良久廼甦即捨國入山自守時王命終生大海中作摩竭魚身長六百由旬多有諸蟲唼食其身身瘙癢故揩玻瓈山碎殺諸蟲血流污海百里皆赤以此罪緣命終墮大地獄有如是過可不戒哉第三十四暫念小乘戒二初作持止犯三初護戒若佛子護持禁戒行住坐臥日夜六時讀誦是戒猶如金剛如帶持浮囊欲渡大海如草繫比丘護持禁戒者謂禁防曰護魔無能侵故堅守曰持心無有退故禁即約束義令五根不動故戒即止滅義令意地不起故又此五十八戒皆是舍那金口親宣如王禁敕無敢故違故曰禁戒此則總標行菩薩戒行也行住坐臥者四威儀也日夜六時者晝夜各三時也於此時中護持佛戒守護心城則不被境風所鼓也讀誦是戒者正明護持之義讀以對本尋文知其持犯誦以離本究心明其指歸也金剛者從喻得名有其二義一喻戒能破諸煩惱劫賊二喻大士心堅護持猶如金剛也浮囊者渡海之具也天竺渡海之人或以鳥翎毛袋作或用牛羊皮作或持牛脬常帶其身海船若壞即吹氣浮身以渡大海喻出大涅槃經昔有商人持囊渡海羅剎從乞毅然不許復從乞半廼至絲毫皆悉不與喻持戒者在生死海中遇煩惱羅剎欲壞重戒廼至輕垢一微塵許不可得也草繫比丘者大莊嚴論云迦葉佛時有一比丘途中被賊劫奪衣物賊慮鳴眾來追兼欲害命內有一賊知比丘法謂餘賊言不必殺之但以生草繫縛其手足彼戒謂草木有命不敢毀傷自弗動耳賊如其言繫之比丘守戒寧死不移賊去已遠復有行路人來方解其繫今明大士護持此菩提心戒亦應如聲聞之護律儀寧死莫犯也二生信常生大乘善信自知我是未成之佛諸佛是已成之佛常生大乘善信者謂念茲在茲無有間斷也此承上文雖能護戒若無正信淨因財戒止散善而已自知我是未成之佛者謂生佛本無二心眾生定當作佛特已成未成之別實先佛後佛何殊所謂常作如是信戒品已具足也二乘繇無此信故無望作佛亦無望一切眾生作佛大士於此諦信不疑故能自度度人同成正覺也諸佛是已成之佛者謂諸佛已得三身圓滿萬德具足五住究盡二死永亡是故我能如是修因必然如是證果若少有怠惰即失當來莊嚴之果佛也三發心發菩提心念念不去心發者開發也菩提心者即佛心也所謂是心是佛是佛是心向因沉迷故須開發也謂前雖具大乘善信若不發菩提心其信即無所依故當發此大心以堅其性也然護持禁戒行也常生善信信也我是未成之佛解也謂菩提心乃是信解行中本覺智體信解行三雖具此體若證佛果必以所發大乘菩提心而為主也問大菩提心從何而出生耶答從大悲生如無盡意經云為欲救度一切有情故起悲願等力趣求無上菩提若不為度眾生我即不發是菩提心華嚴云從初地乃至十地於地地之中皆以大悲為主菩提心論云從悲發生大菩提心所有最勝一切佛法皆由悲心而為根本無差別論云因時即是菩提心果滿德圓名正覺菩提心法不思議諸佛如來皆稱讚無畏上授問經云發菩提心所生諸福如虗空界廣大勝上無有窮盡正使有人以恒河沙數佛剎滿中珍寶供養世尊若復有人合掌至誠一發無上正等菩提心者而此福德勝前福德不可校計成佛經云諸法無相為虗空相作是觀已名勝義菩提心當知一切法空以悟法本無生心體自如不見身心住於寂滅平等究竟真實之智令無退失妄心若起知而勿隨妄若息時心源空寂萬德斯具妙用無窮所以十方諸佛皆以勝義行願為戒但具此心者能轉法輪自他俱利也念念不去心者正見護持禁戒之義謂剎那之間不捨此菩提心方是菩提純熟戒行則佛果可期矣又復當知我心即諸佛心故上求佛道復知我心即眾生心故下化眾生而於此心此念須臾不可暫離若一念有離即是起二乘自度之心也止觀云退大取小眾聖所呵菩薩不爾見眾生苦同於己苦起大慈悲愛同一子如母得食常憶其兒若住於空即有棄他之過亦不能淨佛國土教化眾生具足佛法皆不能辦是以菩薩雖入世間生死煩惱不能損其智慧雖佛道長遠不以為遙雖眾生數多而意有勇心堅無退精進發趣初無疲怠故云菩薩於生死而有勇於涅槃而不味勇於生死無生而生不為生死所染如蓮花在泥不為泥之所污輔行云經說高原陸地不生蓮花卑濕淤泥乃生蓮花故知涅槃高原不生菩薩大悲之華生死泥中廼有菩薩利生勝用雖在生死而生死不染蓋大士誓堅志勇故云念念不去心也二違教結罪若起一念二乘外道心者犯輕垢罪若起一念二乘外道心者謂於所信所解所行所發之中不應起一念自度之想若起一念自度之想即離菩提心捨菩提願即名外道故等二乘曰外道也可見持菩薩戒者不應起一念二乘心起此一念則同於外道矣所謂毫釐夾雜三塗苦因故結罪垢問只此一念云何犯罪耶答雖云暫念佛種有傷失菩提心如舍利弗往古劫中發菩提心行大布施有婆羅門從之乞眼舍利弗言眼在我身其用甚大施與汝者極為無用婆羅門堅固索眼舍利弗剜眼與之婆羅門視而擲之擲而唾之口稱穢惡脚踏而去舍利弗言向為汝說此眼無用汝堅欲得今復賤棄眾生頑劣殆不可化不如早求自度遂退大心還習小法至釋迦佛時始證羅漢一念自度失大善利可不慎歟此是遮業繇乖本所習故制欲背大向小計未成犯前第八背大計成失戒在第十重此戒所制不欲背大正言小乘易行且欲斷結然後化生故遮若以三聚攝歸護持禁戒律儀戒常生善信善法戒發菩提心攝生戒也七眾同大小不全共同謂同不得起外道心二乘是其本習不犯者若權入二乘外道為化彼故不犯第三十五不發願戒二初作持止犯三初發願若佛子常應發一切願常應者揀非一發而已惟應數起令菩提心相續不斷故也一切者該下文十事而言願者希求欲樂之義一切殊因妙果無量善法若無希求欲樂之心皆不能遂故菩薩常應願求勝事緣心善境將來因此克遂故當常發也二明事孝順父母師僧願得好師同學善知識常教我大乘經律十發趣十長養十金剛十地使我開解如法修行堅持佛戒孝順父母師僧者此是知報益即持戒願也以孝名為戒故為十願之根本根本若虧九願隨失故第一願即舉孝也願得好師者此是成器益上父母師僧是說孝奉此好師是擇明師也謂行解雙備曰好若有解無行何能誘我前進若有行無解何以開我心地是以酬報二親紹隆三寶皆賴師長教誨力成故十願中師為最要善根雖宿植開悟由良師然弟子雖具信心而無良師訓導切磋琢磨不成法器故第二願得好師也同學善知識者此是夾輔益同為同學大乘戒法之人善為善解心地法門之友謂雖遇明師開解更須善友提擕如臨濟激發於座元昌黎得入於侍者是以求師為最訪友為先故第三願得同學善知識也常教我大乘經律者此是了義益謂願如上師友常教我大乘經律義理分明發正信心修進十發趣等位免墮二乘偏空外道邪執之見若不知大乘經律則福慧不能頓圓故第四願求法也十發趣者此是住真益謂已聞大法當起大心趣入妙道有住義故若不發心於道無益故第五願解發趣也十長養者此是化俗益謂既發大心趣道當滋長培養積功累德有行義故若不滋培則無深進故第六願修長養也十金剛者此是向中益謂既長養菩提當智悲雙運順入法界猶如金剛堅固不動有回向義故心若不固佛果難成故第七願解金剛也十地者此是入聖益謂前發趣長養堅固菩提已立賢位功用至此當入聖位故若無此地則菩薩妙行不能發生故第八願解十地也使我開解如法修行者此是悟證益開謂開我心地解謂解甚深法謂如上賢聖之理當知皆由師友所出令我開解即當依理起行如法修行也若不修行開解何益故第九願得開解如法修行也堅持佛戒者此是淨業益初以孝順為戒今此第十還以持戒而結故知始終皆以心地正戒而為大乘宗趣是以無量法門百千勝定無漏妙慧莫不繇戒出生三賢十聖以至妙覺極果悉因戒得若不堅持何能得證故第十願堅持佛戒以立其本也三總結寧捨身命念念不去心寧捨身命者謂總發其誓以固其願也念念不去心者謂於前十願發堅固心念念不忘縱遇喪身失命因緣誓不貪惜四大而捨去此心違犯於如來禁戒也二違教結罪若一切菩薩不發是願者犯輕垢罪一切菩薩不發是願者謂從初得戒以至十地不發此十大願則志不堅牢加行進修猶恐為魔所障中途成滯而妙覺果海無由得至故云莊嚴佛界事大獨行功德難成故須願力相持譬如牛力雖能挽車要須御者方有所至是知志不可不堅願不可不發若違斯制罪結輕垢圓覺經云當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘依願修行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴域是也此是遮業繇不發願求善之心難遂故制謂若無大願難尅大果應發不發隨時結過若以三聚攝歸常應發願律儀戒念不去心善法戒如法修行攝生戒也七眾同大小異小乘若不願速出生死希求人天後有相續亦犯責心罪惟遮不開第三十六不發誓戒二初作持止犯又二初標勸若佛子發是十大願已持佛禁戒作是誓言所言誓者自矢曰誓蓋謂期其志而必到者願為之先導也堅其願而不退者誓為之後驅也誓是必固之心亦廼願中之勇烈意尤恐始行心弱宜須防持誓願之福不可稱計欲得至甘露滅盡之處故願後須發誓也又前來十願雖發無誓安克有終故以五誓堅其願使無畏怯尅彼終修也又願以進德修善為力用誓以防非滅惡為功能發句是牒前持句是起後先願後誓者猶馬有轡勒更加鞭䇿也二發誓五初離欲染誓寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行寧以者是發堅誓之懇詞亦即較量弘願之切語也謂流轉生死根本婬欲為第一染污本源心地不淨行為先是故首發大誓也猛火焚燒苦大坑陷墜苦刀山割刺苦如上三苦五寧忍之終不忍背經律共諸女人作不淨行也良以紅爐白刃壞色身於一時花箭蜜鋒沉慧命於萬劫較苦重輕寧忍此而不為彼也此誓出家全發在家惟於邪婬境發夫男女居室世間正法尚嚴此誓況黃門男子逆理亂常又何必言故律及阿含之中佛因野火熾然為諸比丘說此諸誓其根熟者頓斷惑染未熟者懼罪捨戒弗不止之誠不欲其壞法門故也二受供養誓復作是願寧以熱鐵羅網千重周匝纏身終不以此破戒之身受於信心檀越一切衣服復作是願寧以此口吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食於信心檀越百味飲食復作是願寧以此身臥大猛火羅網熱鐵地上終不以此破戒之身受於信心檀越百種床座復作是願寧以此身受三百矛刺身經一劫二劫終不以此破戒之身受於信心檀越百味醫藥復作是願寧以此身投熱鐵鑊經百千劫終不以此破戒之身受於信心檀越千種房舍屋宅園林田地復作是願者前文作誓今仍言作願者謂須作願如誓也此乃誓不破戒非謂誓不受供也其衣服飲食臥具醫藥房舍園田信心檀越為求福故供養於我我戒若全猶須深生慚愧儉用以施悲敬二田展轉令生福善如戒有虧粒米難消何堪酬彼所求故須設重誓以自防護而作是言寧以熱鐵羅網纏身寧吞熱鐵丸寧臥熱鐵地上寧受三百矛刺身寧投熱鐵鑊如上受種種苦終不以此破戒之身受彼種種供養也寶積經云佛告迦葉我常說言寧燒鐵鍱為衣不以破戒之身而著袈裟寧吞熱鐵丸不以破戒之口食人信施摩得伽云若得食時口口作念正此意也三受恭敬誓復作是願寧以鐵鎚打碎此身從頭至足令如微塵終不以此破戒之身受於信心檀越恭敬禮拜禮拜雖不費財而信心慇重故有人於三寶所以恭敬心一瞻一禮罪滅無量福生無邊瓔珞經云菩薩初生時周行七步次舉左足徧滿三千虗空境界不嬈眾生無覺知者其有眾生覩足輪相皆發無上正真道意斯由如來曩者禮敬之報是知得福既多獲罪寧少今以破戒之身受他禮敬尚自損福不淺何能令彼益善有慚愧者可深思之四淨六根誓復作是願寧以百千熱鐵刀矛挑其兩目終不以此破戒之心視他好色復作是願寧以百千鐵錐劖刺耳根經一劫二劫終不以此破戒之心聽好音聲復作是願寧以百千刃刀割去其鼻終不以此破戒之心貪嗅諸香復作是願寧以百干刃刀割斷其舌終不以此破戒之心食人百味淨食復作是願寧以利斧斬斫其身終不以此破戒之心貪著好觸前誓身口不堪受他四事等供今誓六根不應恣染五塵而不言意根者五根皆云破戒之心心即意也況意根無形法塵非像不可同五根為喻然意根緣於五塵境中分別美惡即是法塵故不可更別立法塵也如此六根染於六塵如蠅著唾猶猴膠五令喪戒身永失慧命是故須發重誓以防之立重難以制之也寧受百千刃刀矛錐之楚痛不視好色乃至貪著好觸好觸即輕衣上服臥具等今以此誓心截其惡源方能生諸善根故遺教經云五根賊禍殃及累世為害甚重不可不慎是故智者制而不隨持之如賊假今縱之皆亦不久見其磨滅智度論云如佛偈言寧以熱鐵宛轉眼中不以染心邪視女色有智之人所不應視若欲觀之當如母姊諦視觀之不淨填積婬火不除為之燒滅色過既爾餘聲香味觸法例可知矣五度眾生誓須作是願願一切眾生成佛前四誓雖云自度然亦兼利他之義何也菩薩修行本為眾生苟不自度焉能度人非同二乘之獨利故今此誓願生成佛正顯大士之本懷自利利他共成佛道之大誓也若無此願回向佛道則前之願誓並成人天福報二乘小果而已問願生成佛慈悲心耳較諸猛火熱鐵等喻似不相類云何名誓答若非矢志決心何繇廣度羣品地獄未空誓不成佛其勇烈何如耶安得不為之誓二違教結罪而菩薩若不發是願者犯輕垢罪大士修道誓願為先若不發心罪結輕垢此是遮業繇缺二利故制為防退心觸境不發隨事結過若以三聚攝歸持佛禁戒律儀戒作眾誓願善法戒願生成佛攝生戒也出家五眾同制在家無受供事但有六根度生之誓大小不全共同者同前四誓異者小乘不制第五度生誓也惟遮不開第三十七冒難遊行戒三初作持止犯二初標遊止時若佛子常應二時頭陀冬夏坐禪結夏安居二時者春秋二時也謂此時氣序和暢寒暑不侵正大士行化之時無妨損故而有二義一慎時謂不傷己身二護生不損他命故也頭陀是梵語亦云杜多華言抖擻謂抖擻客塵煩惱增長五分法身故其行則有十二如大般若經云一住阿蘭若此云寂靜處二常行乞食離懈怠故三衲衣即糞掃衣四一坐食日惟一食五節量食稱量而受六中後不飲漿謂果汁也七塚間坐八樹下坐九露地坐此三對治煩惱十常坐不臥禪觀增進十一次第乞食不揀貧富十二但三衣不畜長物此於飲食衣服住處無所貪著是離蓋障速得解脫也大論云佛所結戒弟子受持十二頭陀不名為戒能行則戒行莊嚴不能行亦不犯戒譬如布施能行則得福不能行亦無罪也冬夏坐禪者謂嚴寒酷暑不堪行道當收攝身心以修禪定也結夏安居者是菩薩比丘正制也心形寂靜為之安要期住此謂之居謂當於此住處九旬之中加功用行䇿進修行故而有前後之分從四月十六日至七月十五是前三月安居之時分五月十六日至八月十五是後三月安居之時分故律云前安居者住前三月後安居者住後三月於此時佛制不聽遊行也結在夏四月者謂此時草木蘩茂地多蟲蟻恐損傷物命故也二明遊止事又二初明頭陀事常用楊枝藻荳三衣缾鉢坐具錫杖香爐漉水囊手巾刀子火燧鑷子繩床經律佛像菩薩形像而菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身頭陀者從正月十五日至三月十五日八月十五日至十月十五日是二時中此十八種物常隨其身如鳥二翼常用者謂此十八種物廼是行菩薩道之要具也謂楊枝淨口藻荳潔身三衣蔽形以超俗染一鉢知足以離邪命缾注法泉具開聖地錫杖豎賢聖之標香爐示清淨之體漉囊救物巾布掃塵刀斷愛根燧取智火鑷子拔除煩惱繩床脫略貢高經契一心律規三業佛像是得戒本師菩薩為同學等侶也據事可爾論理各有所表謂楊枝表淨口業藻荳表淨身業缾水表淨意業鉢表空無煩惱三衣表福田之相坐具表法身之基杖表智德全彰爐表戒香馥𩡏漉囊表慈悲之行巾布表却妄之需刀表降法界諸魔燧表使慧光普照床表坐法空之座鑷表拔結使之根經表佛性本源律表如來慧命菩薩表心地之妙因佛像表如來之極果欲得極果要繇妙因欲階妙因先明本源心地如是十八種物事備理足瞬息不可離身以為行道之切要離則非行菩薩道之行也百里千里者百里近也千里遠也謂菩薩行來不論遠近此十八種物當常隨其身也正三月者春分時也八十月者秋分時也謂氣分纔交不寒不熱正可化度也如鳥二翼者借喻表顯以誡持物之心至切也謂鳥之出入全憑兩翼若無兩翼終不能飛菩薩修道佩十八物亦復如是故云如鳥兩翼常隨其身也若非此時必事事隨眾若但知持物而不究心者亦非菩薩本念也戒疏發隱云世有受菩薩戒者漫於戒義略不留心汲汲乎惟十八物是辦而已肩荷隨身便為了畢而或執著鉢盂不隨眾食器者執著繩床不隨眾坐席者膠彼𤨏儀忘其大義居然菩薩藐爾傍僧作犯止持尚猶未悉復何論上求下化之弘規耶噫弊也久矣二明誦戒事若布薩日新學菩薩半月半月布薩誦十重四十八輕若誦戒時於諸佛菩薩形像前誦一人布薩即一人誦若二及三人至百千人亦一人誦誦者高座聽者下座各各披九條七條五條袈裟結夏安居一一如法新學者恐初受戒人不知誦戒之常法故特舉勸而舊學戒者自當知布薩之恒規母待言也半月半月誦者謂黑白半月之中應當布薩長養善法也於諸佛菩薩形像前誦者此明遊行布薩之法所以十八物中有佛菩薩形像及經律也若在僧伽藍中誦小乘戒聚集法堂誦大乘戒當移佛殿此表三寶現前若座上供佛則不必移也一人布薩即一人誦者是獨住之人也至百千人亦一人誦者謂聽則不亂也誦者高座聲朗易聞聽者下座尊人重法袈裟者壞色服也九條者乃九品大衣中之下下品衣也今略舉者表半月誦戒出九有利九界之初門也七條者七衣也表半月誦戒以淨身口之七支也五條者五衣也表半月誦戒圓滿五分法身之體也此謂三衣俱著非許單著五衣七衣可誦戒也此但指菩薩比丘比丘尼誦戒儀式若小三眾止許用縵服縵者無紋名為無縫袈裟若在家二眾誦戒及入壇時禮佛禮僧亦得用無縫衣餘時不得結夏安居者謂前已明遊行布薩之法此結夏安居布薩亦當照上如法而行也二止持作犯若行頭陀時莫入難處若國難惡王土地高下草木深䆳師子虎狼水火風劫賊道路毒蛇一切難處悉不得入若頭陀行道乃至夏座安居是諸難處亦不得入國難者謂地方不寧處惡王者謂人境不和處土地高下者謂多險隘處草木深䆳者謂往來多礙處獅子虎狼者謂多恐怖處水火風者謂多妨修道處劫賊者謂多驚駭處道路毒蛇者謂多傷害處一切難處者謂總結悉不得入也若頭陀行道者謂不唯頭陀時不得入廼至夏坐安居是諸難處亦不得入若當安居而不安冐寒暑而遊行者亦名冐難遊行也良以忍力未充不免多存我相雖持禁戒不可僥倖行險一有所損令人生謗謂持戒者不能免其禍橫而反生退息也三違教結罪若故入者犯輕垢罪佛子行道先要觀時觀處知有難緣便不得往不惟障道抑且招譏若廼自恃有德無妨諸怖違佛言教強入險處遊行者罪結輕垢此戒正制冐難遊行兼制備十八物如法誦戒蓋冐難遊行恐致夭逝在危生念所喪事重大士雖宜為法忘身豈應不慎招損古云知命者不立巖墻下也此是遮業繇不慎遊行故制三緣成罪一是難處二難處想六句二重二輕二無犯三正遊行發足後步步結輕十八物應備不備隨事結過半月誦戒或不誦雖誦不如法亦隨事結過若以三聚攝歸半月布薩律儀戒安居坐禪善法戒二時頭陀攝生戒也七眾同善生經云若優婆塞險難之處無伴獨行得失意罪設有事緣多伴同往非犯大小不全共同者不得冐難遊行異者大士制十八物聲聞惟制六物隨身餘非所制不犯者或先非難處正遊行時難事忽起或為求法度生及癡狂等第三十八乖尊卑次序戒三初作持止犯若佛子應如法次第坐先受戒者在前坐後受戒者在後坐不問老少比丘比丘尼貴人國王王子乃至黃門奴婢皆應先受戒者在前坐後受戒者次第而坐應如法次第坐者此戒繇上布薩而來以明聽眾當如法如律次第而座不可紊亂佛制也次第有二種一平常次第謂七部平時當依位次而坐也二誦戒次第謂誦戒時七部之中各當依本部戒次先後而坐也不問老少者有二義一者通論七眾義謂百臘尼受菩薩戒亦百臘不得於初夏小乘比丘前坐乃至優婆塞生年百歲亦受菩薩戒百臘不得於小乘驅烏尼前坐況沙彌及比丘等二別論戒次義謂比丘比丘尼皆須兼論大小戒次如西域大小各住男女別居若誦戒時偶集一處者在大依大在小依小不得以大奪小故如文殊應闍王請讓迦葉前行謂其久為沙門居眾羅漢之首迦葉復讓文殊稱文殊神智聖達辯才廼可為尊文殊於是前行繇闍王從文殊得無根信故特請之意在文殊不在迦葉而文殊始讓迦葉不敢違古佛之恒規迦葉終遜文殊所以順請主之本意又如南山神請華嚴法師而置座五百羅漢之上此在大依大在小依小平時不亂戒次明矣其餘五眾各自論受戒次第不論生年可知也貴人國王王子者論先敘七眾尊卑定分次各就其名位自敘戒次也又王子等雖受菩薩大戒既未出家仍不得居君父之先故又自為一類也廼至者超略之辭意顯長者宰官婆羅門居士等別為一類以此輩人就世法中或序爵序齒序德原無定局故今惟當序戒然雖序戒未出家人固不得紊亂君臣名位也問君臣父子主僕既同受菩薩戒猶須各為一類何故律中臣子僕先受具君父主後受具便為下座耶答比丘戒法現出世相非世法攝君父主若不聽則臣子僕不得出家既君父主聽許一出家時便永捨臣子僕名位故君父主後設出家受具即以彼為上座設不出家亦以彼為尊者福田若夫菩薩戒法通於世出世間不壞俗諦故雖受菩薩戒君仍是君臣原是臣父子主僕亦爾若欲亂其名位而統序戒次則世法不成安立矣又問一出家時便捨臣子僕位豈非無父無君正被儒者所譏答但捨虗名不捨恩義故律制比丘當精勤行道以報親恩說法勸善用酬王化若不報恩孝養則得重罪非佛弟子此即不廢忠孝矣又比丘如法修行弘通至教令天龍慶喜護國安民過現父母同離苦海此更成就出世忠孝矣然則忠孝大義孰過出家出家之要當尊戒臘故須次第而座也二止持作犯莫如外道癡人若老若少無前無後坐無次第如兵奴之法我佛法中先者先坐後者後坐莫如者教誡之辭外道癡人是無禮儀者廼呵㡿之言也若老若少者謂外道但以生年利根為長不知次第而坐故如來喻之也兵奴之法者謂兵奴出入以軍令主命聽事為務隨到隨止不暇序其禮儀故若比丘至布薩堂中不問戒次而即敷坐者便如此法也我佛法中定不然耳若布薩時先問得戒時節然後依次而坐比丘坐已序比丘尼乃至在家二眾故云先者先坐後者後坐也三違教結罪而菩薩一一不如法次第坐者犯輕垢罪出世聖道先覺為尊坐無次第違佛亂教罪結輕垢而出家菩薩必應善學律儀以膺人天禮敬庶幾不辱僧體堪為福田固不得徒事謙恭尤不得但恃堂堂僧相空腹高心增長我慢濫叨聖賢之標正恐人身未可常保袈裟一失厥苦方深故相與而痛勉之也此是遮業繇乖亂失儀故制三緣成罪一非次謂通別二種二非次想六句二重二輕二無犯三正坐坐者及使坐者同犯隨一一結罪又善生經云優婆塞若在比丘沙彌前行得失意罪若以三聚攝歸如次而坐律儀戒不違佛制善法戒謙卑遜順攝生戒也七眾同大小共不犯者或登座說法不依次序及癡狂等第三十九不修福慧戒二初作持止犯二初修福若佛子常應教化一切眾生建立僧坊山林園田立作佛塔冬夏安居坐禪處所一切行道處皆應立之常應教化者謂菩薩教化眾生應須長遠如是不得間斷也一切者總該王臣士庶而言建立者令生人天之福出世之善類分七處一僧坊以聚眾安修二山林以蔭眾行坐三園圃以供眾蔬果四田地以充僧粮食五佛塔梵語窣堵此云塔亦云可供養處謂供佛形儀及舍利在內令人天瞻仰增修福慧故名佛塔六冬夏安居坐禪處謂修道坐禪者有所依止故七一切行道處謂菩薩隨方化度有益便停但有可止息處皆應建立僧坊佛塔故云一切行道處皆應立之也以止佛塔是供佛安居坐禪僧坊是供僧行道是供法三寶一供其福修矣二修慧而菩薩應為一切眾生講說大乘經律若疾病國難賊難父母兄第和尚阿闍黎亡滅之日及三七日四五七日乃至七七日亦應講說大乘經律一切齋會求福行來治生大火大水焚漂黑風所吹船舫江河大海羅剎之難亦讀誦講說此經律乃至一切罪報三惡八難七逆杻械枷鎮繫縛其身多淫多瞋多愚癡多疾病皆應講此經律應為一切眾生講說大乘經律者謂如來為大醫王法是眾生良藥處處講說正明應病與藥也先總舉修慧之大綱後別明修慧之緣境其為疾病講經律者令知身空寂故為國難講者令保護國界故為劫賊講者令彼息惡興慈故為父母兄弟和尚阿闍黎亡滅之日講者令親緣利樂師長證知我報恩故藉此功勳往生淨土以見孝名為戒故為一切齋會講者令彼所求得如意故為行來治生講者令彼具足功德法財不生憂慼故為水火風講者令彼愛水乾枯不生熱惱故為黑風所吹船舫講者令彼浪靜風恬慈航普渡故為羅剎之難講者令彼惡念消除善心增長故為一切罪報等講者令彼轉難成祥身形解脫故為多淫多瞋多癡等講者令彼滅三毒苦發生清淨慈悲智慧三心不被煩惱所縛故又為多疾病講者前是暫時病苦此非一日病苦故言多也如上處處講說大乘經律以見教化無偏則慧修矣不修則失二種莊嚴修則菩提資粮任運增長古云修福不修慧象王掛瓔珞修慧不修福羅漢感空齋若福慧雙修則成佛兩足尊矣二違教結罪而新學菩薩若不爾者犯輕垢罪是中犯者謂福慧二嚴成佛根本初學菩薩愈當精進如或懈惰不修則自他失利故結輕垢此是遮業繇乖出要之道故制如上七處隨力應修若遇緣當為而不為一一結罪戒本經云若慊恨心是染污犯若懶惰懈怠非染污犯若以三聚攝歸講說經律律儀戒福慧雙修善法戒教化一切攝生戒也七眾同大小不全共聲聞夏安居時應修房舍餘時不制大士一切時中應修福業不犯者或常修禪誦等一切勝業無暇他營及無力者悉皆無犯二勸持如是九戒應當學敬心奉持梵壇品當廣明五揀擇等戒二初列相九第四十揀擇授戒戒三初止持作犯若佛子與人授戒時不得揀擇一切國王王子大臣百官比丘比丘尼信男信女婬男婬女十八梵天六欲天子無根二根黃門奴婢一切鬼神盡得受戒不得揀擇者謂凡有心求受菩薩戒者皆當平等施與不得揀於品類也然王臣等廼至鬼神皆有佛性皆可隨類行菩薩道故云盡得受戒也此土國王受戒者如梁武帝從慧約法師受菩薩大戒唐麟德二年詔終南山道宣律祖於淨業寺授菩薩大戒宋慶曆二年詔允堪律師於杭州大昭慶寺地湧戒壇授菩薩大戒又元豐元年詔慧才律師於雷峰寺為靈芝元照律師等千餘人授菩薩大戒方羯磨時觀音聖像放光貫徹講堂燈炬皆為映奪此廼一切大會受戒之瑞事也明萬曆戊申年詔中興律祖慧雲馨公大和尚欽賜衣鉢於五臺山永明寺傳千佛大戒又甲申年詔三昧律祖於江寧大報恩寺傳授菩薩大戒王子受戒者如唐貞觀二年詔元琬律師入宮為皇太子及妃嬪等授菩薩大戒大臣者我皇清順治庚子年內侍周天成護法恭請華山本師見月老和尚授菩薩大戒此略舉王臣官長皆奉行菩薩道也鬼神受戒者如山神水神及嶽帝受戒等餘不繁舉此正顯佛道無偏一切普攝也蓋陽春擇物而生則其生必寡滄溟揀流而納則其納幾何大士春育海涵等視眾生猶如一子豈有分別高下僧俗貴賤淨穢之不度耶二作持止犯應教身所著袈裟皆使壞色與道相應皆染使青黃赤黑紫色一切染衣乃至臥具盡以壞色身所著衣一切染色若一切國土中國人所著衣服比丘皆應與其俗服有異若欲受戒時應問言現身不作七逆罪耶菩薩法師不得與七逆人現身受戒七逆者出佛身血弑父弑母弑和尚弑阿闍黎破羯磨轉法輪僧弑聖人若具七逆即現身不得戒餘一切人盡得受戒應教等者上明不揀此明應揀揀有二種一揀身形不如謂衣不壞色外貌不如法也二揀業障不如謂干犯重罪內心不如法也袈裟者此云染衣亦云壞色壞有二種一壞衣好色恐生染著故二壞己貪心恐妨道業故謂世俗所尚者惟五大色出家修解脫道不類俗法故云皆使壞色與道相應也皆染使青黃赤黑紫色者謂青非深青及純青廼泥青也黃非大黃及淺黃廼黃兼赤染即木蘭色也黑非全烏如外道服廼兼紫染如熟桑椹名為緇衣故就此五種色中皆使壞色以別世俗青黃赤黑紫五種艶麗色也舍利弗問經中以此五色表五部所能非實令著若著即同世之五彩何名壞色與其俗服有異寧免末法袈裟變為五彩之貴故云皆染使青黃赤黑紫色也一切染衣乃至臥具盡以壞色者謂不但三衣壞色而所有一切衣服下至臥具皆當盡染作壞色故云身所著衣一切染色也又云臥具即被帳氈褥等之總名也若一切國土中國人所著衣服比丘皆應與其俗服有異者謂諸國所製衣服各有不同然有二種一形不同二色不同即此方所製是袖衣所尚是五大色天竺所製同於梵天方服色同五大而多尚白出家所著方服皆悉割截染使壞色故云比丘皆應與其俗服有異也然有異者正顯緇素當有分別曾未言及在家受戒者著割截衣也又比丘比丘尼體是僧寶故制三種田衣永異凡俗其式叉摩那等五眾惟須壞色不得濫同比丘比丘尼也今時不諳經律之意不分僧俗之制授在家男女五戒令著比丘五條袈裟授在家菩薩戒使著二十五條僧伽黎僧俗混亂違佛正制宋慈雲懺主三衣辯惑篇已辯詳悉檢閱自明然優婆塞戒經聽畜三衣者謂令彼供養知是福田衣離染服時念解脫以求出離故非謂使披著也義淨三藏親遊西域目覩沙彌曾未見有披著比丘五條七條袈裟其所著者惟是鉢吒以其未入僧寶之數故未堪著福田之衣著即得罪沙彌尚且遮止而其俗士寧堪為人天福田耶又在家菩薩當隨國所製惟可染使壞色或可隨宜所著但不得特為莊嚴愛好顯異惑眾不染亦無犯制如王臣之服各自有製男女亦別豈得皂白不分漫為槩論耶既為佛子當遵佛制不可混濫也前明應教身所著袈裟此明業障不如須揀擇若欲受戒時應問者謂染淨不得相參故也現身不作七逆罪者謂前身所作非復可知亦復不為戒障若現身七逆罪成定墮無間正障戒品雖受亦不得戒故當先問也出佛身血者如來行滿果圓宿障久寂非人天魔王所能得便今所問者謂調達破僧將五百比丘去身子厭令眠熟目連擎眾將還調達眠起誓報此怨佛於靈山經行調達捧三十肘石擲佛山神手遮小石迸傷佛足出佛身血墮阿鼻獄故曰出佛身血也今雖無佛法爾須問弑父弑母弑和尚弑闍黎者以下殺上曰弑謂父母有生育色身之重恩和尚闍黎有生長戒身之大德此名大逆也破羯磨轉法輪僧者梵語羯磨此云作法亦云辦事僧是三寶中之一數謂作如來之法而辦眾僧之事故名羯磨僧也破者謂在一大界內極少下至八比丘共住此四人與彼四人各自為黨分作二部界內別作布薩羯磨僧事是名破羯磨僧也比丘尼別作羯磨亦爾破轉法輪僧者傳說曰轉輪有摧碾之用謂傳說如來之法則能摧碾眾生一切惑業故名轉法輪僧也破者下至九比丘共住一人自稱作佛誘彼四人別從其教餘四守正不從分作二部倒說經律不論界內界外但令人捨正見而入邪見者是名破法輪僧如調達等是也惟尼不能破由具五漏之體無人信彼作佛故今時雖無其事但有代佛揚化弘法利生者皆名轉法輪僧也若有破者罪亦同科此二皆名破和合僧也聖人者小乘四果大乘發趣以上也若具七逆者謂此七事之中現身隨作一事即不得戒也然本源心地雖復平等無凡聖善惡之分而此等人自逆本源壞其心地不發戒體不生戒善故云不得戒也餘一切人則不應揀故云盡得受戒也問小乘害和尚非逆今大乘云何言逆答此經中重逆二字有別有犯重不犯逆者有兼重與逆者聲聞害師已犯重罪特不云逆耳蓋逆是重上復加逆罪也又問下殺上皆逆也云何聲聞害師非逆答佛法中重對世法逆佛法中逆又加世法逆一等聲聞害重已是世間逆罪而菩薩所謂逆者則更加重故故云菩薩重重於聲聞重也三違教結罪出家人法不向國王禮拜不向父母禮拜六親不敬鬼神不禮但解法師語有百里千里來求法者而菩薩法師以惡心瞋心而不即與授一切眾生戒者犯輕垢罪出家人法者謂君親有莫大之恩當拜而不拜六親鬼神有護助之德當敬而不敬何也謂未出家時先已曾辭禮君親故也今為佛弟子不務世禮當遵佛制然君親既不禮拜則六親鬼神亦不當敬禮故云不向國王禮拜六親不敬鬼神不禮也又出家不存在家之禮出俗無霑處俗之儀然出家為佛之子塵外之賓雖未得道已是三寶中之人天魔震懾帝釋歸依設若反敬僧寶失尊三寶既缺則人天無依故然出家祇當精勤行道以報君親代為敬禮三寶以祝康寧福壽是為出家盡忠盡孝敬君愛親之大禮也按順正理論云國王君主於諸比丘定無希求禮敬事者懼損其德及壽命故如昔優陀延王納臣讒謂賓頭盧王每至問訊而不起迎遂生惡念今往不起當奪其命時賓頭盧知王惡念而來即自思惟我若起迎彼便失位若不起迎彼奪我命即墮地獄寧令失位不令彼墮地獄便起遠迎其後七日失於王位被慰禪國王擒捉鎖足七年又東晉成帝六年庾冰輔政帝在幼冲為帝出詔令僧致拜時尚書令何充謝廣等建議不合拜往反三議遂寢又魏太武七年道士宼謙司徒崔皓讒於佛法帝然之遂滅佛法逃僧斬後延曇始沙門頂禮悔過帝感癘疾遂誅崔氏還興佛法鬼神不禮者順正理論云諸天神眾於優婆塞邊無敢希求禮敬昔北方多聞天王請舍利弗目犍連尊者及五百聖僧至自宮中設供養已復啟尊者曰從今已後諸出家在家受佛戒者至我廟中皆應施我偈頌使我等眷屬專誠護持正法令出家在家佛弟子於一切時恒無惱害若樂禮敬天神便與外道等無差別天王尚且不禮況餘鬼神故致拜天尊而像傾倒方等經云不得祭祀鬼神亦不得輕於鬼神優婆塞戒經云若優婆塞為諸舍宅及身命祠祀鬼神者不失戒若至心禮外道鬼神者失戒若祠祀時不得殺害生命但解法師語者謂信得菩薩大戒是成佛之根本從師傳授故以解語為重也有百里千里來者正顯求法之心至切也如是至切而不授者則辜負當機退失佛種不太甚乎惡心瞋心者明非見機益物之心也不即與授者此結上文餘一切人盡得受也然此大戒本是一切眾生所應同受不同聲聞戒中須擇品類惟恐有逆故須問也有心要受悉皆應與若瞋惡棄捨罪結輕垢良以菩薩利生平等教化不擇冤親貧富貴賤若涉私懷便非佛子大士之心安在耶此是遮業繇乖於平等故制四緣成罪一是受戒器謂形儀如法非七逆人二堪受想六句二重二輕二無犯三有揀擇心或惡其下賤瞋其貧乏等正是業主四令不得受隨所拒人結罪又前人本不欲受強令受戒亦犯輕垢若以三聚攝歸行出家法律儀戒先問七逆善法戒不揀擇授攝生戒也比丘比丘尼全犯餘五眾無授戒事未制大小不全共小乘先許後拒則犯不許無犯大乘接化為本不授即犯不犯者若知根器不堪受或非發上求下化之心惟邀名利自高之念或其心未誠志願未堅而不生難遭之想不授不犯若如曇無讖之勉道進不即與授正大士善權觀機化導彼此多生功德豈可與惡心瞋心等視耶音釋四門八路棊俗呼別棊用黑白子百二十以骰子擲之照點數行馬故脬音拋膀胱也草木有命外人以有知為命如來以有生為命激發於座元臨濟初參黃蘗時睦州為首座指問佛法的的大意三度被打後參大愚於言下大悟得入於侍者韓文公問大顛佛法省要處師良久公罔措三平侍者敲禪床三下師曰作麼平曰先以定動後以智拔公曰弟子於侍者邊得箇入處黐音癡黐膠以黏鳥獸也猶猴膠五昔有獵人於猨猴行處以黐塗其草上有智猨猴遠避而去愚癡猨猴以手小觸即膠其手以兩手欲解求脫即膠兩手以足求解復膠兩足以口咬草輙復膠口五處同膠臥地獵人以杖貫挑而去愚癡凡夫不善護身五根染著五欲亦由是也客塵不住名客搖動名塵五分法身戒定慧解脫解脫知見為五分即分齊法者三學等諸法也身者聚也謂聚集無漏五蘊諸法以成身也九有欲界六道為一地色界四禪天為四地無色界四空天為四地共為九地皆有生死故云九有文殊具云文殊師利此云妙德大經云了了見佛性猶如妙德等文殊即能信之心佛名經說一切諸佛皆因文殊師利而發心故闍王具云阿闍世王此云未生怨妙樂云母懷之日已有惡心於瓶沙王未生已惡故因為名涅槃經云阿闍名不生世者名怨以不生佛性故則煩惱怨生也調達此云天授謂父母從天乞子天授與之故名天授或翻天熱以其生時人天等眾心皆驚熱故山神請華嚴法師隋禪定寺僧慧悟京兆人曾與一僧同隱終南悟受持華嚴彼誦涅槃木食巖棲各專其業忽一人來請就宅赴齋二僧相推請者云請華嚴法師悟因隨往乃山神也復請五百羅漢皆推悟于上座五漏一不得作梵天王二不得作帝釋三不得作魔王四不得作轉輪聖王五不得作佛慧約法師梁帝曰慧師德高人世道被幽冥四月八日延師於等覺殿受菩薩戒帝自受戒後食惟一食菜止茹蔬寢居殿所淨如沙門普通四年帝制中外母斥法師慧約之名別號智者沙門別號自法師始入滅於大同元年九月六日壽八十四夏六十三帝素服臨喪哭之輟朝七日詔塟於誌公墓左從師得戒者四萬八千餘人皆服緦麻哭送至墓南山宗主師諱道宣字實相京兆錢氏子父吏部尚書母夢梵僧語之曰所孕者梁之祐律師也及長投日嚴頵師出家年二十依智首律師進具親從學戒以律自持居終南山苧蔴蘭若撰行事鈔建南山宗燒戒定香行般舟行感天人送供翊衛修行暮年以戒壇未合佛制躬自負土準律新之唐高宗乾封二年十月三日示寂於長安西明寺眾聞天神同聲請師歸彌勒內院高宗有詔傷悼勅天下寺院圖形塑像以為標範奉祀穆宗御製讚曰代有覺人為如來使龍魔歸降嶽神奉事聲飛五天辭驚萬古金烏西沉佛日東舉稽首歸依肇律宗主懿宗諡號澄照聖師允堪律師師錢塘人幼從天台崇教大師祝髮學無不通及受具後專精律部著會正記續南山宗住蘇之開元秀之精嚴皆依律建壇歲歲度僧傳弘戒法福國祐民後於慶曆皇祐年間十一月二十一日入寂昭慶建塔於西湖菩提院諡號真悟智圓大律師慧才律師師解行相應深入四明法智尊者之室日持大悲呪必百八遍甞夢觀世音菩薩脫袈裟以衣之淨慈法真禪師為之記元照律師字湛然餘杭唐氏子厭俗出家得戒於雷峰之慧才法師住杭州靈芝寺精練毗尼作資持記續昭慶允堪律師宋天慶年間九月一日跏趺入寂壽六十九臘五十一葬於寺之右隅諡號大智律師元琬律師師於唐貞觀十年十二月入滅之先遺表上奏曰聖帝明王恭敬三寶沙門或有犯法不應與民同科乞付所屬以僧律治之并上安養論帝嘉納之有詔傷悼遣太子臨吊勅有司給葬具勅葬沙門由琬始也仍於葬所建塔供養中興律祖中興者廢而復興也如周宣王漢光武中興帝王之業律祖則中興法王之戒也祖諱如馨字古心溧陽楊氏子生而異香盈閭者七日父早喪母撫育而成人至壬午母亦告祿見世緣虗幻遂求素安法師出家聞師誨眾曰佛法住世功在毗尼若不精嚴佛恩難報由是刻志於心願見文殊親承受戒遙望五臺三步一禮千有餘日拜到山中見一老姥捧僧伽黎從林而出問曰大德禮拜殷勤所求何事答求見文殊菩薩親授大戒姥曰若然者我此法服今贈與汝祇恐菩薩難見見或不識祖手接衣姥標指曰你要見文殊那不是麼祖一迴顧姥即不見五峰放光結成雲葢菩薩於光中垂手摩祖頂曰古心比丘文殊為汝授戒竟祖於言下頓悟心地法門毗尼宗旨自此漸還金陵時雪浪法師奉旨修長干寶塔工將告竣塔頂艱舉日夜翹勤冀佛慈應夢感韋天而慰之曰優波離尊者預斯始克汝願明旦律祖著衣持鉢杖錫繞塔其頂即上法師喜慰偕諸緇素案香禮拜信知為優波離再轉也遂請於古林開戒後坐靈谷棲霞甘露靈隱天寧寺等南北道場共三十餘處其所到之地法會殊勝不能盡述祖生於嘉靖辛丑年六月初十示寂於萬曆乙卯年十一月十四世壽七十有五僧臘二十有七染道三十四年弘戒二十二載弟子奉全身塔於天隆之後山神宗皇帝御讚曰瞻其貌知其人入三昧絕六塵昔波離今古心諡號慧雲律師三昧律祖祖諱寂光瓜洲錢氏子初從雪浪法師習賢首教觀次求古心律祖圓具於潤州之甘露寺親炙有年惟律儀是任祖嘉其行解傳授毗尼弘揚戒法行道豫章緇素敦請開戒於東林寺陸地忽透千業白蓮一十八朵按廬山紀事云遠公臨滅度時示眾曰若得白蓮重開吾當再來教化矣時眾聞之皆知昧祖為遠公祖師再來也後住華山預合符讖其餘神異銘傳備詳見月律師師諱讀體滇南楚雄之許氏子父胤昌世襲指揮使母吳氏感異而生師幼而神敬善繪大士像人爭寶之皆稱為小吳道子年二十七忽念世相無常棄襲爵而為黃冠住劍川赤宕嵓遇一老師授以華嚴閱至世主妙嚴品有省即詣寶洪山求亮如法師出家師一見喜為再來人遂為剃度授與禁戒隨侍有年聞江南三昧律祖戒法精嚴偕友成拙瓢笠東來遇昧祖於丹徒之海潮菴乞圓具戒依學不離祖視不凡遂差為首領輔弼法門師承祖命統眾精勤始終不怠祖常為眾曰老人三十年戒幢若非見月幾被摧折矣及住華山命師兼掌院事臨終付託繼席華山師受囑已一切院務事事躬行布薩安居法法如律有滇中善信來謁云弟子禮雞足山三載求見迦葉尊者夢感韋大示現曰尊者至江南華山弘律爾欲親覲當往見之故來參請師云我是凡僧不可虗說師恐眾惑秘不容傳故維摩云不起滅定現諸威儀此之謂也其諸著述道行詳如銘傳山神請戒師諱曇邕初仕符秦為衛將軍堅南敗遂從道安法師出家次事廬山遠公祖師後於廬山之西營立茅茨偕弟子曇果沉思禪門忽有男子丰姿端雅從者二十人來請授五戒邕知是山神乃為秉爐授之三歸五戒為說法要神受戒已䞋邕外國七筯禮拜辭別倏忽不見水神求戒江西九江鱘魚嘴風波最險有無風三尺浪之謠商賈至比必禱祀而行崇禎年間湖廣江夏賀奉聖以枚北詣京師道由鱘江嘴風浪大作舟頃將覆賀具公服禮拜忽見空中絳衣神人手執黑鬼抑於水中風浪始息次日起鐵猫有一老樹根隨猫而上賀曳至大王廟中挂一扁曰木龍徵應由此威神益振祭祀益繁大王廟前每日有倡優十二班供應宰殺猪羊無數至崇禎十五年湖廣靳王欲興溈仰道場延三昧律祖入楚將過九江有神人托夢與之曰我乃九江水神宋大王也我前生與師同賀對揚三人同在山中修行唯師不昧正因今為律師賀以弘福為宰相我以一念之差隨為血食之神邇因鱘魚嘴樹妖欲覆賀舟我以宿世同修救之由此宰殺日繁將來必墮無間地獄師明日過此必至我廟中為我授戒更布其事於四方使禱祀者不用葷腥也昧祖果如其言為之授戒鱘魚嘴自此風浪不作行舟坦然往來無恙矣嶽帝受戒元珪禪師住嵩嶽一日有異人稱謁云我嵩嶽神也願授以正戒令我度世師付五戒曰汝能不婬乎曰我亦娶也師曰非謂此也謂無羅欲也曰能師曰汝能不盜乎曰何乏我也焉有盜取哉師曰非謂此也謂饗而福淫不供而禍善也曰能師曰汝能不殺乎曰實司其柄焉云不殺師曰非謂此也謂有濫誤疑混也曰能師曰汝能不妄乎曰我正直焉有妄乎師曰非謂此也謂先後不合天心也曰能師曰汝不遭酒敗乎曰能師曰如上是為佛戒汝當奉持天尊佛是天中天聖中聖故舊經譯佛為天尊後道士偷天尊名目為老聃之號故依經改譯為世尊謂天上世間所共尊敬故也致拜天尊唐益州福壽寺僧寶瓊俗姓馬幼年出家讀誦大品般若兩日一遍以為常業四遠聞者皆來欽敬值道士與民作道會邀瓊赴之瓊至不禮而坐道眾皆謂不禮天尊輕我宗法耶瓊曰邪正道殊所事各異天尚不禮何況老君眾議紛紜頗相陵侮瓊曰吾禮非所禮恐貽辱先宗遂禮一拜道像并座一時搖動又禮一拜連座反倒墜落在地摧毀道民羞耻唱言風鼓競來扶正又禮還倒瓊曰天朗和暢而言怨風汝之愚戇不測吾風合眾驚懼一心禮瓊皆捨道歸佛請瓊受菩薩大戒象王挂瓔珞羅漢感空齋昔有二僧同修行業一但修慧業不修福業雖得漏盡後身無供一專修福業不修慧業雖得錦福身為象王鉢吒此云縵條即是大㲲與袈裟量同總為一幅出家沙彌令染使壞色披著百一羯磨云求寂之徒縵條是服而有輙披五條深為罪濫神州之地久扇斯風此成非法願勿披著九十五種外道西域記云九十五種是邪惟一是正附佛法一種也三十肘石肘臂節也從臂節至指端名為一肘準周尺二尺八寸三十肘約有五丈四尺調達捧如許大之石遙擲佛也優陀延王或名優填王唐言出愛亦云出光破僧事云佛初降誕時大地震動普放光明時憍閃毗國百軍大王初誕一子見此光明便作是念我子福力有大光明如日初現普照世間宜與我子名曰出光曇始沙門一云惠始佛老志云惠始沙門清河張氏子也始師鳩摩羅什法師初魏太平真君六年太武討盍吳之亂至長安見僧寺院有兵仗武怒司徒崔浩因而勸武盡誅沙門毀諸經像至十一年崔浩自恃才略譔國史書魏之先世事列於衢路刊石立於郊壇太武以浩暴揚國惡大怒使有司按浩夷五族是時曇始謁太武武怒命斬之不能傷自抽佩刀斬之又不能傷投諸虎檻虎皆弭服武驚延始上殿悔謝歸敬佛法復興焉
