body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述第四妄語戒三初作犯止持若佛子自妄語教人妄語方便妄語妄語因妄語緣妄語法妄語業乃至不見言見見言不見身心妄語妄語者是不真實之稱謂欺凡罔聖迴惑人心故名妄語自妄語者自向人說我得上人法得十地辟支四果四向四禪四空定成不淨觀成安般念及六通八解等上人法者謂聖賢所修所證之法也所修者謂三十七品菩提分法及諸禪三昧等所證者謂三賢十聖之階位四果四向之分證以此所說之法對一切凡夫有漏之法最尊最上故名上人法也或言已斷結使或言永離三途或言天龍鬼神皆來問答如是虗而不實圖致名利名大妄語其罪極重教人妄語者謂教他向人說我得上人法等或教他向人說自得上人法等名利不入己犯輕方便妄語者謂欲作妄語先假種種巧言令他信受也或遣使語或遣書往或作知相令前人領會或誑言讚他而密自美或方便顯異如蜜塗樹引眾蜂來詐言我能召蜂以誑前人或借鬼神仙乩或用呪術令人得夢境等皆屬方便因緣法業者初起一念誑心為因多種助成其誑為緣妄語中方則為法前人領解為業又因者欺誑心謂欲欺誑世間以取名利故緣者可欺人謂前人無知惑為真實故法者可欺方謂假現威儀架言成聖故業者欺誑事謂出口了了前人領解故廼至者承上大妄語等以至不見言見之小妄語也然六識皆能顯妄今惟舉見身心三種者是略也不見言見者直出為言宣述為語謂本不曾見他作惡以順其意而直言見見言不見者謂本見他人行善以嫉姤心而言不見即揜其善而揚其惡也身心妄語者身業表相亦名妄語也如問其得果不點首示相問清淨不默然不答等繇欺誑心表示身相令前人領解然口雖不言而妄語已成故曰身心妄語也又律中以六識束為四法謂見聞觸知也見屬眼識聞屬耳識觸屬鼻舌身三識謂此三鈍故故束為一知是意識所以妄語總有八種謂不見言見不聞言聞不觸言觸不知言知見言不見聞言不聞觸言不觸知言不知但令違心而說隨作其一即名妄語若為救眾生命有益前人權巧方便是大士損己利他之心無犯尤生多功德問佛見兔入何言不見答為救兔故見機權巧所謂無所違犯正是生多功德也二作持止犯而菩薩常生正語正見亦生一切眾生正語正見菩薩等句總標勸學也若以事釋謂以無漏慧常攝口業遠離一切虗妄不實等故曰正語謂修無漏聖道見四諦分明破外道有無等種種邪見故曰正見如是外正語內正見身心不妄語也若以理明正語者如實而語也正見者為生死為菩提為眾生不為名利故反此則邪語邪見邪業也上一句是自利行下一句是利他行又常生者是欲不忘之謂也謂菩薩於本源心地應當常常發起正語正見不謬稱凡為聖以邪為正故自己既然如是行持亦令一切有情生起正語正見之妙因方見大士利生之本懷也三違教結罪而反更起一切眾生邪語邪見邪業者是菩薩波羅罪而反更起者明其不應也謂菩薩當化一切眾生正其三業增長聖心今反導彼邪心起諸邪見依於邪語造作邪業使生生不得樂果豈大士之體耶故曰是菩薩波羅彝罪若以三聚攝歸身心不妄語律儀戒常生正語善法戒亦令眾生正語正見攝生戒也七眾菩薩共制大小亦同若為慈悲利濟眾生者見機得作亦具性遮二業譬如平人妄號帝王自取誅戮五緣成重一是眾生二眾生想三欺誑心四說重具五前人領解一是眾生者上中下三品如前說上品境中向父母師僧妄語犯重向諸佛聖人妄語此人不惑又能以神力遮餘人令不聞但結方便罪若聖人中未證他心智者向說仍重向中品境天人等同重正是迴惑之境或諸天有他心通不受其惑亦止結方便罪向下品境四趣境或云同重今言下境既有解語受戒之機亦應犯重以鼓惑鬼畜尤堪作名利媒嫁故或可失戒猶許重受或可結不失戒重耳二眾生想者亦有當疑僻六句二重二輕二無犯如前可例又聖人聖人想聖人疑為說妄語結輕聖人非聖人想為說妄語稍重非聖人非聖想非聖疑為說妄語結重非聖聖想為說妄語稍輕又人人想人疑為說妄語結重人非人想稍輕非人人想人疑稍重非人非人想更輕三欺誑心者謂希圖名利非增上慢亦非戲笑假說正是業主此仍分通心隔心若通欲一切人聞隨有聞者結重若本惟欲此人聞此人不聞而彼人聞是屬隔心於彼無欺誑心總不結罪戒本經云若菩薩見味禪以為功德是染污犯也四說重具者謂十地辟支等雖四禪四空定凡外亦能修證而是世間勝法故亦同重不淨安般二觀廼佛法二甘露門今言成就即是有證有得天龍等來正是彰其聖德斷結使離三塗皆屬果證中事故皆犯重若欲說初果誤說二果若欲說二果誤說初果既不遂妄語本懷止結方便若言持戒清淨善通三藏能習禪思等虗而不實皆犯輕垢或遣使說此有二義一云教他說我是聖人亦重以士無圭璧談者為價傍人讚說勝過自道教他道是聖名利不入我非重也二云聖法冥密證之在我必須自說方重他說坐輕五前人領解者或自說或教人說或作書說但令彼人領知信服據此時結重若對面不解且結方便後追思前言忽解時結重若人問汝得道否若點首自肯者結重默然不言非者結輕其餘小妄言等隨一一語結一一輕垢隨多人領解結多多輕垢若增上煩惱數數違犯無慚愧心失菩薩戒失戒後更說止得性罪若深生慚愧永斷相續亦許更受未必須見相也又綺語亦此戒兼制是為犯不犯者狂亂病壞心後生不自憶及戲笑說誤說獨說或向人說十地四果等法不言自證不犯大涅槃經云一切眾生雖有佛性要因持戒然後乃見因見佛性得成阿耨多羅三藐三菩提若有說言我已成阿耨多羅三菩提何以故以有佛性故有佛性者必定當成以是因緣我今已得成就阿耨菩提當知是人犯波羅何以故雖有佛性以未修習諸善方便是故未見以未見故不能得成若言勤修方便斷壞煩惱不犯四重華嚴二地品云妄語之罪亦令眾生墮三惡道若生人中得二種果報一者多被誹謗二者為他所誑綺語之罪亦令眾生墮三惡道一者言無人受二者語不明了楞嚴經云雖則身心無殺盜婬三行已圓若人妄語成愛見魔失如來種所謂未得言得未證言證佛記是人永殞善根沉三苦海如第四禪無聞比丘妄言證聖墮阿鼻獄按此戒從菩薩心地法門戒心中定心好說心及正直心所出第五酤酒戒三初作犯止持若佛子自酤酒教人酤酒酤酒因酤酒緣酤酒法酤酒業一切酒不得酤是酒起罪因緣酤者貨賣或造賣酒者能醉人是無明之藥失性之丹大士之體應與人智慧增長信心不得以無明之藥飲人令他昏迷失性也自酤者是親身所為教人酤者有其二義一教他為我賣二以直與他酤賣分利大士以利生為本自作教他皆非菩薩心行此事極重釀酒賣人廣能使飲多起非心敗國亡家喪身失命然世人止知亡家敗國為重而不知報感三途苦惱倍增若自賣教人利歸於己同犯重罪若他賣他得罪輕然利雖歸彼而傷身喪慧是同亦應犯重此以顛倒眾生心而得罪非但為利故結也因緣法業者初起一念酤酒之心為因次心相續助成酤事為緣善巧造作為法酤酒事成為業又因者求利之心緣者種種器具法者觔兩價直出納取與等事業者運手賣酒授與前人也一切酒不得酤者謂不論草木樹皮百花五穀所造若生若熟若若糟凡有酒色酒香酒味但能令人醉者皆不得酤也是酒起罪因緣者乃出其繇也謂種種過惡皆因酒起故大莊嚴論云佛說身口意三業之惡行惟酒為惡行之根本故云起罪因緣也二作持止犯而菩薩應生一切眾生明達之慧明達之慧者以慧能破煩惱昏衢故曰明直至本源心地故曰達大士當以種種善權方便啟發眾生令生妙慧故曰應生一切眾生明達之慧也如一酤飲時則明者昏而達者愚膽小者大力弱者強天命在上而不知畏王言在前而不知敬甘心刑具負蹈水火以是為非以邪為正無所不言皆酒使然酤之一事豈不重耶前明斷一切惡此明修一切善菩薩因行正應如此三違教結罪而反更生一切眾生顛倒之心者是菩薩波羅罪而反更生者是承上酤酒與人而結罪也然菩薩不啟之以妙慧攝化眾生而授之以迷惑故曰而反更生也邪正兩途不辯迷真逐妄不分故曰顛倒然眾生住世間者本來明倫達理而無混凟之愆欲出世間者本來明因達果而有修證之喜若以酒酤與人在世間則昏迷不醒倫理全乖在出世間則癡蠢無知因果皆昧故曰是菩薩波羅罪若以三聚攝歸不得酤酒律儀戒生明達慧善法戒心不顛倒攝生戒也此戒七眾菩薩共制大小乘不全同小乘作酒止結不應酤者同於販賣大乘作時結方便罪酤則犯重也此屬半性半遮以能犯前之四戒故同於性王法之所不禁又屬於遮然是惡律儀所攝雖不受戒人作此業者亦招苦報故特為大士設此厲禁儻總無罪報又何須結戒令大士掣肘耶此戒五緣成重一是眾生二眾生想三希利貨賣四是真酒五授與前人一眾生者三品如上說上品者賣與無醉亂人則輕賣與有醉亂人則重中品人天正是所制犯重下品舊云結輕以亂道義弱故今云酤與受戒鬼畜等亦重二眾生想者有醉亂醉亂想疑犯重餘四句輕三希利貨賣者正是業主出家菩薩一切販賣求利都制在家菩薩止許如法求財不許作此惡律儀也四是真酒者酒色酒香酒味飲之醉人犯重雖無酒色酒香而有酒味醉人亦重雖似酒色酒香而無酒味飲不醉人無罪藥酒雖亦希利不能亂人在家菩薩酤者無罪又在家菩薩或在婬舍或賣淨肉皆犯輕垢以招呼引召不能如酒故也五授與前人者從授受時結重問酤酒未必飲云何犯重答繇酤有飲飲之害有限酤之禍無窮故儀狄造酒禹輙疎焉菩薩犯之安得不招棄罪耶徧觀律論惟遮不開過酒器與人飲酒尚五百世無手況復酤酒耶按此戒從菩薩心地法門戒心中慧心達心所出第六說四眾過戒三初作犯止持若佛子口自說出家在家菩薩比丘比丘尼罪過教人說罪過罪過因罪過緣罪過法罪過業以此傳彼曰說出家菩薩謂出家五眾受心地大戒人在家菩薩謂優婆塞優婆夷二眾受大士戒者比丘比丘尼謂稟具足戒人而未受菩薩戒者罪謂犯戒輕重等事過謂七逆十惡等業謂向未受菩薩戒者前讒說大乘七眾犯戒逆惡等事或向未受具戒人前說比丘比丘尼犯戒逆惡等事以抑沒前人損壞正法故得重罪也又比丘比丘尼雖則小乘以住持僧寶關係法門故亦同重又罪過者謂越分所作名之為過以過定罪故曰罪過也教人說罪過者或口教或現相教或遣使教或遣使持書往教口自說者已不順理況又教人如是而說則過惡愈重矣此有二義一己有私忿令他宣說彼過以快自心二他人之忿令彼所忿者說就中取事也而菩薩聞外道等說尚欲教之莫說豈有自說大小乘過及教人說大小乘人過之理耶律攝云出家之人所有言說皆為利益不應私忿道說於他薩婆多論云寧破塔壞像終不向人說出家過惡若說過惡則壞佛法身若本見法眾有過即當以慈愍心護念心殷勤諫諭令其悔改內全僧體外護俗聞無以私心欲壞彼人名利自免怨結萬世復無玷辱正法之過也若三諫不改可白眾僧以悲愍心護法無犯若前人不正見無犯猶多生功德何以故無致謬計多人入於邪途故也若乃恣口發揚自辱法門貽羞佛化使聖道不行豈大士之所為耶因緣法業者初起說心為因次心助成說事為緣以種種方便巧說為法前人領解為業也二作持止犯而菩薩聞外道惡人及二乘惡人說佛法中非法非律常生慈心教化是惡人輩令生大乘善信外道者天竺有九十五種謂心外求法不達內因故名為外三乘聖教令淨心惑悟明心地故名為內外道不信自心是佛遂迷真逐妄以邪為正造不善業故名惡人二乘執一定之規模疑大人之作略故亦㡿為惡人蓋繇不發大心闕於慈濟故也佛法者揀非二乘權小教也非法非律者謂大乘本源心地法律不同外道撥無因果之邪教及世間之法律亦不同於二乘厭苦欣寂以修四諦之法五篇七聚之律繇不明正教幽深大乘妙用但見所作所為便言非法非律也常生慈心者謂凡見說過之人即應起慈愍心不惜口齒常常勸誡非謂一度而已也教化是惡人輩者教謂教彼轉小為大化謂化他改惡從善方見菩薩覺悟羣生之念也令生大乘善信者謂令彼外道趣向中道不謬執斷常二乘涉俗利生不樂獨善寂皆信自他本具心地大戒無惡不止無善不修無生不度諸佛是已成之佛汝等是未成之佛念念不去心是為常生大乘善信也三違教結罪而菩薩反更自說佛法中罪過者是菩薩波羅罪反更自說者明其不應也佛法中罪過者揀非外道及二乘中事也大士以安物為心猶教他人莫說而反更自說揚他過惡陷沒前人深損正法自喪己德菩薩之行安在耶故曰是菩薩波羅罪問佛法中寧容此瑕疵耶答佛令半月半月布薩檢察三業有罪則發露除愆無過即長養淨德如不自首見者往屏處諫之輕垢令對首悔除重罪令見好相如不肯自陳廼對眾公舉若不見罪僧應作不見罪羯磨治之儻弟子有過師當善誨令改如不見過擯之不與共住此廼佛法清濁自分豈同私心揚惡方為不容他過也如不畏罪福因果故以私忿心道說他過肆毒之言惟恐不深說過之聲欲徧大地祇圖現前快意寧知身後遭殃耶若以三聚攝歸不說眾過律儀戒常生慈心善法戒教人生信攝生戒也此戒七眾菩薩共制大小不同小乘說初篇犯第二聚說二篇犯第三聚說三篇以下皆犯第七聚大士宜揜惡揚善故說重同重說輕同輕若所說是實即上品兩舌亦兼惡口若所說不實復是妄語此具性遮二業如世人妄說禍福而招陷沒之報也此戒六緣成重一是眾生二眾生想三說罪心四所說過五所向人六前人領解一是眾生者上中二境有菩薩戒有比丘比丘尼戒者重無戒者輕下境舊云有戒無戒皆輕今云有菩薩戒者宜重但未必失戒耳若前人實犯重罪已失戒者說但犯輕或雖犯重而未失戒或雖失戒如法重受說皆重犯二眾生想者有戒無戒二重四輕三說罪心者有二一陷沒心欲令前人失名利故二治罰心欲令前人被繫縛故此二心正是業主不論是實是虗皆犯重四所說過者或說罪事或說罪名各有當疑僻六句罪事者殺盜婬妄飲酒食肉等事罪名者大則七逆十重輕垢小則五篇七聚等名若重名重事作重想重疑而說犯重作輕想說犯輕若輕名輕事作輕想輕疑而說犯輕作重想說犯重五所向人者上中二境無菩薩戒為說菩薩七眾罪過犯重無比丘比丘尼戒為說二眾罪過犯重若所說不實自屬謗毀戒也下境不論有戒無戒向說皆輕毀損不深故六前人領解者口業事遂據此時結罪隨語語結隨人人結若未解時止結方便是為犯不犯者若向有大乘戒有具戒者如法說實舉過令其懺悔或獎勸心說若被僧差以公心說不以私心而言如提婆達多作逆罪佛令僧羯磨差身子往俗家說是也華嚴二地品云兩舌之罪亦令眾生墮三惡道若生人中得二種果報一者眷屬乖離二者親族弊惡惡口之罪亦令眾生墮三惡道若生人中得二種果報一者常聞惡聲二者言多諍訟十善業道經云若離兩舌即得五種不可壞法一得不壞身無能害故二得不壞眷屬無能破故三得不壞信順本業故四得不壞法行所修堅固故五得不壞善知識不誑惑故若能迴向菩提後成佛時得正眷屬諸魔外道不能沮壞按此戒從菩薩心地法門戒心中慈心信心護心好說心所出第七自讚毀他戒三初作犯止持若佛子口自讚毀他亦教人自讚毀他毀他因毀他緣毀他法毀他業自讚者稱己功德恃其所長欲使名利歸己也毀他者譏人過惡發他之短使他失名利也菩薩應當與直於他引曲向己何容譽己毀他彼此互形顯己德而彰人短故犯重也若但以貪心自讚瞋心毀他各各結染污犯戒本經中別有此條今經亦此戒兼制也教人者有二義一是教人讚我毀他或現相或遣使持書往二是教人自讚己德輕毀他人也因緣法業者初起一念讚毀之心為因次心相續助成為緣以種種善巧讚毀之方為法前人領解取信為業此四句中單指毀他不言自讚者是便經文故然毀他即密顯自勝自勝即是讚義也又自讚之念則輕而毀他惡心偏重故舉重以該輕也二作持止犯而菩薩應代一切眾生受加毀辱惡事自向己好事與他人應代一切眾生受加毀辱者正見菩薩利生之本念也謂非但自不讚他不毀而他人有毀辱之事還要代受者非大士心行孰能為耶惡事自向己者正是不自讚也好事與他人者正是不毀他也所謂善則稱君過則稱己也三違教結罪若自揚己德隱他人好事令他人受毀者是菩薩波羅罪揚是稱揚隱是隱沒自揚祇恐己不勝人隱他惟憂他勝於我然自揚己德非真德也隱他好事徒昧自心而復令他人受毀者故曰是菩薩波羅罪菩薩善戒經云若菩薩為人所讚言是十住若阿羅漢等默然受者得罪據此則受人讚亦不可何況自讚而兼毀他豈大士利生之所為耶若以三聚攝歸不自讚毀他律儀戒代人受辱善法戒好事與人攝生戒也此戒七眾菩薩共制大小不同大士以利生安物為本故重小乘自讚犯第七聚毀他犯第三篇故不合結也此具性遮二業如世間人爭名奪利難免傷身之患也五緣成重一是眾生二眾生想三讚毀心四說讚毀具五前人領解一是眾生者上中二境重下境輕二眾生想者上中上中想疑二重餘四俱輕或下境作上中想亦重也三讚毀心者正是業主謂欲彰彼短使名利悉歸於己非為折伏非為利益也四說讚毀具者有七一種姓或尊或卑二行業或貴或賤三技術工巧或上或下四過犯或有或無五結使或輕或重六形像或好或醜七善法或具不具五前人領解者口業事遂隨語語結重羯磨文云若以上品纏犯失菩薩戒應須更受中品纏犯應向三人或過三人悔過除滅下品纏犯向一人悔以下三戒並同又不隨他善亦應此戒兼制戒本經云若知他眾生有實功德以慊恨心不向人說亦不讚歎有讚歎者不唱善哉是犯染污起若懶惰懈怠放逸犯非染污起是為犯不犯者知彼少欲護彼意故若病若無力若護僧制若恐令彼人起煩惱起溢喜起慢起非義除此諸患故若實功德似非功德若實善說似非善說若為摧伏外道邪見若待彼說竟戒本經云若輕毀外道稱揚佛法若以方便令彼調伏捨離不善修習善法又令不信者信已信者增廣是為不犯又不犯者若為誘邪途而歸正道貶二乘令會一乘雖語似毀譽而心實是大悲斯廼大士愍物弘化之慈心豎立法幢之大願不可同毀譽而論過耶問世尊天上天下惟吾獨尊而彈呵二乘排㡿外道不幾於自讚毀他否耶答讚毀者謂其以我人勝負為懷惟知利己不念損人今世尊任己是佛欲令眾生皆成佛故㡿他是邪恐眾生入邪故也此廼全體大悲何名讚毀耶使其執卑己尊人之小節則眾生莫知從違萬古如長夜矣所得者少所失者多豈大士之體乎按此戒從菩薩心地法門戒心中護心喜心好說心所出第八慳惜加毀戒三初作犯止持若佛子自慳教人慳慳因慳緣慳法慳業慳惜加毀者謂乞財求法鄙恡不與故曰慳惜而反忿怒罵辱故曰加毀慳惜屬貪分加毀屬瞋分貪瞋繇無智慧即屬癡分性貪墮餓鬼加毀墮地獄愚癡墮畜生三毒不善皆緜貪起大士行檀波羅蜜不揀親疎求者悉與若不施而加毀深違菩薩三聚淨戒何名佛子自慳者自恡財法不肯惠人教人慳者或教鄙恡財法不施或教令加毀或口教或遣使持書教等所謂方以類聚也因緣法業者初起一念慳心為因次心相續助成其慳為緣種種巧言悋惜之方為法前人領解慳事成就為業此四句不言加毀者先繇慳故然後加毀若非慳單毀即屬輕垢戒優波離問經云於根本罪何者復重佛言住大乘菩薩如犯恒河沙數貪罪於一瞋罪較量此二罪中瞋惟屬重所以者何現瞋者捨離眾生現貪者愛護眾生則不為煩惱於菩薩所無有災橫等怖故學論云瞋義云何謂本性為大罪故不生方便悲愍行恚怒者然非利益則長養煩惱減失悲愍為大過失此戒慳惜故悋財而行加毀若貪而能施則無加毀瞋恚等過正法念經云若先少思惟已後竟不施墮餓鬼趣許已不施墮地獄趣況復無上菩提具足許施無餘世間諸眾生故二作持止犯而菩薩見一切貧窮人來乞者隨前人所須一切給與一切者不擇怨親遠近皆當施與也無法曰貧無財曰窮或貧於法或窮於財財法皆有貧窮二苦也來乞者身貧乞財施之以財若多若少心貧乞法施之以法若大若小前人者指一切貧窮人也隨其所須無不滿願故云一切給與也決定毗尼經云在家菩薩應行二施一財二法出家菩薩應行四施一紙二墨三筆四法得忍菩薩行三施一王位二妻子三頭目皮骨當知凡夫菩薩隨宜惠施若都杜絕不與則應犯也優婆塞戒經云見乞者來多少隨宜給與遣空還者得罪據此則知在家尚宜布施況出家菩薩學大悲者也起信論云若見一切人來求索者所有財物隨力施與若見厄難恐怖危逼隨己堪任施與無畏若有眾生來求法者隨己能解方便為說以自捨慳貪令彼歡喜也三違教結罪而菩薩以惡心瞋心乃至不施一錢一鍼一草有求法者不為說一句一偈一微塵許法而反更罵辱者是菩薩波羅罪惡心者恐施其物瞋心者不喜其人皆慳因也不施與慳緣也不為說慳法也更罵辱慳業也乃至者論財從多以至極少一鍼一草此謂無財者不能隨意施也論法則從廣說以至極少一句一偈一微塵許此謂寡識無聞不能廣說也如來往昔為轉輪王值世譏饉變肉山大身施眾生食無有悋惜今來乞者不為給與已違菩薩本願而反更罵辱者是慳毀雙具故曰是菩薩波羅罪問自理未明無法誨彼當如之何答此制有而不施如其無法自應實對不可誑妄說法疑悞前人反取深咎也若以三聚攝歸自他不慳律儀戒一切給與善法戒隨人所須攝生戒也此戒七眾菩薩共制大小不同大乘不揀親疎求者皆施不與加毀悉犯以本誓兼物故小乘惟弟子不教法犯第七聚不與財不制加毀隨事結罪不合為重此具性遮二業慳惜以無慈愍心即違菩薩本念故同性業也五緣成重一是眾生二眾生想三慳毀心四示慳毀相五前人領納一是眾生者上中下三境有戒者悉重餘輕二眾生想者有當疑僻六句三重三輕如上說三慳毀心者謂惡瞋悋惜財法欲以打罵拒絕是犯然此自慳自毀正是業主教人犯輕垢四示慳毀相者或隱避不與或言都無或手杖驅㡿或惡言加罵或自作或使人打罵皆重五前人領納者謂知我慳惜之相受我打罵之辱隨事隨語結重若彼遣使求財請法對使人慳惜遙作訶罵既非對面損惱稍輕皆不結重或雖重不失戒菩薩善戒經云求者三至若不施者是名犯重戒本經云觀眾生應以苦切之言方便利益恐其憂惱而不為者是犯非染污起不犯者若自無若求非法物若不益彼物若以方便令彼調伏若彼犯王法護王意故若護僧制此明不與財不犯也又云若外道求短若重病若狂若所修法未善通利若彼鈍根聞深妙法生怖畏心若知聞已增長邪見或向惡人說此明不與法不犯若彼不宜聞法得財宜見訶辱皆不犯問不宜聞法得財宜見呵責皆不犯者云何答不宜聞法者謂根劣非器或聞反生誹謗故不宜得財者謂用財造惡或因財得禍故宜見訶辱者謂頑愚者因懲治而改悔豪傑者因折挫而興起如斯慳毀正是成就彼人何犯之有又有二種不施不犯一者乞財作惡害人害生不施不犯二者乞法還歸外道助外道法不說不犯即加訶責亦不名犯十善業道經云若離貪欲即得成就五種自在一三業自在諸根具足故二財物自在一切怨賊不能奪故三福德自在隨心所欲物皆備故四王位自在珍奇妙物皆奉獻故五所獲之物過本所求百倍殊勝繇於昔時不慳嫉故若能迴向菩提後成佛時三界特尊皆共敬養若論果報慳毀之罪亦在三途又慳財餘報住生貧窮慳法餘報世世愚鈍當知不慳即是無貪善根所攝也按此戒從菩薩心地法門戒心中捨心慈心悲心施心益心所出第九瞋心不受悔戒三初作犯止持若佛子自瞋教人瞋瞋因瞋緣瞋法瞋業瞋者是惡怒之心此心一起先見於目故瞋從目自瞋者謂內懷忿恚含毒在心外發身口而起暴惡三業皆不善也教人瞋者教他如我所為也問瞋非樂事云何教聽答凡人各有本性而兇暴軟弱不同但教以忍則不喜教以瞋則樂從如秦皇之賢逐客漢主之悅智囊是也然瞋起即捨悲心比貪癡尤重故華嚴經云一念瞋心起百萬障門開又教人瞋者有三義一借他瞋彼以雪己恨二教他瞋彼於中取利三是他人所恨使其兩相瞋害取為己樂也因緣法業者初起一念瞋心為因次心相續助成為緣種種打罵之方為法瞋悔事成為業又因者無始含恨習種緣者所瞋人境現前法者起計令彼受辱業者三事和合成瞋故結重罪也二作持止犯而菩薩應生一切眾生善根無諍之事常生慈悲心孝順心一切眾生者槩指而言根有能生之義即是發善之本不起瞋心即是無諍之法無諍之法便是生善之根六和之體能如是者是為生一切眾生善根無諍之事也慈悲心者等視眾生如保赤子不忍傷也孝順心者觀諸眾生如己父母不忍逆也若縱瞋心而不休隔眾生而不接障聖道而不行斷佛祖慧命豈大士之體耶三違教結罪而反更於一切眾生中乃至於非眾生中以惡口罵辱加以手打及以刀杖意猶不息前人求悔善言懺謝猶瞋不解者是菩薩波羅彝罪非眾生者有其二對一真化對謂變幻化作者是也彼雖無情作有情想而行瞋辱亦犯輕垢二聖凡對則諸佛聖人是也瞋惡業有三一用內色手打也二用外色刀杖也三用內外色手執刀杖打也惡口罵辱口業造罪刀杖手打身業造罪意猶不息意業造罪如是三業不善甚於狼虎皆繇瞋故前人求悔是身意二業善言懺謝是口業如是三業虔誠求悔不解者上違佛教中失本心下乖接引惡業增而不損聖道隔而不行故曰是菩薩波羅彝罪華嚴經云寧愛染無瞋何以故愛與眾生結近緣有佛法可教使人能信從瞋與眾生結遠緣縱好佛法其人違而不信矣又云我不見諸惡中有過於瞋者故上界不行瞋所以名為天也若以三聚攝歸不自教瞋律儀戒生慈悲心善法戒生孝順心攝生戒也此戒七眾菩薩共制大小不同大士攝取眾生為務以乖化之道故重小乘自利瞋他犯第七聚此具性遮二業繇瞋心一起能害慧命故五緣成重一是眾生二眾生想三瞋隔心四示不受悔相五前人領解一是眾生者上中二境重下境輕或有戒者亦重但不失戒也二眾生想者有當疑僻六句如上三瞋隔心者心懷忿恨不欲和解正是業主四示不受悔相者或關閉斷隔發口不受五前人領解者知彼不受隨身口業多少結重戒本經云若菩薩侵犯他人或雖不犯令他疑者即應懺謝慊恨輕慢不如法懺謝見犯染污起若不慊恨性不受懺是犯非染污起若懶惰懈怠犯非染污起又云見有眾生應訶責者應折伏者應罰黜者以染污心不訶責若訶責不折伏不罰黜是犯染污起不犯者或前人追悔之心不真懺謝之念不切菩薩以慈愍心終欲令其深改前非後更不造廼示以瞋恚之相或復折伏狠戾眾生無慚惡性邪見之徒外現威而心實慈口訶㡿而念至愍正大士調伏剛強眾生之大用豈與具三毒者而比耶又不犯者若彼欲令作不淨業然後受者不謝無罪若知彼性好聞訟若悔謝者增其瞋怒若知彼和忍無慊恨心恐彼慚耻不謝無罪又不犯者若彼更起染著外道謗聖成就邪見若增苦受或彼不可治不可與語難可教誨多起慊恨若觀時若恐因彼起聞諍相違若相言訟若僧諍若壞僧若彼不諂曲有慚愧心漸自改悔等地持經云若以方便令彼調伏若彼不如法悔其心不平不受其懺無罪華嚴二地品云瞋恚之罪亦令眾生墮三惡道若生人中得二種果報一者常被他人求其長短二者恒被於他之所惱害楞嚴經云瞋習交衝發於相忤故有刀山劍樹斧鉞等十善業道經云若離瞋恚即得八種喜悅心法一無損惱心二無瞋恚心三無諍訟心四柔軟資直心五得聖者慈心六常作利益安樂眾生心七身相莊嚴眾共尊敬八以和忍故速生梵世若能迴向菩提後成佛時得佛無礙心觀者無厭按此戒從菩薩心地法門戒心中忍心喜心慈心悲心及孝順心所出第十謗三寶戒三初作犯止持若佛子自謗三寶教人謗三寶謗因謗緣謗法謗業謗者乖背之稱大凡解不稱理言不審實異說異解皆名為謗自謗三寶者謂自己未具正見未解深理以邪為正以正為邪或見邪教典籍或聞外道人言或順有勢位人誹議便謂菩薩經律言非佛說是為謗佛及言非大乘經典是為謗法又云受持讀誦者非佛弟子是為謗僧或自發邪解建立邪言自謂為正或從邪師領納邪法著作邪書惑亂人心疑誤後學永失正道陷波邪途繇此傳播後代蔓延不絕罪不可容也教人謗者謂教他如我訕毀欲黨同伐異也又世有著作謗辭傳播後代初學淺識隨而和之此則自謗教他實兼偹焉取快目前遺殃累劫因緣法業者初起邪見之心為因邪心相續助成謗事為緣巧說邪見之方為法前人領解為業致使當來不見三寶之相受三惡道苦也又謗有四義一自樹門庭二顯己技藝三取媚權勢四誑誘無知此戒亦名謗菩薩藏說相似法或云邪見邪說戒戒本經名謗亂正法戒謂自以邪見謗亂正法非謂毀罵之謗設使毀罵其罪猶輕唯此罪重也二作持止犯而菩薩見外道及以惡人一言謗佛音聲如三百矛刺心況口自謗天竺此方異學之徒乃至菩薩心外求法悉名外道非必極邪也不信大乘常住三寶故棄捨心地大戒而習學異道邪教撥無善惡果報是名惡人非必巨慝也一言者以其最少尚如三百矛刺心況其肆言謗聲外揚而大士之心安能忍乎謗佛音聲者法也三百矛刺心者喻也以喻傷自己心地也音聲者謂音從彼出聲是我聞故曰音聲問經中但云謗佛今言謗三寶者何義答佛是心成法從口出僧是身作身口以心為主是以謗佛即謗法僧也菩薩是成佛之人以三寶為心普願一切眾生成佛今聞一言謗佛則斷當來佛種故如三百矛刺心言其害之最多而痛愈切也見外道惡人謗佛尚且如此痛切況受佛禁戒為佛弟子者口謗一言即是外道惡人也斯實愍彼邪見自陷泥犂復引無量眾生誤入苦海故云如三百矛刺心非謂瞋彼謗毀三寶之念而制此戒然三寶體如日月非一指能翳其明猶擲斧斬天還傷自己三寶不為之謗也三違教結罪不生信心孝順心而反更助惡人邪見人謗者是菩薩波羅彝罪佛即是心今謗佛則不信自心是佛故曰不生信心既違佛教無孝順心故曰不生孝順心也然大士本以信孝二心受佛正戒常當敬順三寶而無違逆自謗己是逆理豈可更助邪見惡人共訕毀耶故曰是菩薩波羅彝罪若以三聚攝歸自他不謗律儀戒見如刺心善法戒生信孝心攝生戒也此戒七眾菩薩共制大小不同大士以利生為任故重小乘說殺無果報婬不障道世界有邊無邊等均名惡見語語犯第七聚三諫不捨結第三篇更或不捨作惡見不捨舉羯磨雖非滅擯而治罰最嚴冀欲永捨惡見故然終不結重此亦具性遮二業以邪見為本復加口過也此十重戒皆屬性業者小乘以酒為遮戒大士利益眾生為本令他迷惑心地故酒亦屬性罪也如智度論云性戒者是尸羅身口等八種謂身三口四更加於酒以防意地令得淨命故即十善中後三意業而數雖不同其義無別言性罪者謂不繇佛制其性自然是惡故名性罪止觀云性戒者莫問受與不受犯即是罪受與不受持即是善若受戒持生福犯獲罪不受無福犯無虧戒罪惟有惡行及業道罪言受犯得罪者謂於性罪上更加虧戒罪也此戒具五緣成重一是眾生二眾生想三欲說心四正吐說五前人領解一是眾生者向上中二境謗則重向下境輕二眾生想者六句如前可知三欲說心者正是業主謂邪見推畫唯此是實餘皆虗妄既心存謬解喜向人說也邪見雖多大端有四一上邪見二中三下四雜上者撥無因果如闡提輩中者謂三寶不及外道若心中計成失戒若心知三寶勝口說不如既未翻歸不失戒體語語結重下者棄大取小計成失菩薩戒計未成結輕雜者或偏執或雜信或繫念小乘或思義僻謬偏執又二一執大謗小戒本經云若菩薩如是見如是說言菩薩不應聽聲聞經法不應受不應學菩薩何用聲聞法為是犯染污起寧知三世諸佛出世隨機設教皆說三乘應以聲聞乘得度者即現聲聞身而為說法其聲聞四果廼出世聖賢人天福田豈可輕耶謂彼無利生心故佛訶之然亦但訶其心未甞訶其行也二偏謗一部於方等中偏言某部非佛所說亦犯輕垢若菩薩聞菩薩法藏甚深義真實義諸佛菩薩無量神力誹謗不受言非利益非如來說是亦不能安樂眾生是犯染污起也雜信者不背因果及三寶大乘但言外道鬼神亦有威力奏章解神或復勸他悉犯輕垢繫念小乘者知大乘高勝且欲先取小果後更修大此名念退亦犯輕垢思義僻謬者若有知他為是強欲立異皆犯輕垢四正吐說者若自說若令人傳說若作書著述等五前人領解者謂納受邪言隨語語結罪披書發解亦語語結罪惟遮不開華嚴二地品云邪見之罪亦令眾生墮三惡道若生人中得二種果報一者生邪見家二者其心諂曲十善業道經云若離邪見即得成就十功德法一得真善意樂真善等侶二深信因果寧殞身命終不作惡三惟歸依佛非餘天等四直心正見永離一切吉凶疑網五常生人天不更惡道六無量福慧轉轉增勝七永離邪道行於聖道八不起身見捨諸惡業九住無礙見十不墮諸難若能迴向菩提後成佛時速證一切佛法成就自在神通按此戒從菩薩心地法門戒心中護心信心念心及孝順心所出三結示三初舉所持法善學諸仁者是菩薩十波羅提木叉應當學於中不應一一犯如微塵許何況具足犯十戒如法如律如佛所教不違本源心地順理而修故曰善學皆具慈悲利濟之心故曰諸仁者猶言諸大德也斯廼如來讚譽學戒者之美稱謂菩薩純以仁孝慈濟為心故佛讚之也是菩薩者謂提清此心地大戒廼菩薩所學非聲聞所持也若犯之即得極惡重罪當招地獄苦報持之即是妙因極果當證真常之樂也梵語波羅提木叉華言保解脫今方學戒雖未解脫然守持無染如來保任後必得解脫也木叉為因解脫是果此廼因中說果言我已誦此十波羅提木叉竟汝等亦當時時修習刻刻行持故曰應當學也於中等者謂於十重戒中非但不應犯一戒連一戒中絲毫亦不應犯也如浮囊一洩則彼岸難登然犯少尚不名菩薩何況具足犯十戒而失其正因極果感於惡報無窮耶故下文示其得失二別舉得失二初不升失若有犯者不得現身發菩提心亦失國王位轉輪王位亦失比丘比丘尼位亦失十發趣十長養十金剛十地佛性常住妙果一切皆失不得現身發菩提心者直指此生為語現謂現在發謂開發菩提心者即成佛果之因地覺心也十波羅提木叉皆從此心地流出持戒如平地佛果如妙種菩提心如芽此心地戒一虧如截樹頭菩提之芽已焦雖有佛性現身必不能發生也現身既不能發生他身則可知矣亦失國王位轉輪王位者位基也謂現在既失其位未來必並失其名也國王轉輪王者謂心地端嚴本尊貴故然世間尊貴亦繇戒得也比丘比丘尼者謂心地清淨本高尚故然出世間高尚亦繇戒得也發趣長養金剛者以心地不遷於惡即是住十心心地能為諸善即是行十心心地慈愍眾生即是向十心謂菩薩三十心亦繇戒得也十地者謂菩薩極位亦繇戒得也以心地發生無量具足諸地大功德故佛性常住妙果者謂妙覺佛果亦繇戒得也以心地本來是佛今圓滿極果故然輪王福位比丘慧位十地因位佛性果位皆是樂果也若犯十重則永失如上大益故曰一切皆失也問犯前四戒則一切戒體俱失犯後六戒祇是失菩薩法何云亦失比丘比丘尼位耶答此是一往乘勢之語譬如有人從高處墜下法爾至底理無中止如身子六心中退仍向五道輪迴此其驗也二沉墜失墮三惡道中二劫三劫不聞父母三寶名字以是不應一一犯上申先失樂果此明後受苦報也三惡道中者謂地獄餓鬼畜生受苦處也惡即不善之稱道以能通為義繇一切眾生造作極重惡業而生其處故名惡道也二劫三劫者明受苦極長之時分也不聞父母三寶名字者謂無人天受生之果見佛聞法之因皆繇罪障深重故也良以犯戒者以欲為樂故感當來苦報也以是者總結上文而言也謂繇是之故不應一一戒中犯如微塵許所謂毫𨤲有差天地懸隔可不慎歟三結勸學持汝等一切菩薩今學當學已學如是十戒應當學敬心奉持八萬威儀品當廣明此戒是一切佛一切菩薩行之根本故三世菩薩同學同持若一切佛菩薩不由此十戒法門得賢聖果者無有是處所以如來再三叮嚀勸學勸持盡未來際不可忘也問現在未來固當誡勉已學則既已奉持云何復勸答良由心地無盡菩薩學心地法門亦無有盡也故佛尚半月半月自誦況菩薩耶此十重戒與瓔珞經同若善生經單明在家六重則無後四戒若地持經單明出家八重則無酤酒說過二戒又地持羯磨文中明受戒法亦通在家二眾今此經與瓔珞去複存單合成十重然善生經意被界內不制後四猶之可也地持被界外機何不制酤說二戒耶若謂出家不妨酤酒說過此決不然若謂在家不妨讚毀廼至邪說此尤不可葢或各就僧俗易起過邊制之實則十戒皆通僧俗也八萬威儀品者言今此所說是略出十無盡藏戒品之大綱如欲廣明持犯性相當閱大本後分八萬威儀品中詳悉也音釋辟支華言緣覺謂觀十二因緣而悟道故大乘四果大乘者謂通教中菩薩於當教中對聲聞緣覺小乘故得稱為大乘也四果者本是聲聞所證果位今菩薩歷於十地修行證果亦有淺深始終不同故借小乘四果之位以區別之是名大乘四果一初地生如來家是須陀洹果華言入流又云預流謂菩薩入初乾慧地時斷惑證理即是證佛所證故云生如來家因借聲聞初果以區別之故云是須陀洹果二八地得授記是斯陀含果華言一來謂菩薩於第八辟支佛地中蒙佛授記而得作佛因借聲聞第二果以區別之故云斯陀含果三十地得受職是阿那含果華言不來謂菩薩於第十佛地中而得受如來職猶如別圓二教等覺之位因借聲聞第三果以區別之故云是阿那含果四佛地是阿羅漢果華言無學又云無生佛地即通教中果佛也謂菩薩已斷見思習氣俱盡而得成佛因借聲聞第四果以區之故云是阿羅漢果也出大乘莊嚴經論四向向者趣向謂此人將入須陀洹道未至本位不稱為果但稱為向言其從此向初果也後三果義皆准此四空處定一空處定二識處定三無所有處定四非有想處非無想處定此四通言空處定者以其定體無形色故名之為空各依所證之境名之為處境法持心心無分散故名定也安般念具云安那般那此云遣來遣去即十六特勝法門也特勝者謂勝於四念處等諸禪觀也始從調心終至非想地地皆有觀照能發無漏善業而無厭惡自害之失故受特勝之名也一知息入二知息出三知息長短四知息徧身五除諸身行六受喜七受樂八受諸心行九心作喜十心作攝十一心作解脫十二觀無常十三觀出散十四觀離欲十五觀滅十六觀棄捨出法界次第六神通瓔珞經云神名天心通名慧性天然之慧徹照無礙故名神通一天眼通謂能見六道眾生死此生彼苦樂之相及見一切世間種種形色無有障礙是名天眼通二天耳通謂能聞六道眾生苦樂憂喜語言及世間種種音聲是名天耳通三知他心通謂能知六道眾生心中所念之事是名知他心通四宿命通謂能知自他宿命及往昔所作之事是名宿命通五身如意通謂心欲往彼身即能到山海無礙是名身如意通六漏盡通謂羅漢斷見思惑盡不受三界生死是名漏盡通也八解大集經云一內有色觀外色解脫初禪二內無色觀外色解脫二禪三觀淨解脫具足住三禪四觀空無邊處解脫四禪五觀識無邊處解脫四禪六觀無所有處解脫四空七觀非非想處解脫四空八觀想受滅解脫過三界三十七菩提分法謂四念處四正勤四如意足五根五力七覺支八正道也有漏之法毗婆沙論云有者若業能令後生續生是名有義漏者是留住義謂令有情留住欲界色界無色界故涅槃經云有漏法有二種一因二果有漏果者是則名苦有漏因者是名為集結使一切煩惱名為結使謂結縛身心驅使行人流轉三界故無漏慧戒定慧三學也他心智他心智者知諸眾生心心所法無所滯礙故名他心智也增上慢謂不達法相錯認消息得小輕安自謂究竟乃是如心而語故是染污犯是染污犯者謂從見思煩惱起非也非染污犯者謂從劣慧起也染污即垢染污非染污須分重輕二垢今總名輕垢者對十重而言也然輕戒中復有重輕差別及方便等流之不同也五穀謂黍菽蔴麥稻也儀狄造酒儀狄夏人也善能造酒禹帝飲而甘之曰後世必有以酒亡其國者遂疎儀狄而深痛絕酒也肉山大身釋迦如來往昔為轉輪王名曰無勝發菩提心出家修道時值大饑饉欲以身肉施眾生食即立大誓願上彰水山上便自投身以本願故即成肉山高廣一由旬人民鳥獸來食血肉血肉晝夜生長漸漸高廣至一千由旬皆具頭目四肢身分乃至十千年中以身血肉充滿一切閻浮提人夜叉鳥獸食無一念生悔心也五篇謂四棄法十三僧殘法百二十波逸提法四可呵法眾學法也七聚七聚者四根本為第一聚十三僧殘為第二聚偷蘭遮為第三聚百二十波逸提為第四聚四可呵為第五聚眾學法在身名惡作為第六聚在口名惡說為第七聚也秦皇賢逐客秦宗室大臣諫曰諸候人來仕者皆為其主耳請一切逐之於是大索逐客楚人李斯亦在逐中行且上書曰臣聞泰山不讓土壤故能成其大河海不擇細流故能就其深王者不却眾庶故能明其德王乃召李斯復其官卒用李斯之謀兼天下漢主悅智囊漢晁錯以才辯得幸景帝號曰智囊葢謂美其智之廣也莊嚴戒身清淨定慧莊嚴萬德俱備故律云戒是佛法瓔珞能莊嚴佛法故百萬障門開華嚴普賢行願品云所謂不見菩提障不聞法障生惡道障被謗毀障少智慧障乃至遠離佛菩薩種姓等身子六心中退文句云舍利弗母好形身身之所生故曰身子六心者謂已證六住位而退失也義如後五十四戒中詳黜音出貶斥義尸羅此云清凉謂離熱惱得清凉故大論云性善謂好行善道不行放逸是名尸羅是以義而翻也亦翻為止得謂止惡得善故也正翻為戒戒者制也謂能制一切不善之法也謗三寶唐雍州長安縣高法眼是隋代僕射高頴之玄孫至龍朔三年正月二十五日向中臺參選日午還家舍在義寧坊居南隅向街開門化度寺東即是高家欲出子城西順義門城內逢兩騎馬逐後既出城已漸近逼之出城門外道北是普光寺一人語騎馬人云汝走捉普光寺門勿令此人入寺恐難捉得此人依語馳走守門法眼怕不得入寺便向西走復至西街金城坊南門道西有會昌寺復加四馬騎便語前二乘馬人云急守會昌寺門法眼怕急便語乘馬人云汝是何人敢逼於我乘馬人云王遣我來取法眼問云何王遣來乘馬人云閻羅王遣來法眼既聞閻羅王使來審知是鬼即共相拒鬼便大怒云急截頭髮却一鬼捉刀即截法眼兩髻附肉落地便至西街悶絕落馬暴死不覺既至大街要路踟蹰之間看人逾千西街首即是高宅便喚家人輦向舍至明始蘇便語家內人云吾入地獄見閻羅王昇大高座瞋責吾云汝何因向化度寺明藏師房內食常住僧果子令吞四百顆熱鐵丸當吞之時咽喉閉縮身體焦卷變為紅色吞盡乃蘇至二十六日惺了之時復有諸鬼來取法眼到王所王語言汝何因不敬三寶說僧過惡汝吞鐵丸盡已宜受鐵犂耕舌至正月廿九日蘇惺到三十日平旦復死至地獄復受鐵犂耕舌自見其舌長數里傍人看見吐出一尺餘王復語獄卒言此人以說三寶長短以大鐵斧截却舌根獄卒斫之不斷王復語云以斧細剉其舌將入鑊湯煑之煑復不爛王復怪問所由法眼啟王云臣曾讀法華經王復不信令檢功德簿見案內有讀法華經一部王檢知實始放出獄其人現在觀者如市見者發心合門信敬勵志精勤誡誠無倦京城道俗共知出法苑珠林持戒比丘持戒如帶浮囊渡海護生如草繫不傷故轉輪聖王慈恩云四種輪王威定諸方亦有差別鐵輪獨治南洲奮威始定銅輪治東南二洲震威乃伏銀輪治東西南三洲遣使方降金轉輪王德振四洲望風順化故名聖王三途途謂途道即所趣義亦云塗炭即殘害也四解脫經云一火途即地獄道也此從熱得名謂其處受苦眾生常為鑊湯爐炭所逼故二刀途即餓鬼道也此從驅逼得名謂其處受苦眾生常為刀杖所驅逼故三血途即畜生道也此從互相吞噉得名謂其處受苦眾生強者伏弱互相吞噉飲血食肉故也
