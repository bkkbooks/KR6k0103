body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述第四十一為利作師戒二初作持止犯二初如法審過三初問逆若佛子教化人起信心時菩薩與他人作教誡法師者見欲受戒人應教請二師和尚阿闍黎二師應問言汝有七遮罪否若現身有七遮罪者師不應與授戒若無七遮者得與授戒教化人起信心時者起信論云譬如水中火性是火正因若無人知不假方便能自燒者無有是處眾生亦爾雖有正因熏習之力若不遇諸佛菩薩經律所教及一切善知識開導發心能自成佛者無有是處是故凡欲受戒先須要發信心信心一發萬善從生則眾生可度佛道堪成矣菩薩與他人作教誡法師者謂比丘戒法於僧中受故十師等皆須現在菩薩戒法於十方諸佛菩薩前受故和尚秉宣但得教誡之名謂秉宣佛制教誡後學故見欲受戒人者謂見發心欲受菩薩大戒人也應教請二師者謂請釋迦牟尼佛為得戒本師和尚請一生補處彌勒菩薩為教授阿闍黎也不言羯磨尊證者有三義故一釋迦如來是現在佛彌勒大士乃當來成佛此表現前受菩薩戒為因當來成佛為果也二羯磨尊證同名闍黎故三菩薩戒中多同學等侶一法故但言和尚阿闍黎也按本經前文惟請一師今言二師者以成七逆故也而二義皆得但未見其請師之文其地持瓔珞止請一師應在佛菩薩像前受師當在傍不得背像坐凡為師範須一一明解經論中受法然本經受法久已失傳故傳戒正範依地持瓔珞受法討自詳明不可自師己心難免違教無知之罪復令他終身不得戒也二師應問言者謂秉戒和尚既為彼等請二師已即當在二師前問其七遮罪也言七遮罪者即是七逆罪也謂此罪能障聖道故名為遮違於本源心地故名為逆若現身有者師不應與授戒若現身無七遮罪者即當與授戒也二懺重若有犯十重戒者應教懺悔在佛菩薩形像前日夜六時誦十重四十八輕戒苦到禮三世千佛得見好相若一七日二三七日乃至一年要見好相好相者佛來摩頂見光華種種異相便得滅罪若無好相雖懺無益是人現身亦不得戒而得增長受戒益言十重戒者即十波羅提木叉也謂曾受此菩薩大戒而毀犯之或曾受比丘沙彌及五戒等破於根本也如未曾受戒若作殺盜等止有世間性罪不名犯戒應教懺悔者此是如來利生拔苦之心至切也謂恐癡迷眾生遇順逆境緣善根力弱不能制伏而犯此戒故開此一種方便法門令懺悔除滅若不在佛菩薩形像前勤求懺悔者必陷墜三途永無出期也晝夜六時者謂既有重罪應當時時刻刻誦重輕戒明其罪相願速求清淨也三世千佛者謂三世各有千佛故苦到禮者謂懺悔之法當五體投地如泰山崩懇切至誠深生慚愧稱此佛名念地獄苦發菩提心求見好相放光摩頂滅我此罪如是則犯戒黑業已除戒體離諸障蔽無作重明若不見者更加勇猛二七三七廼至一年要見好相為期言好相者或於誦戒之時或於禮拜之中或於夢寐之際見佛來摩頂或見光明燭身或見虗空藏菩薩以滅罪印印身或見散華灑淨表滅罪相若見如是種種異相以此證知故曰見光華種種異相便得滅罪也又云見光華種種異相者佛來摩頂時如雲消月朗故曰見光菩薩心地復得開敷故曰見華諸罪消滅而當體即空轉為河沙性德故曰見種種異相如是復本心源還同大覺是真佛子故曰佛來摩頂也如昔日世尊以兜羅綿手摩拊病人病即除愈今來摩頂則何罪不滅何德不顯也已上誦戒懺其口禮佛懺其身見相安其意如是三業清淨而戒體得矣惟俟證明若無好相雖懺無益者謂懺心不䖍念不懇切故無如上好相雖懺而罪不滅戒體不復戒善不生故云雖懺無益是人現身亦不得戒也而得增長受戒益者顯非永無益也謂今雖不得戒繇懺悔力故亦得增長向後得戒之益以向後懺心不歇慇懃苦到念念相續二年三年得見好相即得戒也然既見好相知是罪滅因緣勿生取著若取著者即為魔便故經云若作聖解即墮羣邪是也三悔輕若有犯四十八輕戒者對首懺悔罪便得滅不同七遮而教誡師於是法中一一好解對首者謂犯輕垢即對一菩薩比丘前發露懺悔罪便消滅非如逆事要見好相故云不同七遮也一一好解者於此許懺不許懺得戒不得戒一一善能解知方堪為人師範然懺法有其三種謂作法取相無生也作法者晝夜六時清淨三業在佛菩薩像前披陳發露苦到懺悔是也取相者定心運想取相現為期於道場中見佛摩頂或見光見華或於夢中見種種瑞相於此諸相隨見其一罪便得滅是也無生者一切罪業皆從虗妄顛倒心起若了我心不生罪福無主觀業實相見罪本源法界圓融真如清淨故經云若欲懺悔者端坐念實相眾罪如霜露慧日能消除即其義也問實相無相當云何念答以無念之念念無相之相以無相之相相無念之念若於念外別有實相實相之外別有於念即非念實相也其作法懺能滅違戒罪取相懺能滅性罪無生懺能滅無明煩惱罪懺法雖三不出事理二途前二屬事後一屬理止觀云事懺懺苦道業道理懺懺無明煩惱道金光明記云三種懺法同時而修無生是正二為助緣斯乃正助合行如膏益明證理彌速本經雖不言無生而第一義諦即無生也或有單修前二助道如南嶽立有相安樂行不入三昧但誦持故亦得見上妙色相即本經六時禮誦苦到懺悔佛來摩頂等是也如上懺法甚為微細若不用心事無實際故須一一好解也二不解經律若不解大乘經律若輕若重是非之相不解第一義諦習種性長養性性種性不可壞性道種性正覺性其中多少觀行出入十禪支一切行法一一不得此法中意輕重是非之相者謂此心地正戒犯小即污心源對首懺悔便得清淨是名輕相犯大即失戒體要見好相罪方除滅是名重相若輕則輕懺重則重懺是為是相若以輕為重以重為輕是為非相於此輕重是非四相明了辯柝如何是犯如何非犯秩然不亂是為善解戒之名相也又輕則易懺重則難懺是犯須懺非犯則不須懺倘輕罪說重重罪說輕犯謂非犯非犯謂犯如是則不能使人決疑出罪也第一義諦者謂此心地大戒其體湛寂非重非輕而輕重宛然其性虗明無是無非而是非灼爾逈出二邊而雙泯雙照顯中道理而絕議絕思故名第一義諦是為善解戒之義理故智度論云云何名為具足戒謂菩薩持中道第一義諦戒用中道慧徧入諸法無戒不備是名具足戒也如相不解則持犯昧理不解則不識本源心地也此六種性中習種性者是十住位名銅寶輪菩薩即上之十發趣心也謂此菩薩初從十信趣入研習真諦以修空觀開慧眼成一切智得位不退故名為住長養性性種性者此二對十行位名銀寶輪菩薩即上之十長養心也謂此菩薩從真入俗利生進修假觀分別十界差別種性長養聖胎見俗諦理開法眼成道種智由前十住發真悟理從此進趣故名為行不可壞性道種性者此二通對十迴向位名金寶輪菩薩即上之十金剛心也謂此菩薩修中道觀任運施設無功用道行願事理悉皆和融流人法界迴事向理乃至迴能修所修向於法界性如金剛故不可壞由始正修中故名道望後能生佛果故名種也正覺性者亦名聖種性此通屬十地等覺妙覺位從初地至十地用中道觀以智斷惑深而又深地地各破一分無明顯一分三德證入十地開佛眼成一切種智皆名琉璃寶輪菩薩按瓔珞經別出等覺性妙覺性復由深入中道觀達無始無明窮盡源底智極邊際斷最後一品微細無明惑登中道山頂與無明父母別是有惑可斷名有上士是摩尼寶輪菩薩即等覺位也究竟解脫朗然大覺妙智窮源無明習盡翛然無累故無惑可斷寂而常照聖中之聖名無上士是水晶寶輪菩薩即妙覺極果佛位也其中多少觀行出入者謂從上經歷三賢十聖位中隨人根性利鈍所用禪觀功行之不同斷惑證真有巧拙之差別利則巧用功少鈍則拙用功多出入諸禪三昧故云其中多少觀行出入也十禪支者一覺二觀三喜四樂五一心此五支屬初禪六內淨支此屬二禪七捨八念九慧此三支屬三禪十不苦不樂此一支屬四禪此十法為禪觀中之所支用故名禪支雖是世禪而能入賢聖階位也一切行法者總結上進修功行一切法門其理多端權實無量故一一不得此法中意者謂如上進修之法甚深微妙若一一不解其中義趣者非貪利則愚癡也如不解輕重是非則昧於戒相不解第一義諦則昧於戒理不解習種性等則昧於道共定共種種差別然昧戒相則不能決疑出罪昧戒理則不能啟迪真信真解昧道定則不能今人修證趣入苟不明此則不能為人作教誡法師也譬如醫師不通脉理不知藥性欲為治病豈不悞哉二違教結罪而菩薩為利養故為名聞故惡求多求貪利弟子而詐解一切經律為供養故是自欺詐亦欺詐他人故與人授戒者犯輕垢罪大凡不依律法所得利養故云惡求邀名奪利貪取無厭故云多求內不諳經律之旨無慚無愧是為自欺詐外復詐現能解之相是為欺誑他人如是作師與人授戒者喻如盲人引路彼此俱有陷墜之患也貪心教化賣法之端違越毗尼欺誑一切故結輕垢此是遮業繇內無實解外為名利輙爾強為有悞人之失故制二緣成罪一是為利心二攝授徒竟問此與十八無解作師何別答前無解作師過在好名今則正在好利名利兩途皆生死根本菩提大障其罪是均肉駱駝山豈不懼耶故皆結云自欺欺他也若以三聚攝歸不為名利律儀戒一一好解善法戒教人起信攝生戒也比丘比丘尼全制餘五眾無授戒事但令為利攝徒眾亦犯大小俱制小乘師德如前說惟遮不開第四十二為惡人說戒戒二初止持作犯又二初明重法遵人若佛子不得為利養故於未受菩薩戒者前若外道惡人前說此千佛大戒邪見人前亦不得說除國王餘一切不得說不得二字貫於下文前明不解經律不得為利妄授此言能解經律亦不得為利濫說也其外道惡人不信三寶誹謗大乘邪見之輩隨外道唱和易生反復說者或誦說或解說或為授戒或聽彼布薩時聞說也然此千佛所傳大戒非未發菩提心者及外道惡人之所堪聞以其非器故如師子乳非琉璃瓶不能容納也國王者是一國所尊如來付囑令外護三寶故大小乘戒佛悉聽說又大國王即人中之天願人改過遷善自不宣人長短故凡所行一切佛事不宜隱諱況興廢亦係在焉是故應說根本目德迦云尊貴之人雖無敬信亦應為說貧窮之人兼不敬信雖樂欲聞不應為說尊貴指國王也十誦毗尼序云波斯匿王諸佛時正當布薩諸比丘言大王出我等當作法事王言欲聽諸比丘白佛佛言從今日聽在王前說戒然則敬順國王亦佛所誡禮之所在是故惟除國王其餘一切無信之人及未受千佛大戒者前不得說也涅槃經云昔十五日僧布薩時有一童子在隱屏處盜聽說戒金剛力士以杵碎之身如微塵是知為師者不可不慎也二明㡿邪無信是惡人輩不受佛戒名為畜生生生不見三寶如木石無心名為外道邪見人輩木頭無異是惡人輩者總結上文外道惡邪之類也謂不別善惡賢愚故如畜生不受千佛大戒失菩提種子故於生生之處不見三寶雖處人倫不知歸向出世大道故如木石無心從迷至迷六根昏塞故如木頭無異如是等人向之說者非惟不曉復生訕謗故不應說也二違教結罪而菩薩於是惡人前說七佛教戒者犯輕垢罪七佛教戒者謂此心地大戒雖三世諸佛同說而近從七佛授受傳來正所以見其親切不可不揀擇自重而輕為外道未受戒人說至令自損陷他過非小矣如來法水但潤有根之苗恐不信人反增疑議然法雖平等說要當機施者不尊受者不敬罪結輕垢此是遮業由預為說後受不能發起殷重心故制四緣成罪一未受菩薩戒人二未受人想六句二重二輕二無犯三有為利說心四前人得聞時結罪若以三聚攝歸不為惡人說律儀戒國王前說善法戒不為利說攝生戒也七眾同大小不全共小乘一切時中不得向沙彌等說五篇以彼若解者便成盜法重難故大乘惟半月誦戒羯磨時須遣未受戒者出餘時不論前云菩薩比丘比丘尼一切時中皆應講此經律後文見一切眾生應勸受三歸十戒等故知不同小乘毗尼藏也又菩薩比丘比丘尼一切時中亦不得以五篇罪名向未受具人說而菩薩沙彌等亦不得預知五篇名義致成重難永障此生受具足戒也惟遮不開第四十三無慚受施戒二初止持作犯二初不應受供若佛子信心出家受佛正戒故起心毀犯聖戒者不得受一切檀越供養亦不得國王地上行不得飲國王水信心出家者謂發上求下化之心出生死家入如來家也受佛正戒者謂此菩薩大戒是成佛正因故曰正戒此則福田增勝堪受供養也故起心毀犯聖戒者謂不守先心則良田缺陷受供何宜不得國王地上行者國王乃大地之主一飲一皆屬所司既無戒德何堪消受俱舍論云破戒之人於大眾食及與住處佛不許此人噉一段食踐一脚地觀此則知破戒者天地雖寬無處可著檀那雖眾滴水難消何況檀信四事供養十方常住僧物堪能受用耶故云不得受一切檀越供養廼至不得飲國王水也二幽顯共瞋五千大鬼常遮其前鬼言大賊若入房舍城邑宅中鬼復常掃其脚迹一切世人皆罵言佛法中賊一切眾生眼不欲見犯戒之人畜生無異木頭無異五千大鬼者大論云菩薩具足五百戒法一戒天帝遣十神擁護持戒行者故有五千善神也若信心持戒則有五千善神擁護若惡心毀犯則有五千大鬼隨身如世貴位車馬僕從時隨擁衛一犯王法杻械皂卒常隨防禁斯皆善惡途分理本自然也遮其前正顯不許行國王地言大賊謂其虧害千佛大戒也掃其迹者毀戒不能上昇如龜拽尾嫌其穢污房舍道路也佛法中賊者盜披佛衣偷餐佛食在佛法中反害佛法故名為賊然持戒威儀人天皆共瞻仰犯戒衰相眾生眼不欲見此皆自招其過也經云聖賢誦經行道之處其地皆為金剛天人散花供養破戒之人遊履之處其地皆為瓦礫空中飛砂走石是故鬼神常掃其迹又佛藏經云破戒比丘竊人我法此人著衣受食皆是盜得所以世人皆罵言佛法中賊也不識持犯何異畜生身無戒體木頭無別也二違教結罪若故毀正戒者犯輕垢罪出家戒行是良福田戒之不守田於何有帶罪無愧人鬼所毀故結輕垢此具性遮二業由輕視戒律故制三緣成罪一是犯二犯想三起心欲犯念念輕垢戒本經云起五葢心不開覺者是染污犯亦此戒攝若以三聚攝歸受佛正戒律儀戒信心出家善法戒不毀正戒攝生戒也七眾同而出家菩薩為人世福田其責倍重大小俱制小乘即所謂輕戒罪也隨所犯罪更加一輕戒罪大士執心嚴於聲聞也若本無故毀心者但隨事結本罪不加此罪若直起此心未犯事者小但責心大亦應懺惟遮不開第四十四不供養經典戒二初作持止犯若佛子常應一心受持讀誦大乘經律剝皮為紙刺血為墨以髓為水析骨為筆書寫佛戒木皮榖紙絹素竹帛亦應悉書持常以七寶無價香花一切雜寶為箱囊盛經律卷常應一心者念無間斷曰常心離散亂曰一乃顯精勤篤志之至極也若口誦經律心想外緣不論善惡皆為雜念則慧解不能生矣然此一心是能信之心經律是所信之法有事有理事者以心守戒持之不易誦之不忘無背逆心無分散意心不違戒戒不違心名事一心也理者心冥乎戒不持而持持無持相不誦而誦誦無誦相即心是戒即戒是心不見能持所持有犯無犯持犯雙融名理一心也受持讀誦者智度論云信力名受念力名持看文為讀不忘為誦宣傳為說難曉須解此缺供養一法然一切諸佛由學大乘經律而成等正覺故知經律是諸佛之母若不如法至誠供養是輕三世佛母名為不孝故得罪也剝皮為紙等此舉重況輕以顯求法之心至切也有其二義一者身分血肉命根所關世間至寶重者是捨其身命而流通慧命也二者四大虗假終成朽敗世間至無用者是捨其無用而成就大用也木皮榖紙者榖楮樹也以皮造紙故云木皮榖紙也絹素竹帛者絹是袖絹絹帛皆素織成素亦白練也此方上古未識造紙多用竹簡木牘然各國所用今古不同宜隨時隨方用之如五天竺用樺皮貝多羅葉及以白㲲此方造赫蹏紙始自前漢至後漢和帝時蔡敬仲用樹膚及弊布魚網造紙今多甲竹及楮皮作以此書寫流通是為財法二施廣布無盡矣心地觀經云法寶有四種一教法二理法三行法四果法一切無漏能破無明煩惱業障聲名句文名為教法有無諸法名為理法戒定慧行名為行法無為妙果名為果法如是四種引導眾生出生死海到於彼岸以是因緣故當盡心供養也常以七寶等者以顯敬法之心至重也亦有二義一內敬如剝皮為紙等二外敬如財寶絹帛等皮骨是內捨財寶是外捨內外俱捨盡心極矣箱囊皆藏貯法寶之器也二違教結罪若不如法供養者犯輕垢罪供養者如上有五一受持二讀三誦四書寫五香花一一皆須如法供養所以者何法寶者諸佛所師三世諸佛依法修行斷一切障得成菩提盡未來際利益眾生是故如來慧命寄於三藏若不照管必致損壞損壞則斷佛種大不孝也故結輕垢此是遮業繇無敬法心故制若次三聚攝歸讀誦大乘律儀戒書寫佛戒善法戒如法供養攝生戒也七眾同大小不全共小乘不誦持毗尼結罪大乘應修五事又不供養三寶亦犯戒本經云於一日一夜中若佛在世若佛墖廟若經卷若菩薩修多羅藏摩得勒伽藏若比丘僧若十方大菩薩眾若不少多供養及不次一偈讚歎功德廼至不能一念淨心若不恭敬嬾情懈怠是染污犯若忘誤非染污犯善生經云若得新穀果蓏菜茹不先奉供三寶先自受者優婆塞得失意罪若以殘食施於四眾得失意罪惟遮不開第四十五不化眾生戒二初作持止犯二初勸受歸戒若佛子常起大悲心若入一切城邑舍宅見一切眾生應唱言汝等眾生盡應受三歸十戒常起大悲心者菩薩以化度為懷拔苦念切故常起大悲心此心須臾不可忘故曰常也不言大慈者正顯拔苦急於與樂也一切眾生者本該六道而菩薩未得天眼於城邑舍宅憒閙之處未易得見天神修羅地獄餓鬼所可見者惟人及畜耳今此文中是令人發心以人有尊卑貴賤故云一切次令畜生發心後入山林川野寂寞之處廼兼鬼神等應先以種種方便教令發大信心然後授與三歸十戒若不先教發心使與說戒者即是與惡人授戒也應唱等者廼呼召提醒之辭謂一切眾生八識田中漏無漏種法爾具足奈無提醒多劫塵埋若逢提醒自能了悟譬如八十老翁八或呼著乳名未嘗不警心應口又如數十年前遊過佳山好水久後偶遇說起勝境宛然未嘗不手舞足蹈今此唱受亦猶是也應受有三一本自有之非從外來理應受也二惟此為實餘二非真義應受也三在迷既久忽逢指點時應受也瓔珞經云法師先為解說使其樂著然後授與三歸者歸依佛法僧三寶也繇佛法僧三寶是真淨福田故又歸依者回轉之語繇昔背正從邪流蕩生趣今則迴彼邪心轉從正道故云回轉可見三寶威力不可思議歸趣依投能為救護業障蠲除福智增長諸魔怨敵不得侵凌故當歸依也薩婆多論云以三寶為所歸欲令救護不得侵凌故也如折伏羅漢經云忉利天子壽命欲終當受豬身詣佛求救佛教歸命佛法僧三寶於是七日七夜精勤三歸得先豬胎為長者子又木槵子經云佛告琉璃王穿木槵子稱三寶名當斷結業得無上果故知三寶廼是一切眾生歸依處也十戒者即菩薩十重波羅提木叉也不言五戒而言十戒者謂五戒是人天之因十戒乃菩薩之本故唱言汝等眾生各具佛性之戒繇汝無始至於今生皆迷失故今指所歸覺路是成佛正因也菩薩戒本經云若人聞三寶名則不墮三惡道何況至心歸依三寶耶然菩薩見一切眾生莫不是佛今非佛者故當受也不受三歸不知自性三寶不受十戒則不知自性解脫也菩薩善戒經云菩薩至白衣家不能說法開示令供養三寶得罪二令發大心若見牛馬豬羊一切畜生應心念口言汝是畜主發菩提心而菩薩入一切處山林川野皆使一切眾生發菩提心心念口言者菩薩見一切眾生應起大悲心念其無始劫來迷失真性妄造惑業枉受輪迴苦報作是念已乃口告言汝是畜生當求出離勿枉受此苦無有休息如是令知名識苦心求解脫歸向大士然後教發菩提心故云心念口言也又汝是畜生者先示其果報之名發菩提心者後教以出離之要菩提心迺諸佛圓明覺體眾生本源自性即自性三歸心地十戒是也繇迷此心故隱而不發所以輪轉三途無有窮已今逢良導開發此心靈覺洞然暗蔽愚癡倏爾消滅以見心佛眾生三無差別也入一切處等句謂先令人畜發心已今總結隨方隨處所見不論是人是畜而皆令發心足見大士普化之心無往而不利救度之念無時而不切也二違教結罪是菩薩若不發教化眾生心者犯輕垢罪大士本懷利生為主若不發心罪結輕垢問說法對人人猶未信發心向畜畜則何知答含靈覺性多有不迷如鸚鵡聞四諦生天至成辟支佛果獼猴獻蜜次生出家成道鳥聽經而生忉利雁聞法而生三十三天池魚聽經偈而為天子海鯨聞佛各而舟免難鵬之敬律蛤之生天如斯等類不可勝舉勿謂蠢動無知而不化耶然縱迷不覺繇法力加持亦令獲益如舍利弗為患狗及毒蛇說三法印俱生富長者家後成聖果地獄聞經題而盡出火坑又如真言呪語人那解知受持則隨心所願迺至呪枯樹還使生華無情尚爾況有情而不獲益耶如來金口所宣一言一字凡情豈能思測故律制比丘凡至神廟或樹下水邊等處皆誦伽陀今大士知一切眾生具足覺性故教化普度心無間斷也此是遮業繇乖於弘誓故制四緣成罪一眾生二眾生想三無教化心四不行教化遇可化而不化隨事結過然大士化度不出四攝一布施即財法無畏三種二愛語三利益四同事戒本經云以嫌恨心不隨化者是染污犯此即利益攝也又云見眾生所作不與同事若田業若牧牛若和諍若福業不與同者瞋恨心是染污犯嬾惰懈怠非染污犯此即同事攝也若以三聚攝歸勸受歸戒律儀戒起大悲心善法戒教化眾生攝生戒也七眾同小乘無化他義不制不犯者戒本經云若彼欲為不如法事若病若無力若護僧制若彼雖如法能合多人起非法事若伏外道故若以方便合彼調伏悉皆不犯第四十六說法不如法戒二初作持止犯又二初普明一切若佛子常應教化起大悲心若入檀越貴人家一切眾中不得立為白衣說法應在白衣眾前高座上座常應教化者是自利行也入檀越貴人家者是利他行也謂具大悲心故常為在家出家說法然說時須要如法若不如法說者聽者俱招慢法之愆一切眾中者謂在王臣士庶之中也不得立為白衣說法者謂自當尊重於法也白衣者謂俗人好穿素服故此為稱也應在白衣眾前者謂不得在彼背後也應在高座上坐者謂不得坐卑下之座而為說也斯皆是尊法之儀不可輕褻非謂自圖高顯故也或暫時開示彼此俱立無過二別為四眾法師比丘不得地立為四眾白衣說法若說法時法師高座香花供養四眾聽者下坐如孝順父母敬順師教如事火婆羅門法師比丘等者上為白衣及未受戒者普說今為在家出家別說也高座香花供養者表請法之致誠也四眾下坐聽者勸聽法者之孝敬也前明說應如法此明聽當如法也如孝順父母者謂法是法身父母故當孝順也敬順師教者謂法是諸佛教門開示悟入佛之知見務必由師故當敬順無違也如事火婆羅門者謂世界劫初之時忉利天子欲觀閻浮提園林流泉等從天來下觀已復還天上身光如火林中外道遙見妄謂世人供養火故得生天道故彼每於日將欲沒時遂道夜然大火聚向之跪拜盡誠致敬而禮事之故以為喻敬順師教當如彼敬事火之至誠也二違教結罪其說法者若不如法說犯輕垢罪不如法說者謂乖說法之儀非謂不善說法也然大士施法不可泛常說者自尊聽者須敬若不爾者罪結輕垢此是遮業繇強為解說彼此有慢法之失故制三緣成罪一儀不如法二不如法想三正說法若為名利是染污犯若忘誤非染污犯若以三聚攝歸說者高座律儀戒香花供養善法戒聽者下坐攝生戒也七眾同以沙彌等說法亦許高座故以白衣說一句一偈義亦應如法故又善生經云僧若不聽說法讚歎輙自作者是優婆塞得失意罪亦此戒兼制大小乘俱制不犯者僧祇律云若比丘為墖事僧事詣王及地主時彼言此丘為我說法不得語令起恐生疑故若邊傍有立人者即作意為立人說王雖聽法比丘無罪又比丘在怖畏險道時防衛人言尊者為我說法雖持刀杖為說無罪第四十七非法制限戒二初作持止犯二初受戒人若佛子皆以信心受戒者皆以信心受戒者此總標能制所制皆以信心而受佛正戒也能制即明作制法所制謂為官走使既發信心不應違念二制限事二初破滅三寶若國王太子百官四部弟子自恃高貴破滅佛法戒律明作制法制我四部弟子不聽出家行道亦復不聽造立形像佛塔經律立統制眾安籍記僧菩薩比丘地立白衣高座廣行非法如兵奴事主四部弟子者按諸經律即四輩弟子比丘比丘尼優婆塞優婆夷也王官亦攝清信之中自恃高貴者謂威力自在也破滅佛法者生不善心也明作制法者造不善業也不聽出家行道者是滅僧寶也不聽造立形像佛墖者是滅佛寶也不聽書寫經律者是滅法寶也立統制眾安籍記僧者申明制限之事也謂別立統屬禁止於眾安設簿籍記錄僧名令照世編戶應役公門與民無異也菩薩比丘地立者謂制籍所轄屬也白衣高座廣行非法者謂職掌在躬出入由彼也如兵奴事主者為權勢所制故使上者下而下者上也然菩薩比丘乃修聖道之人能令佛法住世教化一切眾生護持國界饒益人民宜當恭敬尊重何堪制辱若是耶仁王般若經云佛告彼斯匿王吾滅度後正法欲滅此經三寶付諸國王建立守護大王當知後五濁世國王王子大臣自恃高貴破滅吾教橫作制法不依佛教制我弟子不聽出家造佛塔寺經像立統官制安籍記錄僧事比丘地立白衣高座等彼經所說與今制戒意正同此僧尼既已出家復令還俗在家二眾不許出家故云橫作制法也問王官可作制法豈四部亦能制四部耶答或父母兄弟子女互相制限障礙故不聽也如付法藏經云闍夜多尊者詣城乞食見一烏便微笑弟子問之尊者曰過去劫中我欲出家父母不聽強為聘妻得一子六歲我復欲去父母教兒抱住我脚啼哭言父若捨我依誰養活先當殺兒然後可去由此兒故不得出家從是九十一劫流轉六道未曾得見今以道眼觀見彼烏廼是前子愍其愚癡久在生死是以微笑若障人出家罪報惡道後生人中眚盲無目是故智者見人出家方便成就勿作留難又老女人經云時有貧窮老女人聞佛說法心開意解阿難白佛此女人何以智慧乃爾佛言是我前世發意學道時母也又問是母何貧乃爾佛言拘留孫佛時我欲作沙門是母慈愛不聽我去我愁一日不食由是五百世貧今者壽盡當生彌陀佛國如經所說子障父母父母障子感報若是況其夫妻兄弟朋友互相障礙罪當如何好心受佛戒者時當自慎也二舉事勸持而菩薩應受一切人供養而反為官走使非法非律若國王百官好心受佛戒者莫作是破三寶之罪菩薩為世福田應受人天供養利樂一切而反為官走使故云非法非律也涅槃會上諄諄付囑之語豈其然乎縱王臣強逼而僧可殺不可辱即一死而存正教何苟生以壞法門耶若國王百官等句此是如來大慈勸勉王臣之語謂既發好心受佛正戒還應如初心未入佛法未與壞法僧處時發信心興隆三寶遵佛律而無另制其方外人王法故云莫作是破三寶之罪也若破三寶即同忤逆問既云忤逆如何但犯輕垢耶答以王臣在家未堪制重而其得罪雖輕感報實重也二違教結罪而故作破法者犯輕垢罪是中犯者四部受戒皆為佛子當體佛洪慈闡揚法化若非法制限破滅三寶罪結輕垢此具性遮二業繇障善法故制四緣成罪一是三寶事二三寶事想三有制限心四制限得成隨事結罪若以三聚攝歸不恃高貴律儀戒不破三寶善法戒不作制法攝生戒也在家二眾全犯出家五眾無自在權勢設能隨力非法制限亦犯大小俱制若如彌勒昔為國王假設非法制限以興正法不犯第四十八破法戒三初止持作犯若佛子以好心出家而為名聞利養於國王百官前說佛戒者橫與比丘比丘尼菩薩戒弟子作繫縛事如獄囚法兵奴之法如師子身中蟲自食師子肉非餘外蟲如是佛弟子自破佛法非外道天魔能破本以好心出家受佛正戒故為王官所重後被名利所迷真如不能自守遂失初志便非好心也於國王百官前說佛戒等者謂內無實行外現威儀誑說佛戒張其行德惑彼聽信而令作世間治罰使內眾弟子無辜受罪故曰橫也作繫縛事者或杻鎻手足禁閉身形故云如獄囚法也或無禮輕賤訶責毀辱故云如兵奴之法也然種種刑辱內眾於心奚忍耶雖自不顧身後遺殃而且現前寧無慙愧何以貪名利而自敗己德恃王官而喪本良心依佛法中得利不念報恩而反如枉害破壞法門正所謂惡魔比丘也前戒制法是在家二眾此戒破法是出家二眾然為名聞利養正此戒本因國王百官指已受菩薩戒者雖是同法之人得於彼前說菩薩戒而不得於彼前橫作非法治罰也其義有三一者尊貴之人素所崇敬故在彼前而說佛戒令彼信受增長善根得以護法注念三寶故二者尊貴之人威力自在仗彼威力壓己同行橫與比丘比丘尼菩薩戒弟子作繫縛事如獄囚法令不出離如兵奴法使聽其命以辱同類故又弟子有過但應如法治罰不應作繫縛事如獄囚兵奴以傷出家軌式三者因自不能守戒見持戒者反加毀謗故於尊貴人前說佛戒者以顯持戒人反不如也師子身中蟲者此引喻以明破法之相也師子廼獸中之王能伏諸獸誰能壞彼惟自身中蟲能食其肉也此喻光明金剛寶戒能壞一切煩惱外道天魔所不能破惟於佛法中出家不依佛教乃能自破然自破有二一者已受佛戒而不護法名破佛法二者僧受佛戒而我辱之亦名破佛法也若出家五眾有過當以佛法律治罰或使懺悔或作驅擯等羯磨豈宜以王法陵辱致使王官損福善神出境是則非獨破法而復令國作難經有明文寧無恐懼二作持止犯若受佛戒者應護佛法如念一子如事父母不可毀破而菩薩聞外道惡人以惡言謗佛戒之聲如三百矛刺心千刀萬杖打拍其身等無有異寧自入地獄經於百劫而不聞一惡言謗佛戒之聲況自破佛戒應護佛法者謂既受佛戒當珍重守持不可犯也然法身繇戒而成眾生繇戒而度故當謹護也如念一子者此喻愛之至也如父母之慈念一子念念在懷一子若失則終身無倚戒法若破則法身無倚也如事父母者此喻敬之極也猶子之敬事父母事事無逆謂此戒是諸佛父母奉持此戒如敬事父母不可絲毫放逸以致毀破也又念子即慈悲心事親即孝順心慈孝兩全法不破矣三百矛者一矛刺心尚不堪忍何況三百此畏聞謗法之聲至極也千刀萬杖等者謂菩薩寧受斯苦不忍一聞謗破佛戒之聲也何以故雖受楚痛萬端惟是苦我一身謗戒即破滅正教壞佛法身使無量眾生而失信心沉淪苦海不得解脫故云寧自入地獄經於百劫而不聞一惡言謗佛戒之聲也聞且不可何況自破耶三違教結罪教人破法因緣亦無孝順之心若故作者犯輕垢罪教人破法因緣者謂佛弟子不可以僧事向在家人說令彼不信興起破法因緣忤逆三寶無孝順心既得佛戒當任真守護讀佛慧命如貪名利毀辱僧伽罪結輕垢此具性遮二業繇毀辱法門故制五緣成罪一是佛弟子謂大小乘七眾不犯邊罪不捨戒者二佛弟子想六句二重四輕雖非佛弟子亦不應作繫縛事故但其事稍稀故不特制或復攝入瞋損戒中三有治罰心欲令前人受辱正是業主四所對人謂國王百官等同有戒者故僅結輕若向未受戒人治罰自屬第六重戒五正行治罰隨事結過若以三聚攝歸應護佛法律儀戒如事父母善法戒如念一子攝生戒也出家五眾同犯在家二眾若治罰佛弟子自屬前戒兼制大小乘俱制不犯者若惡濁世中護持正法比丘得藉王大臣力兵杖自衛如大涅槃經所明然不得非法治罰他人問設有惡僧不守佛戒冐犯國法諫之而不從擯之而不去內律治而不得則將如之何答此在權其事宜不可執一若執於護法而反至滅法者有矣如果有大罪玷辱三寶者寧除一人而全三寶不可全一人而禍及三寶也況文中云橫與比丘比丘尼等橫之一字明無辜也若真罪人應所不制此戒亦名令他得損惱戒大集經云佛言若有眾生為我出家剃鬚髮著袈裟設不持戒彼等悉已為涅槃印之所印也若有以非法而作惱亂罵辱毀訾以手刀杖打縛斫截若奪衣鉢及種種資生具者是人則壞三世諸佛真實報身則挑一切人天眼目時大梵天王白佛言若為佛出家剃鬚髮著袈裟不受戒受已毀犯其國王與作惱亂罵辱打縛者得幾許罪佛言大梵我今為汝且略說之若有人於萬億佛所出其身血於意云何是人得罪寧為多不梵王白言若人但出一佛身血得無間罪尚多無量不可算數墮於阿鼻大地獄中何況具出萬億諸佛身血終無有能廣說彼人罪業果報惟除如來佛言大梵若有惱亂罵辱打縛剃鬚髮著袈裟片不受戒受而犯者得罪多於彼何以故是人猶能為諸人天示涅槃道是人已於三寶中心得敬信勝於一切九十五種外道其人必速能入涅槃勝於一切在家俗人唯除在家得忍者是故人天應當供養何況具能持戒三業相應者其有王臣見有於佛法中出家者作大罪業但擯出國不得鞭打何況鞭打出家具持戒者十輪經云佛言若有破戒比丘如敗膿血退失墮落聖道果證為諸煩惱結使所壞猶能開示一切天龍人非人等無量功德珍寶伏藏是以出家若持戒若破戒我悉不聽國王大臣宰官謫罰繫閉鞭杖乃至斷命況復餘輕犯小威儀破戒比丘雖是死人有戒餘力猶如牛黃是牛雖死人故取之亦如麝香死後有用能大利益一切眾生惡行比丘雖犯禁戒其戒勢力猶能利益無量人天譬如燒香香體雖壞熏他令香破戒比丘亦復如是自墮惡道能令眾生增長善根以是因緣一切白衣不應侵毀輕蔑破戒比丘皆當尊重守護心地觀經云復有一類福田僧於佛舍利及佛形像並諸法僧聖所制戒深生敬信自無邪見令他亦然能宣正法讚歎一乘深信因果常發善願隨其過犯悔除業障當知是人信三寶力勝諸外道百千萬倍亦勝四眾轉輪聖王何況餘類一切眾生如金花雖然萎悴猶勝一切諸雜類花正見比丘亦復如是勝餘眾生百千萬倍雖毀禁戒不壞正見以是因緣名福田僧若供養如是福田僧者所得福德無有窮盡又大集經云爾時一切天龍八部神等得增長信已白佛言我等一切從今以往護持正法若諸國王見有為佛出眾受持禁戒或不持戒或受而毀犯如其事務治其身罪鞭打之者我等不復護持養育如是國王捨離彼國以捨離故令其國土而有種種疾疫饑饉刀兵俱起非時風雨亢旱毒熱傷害苗稼令佛出家弟子委向他國使其國土空無福田若有佛弟子但著袈裟片者若有宰官鞭打彼等其王不遮護者我等亦當出其國土涅槃經云佛言譬如國王諸羣臣等有犯王法隨罪誅戮而不捨置如來世尊不如是也於毀法者驅遣羯磨訶責羯磨為欲示諸惡行之人有果報故有持戒比丘護持正法見壞法者即能驅遣訶責徵治當知是人得福無量不可稱計勝鬘經云佛言菩薩所有恒河沙數無量行願皆應攝入一大願中所謂護持正法護持正法者是大境界乃至少護持正法令魔波旬得大憂惱我不見餘一切善法能令惡魔生此憂惱惟少護持正法之者按唐書顯慶元年五月敕天下僧尼有犯法者以僧律治之不得與民同科又宋景德三年敕品官無故毀辱僧尼口稱禿字者勒停見任庶民流一千里斯誠聖王賢臣不忘靈山之囑也然王臣如此尊重三寶護持法門豈得出家者而反作破法之事耶經云毀犯禁戒猶能為諸人天示涅槃道者謂其雖為煩惱所逼毀犯於一時然戒破而正見不破恒說正法時懷慚愧故云其已於三寶中心得信敬又能讚歎一乘深信因果故瓔珞經云捨戒不捨大願破戒不破正見斯人終得還復清淨如不敬三寶不信因果無慚無愧邪見之徒不可比也二勸持如是九戒應當學敬心奉持三總結持誦諸佛子是四十八輕戒汝等受持過去諸菩薩已誦未來諸菩薩當誦現在諸菩薩今誦諸佛子者此廼重結告眾之語謂我已說四十八輕戒竟汝等應當領納堅持慎勿有怠過去等者謂引同行菩薩次勸誦也言此四十八輕戒非我獨勸汝等新學持誦而過去諸菩薩已誦未來諸菩薩當誦故汝等現在諸菩薩亦當如是而誦此是如來大慈諄諄教誡無倦雖粉身碎骨亦難酧報也已上正宗分竟三流通分三初流通本戒二流通本品三總讚流通初中五初舉所誦法諸佛子聽十重四十八輕戒三世諸佛已誦當誦今誦我今亦如是誦十重四十八輕戒者此總結正宗分以誡之也三世諸佛等者廼引證諸佛以勸誦也謂此五十八戒是諸佛之本源心地菩薩眾生成佛之根本故三世諸佛已誦常誦今誦我今亦如是誦也二囑流通人汝等一切大眾若國王王子百官比丘比丘尼信男信女受持菩薩戒者應受持讀誦解脫書寫佛性常住戒卷流通三世一切眾生化化不絕汝等一切大眾者此正付囑流通能弘之人即是在座聽眾也囑令當行五事一受持莫失二闇讀通利三朗誦令聞八部獲益四解悟義理為人廣說五書寫流通普利一切國王等者謂王可詔誥四方令歸大化子可振起王猷永崇妙道官可因貴化貴共作金湯僧尼為人天標榜代佛宣揚男女承宿善根護助佛法問前勸受中備列婬男婬女等今但言信男信女者何耶答正顯既受得戒皆名第一清淨也此是承上文而言謂四部弟子既受持菩薩戒已悉應讀誦解說其義書寫其相令佛性戒卷常住於世轉化將來一切眾生以續如來慧命也所言佛性常住戒卷者此是舍那心地佛性常住不變不易之戒故一受直至成佛不同聲聞戒止住一生也其戒卷是能詮文佛性常住是所詮義此即一切眾生佛性種子如來常住法身是色是心是情是識皆入佛性戒中也流通三世者繇此戒法現在方知過去即顯未來自舍那始授釋迦證授千百億釋迦轉授展轉相傳以至一切眾生佛性因緣之義不滅故云一切眾生化化不絕也三明流通益得見千佛佛佛授手世世不墮惡道八難常生人道天中得見千佛者謂佛不易見繇受持讀誦此戒而得見也千佛一見則諸惡遠離寧非持戒之功德也然佛該三世今舉千佛約一世耳佛佛授于者謂明稟戒之人與佛相隣次不遠故如持此佛性妙戒清淨當來則與盧舍那佛於千華臺上並肩把手則見千釋迦千百億釋迦並在目前矣世世等是離苦常生等是得樂以此戒能止身口意之過非故不墮惡道八難能出生萬善故常生人道天中原此佛性心地大戒即凡成聖而豈止離三惡生人天耶須知如來未出世時天竺之人多樂生天佛且暫就初學舉凡情未契心源者起其忻善惡惡而為說也今佛初會說法若直示之以極果恐其心生疑惑致有退失正戒大益或由此戒力不墮惡道常生有佛世界人天中見佛聞法速階不退也四重勸奉行我今在此樹下略開七佛法戒汝等大眾當一心學波羅提木叉歡喜奉行如無相天王品勸學中一一廣明我今者是能說之人不但一佛所說而三世諸佛皆同也略開者是所說之法謂此心地戒法品有無盡藏非止十重四十八輕今所說者廼是略示如一毛頭許俾就初機易學歡喜奉行故七佛者謂佛佛教化眾生皆以此戒為初津皆在此菩提樹下成道轉法輪故汝等大眾者此是如來利生念切反復叮嚀謂汝等當一心勤學此戒歡喜奉行如來保任必當得大涅槃也無相天王品者謂此但略說如欲廣知戒中事理當如無相天王品勸學文中一一詳明也五時眾歡喜三千學士時坐聽者聞佛自誦心心頂戴喜躍受持三千學士者未階妙覺猶居學地故云學士前念方終後念即起故曰心心時如來勸百萬億大眾當一心學而三千界內在會諸大菩薩聞佛自誦十重四十八輕戒法悉皆心心頂戴其言歡喜踴躍受持其法不敢忘失佛性種子此亦舉先學以攝百萬億之初機也二流通本品四初徧結說心地品爾時釋迦牟尼佛說上蓮華臺藏世界盧舍那佛所說心地法門品中十無盡藏戒法品竟千百億釋迦亦如是說爾時等者前明一日月世界一釋迦如來說盧舍那佛所說心地法門品中十無盡藏戒法品竟後明千百億日月世界中千百億釋迦如來悉同說盧舍那佛心地法門十無盡藏戒法品故云千百億釋迦亦如是說也今單舉十重不言四十八輕者以此十戒包攝無量諸戒況四十八輕耶故云十無盡藏戒法品也二總舉說住世界二初略舉十處從摩醯首羅天王宮至此道樹下住處說法品為一切菩薩不可說大眾受持讀誦解說其義亦如是前明本佛迹佛所說戒法此略結所說戒法之處也道樹即菩提樹謂世尊在此樹下成道故住處者從天王宮下至閻浮提所住之十處也為一切菩薩等者謂此十住處總與先學菩薩初機大眾皆同一心受持讀誦解說戒法之義故云亦如是也二廣示諸界千百億世界蓮華藏世界微塵世界千百億世界者上明本界各處說法皆然此明餘界各處亦如是而說也微塵世界者謂世界之多不可以數舉故指微塵以喻之也一塵喻一世界故云微塵世界也然蓮華藏世界具足無量微塵世界如是千百億世界微塵世界總不出一蓮華藏世界也經文微塵世界下似乎闕亦如是說四字三標明所說之法一切佛心藏地藏戒藏無量行願藏因果佛性常住藏如是一切佛說無量一切法藏竟一切佛者謂如下所列諸藏乃十方三世一切如來所共有也心藏者本覺心體含裹虗空包羅法界一切萬法悉備其中如寶藏然故名為藏各具通別二義通則一切諸法皆屬於心別則指三十心也地藏者心體平等不二名地出生諸善功德故名為藏通則一切諸法皆名為地別則指十地也戒藏者心體離過絕非名戒止持作犯纖悉具足故名為藏通則一切諸法皆名為戒別則指十重眾輕也行願藏者心體發之為善事曰行存之為善念曰願無量行門如大海不可窮無量願門如虗空不可盡故名為藏通則一切諸法皆名為行別則指六度萬行十大願王等因果佛性常住藏者心體始之所修曰因終之所證曰果佛性者不生不滅無去無來常住者謂此天真佛性雖隨緣立名而性無遷改如在心言名為不生不滅清淨本心在地名為真如平等理地在戒名為光明金剛寶戒在行名為普賢行願在因名為自性深因在果名為究竟極果以此自性該凡聖彌古今廣大周徧不可測量故名為藏然佛性非因非果而因果不離佛性故曰大乘因者諸法實相大乘果者亦諸法實相也其實相即佛性異名今因亦佛性果亦佛性佛性常住則因果亦皆常住通則一切諸法皆名因果佛性常住之藏別則如佛性本源品等又一心二地三戒者正明此戒是菩薩心地也而大行大願繇此戒生正因正果繇此戒得常住佛性繇此戒證大哉戒也斯其至矣一切佛說者通指千華臺上本佛迹佛而說也無量一切法藏者此結心地等諸法藏也繇心無量故法亦無量心藏如是餘藏亦然故曰無量一切法藏也竟者止也謂說法到此止故前五是別此一是總也四結顯大眾奉行千百億世界中一切眾生受持歡喜奉行若廣開心地相相如佛華光王七行品中說上明能被之佛與教此乃所被之機亦即十無盡藏戒法也然本佛迹佛所說無量一切法藏千百億世界中一切眾生各各尊敬受持歡喜奉行者正明機教相扣也言心地相相者戒是心地之相元心地無相而戒有持犯即心地之相也相有總別十重是總四十八輕是別然總有無量故別亦無窮重重無盡法法圓融如天帝網此即諸法實相之相故曰相相所謂是法住法位世間相常住也此廼略說心地法門如欲廣開發明心地事理之相當如大本佛華光王七行品中說然此品惜乎未到三總讚流通三初讚持戒益二初總讚此頌雖非佛說而文義備悉或西土賢聖所置或此方譯人所安廼讚歎持戒勸學度生發願迴向之文如比丘戒本初述讚頌中列戒相後復結頌迴向方合三啟之義今闕初讚頌以今經非全本品兼上下故也明人忍慧強能持如是法未成佛道間安獲五種利明人者言此心地大戒非愚小淺慧所可堪受乃明達智者方能持也以具忍慧故曰明人忍是安忍即指定力慧是智慧指無漏力由具定力而心不動以無漏力而斷惑證真如有慧無忍是名狂慧有忍無慧是名愚定又忍者心之操守其忍至堅故曰忍強慧者心之靈通其慧至利故曰慧強忍強則不被物轉慧強則能轉物又忍強則能永持而終始不移慧強則能善持而圓融不滯然二乘人定多慧少不見佛性權慧菩薩慧多定少雖見佛性而不了了以忍慧俱強故能持如是心地法門也未成佛道間者此極讚持戒之殊勝令人樂學也謂能持此戒決定成佛今雖未成而於其中間世世生生先獲此五種福德利益也安獲者由戒德力故安然任運自得非虗望強求也二別顯一者十方佛憫念常守護二者命終時正見心歡喜三者生生處為諸菩薩友四者功德聚戒度悉成就五者今後世性戒福慧滿此是諸佛子此五種利出地持經諸佛護念者謂此法即是佛母一切諸佛皆從此出故持之者則與諸佛氣分交接若不持此法則斷佛種性能持此法則續佛慧命故諸佛常自眷念憐憫守護持法之人使其進道無魔得以紹隆佛種故般若經云如來善護念諸菩薩是也命終正見心歡喜者謂持法之人已具佛眼臨命終時以戒德威力故得正見分明遠離顛倒夢想究竟涅槃得大安樂所謂假使銕輪頂上旋定慧圓明終不失故生歡喜也生生為菩薩友者謂持法之人位同大覺真是佛子生生之處則三賢十聖一切菩薩皆我同學等侶也功德戒度悉成就者戒為一切功德之本猶如大地能發生一切萬物今戒度既具則其餘諸度萬行功德法財無不具足成就也性戒福慧滿者謂此戒是本源佛性之戒性自賢善身口業淨任運止惡任運生善止惡是慧生善是福由止惡故福田慧滿由生善故慧繇福滿今生堅持淨戒則晝夜福德智慧任運增長後世二嚴圓滿成佛極果號兩足尊故云今後世性戒福慧滿也然一切佛子從戒而生今能持戒福慧漸滿即是諸佛真子當來紹繼佛位故云此是諸佛子即前受佛戒入佛位之意也二敘學戒事二初觀察法體智者善思量計我著相者不能信是法滅壽取證者亦非下種處欲長菩提苗光明照世間應當靜觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴菩薩所應作應當次第學於學於無學勿生分別想是名第一道亦名摩訶衍一切戲論惡悉從是處滅諸佛薩婆若悉繇是處出決定了知故名為智善思量者謂當善用其心以般若觀慧審思籌量戒之體性也計我著相者謂計我之外道著相之凡夫三毒燒心五欲絆體妄勢四大為自身相六塵緣影為自心相俱為根塵所縛迷本真心是以不能信是本源心地之戒法也滅壽取證者上是凡夫計我身而著於幻相名為執有此是二乘滅壽命而取證寂滅名為執無如是灰身滅智安心取證枯寂涅槃故非下菩提種子處也然佛戒平等豈偏絕彼奈役等人不善思量故皆無分也如欲增長菩提道芽當來成等正覺以智慧日照曜世間破諸眾生煩惱闇宅者不須向外馳求惟今時在此心地戒中發起無礙清淨之慧淨極光通則道芽滋長矣靜觀察者謂當如上善用其心也靜是止之異名察即觀之審細止觀不二方是真修諸法真實相者一切諸法皆從緣生緣生無性當體即空空即真空真空無相故曰實相即本源心體也然真空實相不屬有為身心故曰不生亦不滅不墮二邊故曰不常復不斷不墮數量故曰不一亦不異本離動靜故曰不來亦不去如是諸法唯是一心菩薩欲得莊嚴本源心地還從自心起用以方便智照心境界境界即是實相故云靜觀察也又觀察及持戒皆名方便莊嚴觀察即理方便名為智慧莊嚴持戒即事方便名為功德莊嚴又勤方便而不靜觀察則有為有漏無所莊嚴靜觀察而不勤方便則枯槁空寂無能莊嚴故須於一心中當以巧慧方便而莊嚴之此莊嚴是菩薩所應作事以第而學固其宜矣於學於無學者謂研真斷惑有學處也真窮惑盡無學處也又三賢初心次第觀者並名初學有學因也十地後心不次觀者是名最後無學果也然有學無學於此勿生分別有無想相若起念分別即是有為心識非般若真智則不能趣入第一中道以不生分別處中中道宛然是名第一道不落二乘故名摩訶衍之大乘法也又無作妙修全同理性名第一道無學妙性起於真修名摩訶衍謂運載自他同入大涅槃城也一切戲論惡者謂以是第一道故能滅凡外二乘執有執無計彼計我諸戲論惡盡淨無餘故云一切戲論惡悉從是處滅也以是摩訶衍故能出諸佛薩婆若果薩婆若此翻一切智智在因名為般若在果名薩婆若乃一心三觀究竟極果之總名也由第一道堪運摩訶衍乘由摩訶衍乘堪到薩婆若地由薩婆若妙合無戲論理則諸佛智慧神通三昧悉由是處而得彰顯故云諸佛薩婆若悉由是處出也其梵網心地果徹因該理趣至此極矣二護持戒相是故諸佛子宜發大勇猛於諸佛淨戒護持如明珠過去諸菩薩已於是中學未來者當學現在者今學此是佛行處聖主所稱歎是故者廼承上實相心地而言也謂欲歸一心實相須修心地法門欲修心地法門先當發勇猛心修持諸佛淨戒以為入道之本也護持如明珠者有其三義一者潔淨義當護持弗使染污二者圓滿義當護持弗使殘缺三者光明義當護持弗使昏暗然潔淨即解脫德圓滿即法身德光明即般若德其明淨圓滿皆是珠之相德耳於相德中又宛具三義謂體是無上至寶相廼圓滿明淨用能雨物濟貧體為法身相為般若用為解脫以配三聚妙戒法喻泠然也過去諸菩薩等句此是引證結勸回向流通之語謂此光明金剛寶戒是三世菩薩所同習學而證菩提十方諸佛所共行履而趣涅槃也佛是聖中之聖故稱為聖主佛子如是勇猛護持淨戒而因果同符安得如來不為讚善故曰此是佛行處聖主所稱歎也三發願度生我已隨順說福德無量聚迴以施眾生共向一切智願聞是法者悉得成佛道我者作頌之人自稱亦可以為誦戒者稱也隨者不背經文順者不逆戒意謂從上諸佛菩薩皆崇此心地大戒半月半月如法自誦我今隨順聖心亦如是而誦即有無量廣大福德積聚故曰我已隨順說福德無量聚也然此福德而不以自私盡以迴施一切眾生悉同趣向如來一切智智不向人天二乘小果故云迴以施眾生共向一切智也良以此戒一言一字皆從舍那心地中流出是諸佛之本源菩提之根本繇發菩提心而受故今誦此戒功德仍迴向於菩提也復願有聞如是戒法者一歷耳根永為佛種依法修持盡成佛道故云願聞是法者悉得成佛道也又迴施眾生即下化之心名之為悲向一切智即上求之心名之為智悲智雙運名菩提心繇發此心故受得此菩薩大戒繇持此菩薩大戒故即能滿悲智兩輪古人所謂發僧那於始心終大悲以赴難可謂從名字菩提而直趣究竟也如上心地妙戒法門甚深不可思議普願一切有情世世生生受持讀誦常隨諸佛修學共證妙覺果海說梵網經大事畢矣跋經云應日日六時持菩薩戒解其義理佛性之性又云若受菩薩戒不誦此戒者非菩薩非佛種子然今受佛戒者頗多而解佛語者無幾受之不誦戒於何有誦之不解理性何明心地既蒙道芽不發矣故如來半月半月自誦永為軌式一切菩薩善學不敢移易願諸大士發勇猛心既受須持既持須解心地一開佛種自現教化眾生共報佛恩庶不負千華臺上之諄囑也旹康熙己卯年冬分第五長淨日佛菴書玉閣筆誌音釋六種性種即種子有發生之義性即性分乃自分不改之義瓔珞經對別教十住十行十回向十地等覺妙覺而論故有六種性然性通六位種局在因故前之四位名種等覺雖在因然勝於前得稱為覺故不言種也六輪對位輪有二義一運轉二摧碾謂諸佛菩薩轉於法輪則能摧碾眾生惑業故以六輪對諸位次也一切智謂一切內法內名外法外名皆能知能解是名一切智即聲聞緣覺之智也內法者佛教依理而說故名為內外道等違理橫計故名外教也肉駱駝山五百問經論云昔有比丘多乞積聚既不為福又弗行道命終作駱駝山廣數十里適值凶年國人日取食之隨割隨生俄而隣國取之即便大喚問其故答曰吾本道人也為貪財不施負此國人物多矣故以肉償之我不負卿也鬼遮阻華嚴行願品云若復有人恒住淨戒於此大願受持讀誦一切魔軍夜叉羅剎等諸惡鬼神皆悉遠離或時發心親近守護如破淨戒寧不瞋心遮阻其前耶信力故受念力故持信力者瑜伽論云深信諦理轉更增長能遮疑惑不為動搖能拒邪外不為迷亂能破煩惱不為侵害故念力者念根增長能破邪念成就一切出世正念故今若無信力視如等閒豈能心受若無念力立即遺忘焉能憶持是為信力故受念力故持也貝多羅葉此云岸形狀如椶櫚直而且高其葉長廣其色光潤採以書寫赫蹏蹏古蹄字紙名剝皮為紙昔釋迦如來過去久遠無數劫名曰最勝住山林中修於仙道得五神通常行慈心為聞法故往詣城邑聚落處處推求說法之師時有天魔來語仙言我有一偈若能剝皮為紙刺血為墨析骨為筆書寫此偈當為汝說仙人聞已念言我於無量劫中受諸苦惱都無利益今當捨此不堅之身易得妙法歡喜踊躍即以利刀剝皮刺血㭊骨合掌向天請說佛偈魔見愁憂即便隱去仙人便言我今為眾生求法故不惜身命至誠不虗餘方世界有大慈悲能說法者當現我前時東去此二十二剎有佛世界名普無垢有佛號淨名王忽住其前放大光明照仙人身苦痛即除平復如故即為廣說集一切福德三昧經仙人聞法得無礙辯才為諸眾生廣說妙法令無量眾生住三乘道經於千歲命終生淨名王佛普無垢國中由敬法故今得成佛鸚鵡聞四諦須達長者有二鸚鵡一名律提二名賖律提阿難尊者到長者家為說苦集滅道四諦法門其鳥聞法歡喜持誦夜宿樹上為野狸所食以此善根生四王天展轉生他化自在天如是七返生六欲天後生人中出家成辟支佛獼猴奉獻蜜昔佛與諸比丘於林中坐有一獼猴即取佛鉢上樹盛滿蜜奉上佛如來受已分布眾僧皆悉周徧獼猴歡喜騰躍却舞墮坑而死即托生師質長者家形貌端正出家成阿羅漢名曰獻蜜上座鳥聽經而生忉利昔有一比丘在林中誦經音聲和雅時有一鳥聞法敬受在樹上聽之為獵人所射命終緣此善根生忉利天即持天香花到比丘所恭敬供養時比丘即為說法得須陀洹道鴈聞法生三十三天昔佛在波羅奈國林澤中為諸人天說法時空中有五百鴈為羣聞佛音聲身心愛樂迴翔欲下時獵人張網殺之盡生三十三天從天來下持華供佛佛為說法俱得初果池魚聽偈過去無數劫時釋迦如來為流水長者子於空澤池中為十千魚稱南無寶髻如來名號說十二因緣偈頌十千魚後夜同時皆命過生三十三天至如來成道初轉法輪從天來下聞佛說法俱得須陀洹果海鯨聞名梵語摩竭此云鯨魚乃海中大魚也身長三百由旬乃至七百由旬遇舟則能吞之時有五百商人乘船入海採寶值鯨魚開口於水上水流奔趨如入大坑船師曰我曹死矣商人各禱所事無驗中有一近事告眾曰佛是眾生之慈父可共戮方稱南無佛眾即同聲稱之魚聞佛名即合口同念眾得免難鵬敬律金翅鳥王常欲搏龍而食龍披袈裟則不興害蛤生天如來說法蛤從池起入草聽法農夫钁草悞傷蛤死生天患狗毒蛇昔有一狗偷商估食即截四足棄於坑中求生不得求死不得舍利弗以天眼觀見即盛鉢飯飛至狗所以飯除其饑火乃為說三法印曰諸行無常諸法無我涅槃寂滅汝今當於我所發清淨心捨此傍生之身當生善趣又有一大毒蛇於山林中被大火所燒皮焦肉闌舍利弗亦往為說三法印後二皆托生富長者家出家為舍利弗弟子二俱證阿羅漢果地獄聞經題而盡出火坑昔一人暴死入地獄中獄卒以鐵叉叉入油鑊彼即稱云南無大方廣佛華嚴經時油鑊變為蓮池聞者皆出地獄伽陀此云頌是佛所說偈有大神力能自利利他頌曰世間五欲樂或復諸天樂若比愛盡樂千公不及一由集能生苦因苦復生集八聖道能超至妙涅槃處所謂布施者必獲其義利若為樂故施後必得安樂福田僧謂有人供養此僧得無量福世世不受貧窮之苦得大富樂如沃壤之田多獲成實今俗譌稱不勤齊戒坐食田地者為福田僧大違經義也
