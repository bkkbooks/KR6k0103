body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述二釋迦弘傳二初總舉諸界多佛二別顯此界一佛初中又四初受法將辭二旋歸本界三遵勅利生四例結餘佛今初爾時千華上佛千百億釋迦從蓮華藏世界赫赫師子座起各各辭退舉身放不可思議光光光皆化無量佛一時以無量青黃赤白華供養盧舍那佛受持上所說心地法門品竟千華上佛從座而起者受法之事畢矣各各禮辭舍那而退者師資之禮盡矣舉身放不可思議光者報本之心顯矣然諸佛之光有其二種一常光二放光常光即本覺圓明徧照法界放光即所起神通變現非一皆不離本源心地戒體而出也今言不可思議者謂此光非權小之所知繇迹光與本光無異同是三德秘藏微妙智明不可以心思不可以言論故云不可思議也光光皆化無量佛者以顯此智是諸佛之母諸佛繇此而出生故是則舍那心地化為千佛千佛化為千百億佛千百億佛化為無量佛也又表十無盡藏戒品皆由光明金剛寶戒之所出故青黃赤白表住行向地華表萬行妙因供表一乘佛果而妙因從果德起故還用莊嚴果德也前舍那以光告今諸佛以光酬表此心地法門本非言念佛性戒體非色非心惟此般若一光本不離迹迹不離本本迹同照供養盧舍那佛以酬法乳也二旋歸本界各各從此蓮華臺藏世界而沒沒已入體性虗空華光三昧還本源世界閻浮提菩提樹下從體性虗空華光三昧出初隱為沒終沒為已然雖出沒隱顯諸佛悟心自在無礙故體性虗空華光三昧者謂徹照本來如虗空之體性則華光任運自現體性表法身德華表解脫德光表般若德三德圓融故曰三昧也又體性是法生佛共有即常住真心之體性也華光是喻此喻心體廣大虗寂而無邊表故曰虗空心體雖空本來具足恒沙性德智光妙用不妨千枝萬葉俱能爍破情塵故曰體性華光寂不離照動即是定故曰三昧三昧通名也此云等持亦云正心行處亦云正受然三味名體甚多修證不一如一切禪定亦名三昧今言體性華光是揀餘三昧也然如來三昧本非出入故曰那伽常在定無有不定時又云不起滅定現諸威儀示十法界像導利諸眾生今言入者以體用冥一故出者體用全彰故所謂百千定門同歸一寂無邊智海不離本源圭峰云息諸分別智與理冥故名為入是也若融前三觀空即不生觀觀無為法界心華即不滅觀觀有為法界心性即一心觀觀無障礙法界心三一圓通自在名曰體性虗空華光三昧也還本源世界閻浮提菩提樹下者謂釋迦牟尼佛在摩醯首羅天宮與無量梵王不可說菩薩眾說盧舍那佛所說心地法門品竟復擎此世界大眾還至臺藏世界禮敬問法今來南洲故云還也又華藏乃本師受業之本界南洲是自己行化之本界故曰還本源世界也然還去還來不離一迴本源自性界故若約理而言則體性虗空華光三昧便是諸佛本源世界約事而說則千佛千百億佛皆先各有本土因聽戒故俱來至舍那所今受法已畢故又各還本有之報土也閻浮樹名此云勝金提洲也謂此南洲之北有大樹名曰閻浮枝葉皆金滴水入土皆為赤金勝於他金故或曰樹下有河閻浮果汁點物成金因流入河沙成金色斯則樹因河為名洲從樹得稱故云勝金洲即南贍部洲也菩提樹者西域記云畢鉢羅樹高數百尺佛坐其下成等正覺故名菩提此翻覺道乃道之極者故又云道樹莖幹黃白枝葉青翠冬夏不凋光鮮無變每至二月十五佛涅槃日葉皆凋落頃即復故華嚴經云菩提樹高顯殊特金剛為身瑠璃為幹眾雜妙寶以為枝條寶葉扶踈垂蔭如雲寶華雜色分枝布影復以摩尼寶珠而為其果此是舍那他受用身十地菩薩境界非凡夫二乘所能及見然亦表佛三昧神通智光影現莊嚴心地還同體性華光也釋迦由此修道故曰還本源世界菩提樹下也從體性虗空華光三昧出者返源自性為入從本起照為出先入者示自受用三昧故今出者欲令眾生亦受用此三昧故又受業進業曰入赴感起化曰出此有三義一觀實際理地無出入相方便說出入二觀說法時有當說不當說時節之別故有出入三觀機逗教應病與藥則有出入之相然雖示出入動靜一源往復無二定也三遵勅利生分十今第一處出已方坐金剛千光王座及妙光堂說十世界法門海離念曰出事畢曰已前明千釋迦與千百億釋迦皆先於舍那前受菩薩戒藏已廼入三昧還本源世界今明出三昧現身十處說法也方坐金剛千光王座者方猶正也安住正法故曰方坐究竟堅固名為金剛千佛放光得道之座故曰千光王座也按略疏云此座在中天竺摩竭陀國王舍城之西南二百餘里菩提樹下昔此世界初成座與大地俱起據三千世界之中下極金輪上侵地際金剛所成周百餘步賢劫千佛皆坐此座而入金剛定放大光明成無上覺故曰金剛千光王座是如來修證理道之所亦曰道場華嚴經云爾時世尊處於此座於一切法成最正覺是也所言成者法身無成出障名成報身四智剏圓名成化身八相坐菩提樹下斷結為成然事雖有異其理一也及妙光堂者及相繼之辭謂從彼樹下至此處說法也眾寶莊嚴故稱曰妙寶輝互照故名曰光聖凡聚集之處故曰堂也亦名普光堂此堂在菩提樹西不遠昔乃如來初成正覺時梵王以七寶建立此堂帝釋建立七寶之座放異光明照菩提樹請佛昇座轉大法輪佛坐其座七日放光演揚妙法亦名普光明殿華嚴經云爾時如來於普光明殿坐蓮華藏師子之座是也說十世界法門海者海以深廣為義謂如來所說一切諸法此十攝無不盡也一世界海二眾生海三法界安立海四佛海五佛波羅蜜海六佛解脫海七佛變化海八佛演說海九佛名號海十佛壽量海瓔珞經云佛初得道在此樹下說十世界海法門時有八萬無垢菩薩即等覺位菩薩現身得佛有九十億人入六入明門然華藏莊嚴十世界海一真如心廼是十方三世一切諸佛自覺聖智受用境界諸佛乘此法門倒駕慈航廣度羣品一切菩薩修此法門以至究竟果海一切眾生迷此心故生死海中流轉無盡不言眾生而言世界者舉依報以該正報也又華嚴大疏云十世界海即十信法門也信者以順從為義謂順從佛性之理不疑故以十數而言者正明十信法門住行向等與華嚴大同小異也初地菩薩功德積感乘本願力寄位人乘作閻浮提王修十善業以化眾生行檀度法而嚴妙果統攝南洲一切國土故如來始成正覺初轉法輪先於此處說十世界法門海以為菩薩真修方便以此種種世界皆是眾生同別二妄所成故自妙光堂至四禪天凡有十處前六處為六會第七後四禪通為一會則第七會總更說前三十心十地前六會別說此心地法門皆以信為本也據華嚴第七會定通忍等亦合說三十心十地清凉疏云定通忍當等覺法餘當妙覺法取彼例此亦可前三禪金忍願明等覺法第四禪心地明妙覺法然與華嚴不同而同華嚴遮那即釋迦諸會說法不動而周地前圓融地上行布今經舍那坐華臺釋迦據千葉起座至餘地前行布地上圓融應知十無盡戒總一心地是行布不礙圓融也此二無礙方稱圓教故世親以六相圓融舉一全收隨機宜見說有異耳今明次第是故先說十信後說十住使已發大心眾生得入圓十信位方得圓十住也第二處復從座起至帝釋宮說十住帝釋宮者梵語具云釋提桓因此云能天主謂能作三十三天之主也雜阿含經有一比丘問佛何故名釋提桓因答本為人時行於頓施堪能作主故名釋提桓因其宮名殊勝殿即欲界第二忉利天也繇單修上品十善得生其中故離垢地菩薩修行功行多作忉利天王是故世尊第二於此處說十住也菩薩約位進修從淺至深以妙覺為極果而始必以十信為先導故妙覺由信而入入則能住矣十住者一發心住二治地住三修行住四生貴住五方便具足住六正心住七不退住八童真住九法王子住十灌頂住也謂住法信位自修斷證故說此十住者令已入十信菩薩天王得入圓十住法門也華嚴經云爾時如來威神力故十方一切世界一一四天下閻浮提中悉見如來坐於樹下各有菩薩承佛神力而演說法靡不自謂恒對於佛爾時世尊不離一切菩提樹下而上昇須彌山頂向帝釋殿其餘一一上昇皆亦如是疏云如來不動覺樹而昇釋天體用無方赴於物欲其由澄江一月三舟共觀一舟停住二舟南北南者見月千里隨南北者見月千里隨北停者見月不移是謂此月不離中流而往南北如來應現類此可知即體之用無不普周去住在緣佛無動靜不動而徧以赴彼機故經云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恒處此菩提座是故如來不起真際而普利羣生也第三處復從座起至𦦨天中說十行𦦨天者梵語𦦨摩亦云夜摩此云時分謂時時快樂不假日月光明惟以蓮華開合乃分晝夜故是欲界第三天也此天依空而居其殿名曰寶堂繇修上品十善兼坐未到定禪得生其中故發光地菩薩修行功行多作夜摩天王寄位天乘是故世尊第三於此處說十行也繇前十住進修功滿已成佛子自得己利而利他之行未成是故廣行饒益隨順眾生令其歡喜然行有淺深故成十種一歡喜行二饒益行三無瞋恨行四無盡行五離癡亂行六善現行七無著行八尊重行九善法行十真實行謂行教化行利益眾生故說此十行法門者為令已入十住菩薩天王得入圓十行法門也第四處復從座起至第四天中說十廻向第四天者是欲界兜率陀天也梵語兜率此云知足謂於五欲知止足故此天依空而居所修同前中有內院為一生補處菩薩所居亦云後身菩薩住處故𦦨慧地菩薩修行功行多作兜率天王能除眾生身見觀於道品同於初果預流位也是故世尊第四於此處說十廻向廻即廻轉向即趣向謂起大悲心救度眾生故又廻十行之善向於三處一真如寶際是所證二無上菩提是所求三一切眾生是所度以能廻之心及所廻善行向彼萬類等入法界也一救度一切眾生離眾生相廻向二不壞廻向三等一切佛廻向四至一切處迴向五無盡功德藏迴向六隨順平等善根迴向七隨順等觀一切眾生迴向八真如相迴向九無縛解脫迴向十法界無量迴向說此十迴向者為令已入十行菩薩天王得入圓十迴向法門也第五處復從座起至化樂天說十禪定化樂天者是欲界第五天也謂自化五欲而娛樂故故難勝地菩薩修行功行多作化樂天王寄位阿羅漢乘觀四諦行既終同於四果無學位也是故世尊第五於此處說十禪定門為令已入十迴向位諸大菩薩天王得圓知諸佛禪定圓入諸佛剎土圓證法身境界也十禪定者亦名十大三昧諸大菩薩乃能善入入此三昧得法界力無有窮盡得法王位無量自在生如來家示現種種廣大神通一普光三昧二妙光三昧三次第遍往諸佛國土三昧四清淨深心行三昧五知過去莊嚴藏三昧六智光明藏三昧七了知一切世界佛莊嚴三昧八眾生差別身三昧九法界自在三昧十無礙輪三昧詳見華嚴十定品然華嚴在十地後出餘經所云三賢行滿修四加行方登十地是也第六處復從座起至他化天說十地他化天者是欲界頂天也其殿名摩尼寶藏此有二種一者偏修十善假他所化以成己樂即魔王天也二者正修上品十善兼坐未到定禪假此得成自然受樂故現前地菩薩修行功行多作自在天王統攝欲界寄緣覺乘謂此菩薩修十二因緣觀同於緣覺是故世尊第六於此處說十地法門為令已入十定菩薩天王得圓證十地法門也十地者謂菩薩所證之位猶如大地一切佛法皆依此發生故瓔珞經云地名持謂持一切百萬阿僧祇功德亦名生謂生一切因果故名地也一歡喜地二離垢地三發光地四𦦨慧地五難勝地六現前地七遠行地八不動地九善慧地十法雲地謂智悲等運生佛依持故若依今經始從平等地終至入佛界地也已上六處所說法門正為初地菩薩起乃至六地寄位人天二乘同彼斷惑是故世尊在此六處說十信起乃至十地法門令彼凡夫天人聲聞緣覺迴向大乘而證十地也下說金忍願者以七八九地菩薩寄位一乘修菩薩行為令發起自在任運現身說法令永斷俱生我法二執生相無明得入如來妙覺果海也第七處復至一禪中說十金剛復至一禪中者色界初禪離生喜樂地也謂此天已離下界欲惡忻上妙定故遠行地菩薩修行功行多作初禪天王寄菩薩乘以自證法門攝化眾生是故世尊第七於此處說十金剛謂菩薩願心堅固不動猶如金剛一覺了諸法二滅度眾生三莊嚴世界四善根迴向五供養諸佛六實證諸法七廣行忍辱八長時行化九自行滿足十令他願滿若依今經謂信等十心說十金剛者為令已登七地菩薩天王得證金剛觀智入妙覺果海也第八處復至二禪中說十忍復至二禪中者色界二禪定生喜樂地也謂此天已離初禪之喜攝心在定淡然凝靜而生勝定七地已前未離有作登第八地始號不動故不動地菩薩修行功德多作二禪天王主小千界寄一乘位說自證法門教化眾生是故世尊第八於此處說十忍也忍即安忍謂菩薩即斷無明之惑證無生理了達諸法本來寂滅是故見色聞聲如幻如化不起妄念而分別也得此忍已則得到於一切菩薩無礙忍地證一切佛法無礙無盡此乃等覺菩薩後心斷盡微細無明所證也一音聲忍二柔順忍三無生法忍四如幻忍五如𦦨忍六如夢忍七如響忍八如影忍九如化忍十如空忍說此十忍者令彼已得真無生忍菩薩天王修行十忍法門入妙覺果海也第九處復至三禪中說十願復至三禪中者色界三禪離喜妙樂地也此天已離初禪二禪喜踊之動泯然入定而得勝妙之樂故善慧地菩薩修行功德多作三禪天王主中千界寄一乘位以自證法門為諸眾生演說開示是故世尊第九於此處說十願也一願成熟眾生無有疲倦二願具行眾善淨諸世界三願承事如來常生尊重四願護持正法不惜軀命五願以智觀察入諸佛土六願與諸菩薩同一體性七願入如來門了一切法八願見者生信無不獲益九願神力住世盡未來劫十願具普賢行淨治一切種智之門說此十大願者令彼已證善慧地菩薩天王更得十大願力得入如來妙覺果海也前九處乃圓融中說行布此後一處是行布中說圓融也第十處復至四禪中摩醯首羅天王宮說我本源蓮華臺藏世界盧舍那佛所說心地法門品復至四禪中者色界四禪捨念清淨地也此天已捨二禪之喜三禪之樂心無憎愛一念平等清淨無雜住於此禪空明寂靜萬象皆現故法雲地菩薩修行功德多作四禪天王主大千界而位寄佛乘於諸聲聞緣覺菩薩天王說自證法門摩醯首羅此云大力三目八臂手執白拂有大威力故亦云大自在謂得八自在欲樂解脫光明勝於一切居色界頂是故世尊第十於此處頓說心地四十行位法門品令彼圓證十地菩薩入妙覺果海也前佛在四禪下說住行向等諸法門今最後在四禪說心地法門者謂本從四禪中放光發起接至華藏世界秉受此法故今仍於四禪說此心地法門而安慰之亦表萬法總歸一心之至極最尊無上更無有法上於心者今此本源無為無相之法非下地凡夫心識所測惟佛與佛乃能知之又此第四禪是色界最極之頂此天王宮過五淨居上更無有天上於此者故三乘教中立此為淨土是報身佛所居之處密部云過五淨居天有毗盧遮那宮殿是也又帝釋宮等分說此心地法四禪宮中合說此心地法分說表於行布合說表於圓融謂顯此心地法雖位位差別而總趣舍那之極果也又說十忍十願及心地法門者為令斷等覺生相無明得入如來妙覺果海也四例結餘佛其餘千百億釋迦亦復如是無二無別如賢劫品中說其餘千百億釋迦者此結佛佛所說皆同也謂千華上一佛所說心地法門既爾千佛所說皆然千佛所說既爾千百億佛所說皆然一百億世界佛所說既爾如是覆述說法推例千百億世界佛說法皆然故云無二無別也已上經文是結品上之末詞古疏著於品下之初以彰釋迦之本迹令人了如指掌故今仍存其舊賢劫品句出大本經中是什師引證之語非佛言也次別顯此界一佛二初正明心地利物二轉說戒法攝生初中又二初橫指處會二豎詳往復初中四初天上降魔二人間成道三十處轉法四取喻教界今初爾時釋迦牟尼佛從初現蓮華臺藏世界東方來入天宮中說魔受化經已爾時釋迦牟尼佛者謂從體起用之時也前敘千佛及千百億釋迦於千百億世界說法今敘此一日月界中之一釋迦降生國土父母姓字出家修道成佛利生之大略也從初現蓮華臺藏世界者指上卷初於四禪天中放光徹照乃至擎接還歸事也華藏是來處天宮是止處初謂座起辭退舍那現謂放光化佛也東方來入者謂此一日月世界在華藏界中之東故東有二義一震動義謂震伏一切惡魔故二生長義謂發起眾生戒善故然既秉心也法門入體性虗空華光三昧即於三昧之中還來此土也瓔珞經云於一切法界中有一界報於一切有為法若凡若聖若見著若因果法不出法界惟佛一人在法界外然後為復來入法界藏中為無明眾生示一切善惡道果報差別無量是也天宮中者凡佛佛出世皆先在兜率天宮教化諸天子已方乃降生閻浮提也說魔受化經者梵語魔羅秦言殺者謂常欲斷人慧命故華嚴經云所謂蘊魔生諸取故煩惱魔恒雜染故業魔生障礙故心魔起高慢故死魔捨生處故天魔自憍縱故善根魔多執取故三昧魔久躭味故善知識魔起著心故菩提法智魔不願捨離故瑜伽論云利養恭敬稱譽放逸慳悋希欲忿恨惱覆憍詐等皆魔也是以如來先調伏已然後方下生也葢兜率無魔彼諸天子常修喜足定故摩醯首羅天王宮在四禪天上色界之頂四禪共有九天上五天皆三果阿那含聖人所居色界頂有毗盧遮那宮殿諸大菩薩常集其中亦必無魔或在他化天上魔王宮中說法令魔受化已方至兜率或魔自至兜率受化也集註云兜率在六欲梵世七天之中以佛常居中道故是則魔宮包括其中也又或別為利根示現說法於第四禪天降魔已竟方更下生不同鈍根所見直至樹下方降魔也二人間成道下生南閻浮提迦羅國母名摩耶父字白淨吾名悉達七歲出家三十成道號吾為釋迦牟尼佛下生者佛本行經云護明菩薩住兜率天滿四千歲觀下界苦為欲濟故下生也大報恩經云如來出世必為五事一為轉法輪利眾生故二為度多生父母報其恩故三為無信人立信地故四為未發菩薩意者令發意故五為授現前當來成佛記故為此五事故出世也南閻浮提者大論云南洲三事尚勝諸天況餘三洲一能斷婬二識念力三能精進所以諸佛惟出南洲也迦羅或名迦毗羅此云黃色謂上古有黃髮僊人依此修道故以為名是中天竺境中天竺共有一十二國迦羅在贍部洲地之中央也又名婆兜釋翅搜此云能仁住處梵語摩訶摩耶此云大幻術亦云大智母謂成就菩薩大願智幻解脫門以大幻術常為諸佛之母也經云護明菩薩七月八日自兜率下生之時小機之人見乘六牙白象無量諸天作眾技樂從母右脇而入身暎於外如處琉璃大機之人見菩薩乘旃檀樓閣等住於胎中也瑞應經云摩耶夫人胎月將滿思遊園中即舉右手攀無憂樹枝從右脇而生太子天帝以天妙衣裏手承接天神將金柄傘葢諸天龍神散香花鼓音樂大地六種震動阿含經云菩薩生時從右脇出專念不亂時菩薩母手攀樹枝不坐不臥四天王手捧香水於母前立言唯然天母今生聖子勿懷憂蹙太子墮地周行七步舉手而言天上天下惟吾獨尊梵語閱頭檀此云淨飯今云白淨二義一也悉達此云頓吉謂佛四月八日降誕時諸吉祥瑞頓然出現故亦云一切義成是佛小時字也七歲出家者猶言出家七年也謂十九歲二月十五日夜半乘天馬踰城入山先學不用處定不久得證知非究竟次學非非想定又不久得證知其亦非究竟次復遊歷諸國五年非出家事故所不言又為降伏諸外道故示苦行六年至三十歲方成正覺七歲出家明矣號吾為釋迦牟尼佛者顯迹與本名各不同也由古佛授記得斯聖號經云如來往昔為陶師時供養古釋迦佛自發誠願願同彼佛姓號故也齊此以前皆是體性虗空華光三昧中事示成佛已名為從三昧出也三十處轉法於寂滅道場坐金剛華光王座乃至摩醯首羅天王宮其中次第十住處所說寂滅道場者如來得道之處也寂謂寂五住煩惱滅謂滅二種生死道即菩提場即處也菩提是智寂滅是理繇坐此處以菩提智證寂滅理則生死大患永絕一切佛法現前故曰寂滅道場亦名菩提場坐金剛華光王座乃至摩醯首羅天王宮者正明說法之處也謂其心堅固安住不動故曰金剛心寶如蓮寶輝發𦦨故曰華光從體起用自在無礙故名曰王住持一切佛法故名座也又千佛說法皆悉出於華光三昧而坐此座然大地震動此座不變是表實相心地戒體猶如金剛能摧諸煩惱不為煩惱所動故名華光王座也前千光王是證道之座此乃說法之座也坐此座已從妙光堂次第說法乃至四禪其中共有十箇住處說於十種法門故云次第十住處所說也四取喻教界時佛觀諸大梵天王網羅幢因為說無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是佛觀等句是發起此經正宗之處也准上文意即從臺藏東來入四禪天觀察梵網說化魔經等是華光三昧觀也下八千返亦不離此三昧但入出異耳大梵此云淨身亦云淨行淨名經云梵是西音此云離欲是娑婆世界主住初禪中間統上攝下故名為大法華疏云除下地繫上升色界故名離欲而言諸大梵天王者謂此娑婆三千大千世界有萬億大梵天王如來說法俱來集會故總舉也今所言者非初禪天之大梵天王乃第四禪天之大自在梵天王也網羅幢者具云因陀羅網此云天赤珠時佛在摩醯首羅大梵天王宮殿上見此珠幢以無量百千萬億摩尼寶珠共成而一一寶珠光色文彩各各別異不同互相映射互相攝入不相妨礙一大梵王珠幢如是諸大梵王珠幢皆然故佛因之為說無量世界猶如網孔一一世界各各不同佛說教門亦復如是也言無量世界者竪三際而莫窮橫十方而無間然十方世界安立無量諸佛教門施設無量菩薩修證參差無量也然世界即所被之機佛教門是能被之法繇觀梵網萬目重重因知世界教門別異無量故千百億國土中有千百億釋迦宣揚教化也次豎詳往復吾今來此世界八千返為此娑婆世界坐金剛華光王座乃至摩醯首羅天王宮為是中一切大眾略開心地法門竟八千返者往還一周曰返返轉也謂如來成佛度生之事去來約八千轉也舍那本釋迦迹千之百億橫開本迹遠近也臺藏沒閻浮出經八千返豎開本迹遠近也娑婆八千為開心地豈非開顯數數成覺事耶然如來法身體若湛虗本離能所生滅去來動靜之相故般若經云如來者無所從來亦無所去今云八千返者迺如來利生悲智之大用也華嚴經云如來無身為眾生故示現其身斯即法身無生無所不生無相無所不相以化身法身無異體故由眾生緣感則見佛興世緣盡故見佛滅度如雲籠日愚蒙便為日滅雲開日現謂復重來眾生亦爾障重不覩佛日業輕見佛出世實因眾生機感非佛而有來去出世滅度無非利益眾生故涅槃經云諸佛如來為令眾生生欣樂故出現於世欲令眾生生戀慕故示現涅槃是也若據餘經百千猶是隨俗大數而言又如涅槃經云我雖在閻浮提中數數示現入於涅槃然我實不涅槃而諸眾生皆謂如來真實滅盡而如來性實不滅是故當知是常住法不變易法大涅槃者即是諸佛如來法界眾生皆謂我始成佛然我已於無量劫中所作已辦隨順世間法故復示現閻浮提出家成道故法華經云我實成佛已來無量無邊百千萬億那由他劫我常在此娑婆世界說法教化亦於餘處百千那由他阿僧祇國導利眾生我壽命無量阿僧祇劫常住不滅非實滅度而便唱言當取滅度如來以方便教化眾生故問曰如來既成佛久遠何不直現身說法而假父母降生出家修道耶答曰若不如是凡夫無智疑佛是化人或謂無父母妻子方能得道不肯俲修此即如來示現方便利生之妙用也娑婆此云能忍亦云堪忍謂此世界眾生能堪忍受貪瞋癡三毒及諸煩惱之苦而不生厭離以求解脫也乃至者謂十處說法今初舉金剛座後舉天王宮餘之八處包括其中故也為是中一切大眾者為十住處之大眾略說百千恒河沙法門中心地如毛頭許已然後乃為地上凡夫說重輕戒法也二轉說戒法攝生二初標戒源復從天王宮下至閻浮提菩提樹下為此地上一切眾生凡夫癡暗之人說我本盧舍那佛心地中初發心中常所誦一戒光明金剛寶戒是一切佛本源一切菩薩本源佛性種子復從天王宮者上而又下曰復地上五趣雜居地也一切眾生者除佛一人該通九界八部四眾等先為菩薩天眾說今為地上凡夫說也行不正法妄生邪見故名為痴無明煩惱閉自心地故名為暗如來愍此故八千返傳說舍那正戒以三世諸佛皆先受此戒為成佛初因故云初發心中常所誦此一戒也然此一戒即光明金剛寶戒是十重四十八輕戒之體也又十會既畢隨說戒品者以此住行向地等一切微妙法門雖人人性具而沉迷日久方坐癡暗之地何繇得入耶然要入不難自有方便只恐不肯發心耳如盧舍那佛本亦曾為癡暗凡夫但初始發心便受戒品受戒之後便常誦習所以克證心地法門直至成佛皆以此一戒為最勝因緣也但沉迷不覺名凡夫人舍那為本說是傳說正顯釋迦為迹也心地者有二一本源心地性也二三十心十地修也發是開發始覺也謂舍那從癡暗凡夫時最初開迷發心時常誦此一戒光明金剛寶戒本覺也此有二義先以事釋此戒能破癡暗故曰光明能摧煩惱名為金剛具足無量功德法財故云如寶又此戒最上第一故言一戒三世諸佛皆先受此戒為初因故云初發心也次以理明此戒照一切法名為光明攝善戒也體是無漏名為金剛律儀戒也濟物利用名之為寶攝生戒也律儀戒謂無惡不止斷德當證法身佛果然止即是持作便是犯善法戒謂無善不修智德當證報身佛果然作即是持止便是犯攝生戒謂無生不度恩德當證應化佛果然作即是持止便是犯諸佛薩婆若海以此戒為源菩薩六度萬行以此戒為本不惟舍那繇此戒而成即十方三世一切諸佛亦無不以此戒而成一切菩薩亦無不以此戒為本而修起故云是一切佛本源一切菩薩本源也若離此戒修行則三十心十地法門皆不成就故乃至佛地一切功德皆不發生也佛性種子者戒是佛性之種子謂佛性雖含靈普具由戒發生可稱種子如佛種從緣起是也故此戒本以正因佛性為種子然正因佛性性也謂一切眾生皆具此性但背覺合塵常為煩惱之所覆障若順佛性而修則能超脫生死悟入涅槃與佛同證心地法門也故起信論云以知法信無染污隨順修行尸羅波羅蜜而緣了佛性又無不以此戒為種子修也涅槃經云一切眾生雖有佛性要因持戒然後乃見因見佛性得成阿耨多羅三藐三菩提也二釋法益一切眾生皆有佛性一切意識色心是情是心皆入佛性戒中當當常有因故當當常住法身一切眾生皆有佛性者猶言一切眾生皆當作佛也此一句最親切為此一大部經之正宗故華嚴經云一切眾生身中具有如來智慧德相但因最初一念不覺而起無明成於癡暗自為閉障故令受此正戒而閉障自除佛性自現以見佛性無偏徧一切法若意若識若色若心是情是心無不攝入佛性戒中也一切意識色心者本為一真法界之體以不守真如故有心意識名然名雖分三體本無二也又意識乃心之次名謂凡夫妄念倏然集起名心次心思量名意後心了別名識色是色質即四大色身也情是妄情乃意識之別名也是情是心皆入佛性戒中者謂正發明一切色心眾生俱有佛性也除此心外更無別有佛性可得故云阿賴耶識即如來藏是也今言是情揀非無情是心揀非無心無情無心如同木石則不堪受戒既有佛性當入佛性戒中也當當常有因故當當常住法身者當當猶言的的確確也謂此心地妙戒全依佛性理體所起的是常有真因復開顯佛性而莊嚴之確是常住法身妙果復指示戒法而證明之也又決決定定謂之當當常有揀非忽有忽無常住揀非或來或去戒是佛性種子故受者永為成佛正因不墮邪因永住清淨法身不為欲染如金出鑛不復還為鑛矣心地觀經云眾生本有菩提種悉在賴耶藏識中若遇善友發大心三種鍊磨修妙行永斷煩惱所知障證得如來常住身是也三勸信受持如是十波羅提木叉出於世界是法戒是三世一切眾生頂戴受持吾今當為此大眾重說十無盡藏戒品是一切眾生戒本源自性清淨如是者總結上文而言十者舉重而攝輕也波羅提木叉此翻保解脫謂受此戒者如來保任決定得解脫無明煩惱惑業而獲證清淨法身故在因能持名波羅提木叉在果所得名清淨法身也出於世界者謂此心地大戒世所難值如來出世故今出焉當生慶幸毋輕忽也是法戒者揀非二乘木叉乃是成佛之正法戒也頂戴者尊重之至受持者秉執之固也如是成佛種子應當尊重秉執不可暫時忘失故曰是三世一切眾生頂戴受持也吾今當為此大眾者將來曰當重說者重宣此戒也謂上已略說今復再宣或先為菩薩天人今為凡夫故言重也然戒為成道之本不厭頻宣故如來半月半月自誦南山宣祖以十遍為期今言重說未為多也十無盡藏戒品者謂此戒品雖云是十而包羅無盡菩薩戒法具足無量法門也瓔珞經云菩薩一切凡聖戒盡心為體心若有盡戒亦有盡心無盡故戒亦無盡故云十無盡藏戒品也是一切眾生戒者謂此戒法上則千佛所傳下則群機普被僧俗人天共稟神鬼畜類同受非如聲聞戒之局也本源自性清淨者一塵不立也謂此戒乃生佛同源性本清淨在諸佛則已還其源在眾生則要秉受方復其本然本源之性性本清淨非源外別有自性亦非性外更有清淨可得也又此十無盡藏戒法繇本源自性清淨為所依體故今受持此戒乃復其本淨之體也二偈頌三初舍那始授二釋迦轉授三勸眾信受初中二初明本迹次明人法初又三初本佛土二迹佛土三結本迹今初我今盧舍那方坐蓮華臺我者乃如來自顯說法之主揀非千華上佛及千百億釋迦也盧舍那者無明塵垢永盡智慧功德悉圓如淨滿月以名表德也又盧舍那身是戒果正報蓮華臺是戒德依報千佛百億佛是正報千華百億國是依報也舍那是本千佛是迹又千佛為本百億佛為迹非本無以垂迹非迹無以顯本本迹雖殊果德無二也其中有四料簡一本中本二本中迹三迹中本四迹中迹正歸法性曰方安住不動曰坐蓮華臺者謂華藏世界形似蓮華也華在下擎故名曰臺臺居正中以表戒為中道之正因能起中道之佛果舍那身稱華臺亦是依正無差也又舍那本佛坐華臺為諸佛之主者正表戒法是眾德之本也色心不二依正重重此繇眾生心性顯現還依眾生心性安住眾生心性猶如蓮華在塵不染因果同時繇此心性妙蓮華故乃使世界亦如蓮華即此心性第一中道如是究竟契合故云方坐蓮華臺也二迹佛土周匝千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一時成佛道周帀千華上者周匝圍繞義千華謂華具千葉也華瓣曰葉人間華祇有十餘葉天上華有百餘葉諸佛菩薩華乃有千葉也復現千釋迦者諸此千佛皆從舍那一佛出故先現依報後現正報故曰復也佛身具四種一毗盧徧耀正法為身二舍那行滿報果為身三釋迦應迹赴感為身此又開二一應身受純陀供二化身受大眾供今云千釋迦者應身佛也百億釋迦者化身佛也千葉千釋迦者謂一葉有一佛世界故有千佛淨土表十地十波羅蜜圓因起應果之本地也一華百億國一國一釋迦者此顯化佛之境也上明一華葉為一世界故有千釋迦今明一葉上復有百億國土故有百億釋迦千葉故成千百億釋迦此謂舍那纔坐華臺即現千釋迦圍繞每一釋迦復化千佛圍繞每一化佛又有千佛圍繞如是一佛坐千葉蓮華一葉有千佛十葉有萬佛百葉有十萬佛千葉則有百萬佛一釋迦有百萬十釋迦有千萬名為一億百釋迦十億千釋迦共為百億佛此百億佛皆是舍那一葉所出然一葉有一淨土即是一佛世界起圓應身如是一葉一世界有百億國土百億釋迦娑婆百億國是一葉之上故曰一華百億國一國一釋迦也此上釋迦即大化也總該百億此百億釋迦即小化也惟一四部洲耳各坐菩提樹一時成佛道者謂國土雖分而成佛同時體用無二道故也然一一華葉各各為一三千大千世界各有百億山王及四大洲諸贍部洲有金剛座菩提樹王大小化佛各於樹下破魔軍已一時證得阿耨菩提具足三十二相八十種好為諸資糧及四善根菩薩二乘凡夫說三乘法及人天教者正顯生佛覺體無有高下本佛迹佛不分前後故曰各坐菩提樹一時成佛道也三結本迹如是千百億盧舍那本身前八句明從本起末亦是從體起用此二句顯攝末歸本亦是攝用歸體也如是千百億盧舍那本身者謂千百億釋迦是千釋迦所化千釋迦是舍那一佛所化也然用雖千百億而體本是一也言千百億者謂億之一數有四一以十萬為一億二以百萬為一億三以千萬為一億四以萬萬為一億然此娑婆三千大千世界共有萬億日月皆一佛化身所主故同時成道也其臺周徧有千葉一葉一世界為千世界我化為千釋迦據千世界後就一葉世界復有百億須彌山百億日月百億四天下百億南閻浮提百億菩薩釋迦坐百億菩提樹下其餘九百九十九釋迦各各現百億釋迦亦復如是千華上佛是吾化身千百億釋迦是千釋迦化身吾以為本源名為盧舍那佛是知千佛千百億佛不出一舍那本源本源即心地實相戒體故云如是千百億盧舍那本身也次明人法千百億釋迦各接微塵眾俱來至我所聽我誦佛戒甘露門即開千百億是能接之人微塵眾乃所接有緣也俱來至我所者謂俱至我舍那所聽戒此結能接所接之事也按品上下千釋迦與千百億釋迦各接有緣皆至舍那前受菩薩戒藏已然後各坐道場示成正覺傳誦舍那戒藏也言微塵者謂所來之眾甚多不可舉數故喻如微塵也各接者謂千百億佛各各接取千百億世界微塵聽眾惟除無緣者繇佛有三不能一不能度無緣眾二不能空眾生界三不能除定業故也俱來至我所者我是舍那自稱是則能化所化俱會一處正表體用同歸本源心地也聽我誦佛戒者是誡所來聽眾以此心地大戒廼諸佛所傳非舍那自剏故不言說而言誦佛戒也甘露門即開者以喻表法也謂甘露有起死回生之功淨戒具轉凡成聖之德故瑞應圖經云甘露神靈之精也其凝如脂其美如飴鮮潔潤澤是以經中或喻實相或況涅槃則知至妙之物無以加於此也古云天上有丹名曰甘露人得服之長生不老然聽誦佛性妙戒煩惱因此清凉法身即得常住而生死苦海永離便如服甘露之妙藥也又此佛性妙戒雖則人人本具奈因情塵久蔽不自覺知今聽舍那口誦耳門一透心地頓開即見本源自性故云甘露門即開也二釋迦轉授二初敘戒源二示法益初中又二初顯授緣由次讚戒體用今初是時千百億還至本道場各坐菩提樹誦我本師戒十重四十八上四句顯從體起用下一句攝全部戒法以明奉持之要也還至本道場各坐菩提樹者約事而言即菩提樹下是本得道之場也約理而釋本道場表本源心地菩提樹表所證覺體也本師者千百億釋迦皆於舍那前受戒故稱舍那為本師也十重四十八是總標戒相乃別列今迹傳本戒本為迹師以迹誦本故云誦我本師戒十重四十八也次讚戒體用戒如明日月亦如瓔珞珠戒喻日月瓔珠者是讚其體用功能也謂此戒能除罪霧譬之如日能除昏暗喻之如月莊嚴法身譬之如瓔能濟貧窮故喻如珠律儀義也又日能生萬物戒能生萬善月得清凉戒除熱惱瓔障形醜戒除憂慼珠富世財戒富法財善法義也又日月麗天無不瞻仰戒品霑身人所恭敬瓔珠嚴身人所愛樂戒善威儀增長信心攝生義也戒體雖一功用無窮故以喻表也二示法益二初明得益微塵菩薩眾由是成正覺正覺者說法無差故云正出生死夢故云覺微塵者指無數中之有數也菩薩眾指三十心十地及一切聽眾也由是指受戒之法益因也正覺指持戒之功德果也如是因果昭彰皆繇戒之力用故云微塵菩薩眾由是成正覺也次示傳持是盧舍那誦我亦如是誦汝新學菩薩頂戴受持戒受持是戒已轉授諸眾生是盧舍那誦者上行也我亦如是誦者下俲也又我者釋迦自舉以告眾發起勸誡之意也如是誦者謂如法如律如佛所教而誦也汝新學菩薩頂戴受持戒者新學是初聞戒法之大士頂戴屬身受持屬心謂聞此戒法應當身心恭敬如法誦持不可輕忽忘失所謂後覺者必俲先覺之所為也受持是戒已轉授諸眾生者囑令師資傳受毋斷續也諸眾生者廼大乘凡夫也舍那為本授釋迦為迹釋迦得此戒為本復傳諸菩薩為迹菩薩得此戒為本復授諸凡夫眾生為迹既受須持既持須誦欲使燈燈相續化化無盡者必須受持此戒流傳後世故云受持是戒已轉授諸眾生也三勸眾信受二初勸信諦聽我正誦佛法中戒藏波羅提木叉大眾心諦信汝是當成佛我是已成佛常作如是信戒品已具足諦聽我正誦者此示因也至心真實曰諦耳根發識曰聽正當也謂正當誦戒之時不得心馳外境有妨聽法也佛法中戒藏波羅提木叉者指實戒法之言也謂如來所說法藏有三此是大乘毗尼藏揀非小乘律法輪王十善治世語言及外道牛狗等戒也梵語毗尼此云善住由毗尼住世正法得以久住也汝等要著實用心而聽始知我釋迦一佛所誦之戒乃是千百億佛共誦之戒法也不但揀異外道等戒亦復揀異聲聞緣覺等戒也此是諸戒之源五戒十戒及二百五十戒等無不從此流出亦無不攝入此大戒之中故曰佛法中戒藏波羅提木叉也毗尼方廣經云菩薩毗尼猶如大海一切毗尼無不納受是也大眾心諦信者大眾指聽眾而言心諦信者謂諦信自心是佛自心作佛也汝是當成佛者此指因也謂汝信此戒定得成佛故我是已成佛者此示果也謂我已成佛由信此戒故大論云信為能入我持此戒得成等正覺汝亦應爾汝今受此戒能至解脫處我今授此戒保汝得解脫汝雖始覺初心為具佛性戒故當必成佛我雖妙覺果地為悟佛性戒故先已成佛猶如稻種復發萌芽故華嚴經云信為入道之源功德之母欲求大乘戒法必須起大信心方令佛種不斷若不信自身決得成佛則所有戒品不能牢固矣所以如來叮嚀諄囑要須如是念念相繼保守家珍故云常作如是信戒品已具足也又戒品具足全由深信於理而心地增進全由精修於事故曰由戒淨故慧淨由慧淨故戒淨如兩手互洗不分先後事理無礙是名具足義也次勸受一切有心者皆應攝佛戒眾生受佛戒即入諸佛位位同大覺已真是諸佛子大眾皆恭敬至心聽我誦一切有心者謂前既諦信此戒故今勸令受也一切是普利之語有心揀非無心無心即同木石非是戒器則不堪受然既有心皆當作佛葢心外無佛故此心地大戒還須從心所得也引入曰攝夫欲求無上妙道務須先受菩薩大戒以為根本則本立道生直至成佛故云一切有心者皆應攝佛戒也眾生受佛戒即入諸佛位者頓也謂住是戒者以身語意合而為一故位同大覺已真是諸佛子者圓也謂分證覺與究竟覺同故亦具授記之語即字乃是一經之大旨名為開權同字又為取證之極果是為顯實佛子者以紹繼為義三乘聖人皆從佛生解從法所化盡是子義今發大乘心受大乘戒故名曰真佛子有三如凡夫修行未曾入道紹隆佛種名外佛子聲聞秉小乘教生長法身名庶佛子菩薩受大乘戒生佛法身名真佛子位者聖人之大寶也然纔受佛戒即位同大覺者良由生佛同源心性無二也背覺合塵名為眾生背塵合覺名為諸佛今受佛性戒頓復本心源豈不位同諸佛耶問然既位同諸佛猶名佛子者何也答大位雖同於佛功德未圓故受子稱喻如東宮王子已受灌頂終紹王位今但名王子未名王也大眾皆恭敬結勸也至心聽我誦誡聽也若不至心聽則妄念壅閉心地戒法無由得入不久則不能復其本源也夫欲聽戒先當外肅形儀內起敬意恭敬外儀肅也至心內儀敬也內外一如大法當施矣音釋師資師者授道之人資助也謂助發己身之行業也又云師有匠成之功弟子具資稟之德也摩竭陀國亦云摩伽陀此翻善勝或云摩竭提摩者大也竭提體也謂五印度中此國最大統攝諸國故名大體或云摩遍也竭提聰慧也言聰慧之人遍其國內故又云無害言此國法不行刑戮其有死罪者送至寒林或言無惱或言不害皆謂劫初已來無惱害故至瓶沙王截指為刑後自齧指痛復息此刑佛當生其地故吉兆預彰所以先置不害之名也王舍城即羅閱祇也是摩竭國城名薩婆多論云此國本有惡龍作種種災害破壞人民舍宅惟王宮舍不壞因此為名又云千王共居故名王舍城也八相八相者法華經中明釋迦如來無量劫前已成正覺因大悲願力利益眾生數數於十方國土示生示滅處處不同豈但於此南閻浮提一方出現而已今論出現本末則具有八相皆所以示同人法也一降生兜率相二託胎相三出胎相四出家相五降魔相六成道相七說法相八入涅槃相同別二妄一別業妄見謂諸眾生迷失真性自起妄見見有一切虗妄境界或苦或樂譬如病目夜見燈光別有圓影二同分妄見謂諸眾生迷失真性同見一切虗妄境界同受苦樂同業所感譬如一國之人同見瘴惡不祥之事故六相圓融六相者謂一真法界之體而有六種名義之相也然法界體同本無異相由法入於義遂有六名名雖有六不離一體交徹融通一多無礙故曰圓融一總相二別相三同相四異相五成相六壞相忉利此云三十三天居須彌山頂離人間八萬由旬四方各有八天帝釋居中淨名疏云昔迦葉佛滅度後有一女人發心修塔復有三十二人發心助修修塔功德為忉利天主其助修者而作輔臣君臣合之共為三十三天也五欲色聲香味觸為五希須名欲止觀云五塵非欲而其中有味能生行人須欲之心故也眾生身見謂妄計為身強立主宰故一生補處謂猶有一品無明故有一生過此一生即補妙覺位也四加行言四加行者煖頂忍世第一為四工夫增進故曰加行煖者從喻得名如人以木鑽火火雖未出先得煖相譬如加行位中以智慧火燒煩惱薪雖未得無漏之智而已得智火之前相故頂者謂觀行轉明在煖之上如登山頂觀矚四方悉皆明了故忍有二義一者印可義謂於此位中即能印可四諦之理謂苦諦實是苦乃至道諦實是道也二者決定義謂此善根決定無退故世第一者謂此位中觀四諦理雖未能證而於世間最勝故未到定禪未入根本禪也謂於欲界修色界定身雖未到於彼而心已先證彼也俱生我法二執一俱生我執謂於五陰等法中強立主宰妄執為我與身俱生是名俱生我執二俱生法執謂無始時來虗妄熏習於一切法妄生執著恒與身俱故名俱生法執生相無明謂等覺後一品生相無明惑也無明即不覺義以不覺故而生三細此無明至金剛後心方斷五不還天阿那含華言不來不來即不還義謂斷欲界九品思惑盡生色無色界於彼漏盡不復還來受生故也亦名五淨居天謂無煩無熱善見善現色究竟也出家謂出生死家入如來家也五住煩惱三界見惑為一住三界思惑分為三為欲愛色愛有愛也塵沙無明惑合為一住共成五住由此五惑能令眾生住著生死故二種生死一分段生死謂六道眾生隨業感報身之形段則有長有短命之分限則有壽有夭故二變易生死謂聲聞緣覺菩薩雖無分段生死而有因移果易之生死如初位為因後位為果又後位為因後後位為果故名變易也住持謂安住道德執持教化令法久住故又云住於真理持而不失故地繫煩惱謂住繫縛煩惱偏重故五趣雜居地五趣者即欲界六天人餓鬼畜生地獄也本該六趣以修羅通於諸趣故但言五雜居者五趣雖果報苦樂不同總居於欲界故也九界謂三乘六道感報界分不同故有九界也八部佛之垂化道濟百靈法之傳世慈育萬有三乘賢聖既肅爾以歸依八部鬼神亦森然而翊衛故諸經中多列八部之眾也八部者謂天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽是也四眾一發起眾謂開端發起之眾也謂激揚發動使如來有所說使大眾有聞乃至發起問答等是也二當機眾謂當座之機眾也謂宿植德本緣合時熟不起於座聞即得道也三影響眾謂古往諸佛菩薩隱其圓極之果示同機眾匡輔法王如影之隨形響之應聲又如眾星遶月雖無作為而有大益也四結緣眾謂結聞法因緣之眾也葢由過去根淺三慧不生現世雖見佛聞法而未能獲益但作未來得度因緣也真如實際真如者如空合空似水投水性非妄遷故名真如實際者即佛性理地也十遍為期南山宣祖凡授經律必以十遍為期少則恐茫昧故四種資糧亦名四善根一福德資糧謂由宿世修諸福德而於今生豐饒財寶遇善知識離諸障礙能勤修行是名福德資糧二智慧資糧謂於宿世修習智慧而於今生聰慧明敏解了法義是名智慧資糧三先世資糧謂由宿世積集善根而於今生諸根完具家財富足是名先世資糧四現法資糧謂於今世有善法故善根成熟具戒律儀是名現法資糧四善根一樂住林間二四事攝物三捨身求法四勤行精進毗盧遮那此云徧照亦云大日謂如來色身法身普周法界十方世界悉皆照耀若人稱名歸命禮拜則得法界一切諸佛菩薩賢聖乃至八部加持衛護波羅蜜翻到彼岸謂菩薩修此法化度眾生超生死海到涅槃彼岸故輪王十善輪王有四一金輪王主領四大部洲二銀輪王主領三州除北州三銅輪王主領東南二大部州四鐵輪王主領南州四皆有輪寶現於虗空隨輪飛行故名飛行皇帝也十善者一身三謂不殺盜邪婬口四謂不妄言綺語兩舌惡口意三謂不起貪瞋邪見也以此十法治世故曰輪王十善也治世語言謂以孝悌忠信仁義禮智之言而勸化也牛狗等戒涅槃經中有六苦行外道一自餓謂不進飲食長忍饑虗二投淵謂寒投深淵忍受凍苦三赴火謂常熱炙身及熏鼻等四自坐謂常自裸形不拘寒暑露地而坐五寂默謂於屍林塚間以為住處寂然不語六牛狗自謂前世從牛狗中來即持牛狗戒食草噉污唯望生天如上六種外道執此苦行以為得果之因故
