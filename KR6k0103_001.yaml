body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述將釋此經先開十門一教起因緣二藏乘分攝三辨定時會四教觀深廣五所被機宜六能詮體性七宗趣通局八翻譯傳授九總釋名題十別解文義今於題文之前亦懸敘八義門也初教起因緣者華嚴云非以一緣一事而得成就如來出現今經興起亦多因緣別開為十一傳揚諸佛授受常法故二標示衆生入道根本故三發明心地出生大戒故四略開菩薩廣大行願故五廣顯戒門普納含靈故六護持菩薩必不退墮故七激勵小乘令學大乘故八直指凡夫信己是佛故九預扶末法作大導師故十流通聖戒展轉無盡故二藏乘分攝者初藏攝有二一三藏經律論也品內上明法門中心地契經藏攝下明佛法中戒藏毗尼藏攝而無問難故非論攝二二藏聲聞菩薩也經云汝等一切發心菩薩亦誦乃至十地諸菩薩亦誦是菩薩藏攝故非聲聞也二乘攝亦二一五乘謂人天聲聞緣覺菩薩也經云初結菩薩波羅提木叉乃至合掌至心聽佛誦一切諸佛大乘戒屬菩薩大乘攝二四乘三乘之後加一佛乘即法華之大白牛車也經云衆生受佛戒即入諸佛位故是一佛乘攝非前權三乘也三分攝謂十二分教也一長行二重頌三授記四孤起五因緣六無問自說七本事八本生九方廣十未曾有十一譬喻十二論議長行重頌可知汝是當成佛我是已成佛授記也是故戒光從口出有緣非無因故光光非青黃赤白黑等因緣也入天宮下閻浮十住處說本生及本事也略開不可說法門中心地乃至重說十無盡藏戒品方廣也釋迦身放慧光照天王宮回至蓮華臺藏世界玄通華光主菩薩放金剛白雲色光遍照一切世界未曾有也經喻梵網戒如日月瓔珠菩提若苗譬喻也故是九部所攝而非孤起無問論議三分教也三辨定時會者時有三一先照時所謂初善日初分時入也二轉照時所謂中善日中分時入也此一時內轉開三照初轉照時為下根轉小乘法輪中轉照時為中根轉三乘法輪後轉照時為上根轉一乘法輪三還照時所謂後善日後分時入也此當先照時說會有五一華嚴會直顯教也二阿含會隱實教也三深密會引攝教也四妙智會融通教也五法華會開顯教也此當華嚴會攝又涅槃經五味文云譬如從牛出乳從乳出酪從酪出生酥從生酥出熟酥從熟酥出醍醐此當最初乳味也四教觀深廣者開二先教相又二一化儀教門分為十一本末差別門二依本起末門三攝末歸本門四本末無礙門五隨機不定門六顯密同時門七一時頓演門八寂寞無言門九該通三際門十重重無盡門經云我今盧舍那方坐蓮花臺周匝千華上復現千釋迦前二後二分開即差別門連合即起末門又云如是千百億盧舍那本身該歸本門及無礙門十住處說即隨機門四禪化魔又說心地即顯密門重輕戒法一時頓說即頓演門沒入天宮化魔下生成道說法入出不離華光三昧即寂寞門三世諸佛已今當誦一切菩薩已今當學即三際門舍那佛說恆河沙法門中心地及十無盡藏戒法品千百億釋迦亦如是說乃至一切佛心藏地藏戒藏無量行願藏因果佛性常住藏如是一切佛說無量一切法藏即無盡門依引文義十義俱通約時剋定在何門攝此當七九十門兼差別中一分本義以其頓演根本一乘直益圓頓大機宜故應如法思之二化法教門開為二先約教詮法通局顯分齊教類有五初小教中具含四乘一人乘談五戒十善二天乘談四禪八定三聲聞乘談四諦法門四緣覺乘談十二因緣前二有我猶屬界內凡夫後二無我名為出界聖人故此小乘唯談我空二始教但明法空亦名分教但說法相三終教竟說中道亦名實教廣談法性四頓教唯辨真性五圓教圓談法界初是小乘二三大乘四五一乘此屬圓教本源心地與法界心性無二無別故亦可兼前終頓而非小始故權實教中實教所攝經云衆生受佛戒即入諸佛位屬頓教攝又一舍那化千百億千百億即舍那本身屬圓教攝偈云應當靜觀察諸法真實相是名第一道亦名摩訶衍終實義也文云一切衆生皆入佛性戒中偈云常作如是信戒品已具足頓教義也經云為開百千恆河沙不可說法門中心地乃至因說無量世界猶如網孔一一世界各各不同佛教門亦復如是圓教義也斯則有前所通無前所局矣次約法生起本末顯分齊法義亦五初唯一心為本源所謂衆生心是心則攝一切世出世間法即華嚴一真法界心圓教齊也二依一心開二門一者心真如門所謂心性不生不滅頓教齊也始教空義密說此門以彼不知如來遣相為顯真性故非其分二者心生滅門依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿梨耶識終教齊也分教識義密說此門以彼不知佛說如來藏以為阿賴耶故非其分三依後生滅門明二義一者覺義謂心體離念等虗空界二者不覺義謂不如實知真如法一故始教空宗齊此覺義以為真空本覺之地彼未明真空相即真如性故說諸法無不是空四依後不覺義生三細一業相二轉相三現相分教相宗齊此業相以為諸法生起之本故未明三細與真如同以一心為源故說真如凝然八識生滅五依後現相生六粗一智相二相續相法執也三執取相四計名字相上四皆惑道二乘唯齊第三但斷我執未證法空故五起業相業道人天齊此但知善惡業相不識二執惑故六業繫苦相苦道也舍那略開心地如毛頭許乃至本源自性清淨即一總相心也汝諸佛轉我所說與一切衆生開心地道即二門也釋迦佛說舍那心地中初發心中常所誦一戒光明金剛寶戒是一切佛本源一切菩薩本源佛性種子即覺不覺義也一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中即三細也如是十波羅提木叉出於世界是法戒是三世一切衆生頂戴受持乃至云若有犯者不得現身發菩提心及隨三惡道中二劫三劫不聞父母三寶名字即六粗也經既本末具證義理深廣彰矣後觀道開為三門一不生觀二不滅觀三一心觀亦可一非異觀二非一觀三實相觀偈云應當靜觀察諸法真實相不生亦不滅不一亦不異如是一心中方便勤莊嚴亦可一滅惡觀二出佛觀三一道觀偈云於學於無學勿生分別想是名第一道亦名摩訶衍一切戲論惡悉從是處滅諸佛薩婆若悉由是處出亦可一不有觀二不無觀三本源觀或云一非色觀二非心觀三戒光觀文云戒光從口出非色非心非有非無是諸佛之本源或云一俱非觀二因緣觀三心戒觀文云我今自誦諸佛法戒乃至一切諸菩薩亦誦是故戒光從口出有緣非無因故光光非青黃赤白黑乃至非因果法等此三觀門即小乘律儀道共定共三戒亦即律儀無漏禪戒亦即大乘律儀善法衆生三戒瓔珞經云律儀戒謂十波羅提木叉善法戒謂八萬四千法門衆生戒謂慈悲喜捨化及衆生令得安樂也此約次第三觀配釋如是若圓融觀三觀並攝三聚三聚具含三觀乃至十重四十八輕八萬四千法門化度十界百億衆生三觀三聚莫不遍包則此觀道豈不幽深也五所被機宜者經云一切衆生皆有佛性無非所被不同餘宗唯被菩薩及不定佛依起信論三聚統收此經正為不定文云信男信女淫男淫女盡得受戒兼為正定修進妙行經云三世菩薩已學今學當學邪定作近遠緣彼論云近遠速得度故遠緣久遠得度故是近遠復有二緣一增長行緣二受道緣今經云衆生受佛戒即入諸佛位近緣也汝是當成佛我是已成佛遠緣也又准楞伽經五性攝盡一聲聞乘種性二緣覺乘種性三如來乘種性四三乘不定種性五闡提無種性此經正被如來乘種性兼為餘四性以作近遠緣故彼經云捨善根一闡提以佛威力或善根生佛於一切衆生無捨時故今經云一切衆生皆入佛性戒中當當常有因故當當常住法身又云見一切衆生應唱言汝等盡應受三歸十戒發菩提心畜生闡提尚爾況二乘聖性耶若約今經人有八對文云國王王子大臣百官比丘比丘尼信男信女淫男淫女十八梵六欲天無根二根黃門奴婢一切鬼神盡得受戒初王臣二僧尼三淨染四欲色五有無六主僕七幽顯八橫豎法有十六謂信聞喜見持戴讀誦解學修說注書授行也若普收者或疑或信或毀或讚皆為所被經云七逆八難一切犯戒罪應教懺悔又云十無盡藏戒品是一切衆生戒本源自性清淨則知成法破法盡成佛道也六能詮體性者分開四門一隨相門又三初聲名句文體經云若說法時法師高座四衆聽者下坐二通攝所詮體上四屬能詮此一所詮義若不詮義文非教故下云應一一教受持大乘經律教解義理又云先學大乘威儀經律廣開解義味三六塵顯法體下云戒光從口出又云剝皮為紙刺血為墨以髓為水析骨為筆書寫佛戒木皮榖紙絹素竹帛亦應悉書持常以七寶無價香花一切雜寶為箱囊盛經律卷二唯識門前三教體皆自識變下云常應一心受持讀誦大乘經律若見牛馬豬羊應心念口言汝是畜生發菩提心又云三千學士聞佛自誦心心頂戴三歸性門此識無體真如性故經云日日六時持菩薩戒解其義理佛性之性四無礙門謂前理事心境交徹無礙又云一切意識色心是情是心皆入佛性戒中又云十無盡藏戒品是一切衆生戒本源自性千百億世界中一切衆生受持歡喜奉行故此一經通取四門為教體也七宗趣通局者先通辨諸宗有六一隨相法執宗即小乘諸師依阿含等經造俱舍等論二唯識法相宗即無著依深密等經造瑜伽等論三真空無相宗即提婆依般若等經造中觀等論四藏心緣起宗即馬鳴依勝鬘等經造起信等論五真性寂滅宗即龍樹依楞伽等經造佛性等論六法界圓融宗即天親依華嚴等經造十地等論今此經宗當後第六門也經云佛坐菩提樹下成正覺已初結菩薩波羅提木叉以此即舍那心地戒衆生佛性戒大衆十無盡藏戒故屬圓融宗也後局明此經有總有別總則心地大戒以止惡行善為宗了達佛性因果超凡入聖為趣別開五對一教義對崇毗尼教相為宗合悟心地妙義為趣二事理對舉重輕是非事相為宗解第一義諦理性為趣三境智對所緣六種性真境為宗能照三門觀智慧為趣四行位對修行無量行願藏法為宗三十心十地賢聖階位為趣五因果對善徹佛性正因為宗圓成法身佛果為趣此之五對前後相由生起也八翻譯傳授者有二一翻譯時年肇序云羅什法師誦此一品以為心地之首此經有一百一十二卷六十二品弘始三年秦主姚興玄心大法卑萬乘之心尊三寶之教於草堂寺共諸學士與什參定大小兩乘五十餘部唯梵網經最後譯出時道融道影等三百餘人一時受菩薩大戒融影等信受佛語即書出此心地一品八十一部流傳後代當時三百餘人常誦此一品以為持戒之資應知此土菩薩大戒乃什師之所傳也二疏解流傳天台智者大師著義疏雲棲蓮池大師述發隱吾千華三昧光律祖直解心地一品古吳素華旭法師合注廣州在犙贊法師略疏乳峯德水源法師手標如上諸書皆詮梵網妙理今於衆部之中採諸奧義共析經文庶其覽者逐事以明理就理而察事明於理則自不迷宗察於事則自不怠持梵網之旨既明則吾人之心地未嘗與毗盧遮那遍照異也上明八義門竟九總釋名題三初經題二人題三品題今初佛說梵網經佛說者先舍那所說後釋迦親宣也梵語佛陀華言知者覺者知謂知過去現在未來衆生非衆生數常無常等一切諸法是名為知覺謂於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮花開是名為覺對迷說覺對愚說知能知能覺故名為佛佛有三身法報化也法即本覺性體報乃始覺智圓化則慈悲應現也然法身無相圓明遍照十方報身萬德具八萬四千相好化身丈六金身具三十二相八十種好有云法身名毗盧遮那此云遍一切處如心地觀經偈云法身體遍諸衆生萬德凝然性常住不生不滅無來去不一不異非斷常法界遍滿如虗空一切如來共修證是也報身名盧舍那化身名釋迦牟尼此一往語耳當知三身非一非異機緣不同見一異也說者悅其所懷謂諸佛久修久證一體三身了知一切衆生同具此德大悲熏心每思濟度今機緣初熟乃接歸本源世界親覲本尊秉受心地法門次復示成樹下普為凡夫結重輕戒俾受者頓入佛位成真佛子度生本懷於茲暢悅故曰悅其所懷也又四辨宣揚名之為說三昧正受名之為默說法則利益衆生默然則自受法樂也梵網者以喻彰名也梵謂梵天網謂珠網謂佛在摩醯首羅大梵天王宮中觀彼天宮殿上因陀羅網幢衆寶所成光光涉入不相障礙佛剎如之故以喻為經名也義如後釋然能喻唯一謂梵網珠幢所喻有二謂世界及佛教門也世界即所被之機教門是能被之法法性平等理非種種繇機異故教門亦殊也此乃就事而言若約法釋者梵網即是衆生心性亦乃諸佛之本源行菩薩道之根本是大衆諸佛子之根本也自性本淨名梵塵界含攝名網繇此心性建立無量世界衆生之法及設無量教門諸佛之法故云心佛及衆生是三無差別只在迷悟之間而分優劣矣何以故迷成三障悟即三身合而言之自悟為佛悟他名說自他不二名為佛說梵網也經者梵語具云欲底修多羅華言契經上契諸佛妙理乃合道而言下契衆生之機是逗根而說為法為則今古常然故名為經總不出貫攝常法四義謂貫串所說之理攝持所化之機三世不易為常十界同遵曰法夫聖人之語無非教人聞之從凡悟聖永息迷心者矣正翻為線此方不貴線稱故存於經也按諸經律有以單人單法單喻為名或以人法為題或以人喻為題或以法喻為題或以人法喻為題所謂單三復三具足也今經當第五種立題若以通別論之則經為通同名經故梵網是別別餘經故故此經中若境若智若機若益若理若事若體若用若因若果而逈別餘經也境謂性境即一真法界體性虗空華光三昧智謂十智即本經所謂天眼天耳乃至天願等機謂總攝羣機如經云汝諸佛子轉我所說與一切衆生開心地道益即利益謂衆生受佛戒即入諸佛位等理即理體經云一切衆生皆有佛性事即事相謂但解法師語盡得受戒體即戒體謂光明金剛寶戒是一切佛本源用即功用謂得見千佛千佛授手世世不墮惡道八難等因即因行如云我已百劫修行是心地等果即果位如蓮華臺藏世界赫赫天光師子座上盧舍那佛也是故梵網一經教齊圓頓義並華嚴主伴重重說聽皆佛該七衆以通收凡諸位而均攝為一化之根源乃大乘之極暢也上四字是所詮之義下一字為能詮之文能所合目故名佛說梵網經也初津者為初學者以作津梁也二釋人題姚秦三藏法師鳩摩羅什譯姚秦者姚是姓秦是國號乃後秦國主姓姚名興也題立此號者以證譯經之時也三藏者經律論之靈文也謂開示悟入貫串攝持名經處斷輕重開遮持犯曰律刊定是非邪正為論包括所應知義令無分散故名藏也法師者法軌則義師匠也法雖可軌體不自弘弘之在人謂此師善解三藏華梵雙通以法自師以法師人就德為名故曰三藏法師也鳩摩羅什此云童壽謂法師年在童稚之時而辨慧已超耆宿故譯者謂手持梵卷口誦秦言翻梵成華故名譯也父天竺人師在胎日母增辨慧七歲出家日誦千偈九歲與外道論義辨挫邪鋒咸皆愧伏遠近異之母生什後亦即出家聰拔衆尼得第三果什既受具母謂之曰方等深教應大闡揚秦都與汝自身無利如何什曰菩薩之行利物忘軀大化必行爐鑊何恨從此已後廣誦大乘洞其祕奧西域諸王皆尊奉為師凡請說法必長跪座側令師踏登符堅建元九年太史奏云有德星現外國當有大德智人入輔中國堅曰朕聞西域有羅什襄陽有道安將非此耶遂遣將軍呂光等率兵七萬西伐龜茲請師弘法呂光與師才及中途姚興續秦迎師歸國以師禮事之優寵特甚延入西明閣及逍遙園別館安置與八百沙門咨受師義敕譯經論三百九十餘卷弘始十一年八月二十日卒於長安壽七十歲南山律祖問天人陸元暢云什師所翻之經至今若新受持轉盛何耶答云其人善解大乘得佛遺寄之意絶後光前仰之所不能及為一代之寶從毗婆尸佛已來譯經師也又云什師位階三賢文殊指授令其刪定非槩論也三釋品題菩薩心地品之下此品以人法為名菩薩人也心地法也先釋菩薩人名梵語具云摩訶菩提質帝薩埵此云大道心成就衆生謂有大心入佛道故亦云覺有情謂菩提是能覺義薩埵是有情義謂能令一切有情覺悟佛道故東土好簡故但言菩薩也亦云大士謂能上求下化建立大事故又云開士謂能開化一切衆生故總而言之依無作四諦境發四弘誓撰大甲胄能為難事上弘佛法下化衆生智悲雙運故獲此號也其間有通有別通則從初發心以來直至等覺皆名菩薩別則菩薩位次各各不同也次釋心地法名謂萬法之所從生故稱為心凡聖之所依持故稱為地蓋此心地是譬喻品內所明大士要用如人身之有心能總萬事能生勝果為大士所依義言如地然菩薩律儀遍防三業心意識體一名異三業之中意業為主身口次之據勝為論故言心地夫佛即心心即佛也心得佛以顯示第一義佛因心以化度人天故佛佛出世唯語此心心之外無法可說識此義者可與談梵網矣又此心地乃一切凡聖之本源在凡則迷此心故而流轉三界六道四生在聖則悟此心故而復本真源究竟清淨菩薩欲還本源世界故依此心地正戒以為勝因而證舍那之極果也故經云我已百劫修行是心地號吾為盧舍那汝諸佛子轉我所說與一切衆生開心地道又云一切意識色心是情是心皆入佛性戒中受此戒已極至佛身於其中間戒體常在故知此戒即心地也淨名經云諸佛得解脫當於衆生心行中求以本源心地出生一切菩薩行位各各不同於此菩薩位中位位修行心地法門亦復無量非依心地之法孰成菩薩之名非因菩薩之人孰秉心地之法人即是法法即是人繇人故有大菩提繇法故有大涅槃菩提是智涅槃是理理智一如故云菩薩心地也又本源心地不惟出生菩薩行位亦復遍出一切諸法所謂地獄心乃至佛心地獄地乃至佛地今但云菩薩心地者以菩薩上同慈力下同悲仰遍攝十界之義然十界無非心地法門故若非此心為地則戒從何而持佛從何而成耶梵語鉢里勿多此翻為品品者類也謂義類相從故名為品相傳此經大本共有一百十二卷六十二品此乃菩薩心地一品上下兩卷上卷明菩薩三十心十地法門為入佛果之根源下卷明菩薩十重四十八輕戒又為行菩薩道之根本拈此一品而知一部指歸即此一部而通一代儀法觀一佛而遍知十方三世諸佛模楷見一菩薩而知十聖三賢心地對上而言故云菩薩心地品之下也總釋名題已竟十別解文義將釋經文大分為三初序分二正宗分三流通分此三分之興始自晉道安法師彌天高判後西域諸菩薩疏釋東來皆分三分始知晉符西釋誠乃古今不易之恆規也序謂序述亦緒也致也乃序一經之由致也而有通別通者如一切經初皆有如是我聞一時佛在某處與諸大衆俱是名為通別者謂說經各有緣起不同故別序一經或一品之由緒是名為別正宗者宗即主也崇也謂佛所說法必崇尚當機所說之義為正主斯即一經之宗旨也流通者流謂不滯通謂不壅以正義既陳務傳後世利益衆生使正法之源流通而無壅滯廣布十方無有窮盡也此經從品初至第一清淨者名為序分從佛告諸佛子言有十重波羅提木叉至現在諸菩薩今誦名正宗分從諸佛子聽十重四十八輕戒至偈終名流通分雖是六十二品中之一品一品中之下卷而序正流通自在全經然就茲下卷三分宛然如華嚴法華等經品品皆以爾時為首今經亦然即正宗流通亦是明此一品之性相事理非彼全部之正宗流通故又華嚴鈔云夫聖人設教必有其漸將命微言先彰由致由致既彰當機受法故授以正宗正宗既陳務於開濟非但篤於時會復令末葉傳芳永耀法燈明明無盡故授之以流通非唯一部當會當品等皆容有之是也初序分為二初舍那發起二釋迦勸發初中二初長文二偈頌長文三初舍那付囑二釋迦弘傳三勸信受持初中又二初口音勸示二放光付囑今初爾時盧舍那佛為此大衆略開百千恆河沙不可說法門中心地如毛頭許是過去一切佛已說未來佛當說現在佛今說三世菩薩已學當學今學我已百劫修行是心地號吾為盧舍那汝諸佛子轉我所說與一切衆生開心地道爾時者即盧舍那佛將示心地法門之時也諸經通序具六種成就今經亦然爾時時也佛主也大衆衆也為開心地法門聞也菩薩世學信也蓮華臺藏處也又師資道合說聽事成當爾嘉會之時故名爾時梵語盧舍那此云光明遍照照有二義一內以智光照真法界此約自受用身也二外以身光照應大機此約他受用身也又翻為淨滿謂諸惡無餘故云淨此是止惡果報也衆德悉圓故云滿此是行善果報也由行滿果圓故稱為佛亦即惑業俱盡福智圓滿之稱也斯多從自受用得名其光明遍照多從他受用為號按心地觀經法身亦名自性身無始無終離一切相絶諸戲論周圓無際凝然常住其受用身有二種相一自受用二他受用自受用身者三阿僧祇劫所修萬行利益安樂諸衆生已十地滿心出過三界居淨妙國土坐大寶蓮華所謂大寶華王座也無量大衆海會圍繞供養恭敬尊重讚歎如是名為後報利益爾時菩薩入金剛定斷除一切微細所知諸煩惱障成無上菩提如是妙果名現利益是真報身有始無終壽命劫數無有限量窮未來際諸根相好遍周法界四智圓滿受用法樂具足八萬四千智門如是一切諸功德法名為如來自受用身也如來他受用身者具足八萬四千相好居真淨土說一乘法令諸菩薩受用大乘微妙法樂一切如來為化十地諸菩薩衆現於十種他受用身第一佛身坐百葉蓮華為初地菩薩說百法明門菩薩悟已起大神通變化滿於百佛世界利益安樂無數衆生第二佛身坐千葉蓮華為二地菩薩說千法明門菩薩悟已起大神通變化滿於千佛世界利益安樂無量衆生第三佛身坐萬葉蓮華為三地菩薩說萬法明門菩薩悟已起大神通變化滿於萬佛國土利益安樂無數衆生如是如來漸漸增長乃至十地他受用身坐不可說妙寶蓮華為十地菩薩說不可說諸法明門菩薩悟已起大神通變化滿於不可說佛微妙國土利益安樂不可宣說不可宣說無量無邊種類衆生如是十身皆坐七寶菩提樹下證得無上菩提是為十種他受用身也為此大衆者大衆指千華上佛及千百億釋迦也按上品經文云是時釋迦擎接此世界大衆還蓮華臺藏見盧舍那佛佛乃廣開示三賢十聖法門為入佛果之根源是知非止千佛千百億佛為大衆也舍那是能說法之本佛大衆是能受法之迹佛百千十萬也恆河亦云殑伽此云天堂來謂見從高處來故河在中天竺濶四十里沙細如麵章安云諸經多以恆河沙為量者有四義故一人多識之二入者得福三八河中大四是佛生處此即四悉檀也一河之沙數尚無窮況百千河之沙數豈可能盡故云不可說也亦即十大數中之第九數以喻法門之廣大無窮無盡今於無窮無盡法門中略說心地一法猶百千河沙中之一沙故云如毛頭許也然法門雖廣不出心地一法舉心地即該盡萬法是亦以少攝廣也涅槃經云佛在林中取少樹葉告諸比丘我覺了一切諸法如大地草木葉等為衆生所說如手中葉耳正同此喻也門者即能通之義謂如來所說一乘之法皆從此出故曰法門不可說法門廣也心地如毛頭許略也從廣開略故云略開也過去一切佛已說者則見法有所傳也未來佛當說者則見法有所受也現在佛今說者則見法有所證也佛是果人引同證說勸信也菩薩是因人引同修學勸受也三世菩薩等者謂三世果人尚且遵教豈三世因人有不同學者耶然心為萬法之源舉心則萬法俱盡故諸佛同說大士同學也我已百劫修行是心地者我八自在之真我非凡夫執五蘊身心之妄我也百劫揀非權教三祇梵語劫波此云分別時節以劫初人壽十歲時子年倍父年如是增至八萬四千歲後百年減一歲如是減至十歲此一增一減名一小劫二十小劫為一中劫成住壞空各二十番增減為一大劫無數大劫為一僧祇故上品文云我已百阿僧祇劫修行心地以之為因初捨凡夫成等正覺號盧舍那住臺藏世界海以之為果此謂修心地戒時從名字菩薩直至等覺位位修習堅固成就入妙覺位戒體圓極諸惡永淨萬善悉滿是故名為盧舍那佛也今言百劫者或文略也准餘經多云如來於三大阿僧祇劫修行或過三大劫已復於百劫中修相好因故云百劫也天台引智度俱舍婆沙等論云如來從古釋迦至尸棄佛值七萬五千佛名初阿僧祇從尸棄佛至然燈佛值七萬六千佛名二阿僧祇得授記莂號釋迦文從然燈佛至毗婆尸佛值七萬七千佛名三阿僧祇滿從初至此修六度竟更住百劫修相好因故賢愚經云佛言我三阿僧祇劫精勤苦行百劫修福初阿僧祇劫供養八萬八千諸佛中阿僧祇劫供養九萬九千諸佛後阿僧祇劫供養十萬諸佛出家持戒具足尸波羅蜜乘六度車被忍辱鎧於菩提樹下坐金剛座降伏魔王得成佛道按瓔珞經云佛初發意志求緣覺乘閒居靜處四十四億劫無佛法聖衆其間七十劫後遇大通慧佛演暢大乘乃微信解建功德業復經十九劫為大國王供養清衆周給貧乏捨位出家晏居寂念心漸疲倦往來生死受報無數由意無大誓欲免自身患復經六十劫值遇寶瓔佛一乘無二道不聞小節名始從彼發意弘誓心難沮從彼至今日七億阿僧祇將護順正法今乃自覺悟須知七億已前雖復勤苦修道而無堅誓終不能成等正覺據此則百阿僧祇猶少斯亦隨機所說權實大小兩乘化儀不同今舍那以自己所修證驗之成法而告之令他生信依此心地法門而效修證也汝諸佛子轉我所說者諸佛通指千葉上佛千百億釋迦也謂前說法普為大衆今付心印非餘人所堪故特囑千釋迦傳我舍那佛語示諸衆生使上承而下布以見稟法自有來也受法得益曰子轉傳也謂傳佛法以及衆生也然既傳心印不可泛常故稱子也與一切衆生開心地道者啓閉曰開謂我舍那一佛已同十方三世諸佛修證此心地法門則汝等亦當以我心為心轉我所說與一切衆生修證此心地法門各見本源心地也然此本源心地一切衆生之所共有但無始劫來久被妄情惑業雍閉所謂諸佛已悟衆生尚迷心王既蒙則法王不現故令轉佛所說使得豁通故云聞心地道即是開佛知見也次放光付囑時蓮華臺藏世界赫赫天光師子座上盧舍那佛放光光告千華上佛持我心地法門品而去復轉為千百億釋迦及一切衆生次第說我上心地法門品汝等受持讀誦一心而行蓮華臺藏世界者謂居塵不染故名蓮華堅實高顯為萬法之宗極故名曰臺含無邊之剎種故名曰藏豎無終始曰世橫絶方隅曰界蓮華臺藏世界舉依報也師子座上盧舍那佛舉正報也又蓮華含子之處目曰臺藏者有包裹義今剎種及剎土為一大蓮華之所含藏十方世界悉在其內故曰蓮華臺藏世界即華藏世界也約事可爾據理而言何因剎海相狀如斯略舉二因一約衆生知來藏識即是香海於此海中有因果相恆沙性德即是正因之華世出世間未來果法皆悉含攝故名為藏若以法性為海心即是華含藏亦爾然此藏識相分之中半為外器不執受故半為內身執為自性生覺受故如來藏識何緣如此法如是故行業引故二約諸佛大悲海中生無邊行華含藏二利染淨果法重疊無礙故所感剎相狀如之又蓮華即種種光明蕊香幢臺即蓮果十不可說佛剎微塵數香水海在中也赫赫熾盛貌天光是法性天然功德光普照昞爍故師子座者謂形似師子故表說法無畏也如來說無畏之法外道魔王悉皆歸降猶師子之哮吼飛禽走獸盡皆潛伏是以凡佛所坐之座皆名師子座也又名法空座亦表無畏謂如來得法空故故無所畏也上品云舍那在百萬億紫金剛光明宮中坐百萬億妙寶蓮華赫赫光明座是也光告千華上佛者如來心地本絶名言聲也今欲顯心地正法還以心光而作佛事故不以言告而以光告正顯付託之事也然既結示已畢復放光普告者謂此心地法門若本若迹若因若果無不以智為前導也然華嚴雲臺說法禪天光音尚且成教況佛身光耶此亦有二意一近則言告遠則光告二劣機言告勝機光告今則身口通行表此心地戒法為至德要道也若約應機謂是他受用土身佛若約自證即法身無礙土無盡師子座圓融無礙佛遍照法界光總相心地法盡屬於圓教非權漸也佛名釋迦牟尼者本起經翻釋迦為能仁本行經譯牟尼為寂默能仁是姓從慈悲利物顯不住涅槃寂默是字取智慧冥理顯不住生死千華上佛大化也千百億釋迦小化也及者相繼之辭次第說者有二義故一約人先舍那說次千佛傳次百億佛次菩薩次衆生也二約法先三十心次十地次十重次四十八輕也持誦內熟道種也心行外驗行事也領納曰受固守曰持對本曰讀背本曰誦受持屬心讀誦屬口心口進修無二無別故曰一心而行也又次第說者圓融不礙行布也一心行者行布不礙圓融也音釋支那或云至那華言文物國即讚美此方是衣冠文物之地也西域記云摩訶至那此云大唐又名震旦或云真丹琳法師云謂東方屬震是日出之方故云震旦樓炭經云葱河以東名為震旦以日初出耀於東隅故得名也一大事因緣一即一實相也其性廣博為大如來出世度生儀式為事衆生具此實相而能成機感佛為因如來證此實相而能起應度生為緣一切如來出現於世普為開示一切衆生本有實相令其咸得悟入佛之知見故也無上菩提菩提此云覺道無上者謂成妙覺佛智淨獨尊無有過於上者故曰無上焚膏繼膏油也日影也古云日不足繼之於夜者是也凡例凡者大凡例者比例左傳序云發凡而起例也古杭隋時稱杭州唐時稱餘杭宋高宗南渡建都於此改為臨安逮明復稱杭州故云古杭也昭慶按志石晉天福元年敕建律宗大昭慶寺昭為昭萬善之功勳慶為慶一人之大德也萬壽戒壇即地湧戒壇也正名古佛戒壇趙宋太平興國三年允堪律師依此晝夜精勤行道感韋天示現曰今大師行道處乃古佛戒壇最吉祥地然燈佛降生之處也願師大闡尸羅以續如來慧命弟子於西天竺取世尊成道座下土四大海心水築壇請師傳戒令登踐受戒者永脫泥犁之苦言訖壇從地湧七寶分光東方正旦韋天合掌虗空證明五色祥雲結蓋而覆人皆異之故稱地湧戒壇事聞於上敕賜萬善戒壇以戒為萬善之本萬曆三十三年敕賜萬壽戒壇謂登壇說戒祝延聖壽故也三無漏學三者戒定慧也因戒生定因定發慧戒出三途定超六欲慧脫三界三法相資煩惱淨盡不漏落生死故學猶飾也器不飾則無以成美觀人不學則無以成聖果也十門門者收攝無擁之謂也謂將欲釋經於其文前先以十門收攝經意疏通條章顯示大綱令諸學者依門入解使經宗意趣則有所歸而無擁滯也譬喻以類比況曰譬開蹺令悟曰喻謂如來說法為鈍根者假譬喻以曉示之令其開解故如法華經中火宅藥草等喻是也三際先中後也波斯匿王言觀身實相觀佛亦然無前際無中際無後際四禪八定定者謂攝散歸靜之義也色界有四謂初禪二禪三禪四禪無色界有四謂空處識處無所有處非非想處故云四禪八定也四諦法界次第云此四通言諦者以審實為義此四諦法正為聲聞人說欲從聞生解故必須藉教顯理今明教理不虗故云審實苦由因感果則應先因而後果今悉先果而後因者教門引物為便故皆先果而後因前二諦是世間之法令知苦以斷集故先果而次因後二諦是出世間之法使為滅以修道故亦先果而次因也一苦諦苦是苦果二集諦集是苦因三滅諦滅是樂果四道諦道是樂因我空謂無我人衆生壽者四相之見法空謂無色受想行識五陰之法也一真法界離二曰一不妄曰真交徹融攝故曰法界即是諸佛平等法身從本以來不生不滅非空非有離名離相無內無外惟一真實不可思議故心真如門心真如者即是一真法界大總相法門體所謂心性不生不滅非染非淨畢竟平等無有變易惟是一心故名心真如門如來遣相謂祛遣法相惟顯法性故謂一切法本涅槃相若執涅槃則涅槃亦成法數故復遣云無涅槃也無有涅槃佛遣能也無有佛涅槃遣所也佛能覺也涅槃所覺也以有無不可得故能所俱離也如來藏即真如性第八識所依具足諸法包含萬象故謂之藏諸佛證此藏心利益羣生應用無盡即一實相之體也此體能生世出世間一切諸法故名如來藏阿賴耶識即第八識名翻為無沒識取不失為義又翻藏識謂能含藏善惡諸種子故亦名種子識亦名果報識真空謂心境俱融故然真空無相即名實相也道共戒謂於見道修道位中不作意持自然不犯戒與道俱發故稱為共此戒既是初二三果所得即是無漏戒也定共戒亦名禪戒謂發得初二三四禪定之時不作意持自然不犯戒與定俱發故稱為共此戒斷惑未盡未出生死即是有漏戒也無漏禪戒即上道定二戒之總稱也八萬四千塵勞偈曰十使互成百十界成一千七支為七千三世二萬一三毒并等分是為八萬四塵者染汙真性也勞者驅役流轉也八萬四千法門謂如來成道有三百五十度無極法門度無極者謂事理行滿度生死流登涅槃岸此之功德無有窮極故云度無極也偈曰第一光耀起乃至分舍利有三百五十度無極法門門門有六度共成二千一以四大六衰合二萬一千加三毒等分是為八萬四不定性謂遇緣重習修行不定故若近聲聞而習聲聞法若近緣覺而習緣覺法若近菩薩而習菩薩法各隨所習而成其性是名不定性第一義諦真諦非有俗諦非無不有不無是名中道第一義諦本覺謂衆生心體靈明虗廓等虗空界無處不遍即是如來平等法身依此法身說名本覺始覺謂衆生本覺心源由無明熏動覺不成覺多劫在迷今始覺悟是名始覺始本不二名究竟覺即成佛也三十二相謂如來應化之身具此三十二相以表法身衆德圓極人天中尊衆聖之王也所謂足安平相千輻輪相手指纖長相手足柔軟相手足縵網相足跟滿足相足趺高妙相腨如鹿王相立手摩膝相馬陰藏相身縱廣等相毛孔生青色相身毛上向右旋相身金色相身光面各一丈相皮膚細滑相七處平滿相兩腋滿相身如師子相身端正相肩圓滿相四十齒相齒白齊密相牙白淨相頰車如師子相咽中津液得上味相廣長舌相梵音深遠相眼色如金精相眼𥇒如牛王相眉間白毫相頂肉髻成相亦名無見頂相是為三十二相也八十種好所謂無見頂相好身高鼻孔不現好眉如初月好耳輪輻相好身堅實好骨際如鈎鎖好身回轉如象王好行時足去地四寸而印文現好爪如赤銅色好膝骨堅著圓好身青潔好身柔軟好身不曲好指纖圓好指文藏覆好脉深不現好踝不現好身潤澤好身自持不逶迤好身滿足好容儀備足好容儀滿足好住處安無能動好威振一切好一切樂觀好面不長大好正容貌不撓色好面具滿足好唇色紅潤如頻婆果好言音深遠好臍深右旋圓妙好身毛紺青光澤好手足圓滿好手足如意好手文明直好手紋深長好手文不斷好一切惡心衆生見者和悅好面廣殊妙好面如滿月好隨衆生意和悅與語好毛孔常出妙香好口出無上香氣好容儀如師子王好進止如象王好行法如鵝王好頭如摩陀那果好一切身分具足好四牙白利好舌相長廣赤色好舌薄微妙好身毛紅色好身毛軟淨好眼秀廣長好孔門相具好手足赤白如蓮華色好臍厚不出好腹形不現好細腹方正好身不傾動好身持厚重好其身長大好身長殊妙好手足軟滑好四邊圓光各一丈好光明照身而行好等視衆生好不輕衆生好隨衆生音聲不增不減好說法不著好隨衆生語言說法好發音報衆好次第有因緣說法好一切衆生不能盡觀德相好觀無厭足好首髮修長好髮色青珠光滑好手足有德相好是為八十如上相好皆是多生清淨持戒所感也等覺一生補處菩薩之名如今彌勒菩薩等下地望之則與佛等尚有極微細一品無明未盡猶名菩薩所修觀智純一堅利喻若金剛名金剛心亦名有上士妙覺謂金剛後心朗然大覺妙智窮源無明習盡名真解脫故曰妙覺也三障煩惱業報曰三覆蔽正道曰障天眼謂清淨色根照境發識名之為眼依天修得故曰天眼天竺新云印度唐言月謂彼土聖賢繼軌導凡御物如月照臨故也模楷取法則義居真淨土華嚴經云他受用身依他受用土他受用身者謂因他機感扣而現此身即勝應身也他受用土者亦即實報土也謂佛以大慈悲力隨十地菩薩所宜變為淨土或小或大或劣或勝他受用身依之而住故云居真淨土觀無量壽佛經疏云行真實法感得勝報者是也諸菩薩即別殺十地圓教十住十行十向乃至等覺菩薩也阿僧祇此云無央數乃天人中能知算數者極數不能知是名一阿僧祇此是華嚴經十大數中之首也十大數者一阿僧祇二無量三無邊四無等五不可數六不可稱七不可思八不可量九不可說十不可說不可說是為十大數也所知障所知障者亦名智障謂執所證之法障蔽智慧之性是名所知障與煩惱同是根隨二十六惑由貪上有擾亂用名煩惱障有覆蓋用名所知障煩惱障涅槃所知障菩提有分別俱生此且分別大乘見道位斷也如來二障永離心常清淨而無能所之相也四智一大圓鏡智二平等性智三妙觀察智四成所作智百法明門百法束為五門謂色法十有一心法八心所有法五十有一不相應行法二十有四無為法六共成一百也詳如大乘百法明門論三賢謂十住十行十回向也皆稱賢者此就別教而論謂此位菩薩但斷見思惑盡尚有無明惑在未入聖位故名曰賢十聖聖者正也謂此菩薩修行功滿已入正位故名曰聖即十地也四悉檀悉遍也梵語檀那華言施華梵兼稱故名悉檀謂佛以此四種說法遍施一切衆生故名四悉檀也一世界悉檀世即隔別之義界即界分也蓋由衆生根器淺薄故佛隨其所欲樂聞為之次第分別而說令生歡喜是名世界悉檀二為人悉檀謂佛欲說法必先觀衆生根器之大小宿種之淺深然後稱其機宜而為說之令其正信增長善根故名為人悉檀三對治悉檀謂如衆生貪欲多者教觀不淨瞋恚多者教修慈心愚癡多者教觀因緣謂對此等諸病說此法藥遍施衆生故名對治悉檀四第一義悉檀第一義即理也謂佛知衆生善根已熟即為說法令其得悟聖道是名第一義悉檀八自在我我即身在義即如來常樂我淨四德之我由如來具大神力智慧隨機示現自在故一能示一身以為多身二示一塵身滿大千界三大身輕舉遠到四現無量類常居一土五諸根互用六得一切法如無法想七說一偈義經無量劫八自身遍諸處猶如虗空具此八義故稱我也尸棄此云寶髻亦云式棄此翻為火火有二義一能照諸惡不起二燒諸煩惱不生故從義以立名然燈梵語泥洹竭此云然燈大論云謂太子生時身光如燈故亦云錠光毗婆尸亦云維衛華言勝觀亦云遍見六度謂施戒忍進禪慧以此自度度人故修相好因相謂三十二相好謂八十種好修行六度成百福德用百福德成一相以為三十二相之因也妙海王子梵語文殊此云妙師利此云海王子者法王之子也然如來為大法王妙海最初請佛授菩薩戒入法正位故名王子也三教法流頌出周書異記周昭甲寅第四帝釋迦降生迦維衛穆王壬申五十三如來八十歸真際滅度一千八十年教流漢明永平世佛先四百二十二老子方生定王世佛先四百七十七孔子靈王時誕質是為三聖誕生時前後分明次第記
