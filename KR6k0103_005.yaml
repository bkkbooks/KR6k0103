body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述二四十八輕三初承前起後二正説戒相三總結持誦今初佛告諸菩薩言已説十波羅提木叉竟四十八輕今當説佛告下承前也木叉下起後也菩薩指三賢十聖等一切聽衆不言十波羅彝而言波羅提木叉者謂犯之則得極惡罪持之則得解脫果也輕者對重而言今當説者謂如來重復誡衆令一心聽也二正説戒相五初不敬等戒二國使等戒三瞋報等戒四不贖等戒五揀擇等戒初中二初列相十第一不敬師友戒二初作持止犯三初勸人受法若佛子欲受國王位時受轉輪王位時百官受位時應先受菩薩戒佛子義如上國王者謂統攝人民天下歸仰故轉輪王者謂德振四洲乘輪輔化故百官者謂上至三公下及州縣文武諸臣也應先受菩薩戒者此顯戒德威力也夫欲登尊貴之位必須先立其本本立則福興聖主良臣由此而出皆受戒之益也先勸王臣者謂佛法普攝從上至下理應然也不言僧尼者以受戒之法出家五衆是本分事所以意普而辭偏不須勸也又受法在前受位在後者謂國王有教化之力勸善之功所以先勸也金光明經云若國王受菩薩戒廣行十善法教化衆生者身心快樂永無三災遠離八難國界安寧人民樂暢所以先受菩薩慧戒後受王臣福位也故心地觀經偈云王今所受諸福樂往昔曾持三聚戒戒德薰修所招感人天妙果獲法身是也二受法得益一切鬼神救護王身百官之身諸佛歡喜一切鬼神者總指護法諸神也救護王身者謂不忘佛敕也然救護王身永保其位救護百官之身高進其爵繇王臣崇敬三寶而受佛戒則鬼神擁護而身安三災漸息雨風常調萬民受益所以道國王安則天下安國王福則天下福矣故心地觀經云若有人王成就正見如法化世名為天主以天善法化世間故諸天善神及四天王常來加護守王宮故雖處人間修行天業賞罰之心無偏黨故如是聖主名正法王又金光明經偈云由諸天護持亦得名天子三十三天主分力護人王衆星依位行日月無乖度和風常應節甘雨順時行一切諸天衆充滿於自宮是故汝人王忘身弘正法故云一切鬼神救護王身百官之身也然受持五戒尚有二十五神擁護況菩薩戒耶庶人受戒鬼神亦護況王官者耶諸佛歡喜者謂王臣信受戒法故歡鬼神遵教擁護故喜以受戒則福庇幽冥所以鬼神擁護又能弘護法化故諸佛歡喜是故凡欲固其位必先受其戒也三得法應行既得戒已生孝順心恭敬心見上座和尚阿闍黎大德同學同見同行者應起承迎禮拜問訊孝敬心者即具戒之體也謂依法行持曰孝無違佛制曰順尊貴讓善曰恭肅儀承事曰敬如上四心皆從意起故曰生孝順心恭敬心也既得者謂申明戒雖佛制受必由師故當孝敬也上座者謂上更無人故婆沙論云上座有三一生年上座戒臘在先故二福德上座衆所推敬故三法性上座證入聖位故此言戒臘上座也毗尼母論云受戒二十臘至四十九臘為上座瓶沙王稱佛弟子為上人謂在王臣士庶之上故也和尚此云力生謂繇師威力生我無漏妙戒身故阿闍黎此云軌範軌範即是師義謂能執持威儀而成範相教誡弟子持戒修行之法則故也大德者是尊稱之義謂能具大功德通上徹下故在佛而言則道成德備徹底窮源有廣大威德故在師僧而言謂嚴持戒行守護威儀有廣大行德故同學者謂宗同一師學大乘法故同見者謂心同一解見大乘理故同行者謂身同一業修大乘行故如上師者乃人天模範濟世舟航衆善由是而成萬行因茲而立故律云視和尚阿闍黎當如視佛不得違慢友者謂能品藻人物輔德助修一切悟機非友不發一切惡法非友不除師友將至即應起身承迎禮拜承謂承事迎是迎接禮者理也以恭敬謙遜進退有度為大理也拜者服也俗禮兩拜取法兩儀四拜取法四象也釋禮則三拜表三業致敬而歸依三寶得離三毒故也問訊者以言詢問也謂禮已當舒顏和色平視正念詢問云不審少病少惱起居安樂不地持經云道路清泰四大調適臥覺安不如是隨時應問事無一定斯皆尊崇戒法奉行孝敬之道也又應起意業敬承迎禮拜身業敬問訊起居口業敬如是三業虔誠孝敬之心盡矣二違教結罪而菩薩反生憍心慢心癡心瞋心不起承迎禮拜一一不如法供養以自賣身國城男女七寶百物而供給之若不爾者犯輕垢罪反生者明其不應也憍者亢己慢者忽人癡者當賢聖而不知瞋者宜親愛而反嫉然憍慢則不恭敬癡瞋則不孝順如此四心若內懷其一則相現於外不起承迎禮拜也供養者謂進修財行名供有所攝資名養又下薦於上名供卑資於尊名養一一不如法供養者皆非佛子之道也以自賣身者是教人尊法竭誠盡力之極也如常啼賣心肝而學般若等國城男女例此可知亦是舉重況輕也謂尚應如此供養況禮拜之儀而不為耶七寶者謂金銀琉璃硨磲瑪璃玻黎赤珠也百物者總指供身資具之大數也然身命內財國等外財疏而依報城邑親而正報男女貴至七寶賤至百物一切皆可賣之既為佛子當重法如此今人雖貧寧無少物亦未至賣身男女等由重財輕法故得罪也若不爾者謂若不如上恭敬供養罪結輕垢言輕垢者謂此罪雖輕於十重而能染污本源心地故名輕垢應作惡作罪懺不懺障菩薩戒懺時須咨知法者罪方除滅如比丘突吉羅罪懺悔法説以下一一戒中自須分辨不復委明此戒準義亦應有因緣法業等四種但以衆輕垢罪成與不成同名惡作亦具性遮二業繇傲不可長妨於進善故制四緣成罪一師友謂上座及同行等二師友想六句二重二輕二無犯三不敬心如菩薩優婆塞五戒經云若有所問不如實答者犯重垢罪若無慢瞋恚癡之意犯輕垢罪又戒本經云若憍慢瞋恨不起迎拜等是染污犯若懶惰懈怠無記散心或忘誤非染污犯四應迎不迎應供不供等事成隨結輕垢若以三聚攝歸孝順恭敬律儀戒承迎禮拜善法戒如法供養攝生戒也七衆同大小共惟遮不開以師友知識是得道大因緣是全梵行不敬則永失法利魔所攝持敬則常遇善緣成就佛法也不犯者若病若聽法説法若先共他語乃至護多人意及癡狂等第二飲酒戒二初作犯止持二初作犯若佛子故飲酒而酒生過失無量若自身手過酒器與人飲酒者五百世無手何況自飲故飲者揀非錯誤無知也酒生過失無量者謂酒乃衆禍之門其過不可勝數故言無量也如娑伽陀具降龍之力伏地無知優婆塞導攘雞之非而諸戒盡喪商紂威雄炮烙而牛飲滅宗寇準功著澶淵而漏言失事飲酒之失利害如此是以古人寧棄酒而不棄身者蓋謂此也律中更有三十六失皆從酒生也過酒器與人飲酒者有二義一云執酒器令相勸二云過空器令斟酌五百世無手者戒疏云飲酒之罪有五五百世受苦一五百世在鹹糟地獄二五百世在沸屎地獄三五百世在曲蛆地獄四五百世在蠅蚋地獄五五百世在癡熟無如蟲地獄今之五百世或在最後故繇與人癡藥故生癡熟蟲中報也過瓶杯酒器與人飲尚感如是報應況自飲者寧無重罪耶問飲酒者多無手者何鮮答不必盡是人中如蛇蚓鰍鱔之屬皆無手報故初鹹糟而最後五百名曰癡熟謂癡蠢酣熟頑然無知即無手之報也二止持亦不得教一切人飲及一切衆生飲酒況自飲酒一切酒不得飲一切人者謂在家出家男女老少他方異國人也一切衆生者謂非人異類及鬼畜等是也一切酒者謂酒有多種不同故總舉也不得飲者遮止之辭正是此戒之體謂前重戒制貨賣此戒制自飲也不自飲自利德不教人飲利他德二利兼行諸惡自止目連問經云一鬼問言我一生來頑癡無知何罪所致目連答言汝為人時以酒施人復強勸飲令其顛倒識性昏迷今受華報果在地獄正法念經云若以酒與會僧衆及受戒人寂靜人寂滅心人得禪定者以濁亂彼人故墮呌喚地獄如經所明豈不懼耶三違教結罪若故自飲教人飲者犯輕垢罪是中犯者若違佛制自作教他皆結輕垢律云若噉及糟能醉人者隨咽咽得罪此是遮業繇昏迷亂性故制四緣成罪一是酒謂飲之醉人二酒想六句二重二輕二無犯三有飲心四入口咽咽得罪若以三聚攝歸不自飲酒律儀戒離衆過失善法戒不教人飲攝生戒也七衆同大小制不犯者若病非酒莫療及癡狂等諸經集要云酒多過失開放逸門飲如葶藶犯罪已積若消疾苦非先所制此是如來大慈為病故開但不得未病先病貪飲忘律如昔波斯匿王夫人末利從佛受戒已遇王欲殺厨官夫人以酒宴王共相歡勸王喜夫人飲酒樂已忘殺其刑遂寢夫人詣佛懺悔佛言如是飲者獲大善利見機施權不犯戒也斯乃一時方便安可以常法拘之如無末利之心效行末利之事其罪難逭果能如齊僧曇顯醉中與黃冠角法使無量道士歸降佛法由此大興者則不生過也其或未然感報如律第三食肉戒二初作犯止持二初作犯若佛子故食肉一切肉不得食夫食肉者斷大慈悲佛性種子一切衆生見而捨去故食肉者明非錯誤也一切肉者謂不論水陸空行之物但是有情身分皆不可食也謂一切肉皆從斷命中來傷殺施為損害物命令他受死資給自身但畏己飢不觀死苦殺他活己於心忍乎斷大慈悲佛性種子者有其三義一傷慈二傷悲三傷佛性謂一切衆生皆有佛性與我同體豈可食噉其肉耶然菩薩以慈悲為本利濟為懷慈悲則拔苦與樂利濟則廣行饒益食肉則二行皆違何名佛子又大慈悲者無上菩提心是斷此心即是斷佛性種子種子既斷則將何以為成佛根本故云斷大慈悲佛性種子也一切衆生見而捨去者謂殺習未除猶生恐怖故如鷗去海翁機鴿搖羅漢影戰悚不息況噉其肉形色氣息見者聞者能無驚懾遠離耶楞伽經云獵師屠兒捕魚網鳥諸惡人等狗見驚吠獸見奔走空飛水陸一切衆生見之咸作是念此人氣息猶如羅剎今來至此必當殺我為護命故悉皆走避故云見而捨去也問經稱食肉之人入於山林虎狼師子皆來集會今云一切衆生見而捨去者何答捨去者驚其殺心而遠離來集者嗅其同氣而相求或去或來皆惡因緣也二止持是故一切菩薩不得食一切衆生肉食肉得無量罪是故者總結上文之意以慈悲則向否則去也一切菩薩者從初受戒人乃至未得地者其已登地菩薩自知持戒食肉之過也其小乘初開三種淨肉謂彼國土地多砂礫草菜不生如來運慈神力所化乃一時權現實非衆生身分後即隨斷安有食肉之人名為佛子耶故云一切菩薩不得食一切衆生肉也食肉得無量罪者謂罪業多種非一類也以邪見覆心貪其口腹念念積惡口口傷慈日久歲深罪業不可勝數故云得無量罪也然一切衆生雖改頭換面形貌有殊而貪生畏死之佛性無異也楞伽經明有無量因緣不應食肉謂衆生常為六親故不淨氣分所生長故衆生聞氣悉生恐怖故如旃陀羅狗見驚吠故慈心不生故呪術不成故諸天所棄故夜多惡夢故虎狼聞香故多諸疾病故楞嚴經云食肉之人縱得心開似三摩地皆大羅剎報終必墮生死苦海云何是人得出三界一鬼問目連言我一生來多有兒子皆端正可喜而皆早死念之斷絶痛不可言何罪所致目連答言汝為人時見兒殺生助喜噉肉殺故短命喜故痛毒今受華報果入地獄見作隨喜得報如是況自作乎問蠶害慘矣云何不制答文互見故煮繭斷命十重殺戒攝鑊湯繅車殺具戒攝例養六畜損害衆生戒攝為利資身邪命自活戒攝楞嚴亦禁絲綿絹帛是知僧號衲子士稱布衣無待論矣若夫王臣則惡衣服美黻冕自有古人成訓在二違教結罪若故食者犯輕垢罪是中犯者謂自貪滋味不念他身罪結輕垢問前十重戒中已戒殺生此復戒食者何也答恐人謂殺則犯戒買食則無妨故殊不知買食者無則殺者亦少矣但殺則犯重食則犯輕雖然罪相不等皆非解脫之道也故楞伽經云為利殺衆生以財網諸肉二俱是惡業死墮嘷呌獄輕重皆不可犯明矣四緣成罪一是肉謂有情身分二肉想六句二重二輕二無犯三有食心正是業主四入口咽咽結罪若以三聚攝歸不食肉律儀戒具佛性善法戒慈悲心攝生戒也七衆同大小不全共謂前小乘初聽三種淨肉謂不見殺不聞殺不疑為己殺一切悉聽又知水有蟲或疑有蟲不看不漉輒用輒飲大小俱制不犯者癡狂等楞嚴經云以人食羊羊死為人人死為羊乃至十生死死生生互來相噉惡業俱生窮未來際是知食肉三途罪報矣第四食五辛戒二初止持作犯若佛子不得食五辛大蒜茖蔥慈蔥蘭𦵇興渠是五辛一切食中不得食大蒜者即葫蔥也謂由從葫地持來故茖蔥者即薤菜也慈蔥者以其莖葉慈柔故蘭蔥者即小蒜也興渠者亦云興宜葉似蔓菁根如蘿蔔生熟皆臭出于闐國此土無故不翻是五辛等者謂申明一切食中不得食也而有四句一葷而非辛阿魏是也二辛而非葷薑芥是也三是葷是辛五辛是也四非葷非辛穀菜是也謂此五辛熟食發淫生啖增恚食中凡有皆不得啖故云一切食中不得食也楞嚴明有五失一生過二天遠三鬼近四福消五魔集西域記云家有食者驅令出郭楞伽開六謂身心臭穢無善名稱呪術不成諸天所棄口氣常臭障諸聖道大慧問言酒肉及與𦵇飲食為云何惟願為我説食不食罪福世尊答言一切肉與𦵇及諸韭蒜等種種放逸酒修行常遠離飲食生放逸放逸生邪覺從覺生貪欲貪令心迷醉迷醉長愛欲生死不解脫酒肉蔥薤蒜悉為障聖道及違聖表相是故不應食問飲酒昏神食肉害物罪過宜矣五辛於神不昏於物無害經開五失不已甚乎答雖不害物亦能昏神以穢濁之氣助發欲心辛烈之味增長恚性欲恚覆心頓忘明覺非昏而何故宜戒也二違教結罪若故食者犯輕垢罪持戒離染向清淨道凡是葷辛臭者皆不得食若故違者罪結輕垢此是遮業由臭穢之物妨於淨法故制四緣成罪一是辛二有辛想六句二重二輕二無犯三有食心四入口咽咽結罪若以三聚攝歸不食五辛律儀戒是辛不食善法戒自戒勸他攝生戒也七衆同大小制大乘防過義深較小略重不犯者若病非蒜等不愈須處僻靜別室食之不得入佛塔僧堂不得入僧浴室不得上都圊內俟斷食更七日後臭氣都盡沐浴浣衣香熏入衆廣如律明又不犯者或癡狂等佛頂經云食辛之人縱能宣説十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等舐其唇吻修三摩地不得清淨善神不護命終自為魔王眷屬受魔福盡墮無間獄第五不教悔罪戒二初作持止犯若佛子見一切衆生犯八戒五戒十戒毀禁七逆八難一切犯戒罪應教懺悔一切衆生者謂天龍八部人非人等但受佛大小乘戒者是也縱不受佛戒如有造惡行人作非法事者能方便誡諭令不為者以見菩薩心也八戒者有大小二乘大乘即地持經中八重謂殺盜淫妄毀惱瞋謗也小乘即八關齋法謂離殺盜淫妄飲酒華香瓔珞香油塗身高勝大床作倡伎樂及故往觀聽非時食也大智度論云我某甲受行八戒隨學諸佛法名為布薩願持是布薩福報生生不墮三惡八難我亦不求轉輪聖王梵釋天王世界之樂願諸煩惱盡逮薩婆若成就佛道問曰何以故六齋日受八戒修福德耶答曰是日惡鬼逐人欲奪人命疾病凶衰令人不吉是故劫初聖人教人持齋修善作福以避凶衰是時齋法不受八戒直以一日不食為齋後佛出世教語之言汝當一日一夜如諸佛持八戒過中不食是功德將人至涅槃若城邑聚落一切處有持齋受八開戒善人者惡鬼遠離住處安隱是故此六日持齋受戒得福增多不可稱計此亦名中間戒謂在五戒之上十戒之下也五戒者即八戒中前五事也在家惟禁邪非出家全斷十戒者即沙彌十戒及本經十重戒也其八戒惟局在家十戒但局出家五戒內外通攝毀禁者毀謂毀犯禁謂禁止謂如來所制戒法禁止不得違也七逆者如後文中釋八難者即犯戒果報一地獄二餓鬼三畜生四長壽天五北俱盧洲六盲聾瘖啞七世智辨聰八生在佛前佛後謂此八種皆為障道不得見佛聞法故名為難然此八事或由前生造罪故致斯難或今生所作未來當報故應教令悔過也如作殺盜淫妄等招地獄餓鬼畜生報修外道無想定招長壽天五百劫報不識三尊作世間福招北洲報心生邪見聞法不喜招盲聾報不信三寶毀謗衆僧招瘖啞報不信有出世法耽味世教招邪智辨聰報業重緣輕故生佛前佛後報也一切犯戒罪應教懺悔者一切總結之意毀破曰犯諸佛法律曰戒過咎曰罪理宜曰應誡勸曰教改往修來故曰懺悔謂總結如上若輕若重若性若遮之罪理宜誡勸向三寶前説所作事令改過遷善誓不再作故云一切犯戒罪應教懺悔也二違教結罪而菩薩不教懺悔同住同僧利養而共布薩同一衆住説戒而不舉其罪不教悔過者犯輕垢罪不教懺悔者二利之心全缺矣同住同僧利養者謂同一僧界中住共受檀越利養也而共布薩同一衆住説戒者謂同一界內衆僧半月半月共布薩誦戒也然説戒誦戒皆布薩義西域一大界內或有二住處同一説戒而別受利養今謂法食皆共故總言同也如説戒之時若有過者三根確實即當舉其所犯令彼懺悔以見戒和同修也不舉不教同僧利養虗受信施罪結輕垢由匿藏他罪染污自心故菩薩優婆塞五戒威儀經云菩薩為多人頭首見諸眷屬不如法事應訶應擯優婆塞戒經云寧受惡戒一日斷無量衆生命根終不畜養弊惡弟子不能調伏何以故是惡律儀殃齊自身不能教誨惡弟子乃令無量衆生作惡能謗無量妙法故此是遮業繇怙惡長過故制四緣成罪一有罪二有罪想三不教心正是業主戒本經云瞋心不舉是染污犯懶惰懈怠非染污犯四默然同住不教悔是一罪復同食同法各一罪隨事各結若以三聚攝歸應教懺悔律儀戒同共布薩善法戒悔過清淨攝生戒也此亦具性遮二業亦通七衆同犯亦有不同比丘應舉七衆罪比丘尼得舉六衆罪不得舉比丘罪若親里知識私相勸諫無罪式叉摩那得舉五衆罪不得舉比丘比丘尼罪沙彌得舉四衆罪不得舉上三衆罪沙彌尼得舉三衆罪不得舉上四衆罪在家二衆得舉自類罪不得舉出家五衆罪親厚知識私相勸誡皆悉無罪不犯者僧祇律云若彼人𠒋暴若依王力大臣力𠒋惡人力或起奪命因緣傷梵行者應作是念彼罪行業必自有報彼自應知喻如失火但自救身焉知餘事爾時但護根相應無罪又不犯者癡狂等大涅槃經云若善比丘見壞法者置不呵責驅遣舉處是人佛法中怨若能責遣當知得福無盡不可稱量菩薩善戒經云旃陀羅等及以屠兒雖行惡業不能破壞如來正法不必定墮三惡道中為師不能教訶弟子則破佛法必墮地獄第六不供給請法戒二初作持止犯又三初序來若佛子見大乘法師大乘同學同見同行來入僧坊舍宅城邑若百里千里來者先標大乘法師次標大乘同學見行三友以揀小乘師友也初戒但令敬重師友此中兼請説法故復制也法師者謂通達大乘經律性相乃至能化導衆生令入佛地者是也僧坊出家所止之處舍宅在家所止之處城邑王官所止之處百里千里師友所經之路無論遠近相見之儀理應如法不得怠慢也二禮供即起迎來送去禮拜供養日日三時供養日食三兩金百味飲食床座供事法師一切所須盡給與之即起者謂不容少怠也迎來賓主之儀不缺送去師友之念不忘禮拜則為法之心懇切供養則敬重之禮竭誠辰巳午三時明奉食之時不失日食三兩金顯盡力辦供無慳百味飲食者盡世甘美也床有繩木之分座有高低之別一切所須盡給與者謂如上所設供養猶恐師友未足今隨所欲盡情給與勿違其念故云一切所須盡給與之也身尚可捨況身外物乎三請法常請法師三時説法日日三時禮拜不生瞋心患惱之心為法滅身請法不懈常請者明非一日一時也三時者謂初日分中日分後日分此乃請益之時也不生瞋心者謂請法之中不嫌彼師規誡之瑣屑也不生患惱之心者謂供養之中承顏悅意全無吝惜也為法滅身請法不懈者上明外捨此明內捨也謂忘身為道則法有所得勇猛勤求則法有所增正見菩薩妙用也如佛因中捨全身以求半偈剜身然千燈而請説法施妻子與夜叉食欲聞法要乃至身為床座布髮掩泥此是如來求法之榜樣也修菩薩行亦應如是故普賢菩薩告善財言我此法海中無有一文一句非是捨施而求得者是也其常請是口誠樂法之情深禮拜是身誠為法之不懈不生瞋惱是意誠敬法之不慢如是三業虔誠盡善盡美矣蓋人有法則潤無法則枯得法則富貴失法則貧賤又云知覺法性剎那成聖愚迷法性永劫沉淪豈同世間小小方術微微利祿之精進耶譬喻經云阿難尊者過去世時曾為賣香童子見一沙彌行乞口誦經偈因問其故沙彌答言我師山中學道令我日輸米一升兼誦一偈故耳復問若不輸米日誦得幾偈答言可誦十偈童子曰今後勿復行乞吾代輸米沙彌歡喜得靜坐學問至代米九斛試沙彌經悉皆通利由此福報後生為佛弟子多聞第一具足三明及六神通傳佛心印是知供給持經沙彌尚感如是勝報況供養大乘師友能説法者所得勝報孰能思議耶今二心不生則求法精進矣二違教結罪若不爾者犯輕垢罪如資財吝惜慢法輕師罪結輕垢此是遮業繇喪資神之益故制四緣成罪一是法師二法師想若不知者非犯三不請心若瞋若惱是染污犯忘誤懈怠非染污犯四漠然空過隨事結罪若以三聚攝歸供給師友律儀戒不生瞋惱善法戒三時請法攝生戒也七衆同大小不全共小乘未滿五夏未諳律藏見有持律人來應請餘非所制大乘求法無厭一切應請不犯者若病若無力若知彼人作顛倒説若自多聞有力若先已受法及癡狂等圓覺經云末世衆生欲修行者應當盡命供養善友事善知識彼善知識欲來親近應斷憍慢若復遠離應斷瞋恨現逆順境猶如虗空了知自心畢竟平等與諸衆生同體無異如此修行方入圓覺又疏云夫善友度人種種方便師徒心契法意方傳是以俯物就機相親相近愚者無識憍慢便生慢既翳心即不入道第七懈怠不聽法戒二初作持止犯又二初舉處若佛子一切處有講法毗尼經律大宅舍中講法處一切處者通指僧坊俗地也講法者乃説法論義之總稱也依文析義曰講軌持一切曰法毗尼名滅而滅有三義一滅業非二滅煩惱三得滅果意指所詮經律二字意指能詮謂經詮法律詮毗尼毗尼翻律經訓常法以經律二種世問共有然世間經未必詮於正法世間律未必詮於毗尼惟佛經律能詮正法毗尼故名法毗尼經律亦名佛所教誡斯乃七衆同修大小齊奉非局在聲聞也又經是化教謂開誘化導故律是制教謂制約行業故論則解經律之意故不舉也又毗尼翻為善治謂善能自治淫怒癡亦能治衆生之過惡此從功能為名正翻為律律者法也此從教法為名謂斷割輕重開遮持犯非法不定故又毗言去尼言真謂去若干非而就真然真即本源心地也又經律並稱毗尼者經即梵網戒經律即心地法律及諸菩薩戒藏謂一切大乘經典皆有滅惡生善之義故亦同稱毗尼也又講法毗尼者即是講經律也如後文云新學菩薩應持經律卷至法師所聽受咨問者是也大宅舍中者別指王官之家請師講法處也二往聽是新學菩薩應持經律卷至法師所聽受咨問若山林樹下僧地妨中一切説法處悉至聽受前謂菩薩詣我我請説法此謂菩薩在彼我往聽法前是我為會首此則我為聽衆也新學者謂初受菩薩戒人也持經律卷是聽法之儀行儀既具當往彼也聽受咨問者聽是以耳識專聞受是以心識領納即聞思二慧也咨是啓問謂聞而深思思而未達復啓問所疑疑釋則依之修進悟入大乘心地法門也如不聽則無受潤因聽不咨問則無滋長因從聞入解學法具矣此恐新學菩薩學業未成不能重法自生怠慢失大法利日無勝進終退心地特此勉勵故當聽受咨問也山林等者正明僧寺伽藍一切説法處也若懈怠不聽便為放逸放逸則失正念失正念則多散亂多散亂則不正知不正知則生愚癡造諸惡業既為佛子必須上求下化為本因心廣學多聞為勝方便若非廣學多聞豈堪住持三寶是故凡有一切講法處悉應至彼聽受也二違教結罪若不至彼聽受者犯輕垢罪佛法大海轉入轉深安坐不進即違佛教罪結輕垢此是遮業繇怠慢廢失法利故制四緣成罪一是講法律二講法律想三不往心若瞋慢心是染污犯若懈怠非染污犯四不往聽日日結罪善生經中制四十里內須往此亦應爾若以三聚攝歸一切往聽律儀戒持經律卷善法戒聽受咨問攝生戒也七衆同大小略異如前戒説不犯者若不解若病若無力若彼顛倒説若護説者心若數數聞已受持已知義若多聞若如説行若修禪定不欲暫廢若鈍根難受持及癡狂等不往不犯楞嚴經云此方真教體清淨在音聞繇從聞思修戒身清淨方得入三摩地所以童子南詢百郡趙州行腳八旬乃至三登九上遍歷千山方得了明大事那有天生彌勒自然釋迦也第八背大向小戒二初作犯止持又二初背大若佛子心背大乘常住經律言非佛説意欲言而口未發故曰心背常住等者謂此大乘經律從舍那心地流出性本常住不生不滅不變不易諸佛所師菩薩之母住於世間教化衆生能令佛種不斷故云常住經律此是如來頓説一實之教非方便權小隨事漸制之法也言非佛説者非是不信佛語但因新學菩薩不解大乘經律奧妙則以大乘經律謂非佛説故心欲背而念未定口欲言而辭未播所以猶豫不決內自評論也二向小而受持二乘聲聞外道惡見一切禁戒邪見經律者受持者擬欲奉行也二乘即聲聞緣覺由聞如來四諦聲教證無生果故曰聲聞觀十二因緣法無師自悟是曰緣覺問既從如來聲教得道何名惡見答如來觀彼根劣未堪授與大法故暫示之以小教彼即厭苦斷集欣滅修道而證得人空偏理獨出三界無利人心遂失本源心地正體故云外道惡見也一切禁戒者如牛狗等戒也邪見經律者謂邪見自禁復有起諸妄計造立種種典籍誑惑他人故曰邪見經律亦因前章有一切講法處不往彼聽故申明其義恐新學菩薩墮入外道小乘處以邪為正故佛心其慈佛言其謹乎二違教結罪犯輕垢罪是中犯者若違佛制背向未決罪結輕垢若計已成則結重罪故緣不定此中制意誡大士不得背心地之正因失如來之極果而反學二乘斷見思惑證灰身滅智之涅槃永無利他之大用故佛訶之為惡見惡人非訶聲聞戒不可持也此具性遮二業計二乘惟遮業計外道兼性業以是邪見故也若以三聚攝歸心口不背律儀戒具正見心善法戒不向二乘攝生戒也七衆同大小不全共小是本習故非犯計外得責心罪發心欲往步步結應懺罪聞外道説法不入其心悔還尚許懺除共住若片語入心奉行其法乃至拔一髮等失比丘戒成重難現身不許復入僧數惟遮不開不犯者菩薩善戒經云教讀世典書頌文疏為破邪見故為知外道是虗妄佛法真實故為知世事不為世人所輕慢故及癡狂等地藏十論經云三乘皆應修學不應憍慠妄號大乘謗毀聲聞緣覺乘法我先惟為大乘法器堅修行者説如是言惟修大乘能得究竟是故今昔説不相違如經所説為䇿彼堅修行者恐其棄大習小復令一向習小法者趣向大乘非謂聲聞戒可輕可忽有慚愧者惟恐持之不逮菩薩戒本經云若作如是言菩薩不應聽聲聞經法不應受不應學菩薩何用聲聞法為是名為犯是以五天竺國凡出家者皆先學小然後習大俾知罪福因果則不撥有談空識其位次始無妄修謬證茲恐初學淺識無知不達如來祕密之意才聞此即捨彼取捨乖方妄符經旨悖佛言教自取纍於長劫若屑聲聞戒不受則不應剃髮染衣作沙門之相也如摩訶迦葉是佛聲聞弟子受持二百五十大戒復行十二頭陀行自至終身不捨如來以正法眼藏付之而不付彌勒文殊何也正以菩薩隨類利生化現無定聲聞是世間住持僧寶佛法二寶賴之弘揚為人天依仗故知戒德任重非輕若廢聲聞戒不持則僧寶失而佛法二寶亦失矣又復須知心大則戒大心小則戒小故涅槃經及十住婆沙論皆指篇聚云菩薩摩訶薩持是禁戒當知戒無大小繇受者心期惟除外道邪見則世間無有一法不是佛法故云盡大地無非是藥況如來金口親宣者故圓覺經云一切衆生皆證圓覺逢善知識依彼所作因地法行爾時修習便有頓漸若遇如來無上菩提正修行路根無大小皆成佛果第九不看病戒二初作持止犯又二初等觀若佛子見一切疾病人常應供養如佛無異八福田中看病福田第一福田一切等者兼親疏通道俗而言也急患曰疾疾甚曰病乃人愁苦之際佛道以慈為本見者即當念其苦楚竭力瞻視供給調治也如佛無異者申明供養義也謂佛以衆生身為身以衆生病為病故凡見諸病人當視如佛也聲聞律中佛告諸比丘若有欲供義我者當供養病人故云如佛無異也八福田者供之得益曰福生長福利曰田一佛田謂佛乃天中天聖中聖覺道具圓位登極果恭敬供養有大福德故名佛福田二聖人田菩薩緣覺聲聞也謂證悟真常無量功德恭敬供養生長福利故名聖人福田三僧田謂弘通佛法化利群生恭敬供養生長福利故名僧福田四和尚田謂三乘道果五分法身由師生故恭敬供養生長福利故名和尚福田五闍黎田謂軌範後學紏正修行恭敬供養生長福利故名闍黎福田六父田謂生成之德撫育之恩恭敬供養生長福利故名父福田七母田謂懷耽鞠育恩德難酬恭敬供養生長福利故名母福田八病田謂身嬰病苦度日如年慈心照看生長福利故名病福田前三種為敬田應起敬心中四種為恩田應起孝心後一種為悲田應起慈心三心之中慈心為最八福田中悲田福勝謂能救苦患之因自受安樂之果故看病者為第一福田也二舉近若父母師僧弟子病諸根不具百種病苦惱皆供養令差父母者生我之本師長者成我之本僧能荷負正法自利利他學在師後曰弟解從師生曰子師有匠成之功弟子具資稟之德律云弟子看和尚當如父想和尚看弟子當如子想應當共相瞻視便得正法久住增益廣大也諸根不具者六根殘缺病也百種病苦惱者謂吾人四大為身共有四百四病今乃略舉四之一也謂諸病苦惱亂心神不能安樂故云苦惱也供養令差者謂當隨力給與飲食衣服臥具醫藥若自無力應乞化供之不得半途而廢也經明多病短命者皆由前生殺業餘報未央然亦有別緣能招於病如佛弟子中多病無過舍利弗尊者佛謂其多生輕慢師長父母故感斯報是知父母師僧特宜尊敬供養有病之時盡心照看律云看病人有五種德一知病人可食不可食可食應與二不惡賤病人大小便洟吐三有慈愍心不為衣食四能經理湯藥乃至差若死五能為病人説法己身與善法增益故二違教結罪而菩薩以瞋恨心不看乃至僧坊城邑曠野山林道路中見病不救濟者犯輕垢罪瞋恨心者嫌嫉病人不生慈念故或父母師長平時督誨或弟子平時忤慢或病中煩瑣求等遂有瞋恨在心而不肯看也乃至者不論內外凡見一切處病人皆應住看或自供給或託他人是為佛子若無慈心見而捨去者罪結輕垢又云見諸衆生有親屬難財物難以嫌恨心不為開解是染污犯若懶惰懈怠非染污犯亦應此戒兼攝此是遮業由乖慈故制四緣成罪一有病二有病想三不看心瞋恨是染污犯懈怠非染污犯四應看不看隨事結罪若以三聚攝歸供給病人律儀戒供養令差善法戒見病救濟攝生戒也七衆同大小不全共小乘惟師友共房及僧尼須看此外不制大士弘誓兼物一切應看不犯者若自病若無力若教有力隨順病者若知彼人自有眷屬若自能經理及癡狂等第十畜殺衆生具戒二初作犯止持又二初舉事若佛子不得畜一切刀杖弓箭矛斧鬪戰之具及惡羅網殺生之器矛如鋋而有三廉刀杖等皆鬪戰之器傷人者也衛國以兵王臣不制餘者無用故不應也羅網皆漁獵之具傷物者也禽獸無罪橫加傷殺道俗貴賤皆不應也為佛弟子當行佛行應畜智慧刀勇猛杖大勢弓精進箭忍辱鎧定力斧及張大法羅網撈摝三界衆生出生死海至法彼岸如是應為餘不聽畜二引況而菩薩乃至殺父母尚不加報況殺一切衆生不得畜殺衆生具殺父之讐不共戴天而大士修出世行行平等慈視一切衆生猶己父母而無有異故不報復若畜殺具是殺生之漸違孝順心也安知今生殺吾父母者前生豈不曾為我父母耶今生被殺之父母又豈非前世曾殺我父母者耶又加其報則生生殺業不已冤讐無盡也為親報讐有可殺之道且不加報況殺一切衆生既不用殺畜此何為然我讐未報彼已先知若誣叛盜必令彼諸衆生生遠離我心大士之慈悲安在耶二違教結罪若故畜者犯輕垢罪菩薩興慈利物不惱衆生若故畜殺具即是行殺方便罪結輕垢若損物命隨事結重故緣不定此具性遮二業由傷慈故制若以三聚攝歸不畜殺具律儀戒怨親平等善法戒慈念衆生攝生戒也七衆同大小共鬪戰之具舊國王王子餘殺生器道俗皆制不犯者癡狂等二勸持如是十戒應當學敬心奉持下六度品中廣明如是等者總結勸前十戒而言應當用心修學恭敬奉持而無違犯也下六度等者譯師記證大本中下六度品廣明如上十戒今略之也後皆倣此二國使等戒二初列相十第十一國使戒二初止持作犯又二初舉事佛言佛子不得為利養惡心故通國使命軍陳合會興師相伐殺無量衆生菩薩損己利他慈念一切而反為利養起於惡心作兩國之通使受二君之命令為害不淺也以此達彼曰通國受囑傳送曰使命謂覘候盈虗私通消息也萬二千五百為軍排勢成列曰陳相對交接故曰軍陳合會也興者發起也五百為旅五旅為師征討曰伐兩國相爭殺戮甚衆故曰興師相伐殺無量衆生也又凡行軍多則謂之軍次則謂之師少則謂之旅無論軍多軍少為利作使皆不宜往為佛弟子當作佛使傳佛心印興智慧師殺煩惱賊降伏魔軍而歸覺道方見菩薩心行豈可通國使殺衆生利歸於己害及他人而名大士耶若夫説聽兩國罷兵息爭安恤衆正大士之權宜生多功德也二引況而菩薩尚不得入軍中往來況故作國賊不得往來者謂軍中無暇論道惟議攻伐殺法大士聞之何忍喧閙羶穢佛子履之奚安且又多生疑忌故非所行之處往來尚禁何況為使耶賊者害也謂圖名竊利使彼相殘而必害於民民為國本害民即是害國大士之心豈可忍乎是故佛言名譽及利養愚人所愛樂能壞衆善法如劍斬人頭所以如來預誡也二違教結罪若故作者犯輕垢罪是中犯者趣勢行道不若株守自持執鞭求富何如沿門托鉢若欲為國使必有相害因緣隨語隨事罪結輕垢若瞋怒因緣自屬殺戒若奪寶物自屬盜戒故緣不定此具性遮二業繇為利相殘故制若以三聚攝歸不通國使律儀戒不貪利養善法戒不起惡心攝生戒也七衆同大小俱制不犯者軍中求法來請如隱峰飛錫止兵圖澄占鈴息難及癡狂等第十二販賣戒三初作犯止持若佛子故販賣良人奴婢六畜古易棺材板木盛死之具賤買貴賣曰販良人者好人家子女也六畜者謂牛馬豬羊雞犬也為人畜養故名曰畜順世俗言則曰六畜元總該一切禽獸也市易者市井中貿易也棺材已成板木未成皆盛死之具也販人則有生離遠別之苦惱復受下賤驅役打罵之楚痛販畜則有湯火生剝殺害之慘毒販棺雖無害人之生命而開張市易則必利人之死所以禁之也二止持作犯尚不應自作況教人作自作一人也利少故輕教他多人也或教他代我作或教他自作利多故重設利不歸己亦傷心害理較自作亦重故舉況也三違教結罪若故自作教人作者犯輕垢罪自作乖乎一己教他損及他人由貪財害物並是不仁之心深傷法門於菩薩慈悲之道有大乖損故結輕垢若偷度生口若賣畜生令殺呪令人死欲得棺木出售此則別犯殺盜二罪若非殺害因緣但結輕垢此亦具性遮二業繇希利損物乖慈故制若以三聚攝歸不行販賣律儀戒不貪世利善法戒不教人作攝生戒也七衆不全同在家畜養耕牛等非犯準善生經先須作淨施然後受戒否則得失意罪大小俱制不犯者若有力救濟等然貿易乃世俗之常在家當不禁也若以棺材板木施與貧人獲福無量繇慈濟他心無希望故也薩婆多論云寧作屠兒不為販賣何以故屠兒正害畜生販賣一切欺害不問道俗賢愚持戒毀戒無往不欺又常懷惡心設若販穀心恆希望使世荒餓設若販鹽及貯積物意常企望四遠反亂王路塞隔販賣有如是惡心雖不制俗必無希望欺偽公心不犯律攝云不依實説或偽濫斗稱欺誑於他得妄語罪獲物之時犯盜第十三謗毀戒三初作犯止持若佛子以惡心故無事謗他良人善人法師師僧國王貴人言犯七逆十重惡心者顯非善心有益前人本為起貪瞋欲壞彼人名德利養故也無事者正謂前人本無犯戒之實事亦無見聞疑之三根而妄生誹謗也清廉之士曰良慈孝之人曰善宣揚如來三藏聖教開誘衆生入佛知見故曰法師又師者和尚闍黎也僧者同學等侶也國王者萬民之主貴人者三公百官逆則七事不順於理重則諸惡無過於戒也如上聖主賢臣良師善友不惟人世欽仰抑且佛法金湯應當恭敬供養豈得以惡心毀謗使彼良者不良善者不善聖者非聖賢者非賢法師失其名師僧喪於德由此陷沒遺臭世間然白璧青蠅亦可畏也誰謂鼠無牙哉準義亦具因緣法業四種惡心是謗因人師是謗緣逆重是謗法不如意處是謗業也二作持止犯於父母兄弟六親中應生孝順心慈悲心六親有二義一是自己父母伯叔兄弟之六親二大士常念一切衆生如己六親想法師國王有父母義良人善人有六親義大士常當於父母分中生孝順心於六親分中生慈悲心以孝順心故無逆謗之事以慈悲心故無令墮不如意處之惱害二心若生現生自成善果當來受用無窮也三違教結罪而反更加於逆害墮不如意處者犯輕垢罪而反更加於逆害者謂逆則不孝害則不慈故造作非法也墮不如意處者謂惡旁而逆於上誹毀而害於下令彼心生羞耻晝夜不安甚至自害或陷沒其人之名利令彼事不稱心時懷懊惱故云墮不如意處也已上皆是曾受佛戒之人若向受戒法中謗則犯輕垢若向未受大戒人謗不問有根無根同説四衆過戒犯重經云天下善友莫過師長若能終身行道止可自利非報師恩何況更加逆害父母雖復生育訓誨而不能使離三途師長誘進離生死苦得涅槃樂師或教誨不肯信受乃至惡言起於誹謗橫生是非使佛法衰落如是等人法中大魔地獄種子善恭敬經云佛言若於師所不起恭敬説於師僧長短之者彼愚癡人應如法治師實有過尚不得説況當無也前自讚毀他及謗三寶戒中由其毀他兼自讚故犯重罪今單毀他故犯輕垢又前兼謗佛法故犯重罪今止謗僧故犯輕垢也然罪雖輕感報實重謗一比丘尚得苦報況謗恩人德人耶此具性遮二業繇傷慈故制六緣成罪一無罪二無罪想六句四犯二非犯三謗毀心正是業主四所説過七逆十重等五所向人若向同法人前説莫問境高下有戒無戒陷沒人者同犯輕垢若向異法人説自屬重戒六前人領解隨語語結罪若以三聚攝歸不起惡心律儀戒生孝慈心善法戒不毀一切攝生戒也七衆同大小共惟遮不開不犯者癡狂等神變經云佛告文殊師利設若有人於恆河沙等諸佛塔廟悉皆焚毀若於信解大乘菩薩起瞋恚心加諸罵辱或增誹謗是罪過前焚毀諸佛塔廟無量阿僧祇數故經云守口如瓶防意如城報恩經云人生世間禍從口生甚於猛火猛火惟燒一世惡口能燒無數世猛火但燒世間財惡口能燒七聖財是故一切衆生常當護口口中之舌鑿身之斧滅身之禍是以古人謂唇如弓心如弦聲如箭長夜虗發何能傷人惟自加塗炭永嘉云從他謗任他非把火燒天徒自疲我聞恰似飲甘露銷鎔頓入不思議第十四放火焚燒戒三初作犯止持若佛子以惡心故放大火燒山林曠野四月乃至九月放火若燒他人家屋宅城邑僧坊田木及鬼神官物惡心者是不善心也謂瞋嫉他人及與山林禽獸故放火焚燒也林木生草是鬼神禽獸所住曠野無人所到處然本意燒山恐火延至遠處誤及諸物雖無害心而物必被傷所謂城門失火殃及池魚者也四月乃至九月放火者謂蜫蟲鳥獸生草多故此時道俗同制問此中禁四月至九月則十月至三月不制明矣而十月未必無蟲二月正當起蟄此亦可燒焉得無損答此謂寒苦之地而言也若東南溫暖恐非所宜屋宅等處物者而有七種一士民屋宅二王官城邑三僧家坊院四禽獸田林五鬼神舍六官家生物七有生生物如上七種皆須防護前但戒山野此兼城邑僧俗冥陽公私之物也二止持作犯一切有生物不得故燒一切有生物者如墻壁籬柵生地腐薪俱有蟲蟻依止也前是依報此是正報蓋天地以資生為仁菩薩以防護為德放火不惟損燒財物亦無故波及蜫蟲傷慈之甚是以制之三違教結罪若故燒者犯輕垢罪是中犯者如不依佛教恣情任意而故作者罪結輕垢若為損他物故燒自屬盜戒中攝若為殺故燒自屬殺戒中攝此是遮業繇傷損有識故制四緣成罪一非時二非時想三不慎心四正放火若以三聚攝歸不放火律儀戒無惡心善法戒物不傷攝生戒也七衆同大小共不犯者在家為耕種等業出家為除妨害等事慎燒無犯或燒穢物風吹誤及一切無有傷害心及癡狂等楞嚴經云清淨比丘及諸菩薩於岐路行不踏生草況復焚燒傷害生命過去劫時有一樵夫見火焚山救之令滅後身感報為梵天王壽命住過一劫救火尚得如是勝報其焚燒者罪當如何第十五僻教戒三初作持止犯二初舉人若佛子自佛弟子及外道惡人六親一切善知識自者從也及者至也謂從內至外故佛弟子是內衆由學佛內教故外道是外衆以學習外教故謂不順佛理心遊道外故名外道惡人邪見人也謂以不善法撥無因果之教教人致令衆生入斷常坑失如來種永無出期故名惡人故經云衆生無邪因師故邪是故因惡師而誤墮三惡道也六親兼於內外由彼有學內教有習外教故也而有三種一己六親謂父母兄弟姊妹也二父六親謂伯叔兄弟子孫也三母六親謂姑姨兄弟子孫也善知識是熟識良朋非法門師範也二教法應一一教受持大乘經律教解義理使發菩提心十發趣心十長養心十金剛心於三十心中一一解其次第法用應一一教者謂指上內外等衆當次第而教彼受法也先教讀誦大乘經律次教解義發心然後教入果位之法用如是授受工夫方不錯用也大乘者有四義一大乘教法經律教也二大乘理法理性真諦也法界一如故義相俗諦也凡聖萬別故三大乘行法菩提心行也上求諸佛菩提自覺智也下化衆生成道覺他悲也四大乘果法三賢因果入向出證也十聖因果初斷後脫也教解義理者謂既教受持讀誦大乘經律已先令了知義理然後使彼發菩提心由解義理方堪發心如不受持焉知大乘之義味妙理不達義理而所發心非正不發菩提大心而所解者虗解行解相應方有證悟又解義不發心增長狂慧發心不解義增長無明謂解義發心不可偏廢也又不解義理則所發者邪心不發大心則所知者空解故須兼也然義理既解從菩提心中趣十發趣心起行修行入十長養心回向十金剛心於三十心中一一解其次第法用者先修十信心於信決定於理無違次修十住真解信解成就於摩訶衍堪任不退次修十種妙行回向中道以信解行三賢位滿萬行周圓即登十地證佛菩提故名次第法用也然此三十心是入聖位之始行故須一一講明令知次第進修功用方能履踐三賢之果位也二止持作犯而菩薩以惡心瞋心橫教二乘聲聞經律外道邪見論等惡心者謂自立不善之念欲令人入於偏邪故也瞋心者或因其人有所觸惱而生瞋怒故教之令入於偏邪也橫教者言非正真謂枉其根性不稱機宜應教而不教不應教而教彼欲學大而反教之以小應當教正而反教之以邪故名橫也繇瞋惡心故不以正理開導而橫教與二乘經律外道妄計邪見等論誠所謂良材匪匠美器惡用也疑誤學人斷佛慧命三違教結罪犯輕垢罪是中犯者菩薩學大乘心地法門而不以自所受法教人而反以外道邪因二乘自利法教者實非菩薩心行罪結輕垢此是遮業繇使人失正道故制若教以外道是性遮教以二乘惟是遮業惡心瞋心是染污犯無知根智非染污犯若以三聚攝歸教受大乘律儀戒正解義理善法戒教發大心攝生戒也金剛菩提心論云行人知一切有情皆含如來藏性皆堪任安住無上菩提是故不與二乘之法而令得度聲聞執四諦法緣覺執十二因緣知四大五陰畢竟磨滅深起厭離破衆生執勤修本法尅證其果趣本涅槃已為究竟然二乘之人雖破人執猶有法執但靜意識不知其他久久成果以灰身滅智趣其涅槃如太虗空湛然常寂有定性者難可發生要待劫限等滿方可發生不定性者無論劫限遇緣便回心向大從化城起為以超三界謂宿信佛故乃蒙諸佛菩薩而以方便遂發大心從初十信遍歷諸位經三無數劫難行苦行乃得成佛既知聲聞緣覺智慧狹劣亦不可樂又諸外道等戀其身命或助藥物得仙宮住壽或復生天以為究竟行人應觀彼等業力若盡未離三界煩惱尚存宿殃未殄惡念旋起當彼之時沉淪苦海難可出離當知外道之法亦同幻夢陽𦦨也是故非惡心亦不應教以偏邪也七衆同大小不全共同者同不得教以外道異者小衆本習小法非犯不犯者用隨情説逗彼機宜乃至示同外道等又不犯者先以善心就其所好所欲權誘入小後令向大或以外教令入內教等所謂先以欲鉤牽後令入佛智也故華嚴五地菩薩學百工技藝而誘入佛道斯皆大士善權利物以四攝法而攝受衆生非惡瞋心橫教之也瓔珞經云菩薩亦以善權方便之力入諸外道異學之中隨彼法則順從祠祀觀其志趣使得度脫令諸外道興福無量若反生樂著即屬背大向小戒也音釋二十五護戒神灌頂經云持五戒者有二十五善神衛護其身在人左右守於宮宅門戶之上使萬事吉祥也一茶芻毗愈陀尼二輸多利輸陀尼三毗樓遮那世波四阿陀龍摩抵五婆羅桓尼和婆此五神護不殺戒六抵摩阿毗婆馱七阿修輸婆羅陀八婆羅摩亶雄雌九婆羅門地哆十那摩呼哆耶舍此五神護不盜戒十一佛馱仙陀樓哆十二暗耶藪多婆十三涅泥醯馱多耶十四阿羅多賴都耶十五波羅那佛曇此五神護不邪淫戒十六阿提梵者珊耶十七因臺羅因臺羅十八阿伽風陀婆多十九佛曇彌摩多哆二十多賴叉三密陀此五神護不妄語戒二十一阿摩羅斯兜嘻二十二那羅門闍兜帝二十三尼乾那波二十四茶鬪毗舍羅二十五伽摩毗那闍尼佉此五神護不飲酒戒常啼賣心肝而學般若薩陀波崘梁言常啼因求法故即以成名在大雷音佛所行菩薩道為求般若不惜身命空中有佛語言曇無竭菩薩於此座上説般若啼言我貧無供今當賣身天帝化人語言我欲祠天須人心人血人髓汝能與不答言我得大利即剜心取血破骨出髓長者女見即問何故答賣與婆羅門供養法師女曰若有所須我當相與我亦欲往天復本形讚言善哉為求般若勤苦如是比丘三義一破惡義如初得戒即名比丘以一白三羯磨竟發善律儀破惡律儀故二怖魔義既能破惡魔羅念言此人非但出我界域或有傳燈化我眷屬空我宮殿故生驚怖三乞士羲乞是乞求之名士乃清雅之稱謂外乞食以資形命內乞法以養慧命故伏地無知尊者娑伽陀為佛作供義人至支陀國求宿梵志云此間有毒龍恐傷者云但許無妨時夜毒龍奮威欲害尊者以神力而置鉢中明旦拘晱彌王見之歎未曾有請至本國問言欲何所須者云衣鉢六物易得王當施難得者王言難得者何答云黑酒王遂即與之飲而飽醉行至中路倒地而吐烏鳥爭鳴世尊見已語阿難言此時小蛇亦不能伏矣諸戒盡喪婆沙論云昔有近事受持五戒從遠而歸合家赴會近事為渴所逼有酒如水取而飲之鄰雞入舍攘而殺之鄰女尋雞又言不見強逼交通為一飲故而五戒盡喪矣牛飲滅宗商王紂作酒池一鼓而牛飲者三千人懸肉為林男女相逐於其間終至亡國漏言失事宋寇萊公準當真宗疾甚事決于后準以為憂一日請問曰皇太子人所屬望願陛下思宗廟之重傳以神器擇方正大臣羽翼之丁謂錢惟演乃人也不可以輔少主帝然之準蜜令楊億草表請太子監國且欲億輔政已而準被酒漏言謂聞之竟以是罷棄酒不棄身齊桓公飲管仲以酒仲半棄公曰棄酒可乎仲曰臣聞飲酒者言失言失者身棄臣寧棄酒不棄身也三十六失一不孝父母二輕慢師長三不信三寶四不敬經法五誹謗沙門六訐露人短七常説妄語八誣人惡事九傳言兩舌十惡口傷人十一生病之根十二鬪諍之本十三惡名流布十四人所譏嫌十五貶斥聖賢十六怨黷天地十七廢忘事業十八破散家財十九恆無慚愧二十不知羞耻草一捶打奴婢草二橫殺衆生草三姦淫他婦草四偷人財物草五疏遠善人草六狎近惡友草七常懷恚怒草八日夜憂愁草九牽東引西三十持南著北三一倒街臥巷三二墮車墜馬三三逢河落水三四持燈失火三五暑月熱亡三六寒冬凍死鷗去海翁機列子云海上之人好鷗者每旦之海上從鷗鳥遊鷗之至者百數不止其父曰吾聞鷗鳥皆從汝遊取來吾玩之明日之海上鷗鳥舞而不下鴿搖羅漢影昔有鴿為鷹所逐避於舍利弗之影猶戰栗不已遷於佛影方乃釋然由羅漢尚有殺之習氣未能如佛大慈悲也魔集楞嚴經云食五辛者大力魔王現作佛身來為説法誹毀禁戒讚淫怒癡命終為魔眷屬布髮掩泥大論云二阿僧祇是時菩薩以七枝青蓮華供養然燈佛敷鹿皮衣布髮掩泥然燈佛便授其記汝於來世當得作佛號釋迦牟尼捨身求偈過去世如來為菩薩時在雪山修道天帝欲試之化為羅剎口説半偈云諸行無常是生滅法菩薩求説後半偈羅剎云我腹飢餓不暇為説菩薩曰欲得何食答云欲食生人血肉菩薩曰願為我説捨身供養菩薩即敷座請説羅剎云生滅滅已寂滅為樂菩薩遂以偈遍書於山石樹木之間即登樹投身而下羅剎即以手接之時天帝釋還復本形讚歎禮足而去涅槃經云佛言為半偈捨身因緣超十二劫在彌勒前成無上道剜身然燈世尊過去無數劫時作大國王為聞法故剜身然千燈供養勞度差婆羅門彼乃為説偈曰常者皆盡高者必墮合會有離生者有死王聞心大歡喜而立誓言我今求法為成佛道當以智慧光明照悟衆生作是誓已天地大動施妻子與夜叉食如來往昔無數劫時作閻浮提大國王名修樓婆為衆生求法故捨可愛妻子與夜叉鬼鬼盡取食之為説一偈曰一切行無常生者皆有苦五陰空無相無有我我所師長為人之長訓物之規名為師長或云師父父者矩也謂以規矩法則教誡弟子故也南詢百郡華嚴經善財童子展轉南行求善知識經一百一十城今但舉大數也遍歷千山唐大隨法真禪師有僧問劫火洞然這個壞也不壞答云壞僧云恁麼則隨他去也答云隨他去其僧疑之尋師參叩遍歷山川至於萬里古所謂一句隨他語千山走衲僧者是也行腳八旬古云趙州八十猶行腳只為心頭未悄然是也三登九上雪峰存禪師為大事未明三登投子九上洞山占鈴息難東晉佛圖澄占殿閣鈴聲能知鈴語吉凶趙王石勒奉事如神明勒好殺賴師保全甚衆飛錫止兵鄧隱峰禪師詣五臺路淮西屬吳元濟阻兵拒命官軍與賊交鋒未決勝負師乃擲錫空中飛身而過兩軍將士仰視空中鬪心頓息三公大師大傅大保曰三謂忠正無私有功於國名為公也四攝法一布施攝謂大士以財法二種攝化衆生令彼生親愛心依附受道也二愛語攝謂大士以善言慰喻衆生令彼樂聞善言生親愛心依附受道也三利行攝謂大士以身口意善行利益衆生令彼生親愛心依附受道也四同事攝謂大士觀衆生根性隨其所樂即分形示現同其所作令彼利益因生親愛心依附受道也見聞疑三根見謂實見彼犯戒聞謂聞彼犯戒或從他邊聞疑有二種或從見生疑或從聞生疑若有此三是為有根若無此三是為無根僧曇顯一名佛俊不知何許人遊無定方飲噉同俗時有放言標悟宏遠時齊高祖文帝天保六年九月下敕召諸沙門與道士陸修靜學徒者十人親目對較時道士呪諸沙門衣鉢或飛或轉呪諸梁木或橫或豎沙門曾不學術默無所對士女歡閙貴賤移心皆以靜徒為勝諸道士等踴躍騰倚高談自矜誇衒道術仍唱曰神通權設抑挫強禦沙門現一我當現二沙門現二我當現四今薄示小術並辭退屈事亦可見帝命上統法師與道士角試上曰方術小伎俗儒耻之況出家人也雖然天命難拒豈得無言可令最下座僧對之有司尋覓于時名僧盛集曇顯居于末座酣酒大醉昂兀而坐有司不敢召之以事告於上統上曰道士祭酒祇可與飲酒道人共言耳可扶輦將來合衆皆憚而怯上統威權不敢有諫乃兩人扶顯令上高座顯便立而含笑曰我飲酒大醉耳中聞云沙門現一我當現二此言虗實道士言是實顯即翹一足而立云我已現一卿可現二道士各無對之顯曰向聞呪諸衣梁飛揚即命取稠禪師衣鉢呪之諸道士一時奮發共呪一無動搖帝命取衣乃至十人牽舉不動顯令以衣置於梁木又令呪之都無一驗相顧失色猶強言曰佛家自號為內內則小也説吾道家為外外則大也顯應聲曰然則天子處內定小於百官耶靜等道衆緘口無言帝目驗臧否便下詔曰法門不二真宗在一求之正路寂泊為本祭酒道者世中假妄俗人未悟寧有只崇麴為味清虗焉在瞿脯斯甜慈悲永隔上異仁祠下乖祭典皆宜禁絶不復遵事頒敕遠近咸使知聞其道士歸伏者並付照玄大統上法師度令出家其未發心者可令染剃爾日斬首者非一自謂神仙者可上三爵臺令其投身飛逝諸道士等皆碎尸塗地偽妄斯絶致使齊境國無爾信矣道士舊自號為鬼卒道又改號祭酒道後竊佛經沙門名道士故改為道士
