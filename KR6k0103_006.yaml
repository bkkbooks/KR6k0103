body:
  text: 清古杭昭慶萬壽戒壇傳律沙門書玉述第十六為利倒說戒三初作持止犯二初先應自學若佛子應好心先學大乘威儀經律廣開解義味好心者廼自利利他之大心非為利名之惡念也然欲利他先應自利故須先學也如未學佛法先懷利養者便非好心也威儀者利他之軌範楞嚴云能於國土成就威儀是也經律者修進之要道繇學經律故得內正身心外具威儀儀端表正故云淨行成於道儀清白圓於戒品堂堂僧相眾德威嚴而令人可畏動靜合則顒顒可觀而令人可敬斯乃出家之道似人天之師範內懷師子之德外現象王之威遂感天龍恭敬神鬼欽崇以見自利利他之大德也廣開解義味者顯非淺近麤疎之學而已直欲致廣大而盡精微也開是通達無礙解是契悟無疑義是經律事理味是其中奧妙經律威儀准能詮文字習教行於身也廣解義味據所詮圓妙明理證於心也以契悟經律之宗趣通達義理之深味然後利他方能感益不然則自誤誤人矣二為後來說三初明見新學見後新學菩薩有從百里千里來求大乘經律前謂先立其本次則當展其用也新學菩薩是初入道門之人謂不知其大乘經律修進之法故當參請也百里千里來者以見求法之心真其為大乘律師應當觀機逗教遴選道器然後施法也二為示苦行應如法為說一切苦行若燒身燒臂燒指若不燒身臂指供養諸佛非出家菩薩乃至餓虎狼師子一切餓鬼悉應捨身肉手足而供養之如法為說者謂當如大乘經律之法而說也此先明無我之法若計我著相者則不能信受也燒身臂指者以明法不易求故如藥王之焚身二祖之斷臂正見與諸眾生同一悲仰而上求佛道之心致極也若不如是供養諸佛即非大乘根器以身相未空人我宛然豈是菩薩解脫道行也不但燒身臂指等供養諸佛所應力為廼至餓虎狼師子一切餓鬼悉應捨此身肉手足而供養之正明與諸佛如來同一慈力而下化眾生之心致極也以此勘驗求法者心切與不切若能依法教受乃可說也葢一切眾生從無始以來由身口意業造十惡五逆等罪今欲入大乘法門先當教令懺悔先罪然罪既從三業而生今還將三業而懺故使燒身臂指以滅其罪罪滅則障消聞法遂得心開意解非是佛受此供使眾生生大苦痛也況懺罪心未必如作罪心猛若能燒身臂指則罪滅無餘復繇眾生世世慳貪生死不能解脫今令捨身以給鬼獸損己利物正大士之本懷如摩訶薩埵王子以身飼餓虎至成正覺故經云盡大地無鍼許不是釋迦如來捨身命處況此五蘊身心本自空寂無我我所眾生不了妄執為我今欲使達蘊空捨之如棄弊屣是故先為說諸苦行以廓其心堅其志固其願悟蘊空離我執以修初度檀波羅蜜上供諸佛下施羣生成就悲敬二田則入道有門矣三說法開解然後一一次第為說正法使心開意解一一者隨問隨說也上下不倒故曰次第大乘經律故曰正法使心開則見本源心地教意解則知義味無窮如是心開意解則登位證果無難是為順正理說不顛倒也二作犯止持而菩薩為利養故為名聞故應答不答倒說經律文字無前無後謗三寶說者應答不答者為利養故別為一答是悋說隱沒也倒說等者不次第說也謂擅以經律改易前後是倒說隱沒也不說苦行而教大乘名曰無前說苦行而不教大乘名曰無後謗三寶說者謂逆佛本懷背法本義違一切聖賢本宗而答皆是謗義故曰謗三寶而說也所謂說法不當機是法亦非法三違教結罪犯輕垢罪是中犯者為利惜法非訓授之方失師範之道罪結輕垢問謗三寶說云何不入重戒答十重專言謗者是撥無三寶故重此則妄論名為謗說非撥無也故結輕垢此是遮業繇乖訓授之道故制前戒隱大示小今戒雖為說大而希利靳固隱沒義味不令顯示故犯聲聞教訓他人隱沒義味亦犯不先學是一過不正說又一過也為利是染污犯無知機智非染污犯若以三聚攝歸先學大乘律儀戒為說苦行善法戒使心開解攝生戒也七眾同大小制不犯者知機故不說或為斷邪命而呵苦行破愚執而談理行及癡狂等楞嚴經云能於如來形像前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢常揖世間永脫諸漏第十七恃勢乞求戒二初作犯止持又二初為利親附若佛子自為飲食錢財利養名譽故親近國王王子大臣百官言自為顯非為眾為飲食等明非為道名譽者謂仗其聲名讚譽以便取利也親則指為眷屬近則朝夕不遠王臣官長皆是有力大人也然菩薩為眾雖忘身而亦不得恃勢為道雖妄利而亦不得邀名如是行持方見不失大士之體也二非理告乞恃作形勢乞索打拍牽挽橫取錢財恃作形勢者非理強求也謂假彼有力之勢以形無力之人所須財帛方得容易也乞是乞求索是索取打拍是現威壓取牽挽是苦逼他物如是不順正理而取財物故曰橫也二違教結罪一切求利名為惡求多求教他人求都無慈憫心無孝順心犯輕垢罪一切求利者總標取法也謂如前恃勢若不如意便行非法或打拍其人或牽東拽西或以手挽住而索取物如是一切求利是不善法故曰惡求貪取無厭違知足行故曰多求教人求者或教他人恃勢而為己乞或教他人恃勢而自索取或假書敕或聲傳豪力等皆非大士所為也無慈憫心者打拍牽挽也無孝順心者不依佛教也然有慈憫心則常思惠濟慮彼貧窮有孝順心則供養眾生如己父母自不橫取也佛子隨緣而受知足修行是其正命豈得假托王臣恃勢勒化為利忘道罪結輕垢此具性遮二業繇惱害眾生故制乃盜戒之等流也或將本求利或薦書強化皆屬此戒若非分陵奪自屬盜戒戒本經云多欲不知足貪著於財物是染污犯若以三聚攝歸不恃形勢律儀戒具慈孝心善法戒不求世利攝生戒也七眾同大小制不犯者為三寶為病人為眾生如法營求及癡狂等第十八無解作師戒三初作持止犯二初作持若佛子應學十二部經誦戒日日六時持菩薩戒解其義理佛性之性應學十二部經誦戒者凡為師範先當博學三藏聖教明了十二部經熟誦菩薩戒律依律行持解其義理深契本源中道佛性之性無令人誤墮聲聞偏空之性及外道斷常妄計之性方可利他不然則布薩羯磨咸無成濟之功也十二部經者本經上卷云知三世一切佛法門十二法品名味句謂名詮自性句詮差別味即文體為名句之所依也十二法品者一重頌即應頌謂應長行而重說偈也二記莂即授記謂聖言說與名授果與心期名記三直語即長行文義四偈即孤起頌亦名伽陀謂非頌長行之文略云偈也五不請說即無問而自說也六戒律即因緣謂因止作緣方制戒也七譬喻謂鈍根者要以事喻而得解法也八佛界即本生謂說佛本昔受生事也九昔事即本事謂說諸菩薩弟子昔所修行之事業也十方正即方廣謂稱理廣談剎海也十一未曾有謂佛現種種神力說法眾生快未曾有也十二談說即論義謂廣論諸經中之義理也是為大乘所說十二部經此十二部經三乘同學大小共持故律制比丘解通三藏滿足十臘方許為師總不能通經論二藏而律藏必須明了誦戒即布薩也日日六時持菩薩戒者恐持戒之人誦未通利少有怠惰失菩提心故須晝夜六時精勤熟習既得通利尤當深窮理趣持犯開遮以便修行菩薩行也然縱已通利日誦非過如窺基法師日誦戒經及上生經各一遍天龍八部聞之誠為感益也解其義理佛性之性者涅槃經云佛性者即第一義空第一義空者名為中道中道者名為佛性佛性者名大涅槃也又此心地法門是佛性之性菩薩本源非聲聞之性也二止犯而菩薩不解一句一偈及戒律因緣而菩薩等句正明無解之人不堪作師範也解是解悟非為讀文故不言誦而言解也一句一偈者指上十二部經之多不能解悟以至最少之一句一偈亦不能解會者則以何法而為人作師範耶然如來所說一言一字攝無量義一句一偈包一切法如阿之一字海墨書之難窮故華嚴經云無量無邊法門海一言演說盡無餘又諸行無常偈能解一句則便能通達一切諸法如昔解脫和尚感諸佛現於空中說偈曰諸佛寂滅甚深法曠劫修行今乃得若能開曉此法眼一切諸佛皆歡喜解即問曰寂滅之法若為可說得教人耶諸佛即隱以聲告曰方便智為燈照見心境界欲究真實法一切無所見若能解悟此偈則便了達三藏十二部經故舍利弗聞法身偈即證初果愚路三月受持半頌成阿羅漢為諸尼眾略說法要皆證聖果曹溪聞應無所住頓悟心宗是以一句一偈其義難量初學無知不可輕視增一阿含經云一句之中便出三十七品及諸法門迦葉問曰何者一偈阿難答曰諸惡莫作眾善奉行自淨其意是諸佛教瓔珞經云以一句義演出無量諸佛法藏從劫至劫乃至百劫不能究盡一句之義故知如來秘要之法不可思議非是小根所能測度律鈔云佛言善解一字名為律師一字者律字也是知律之一字乃毗尼之宗旨宗旨若悟則無法不通故云律者萬法之所由出也戒律因緣者如舍那傳戒於千佛千佛傳於千百億釋迦初在菩提樹下及妙光堂說何法次第至天王宮說何法乃至佛口放光為諸國王王子等授戒因緣等事是也如不解十二部經中一句一偈及菩薩心地戒中因緣發起之事者則自利未能應生慚愧二作犯止持詐言能解者即為自欺誑亦欺誑他人詐言能解者是不知言知好為人師之故也昧本心源是曰自欺誑誑誤前人是曰欺誑他人如是內欺自心外欺一切故當得罪然罪雖輕而自誑惑人其罪實重也三違教結罪一一不解一切法不知而為他人作師授戒者犯輕垢罪一一不解者結上不知十二部經也一切法不知者結上不明戒律中開遮持犯也而為他人等者謂己尚不知不解則自且從師求學之不暇豈可為他人作師授戒者耶罪結輕垢此是遮業繇無解強授有悞人之失故制受戒不學是一過妄欲作師又一過也隨事結罪若以三聚攝歸六時持誦律儀戒解其義理善法戒自他不欺攝生戒也七眾者舊云比丘比丘尼犯餘五眾無作師事未制按善生經在家菩薩亦得畜在家弟子似亦同制然在家雖畜弟子無授戒事故亦不犯大小俱制大乘為師必是出家菩薩具足五德一持戒二十臘三解律藏四通禪思五慧藏窮玄不犯者為白衣授終身五戒及六齋日授八戒法悉無犯然亦須知五八戒義趣又八戒法若無比丘比丘尼三小眾亦得授五戒設無五眾在家二眾亦得授地持經云必須戒德嚴明善解三藏堪能發彼敬心方可得授不爾得罪律攝云滿足十夏方住師位復須成就五法一知有犯二知無犯三知輕四知重五於別解脫經廣能開解於諸學處剏結隨開若遇難緣善知通塞常誦戒本能決他疑戒見多聞自他俱利威儀行法無有虧犯具如是德名親教師繇其親能教授出離法故第十九兩舌戒二初作犯止持三初能鬪之因若佛子以惡心故惡心者謂謗欺賢人憎嫉良善令生鬪亂修道不得安寧故又有二種一妬忌心謂妬彼賢善之行與己異故二障礙心謂見彼得稱讚供養欲鬬遘令他不得故也二所鬪之人見持戒比丘手捉香爐行菩薩行持戒比丘謂持菩薩戒者不言菩薩而言比丘者謂比丘乃七眾之綱領故知言比丘則已該七眾也香爐是頭陀行十八物中之一手捉行持修清淨供以表比丘行菩薩行不忘敬佛五分法身之信香也三所鬪之事而鬪遘兩頭謗欺賢人無惡不造者鬪遘兩頭者鬪是鬪亂遘是遘遇兩頭即彼此也謂遇此人則說彼人之過遇彼人則說此人之失令他鬪亂乖背六和之敬也遘或作搆架也造也結也謂架起虗言造作是非令他彼此結恨也縱是實言及不傳彼此之語但於二邊說令離散皆不得也謗欺者謗是毀謗欺是欺陵謂種種毀謗欺陵讒嫉賢良令他不和故云無惡不造也二違教結罪犯輕垢罪是中犯者謂以此鬪彼使道誼生疎不但鬪遘比丘推之則讒亂君臣離間骨肉故結輕垢此具性遮二業由乖和故制六緣成罪一眾生二眾生想應以持戒不持戒六句分別二稍重四稍輕三兩舌心正是業主四說過無論實與不實五所向人若向無戒人自屬重戒若泛向同法非彼親友自屬謗毀戒今正以鬪遘為念的向彼之親厚故實與不實皆犯若向此悞向彼結方便罪六前人領解語語結罪若以三聚攝歸不惡心律儀戒不兩舌善法戒不謗人攝生戒也七眾同大小共不犯者戒本經云菩薩見諸有情為惡朋友之所攝受欲作惡事以饒益心說離間語破令離散捨相親愛無所違犯猶多生功德也第二十不行放救戒二初作持止犯三初慈心若佛子以慈心故行放生業以慈心者謂菩薩總修三種慈心觀也一生緣慈二法緣慈三無緣慈也行放生業者謂菩薩運無緣慈度有情界先拔其苦然後與其樂也二慈觀應作是念一切男子是我父一切女人是我母我生生無不從之受生故六道眾生皆是我父母而殺而食者即殺我父母應作是念者謂當從慈心中而發起此念也然既行放生之業應當作如是觀堅其放生念頭觀一切男女皆是我父母何以知然以我生生無不從之受生故不惟人中一切男女是我父母乃至六道眾生皆是我多生之父母而殺而食者即殺我多生之父母也父母之命豈可殺乎父母之肉豈可食乎此即生緣慈也然世人祇識現生父母而迷多生遠親妄認現前四大色身為自己而迷於天地同根萬物同體之至理故起人我心眾生見互相欺陵而殺而食惟知自安不念他苦由是不救危拯厄解其患難大士今悟無始劫來托胎受身徧歷諸趣故六道中一切男子女人皆是我父母奚忍殺食故云而殺而食者即殺我父母也三慈行又三初推己亦殺我故身一切地水是我先身一切火風是我本體故常行放生業生生受生亦殺我故身者此明自他不二也謂眾生身分形貌雖殊而痛癢相關皆同一體故一切地水等者楞伽經云津潤妄想大種生內外水界堪能妄想大種生內外火界飄動妄想大種生內外風界堅固妄想大種生內外地界楞嚴云汝我身中堅相為地潤濕為水煖觸為火動搖為風圓覺云此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地涕吐膿血津液涎沫痰淚及大小便利皆歸於水煖氣歸火動轉歸風是知六道一切眾生地之骨肉水之血髓即我先身也火之煖氣風之動息即我本體也既知本體先身何當自啗寧不傷心彼安即是我安若能戒殺放生非救六道男女實救我多生父母亦度我自身故云常行放生業此即法緣慈也生生受生者謂四大性相既是我本體而六道眾生豈不是我父母故生生無不從之受生則生生當行放救復應於受生之中當悟不生不滅常住法性此即無緣慈也二及人若見世人殺畜生時應方便救護解其苦離常教化講說菩薩戒救度眾生應方便救護解其苦難者方善也便巧也苦難者或被鞭撻繫縛殺戮之痛苦臨危之厄難菩薩見是苦惱眾生當以種種善巧方便盡心竭力勸令放免若自無力可化他人贖脫故云解其苦難也常教化講說菩薩戒救度眾生者教謂上依佛教化謂下化有情救者救其苦難度者度脫輪迴解其苦難是利樂其身講菩薩戒是法資其心由法資心則貪瞋癡諸煩惱解脫得復本源心地此誠大士救度眾生善用其心不悖遠親而順同體之慈悲不違行願而施有情之無畏也三報德若父母兄弟死亡之日應請法師講菩薩戒經律福資亡者得見諸佛生人天上應請法師講經律者菩薩利生先人後己也前自講說是教化救度眾生以及多生父母今請他講是救度己親現生父母眷屬以此大乘戒律是舍那之所傳諸佛之本源眾生之根本涅槃之初因人天之徑路存者聞之一歷耳根永為佛種亡者聞之資其冥福即得往生見佛聞法或生天上受勝妙樂或生人間學佛菩提是知講演戒法功莫大焉昔唐新羅國僧統律師為報恩事於本國黃龍寺講菩薩戒七日七夜天降甘露祥雲密靄覆彼講堂四眾驚歎得未曾有以此證知存亡獲益豈可得思議耶三違教結罪若不爾者犯輕垢罪若不爾者是總結上文而言也謂生不救其危難死不度其冥識則有違孝慈之道罪結輕垢此是遮業繇見危不濟乖慈故制四緣成罪一是苦眾生二苦眾生想三無有慈心四坐視不救隨事結罪不救身命是一過不救慧命又一過也若以三聚攝歸慈心戒殺律儀戒方便救護善法戒行放生業攝生戒也七眾同大小不全共小乘不救眷屬有罪餘非所制大士弘慈利物一切悉救惟遮不開二勸持如是十戒應當學敬心奉持滅罪品中廣明三瞋報等戒二初列相十第二十一瞋打報讐戒二初作犯止持二初重亦不報佛言佛子不得以瞋報瞋以打報打若殺父母兄弟六親不得加報若國主為他人殺者亦不得加報殺生報生不順孝道不得者遮止之辭以冤報冤非大士之平等慈心以瞋打報瞋打乖菩薩之無生法忍故云不得以瞋報瞋以打報打也大般若經云菩薩當鬪諍瞋恚罵詈便自改悔我當忍受一切眾生履踐如橋梁如聾啞云何以惡語報人我不應壞菩提心菩薩設被斫截手足身分亦不應起瞋恚惡言所以者何我為有情生死眾苦令得安樂何容於彼翻為惡事耶永嘉云觀惡言是功德此即成吾善知識不因訕謗起怨親何表無生慈忍力殺彼生而報我生生生奚益瞋彼怨而報我怨怨怨寧息然被他殺害必有夙因快意報讐重增未來怨結故云殺父母兄弟六親不得加報也古云以怨報怨終不止惟有無怨終自息然六道眾生豈唯皆我父母亦是未來諸佛世尊若殺若報非佛弟子故云不順孝道也若夫在家菩薩君父之讐自有世禮權法不預本源心地戒律然世間之讐亦有不報者如長生王子無忘父囑不報梵施王讐梵施與女妻之還復其國以見不報之益也儻會同根同體實相無相而彼生我生安在則世禮權法亦無處可施矣然出家已悟真如實際能所性空而心地無二同一本源則不執權教逆本源悖心地順生死流於長劫也二舉輕況重尚不畜奴婢打拍罵辱日日起三業口罪無量況故作七逆之罪尚不畜奴婢打拍罵辱者此舉輕以誡重也謂奴婢且不應畜何況報讐耶若畜奴婢打拍罵辱則長三惡業傷本慈心至彼譏嫌敗壞正法如同世俗何名佛子在家菩薩雖聽亦不得非理打罵增彼怨結然出家菩薩徒眾亦不聽多畜以妨修道之業故圓覺經中如來教諸菩薩三月䇿修不繫徒眾是以羅漢誨徒猶有相似煩惱南嶽天台而有鐵輪五品之歎也日日起三業口罪無量者打拍是身業罵辱是口業身口未發而瞋心先起是為意業作成名罪問既言三業云何獨標口罪答由起瞋心故行打拍打拍必先罵辱罵辱之時語語惡口獲罪不可勝計故言口罪無量也故作七逆罪者當知斯是喻辭如我今日為父報讐彼復結讐於我父又種將來害父之因故報讐即可名為七逆也餘可准知二違教結罪而出家菩薩無慈心報讐乃至六親中故作報者犯輕垢罪出家菩薩揀非餘眾謂在家菩薩猶得兼用王法以直報冤出家菩薩慈心為本怨親等觀讐無大小親疎一切不得加報不報則解怨釋結永無讐對報則相讐相害更無休息若違本慈心故作報者罪結輕垢此具性遮二業繇傷慈忍復結來怨故制五緣成罪一是讐二讐想有六句初二句輕謂讐作讐想讐疑而行瞋報二句稍重謂非讐而作讐想讐疑二句更重謂非讐非讐想讐非讐埧而行瞋打即第九重戒攝三有報復心四行瞋報事五前人領納謂受其打罵結輕若害命結歸第一殺戒若以三聚攝歸不報讐律儀戒順孝道善法戒不殺生攝生戒也七眾同大小制若在家菩薩憑斷事官依律決判無有私情若打若殺不犯戒本經云若菩薩於他起慊恨心執持不捨是染污犯亦可此戒兼制又菩薩怨不宜報恩則宣報婆沙論云若有孝子能勸父母於三寶因果等法令信心歸向及令修戒施禪慧以自調伏乃名真實報父母恩又戒本經云受他恩惠以慊恨心不以若等若增酬答彼者是染污犯若懶惰懈怠非染污犯不犯者若作方便而無力若以方便令彼調伏若欲報恩而彼不受及癡狂等海意經云佛言海意說復有人以惡心來瞋恚罵辱即作是念是人懈怠遠離白法我今發起精進勤求修習植諸善本勿生厭足乃願是人先坐道場我當最後取成正覺廼至我依此法云何是瞋云何非瞋二中伺察俱不可得又是瞋非瞋若自若他瞋與瞋者皆不可得斯不可得尚離此見是即名忍若能如是察者是為怨親等觀而讐不可得矣第二十二憍慢不請法戒二初止犯作持又二初恃憍若佛子初始出家未有所解而自恃聰明有智或恃高貴年宿或恃大姓高門大解大富饒財七寶以此憍慢而不諮受先學法師經律初始出家者明其染法未深染法未深多有自舉也未有所解者謂無佛法中正解故生憍慢也自恃等者而有七種一恃世間聰智二恃位高三恃年尊四恃門族五恃見解六恃福德七恃富饒以此生慢而不受學又憍慢即根隨二煩惱也憍者於己盛事深生染著醉傲為性能障不憍染依為業即是起慢之因二十隨煩惱中之一也慢者恃己輕他高舉為性能障不慢生苦為業葢為慢於有德心不謙下由此生死輪轉無窮受諸苦故即六根本煩惱中之一也此二煩惱能障聖道一切功德皆不成就由恃此而慢山高聳自阻前進故有先學知識而寸步不移致失諮受之大益也華嚴經云善男子菩薩繇善知識任持不墮惡趣繇善知識教導而得出離世間繇善知識依止覺道除業惑障出生死城至清淨處廼至應於自身起病苦想於善知識起醫王想隨所教令作良醫想所修正行作除病想大乘四法經云諸苾蒭盡壽乃至逢遇喪命因緣必定不得捨善知識也二慢德其法師者或小姓年少卑門貧窮下賤諸根不具而實有德一切經律盡解小姓揀非名家年少揀非耆宿卑門揀非大族貧窮非是富饒下賤非是高貴諸根不具謂是品格疎缺故而實有德者乃是真修實行之人也一切經律盡解揀非淺小知見初心菩薩當以法為重止可將未解而求解不得以三十二相觀如來因人而失法也二違教結罪而新學菩薩不得觀法師種姓而不來諮受法師第一義諦者犯輕垢罪第一義諦者乃無上菩提之勝法也如是法師解行雙美堪為後昆模範若新學菩薩論其種姓而不來諮受者罪結輕垢此具性遮二業繇憍慢障法故制所謂慢如高山法水不住失傳化之益也四緣成罪一法師二法師想六句二重二輕二無犯三憍慢心正是業主與前第六瞋患為異四不諮受隨所應諮不諮結罪前第七制懈怠不聽此則憍慢不請若慢心不往聽應同此戒結罪戒本經云輕說法者不生恭敬嗤笑毀呰但著文字不依實義是染汙犯亦此戒兼制若以三聚攝歸不恃憍慢律儀戒諮受請法善法戒先學經律攝生戒也七眾同大小不全共小乘於應請者而憍慢不請則犯餘惟不得憍慢不制悉請大乘以求法為務一切應請一切不應憍慢惟遮不開第二十三憍慢僻說戒二初作持止犯二初見相得戒若佛子佛滅度後欲以好心受菩薩戒時於佛菩薩形像前自誓受戒當以七日佛前懺悔得見好相便得戒若不得好相應二七三七乃至一年要得好相得好相已便得佛菩薩形像前受戒若不得好相雖佛像前受戒不得戒佛滅度後者對佛世而言也如來生死大患永滅超度四流化盡有緣而歸真際故曰滅度如來在世以佛為師佛滅度後以戒為師以戒師為佛也好心者謂欲上求諸佛無上妙道下化眾生發大菩提心也自誓受戒者謂在佛菩薩形像前自治其心發弘誓願求見如來摩頂授戒也懺悔者謂發誓願已更當七日佛前慇懃懺悔一切罪障若要盛貯師子乳必先蕩滌琉璃瓶好相者或於懺悔時或於禪定中或於夢寐中見華見光見佛菩薩摩頂見如來種種好相便得戒也若不得好相者或煩惱深重不能見相更須發增上心當於佛前二七三七乃至一年必以見相為期方得佛菩薩形像前受戒其或未然不名得戒故云雖佛像前受戒不得戒也昔北凉沙門道進求曇無讖授菩薩戒讖不許且令悔過七日夜竟詣讖求受讖怒不許進念我業障未消更加誠懺首尾三年夢見釋迦佛與其授戒明早詣讖未到面前讖唱言善哉已感戒矣我當為汝作證次於佛像前為說戒相所謂水清月現機感道交也又律師真表苦懺求戒誓願彌勒親授夜倍日功經七晝夜見地藏大士手搖金錫為作戒前䇿發表倍加勇猛至三七日見山川平滿成銀色世界感兜率天王來繞石壇慈氏徐至垂手摩頂讚曰善哉丈夫求戒如是須彌山可手攘却汝心終不退也乃授戒法躬付衣鉢仍賜名真表律師正見眾生心水淨菩提影現中也若懺心不切罪性不空佛不現前戒體不得也二師前得戒若現前先受菩薩戒法師前受戒時不須要見好相何以故是法師師師相授故不須好相是以法師前受戒即得戒以生至重心故便得戒若千里內無能授戒師得佛菩薩形像前自誓受戒而要見好相師師相授不須好相者以其展轉傳來即是如來嫡子亦是法身常住是以法師前受戒即得戒也故律藏云持律之人是人補佛處也至重心者謂受戒之人當視師如佛想發起慇重心故得戒也千里內無能授戒師者雖許像前受必重在見相方名得戒也言得戒者謂得無作戒體也受戒之法以發心為內因以身口為外緣因緣具足感發戒體而戒有二種一無作戒二有作戒無作者戒之體也有作者戒之相也體屬性相屬修體以相顯止也相以體修行也戒雖無量止行攝盡故磐公釋云此戒體不起則已起則全性而性修交成必有無作假色言假色者謂性必假色法以為表顯也亦名無漏色法然無作一發從體起用任運止惡不俟再作故名無作任運行善無時懈怠亦名有作又云此戒體惟心所運不假造作而成故名無作但受有上中下三品瓔珞經云諸佛菩薩現在前受名上品戒菩薩法師前受名中品戒千里無師於經像前自誓而受名下品戒上品受從發心得體中品受從羯磨得體下品受惟貴發菩提心得見好相便得體也涅槃經念戒中云此體雖無形色而可護持雖無觸對善修方便可令具足故知別有此無作體從羯磨得若自誓受者亦從三白時得或從見好相時得也又無漏色法者謂初受戒竟即於法界有情邊得不殺色於法界情非情邊得不盜色於法界有情邊得不婬色得不妄語色乃至於法界三寶邊得不謗色又眾輕中於法界師友邊得不慢色於法界酒得不飲色於法界肉得不食色乃至於法界法門得不破壞色此不殺不盜等法雖無形相可見而借色表顯所謂非眼處色是法處色也又殺盜等是有漏法不殺盜等是無漏法故云戒體是無漏色法也是以未受戒時雖殺盜等事未必念念徧造而十方世界無非我殺盜婬妄之場十方有情無非我殺盜婬妄所行之境甫受戒已則十方世界無非我慈良清直之地十方有情無非我慈良滿直所被之機故一念中成就無漏微妙善色一一徧於法界一切諸念亦復如是然八萬四千法門即無作體所具眾善慈悲喜捨即無作戒妙用功能所以同名為得戒也要見好相者要必定也好相謂相有邪正魔事頗多未易分辯當須善為審察不可率爾以為好相得地菩薩魔尚現作佛身與之授記而末世凡夫可不慎歟二違教結罪又二初恃憍若法師自倚解經律大乘學戒與國王太子百官以為善友自恃者有二義一恃內能解經律二恃外所交國王太子百官以為善友而生憍慢也夫為人師範者應以慈心悲心視求法者如同赤子凡有請問當一一開示傾心而說令彼生歡喜心趣向佛法不得內倚能學能解以輕新學外恃所交勢位以慢於人不答來問也瓔珞經云法師能於一切國土中教化一人出家受菩薩戒者是法師其福勝造八萬四千寶塔況復二人三人乃至百千人福果不可稱量二慢說而新學菩薩來問若經義律義輕心惡心慢心不一一好答問者犯輕垢罪經義者善惡修斷等法律義者輕重開遮等法輕心者輕彼不知大乘經律及藐無王官以為善友故惡心者恡法欺人無慈心故慢心者自恃福慧輕慢前人故不一一好答問者以此三心障蔽心目恃解恃勢不以好答使義理隱沒顛倒法相故結輕垢此亦性遮二業由乖接引教訓之道故制四緣成罪一求法人二求法想三憍慢心正是業主四僻說出口語語結罪若以三聚攝歸如法受律儀戒不自恃善法戒好答問攝生戒也七眾同犯皆得說法故大小共小乘亦不許僻說故不犯者菩薩善戒經云若知前人是惡邪見求覔罪過不犯若知不說令彼調伏若知前人不能敬順若知鈍根聞深義已生於邪見若知聞已向惡人宣說破壞正法等悉皆不犯第二十四不習學佛戒三初止犯作持若佛子有佛經律大乘法正見正性正法身而不能勤學修習佛經律者是總舉菩薩藏大乘教法顯非小乘經律故云大乘法也此大乘法乃是超生死越苦海之寶筏若無此筏永無得出生死苦海也正見者謂大乘經律原具本源心地之正解故曰正見正性者繇具心地之正解故契心地之正因正因即舍那之佛性故曰正性也正法身者繇悟舍那之佛性即我自性而修六度萬行行解相應理事融徹而證真常果德之妙體故曰正法身也如是大乘經律心地之正因正果而不勤修習學是大士自迷正行而反入邪途也既為佛子有佛可歸是吾本師有法可學是吾父母既是本師父母應當時時親近而習學也二作犯止持而捨七寶反學邪見二乘外道俗典阿毗曇雜論一切書記是斷佛性障道因緣非行菩薩道者七寶有二義一者殊勝義謂超出一切諸教偏駁下劣故二者利濟義謂能與一切眾生功德法財故即上佛經律等七種也然金銀等七寶世間以為最珍能濟貧苦令身安樂今此心地大乘教法於諸法中最為珍勝能除眾生饉乏令獲功德法財莊嚴舍那萬德之軀故喻之為寶也不肯勤學即是捨義邪見者二乘外道廼至一切書記無心地之正教故曰邪見然見既是邪則因性果法盡邪矣謂二乘墮於偏空外道執其謬計俗典僅談世務阿毗曇此云無比法即二乘論雜論是一切小乘及外道僧法諸論百論云九十六道九十五種道兼小乘教故成九十六並不能得諸法實相故順聲聞道者皆悉是邪一切書記者謂五明等論及世間一切語言文字也斷佛性者二乘焦菩提芽外道刳正覺種所有語言皆無實義故云斷佛性也障道因緣者心執邪解為因謬修邪行為緣由此遮障大乘正道永失本源心地故云障道因緣也非行菩薩道者謂邪見之人所為之事一一俱非故云非行菩薩道也三違教結罪若故作者犯輕垢罪是中犯者背佛地而趣聲聞尚且不許何況習學外道俗典故結輕垢繇乖出要之道故制如一向習小惟是遮業非染汙犯一向習外性遮二業是染汙犯菩薩若撥無二乘亦名為犯又菩薩比丘比丘尼不學聲聞毗尼亦犯輕垢菩薩優婆塞五戒威儀經云菩薩有佛經藏不能勤學修習迺更勤學外道俗典犯重垢罪戒本經云菩薩於世典外道邪論愛樂不捨不作毒想是名為犯若以三聚攝歸修學大乘律儀戒不起邪見善法戒行菩薩道攝生戒也七眾同皆應先學此經餘力方許別習大小不全共謂大不學毗尼犯小不學此經非犯不犯者若習小助大為欲引化二乘令入大乘故學二乘之法菩薩善戒經云為論義故為破於邪見故為知外典虗妄佛法真實故為知世事故是為不犯問前云背大向小次云僻教此云不習後云暫念四戒似濫答一以志向乖違二以教導偏邪三以安然習小不思學大四以權時習小徐圖學大故不相濫問輔行云小乘許十二時中為伏外道一時習外若大乘初心一向不許至六根淨位學應不難小乘許大乘反制者何答有二義一小乘智劣不習外不能伏外菩薩智勝未習外時先能伏外故此不必急學也二菩薩學佛一切種智證智則得本得本則兼末亦不必急學也且令進行為大安可先事其餘彼聲聞無心成佛不使之學則終於孤陋寡聞矣第二十五不善知眾戒二初作持止犯若佛子佛滅度後為說法主為僧坊主為教化主坐禪主行來主應生慈心善和鬪諍善守三寶物莫無度用如自己有佛在世時諸大弟子雖則分化諸方而皆以佛為主佛滅度後各立門庭而弘法道不無掌事之人恐日久漸殊如來故預舉也說法主者通指主持法席之人僧坊主者梵語摩摩帝此云寺主乃主持院務等事所謂監院也教化主者謂教人作福化人為善令知三寶是良福田信向歸依興崇供養故坐禪主者謂主持坐禪等事行來主者謂主持賓客往來等事所謂知賓也應生慈心者此中有二事皆以慈心為主一以慈心故善和鬪諍謂主法之人見鬪諍者應生慈心善言調伏令彼安樂佛法得以久住二以慈心故善守護三寶物謂執掌三寶財物之人見司事者損費財物應生慈心善言示彼令知罪福愛惜常住因果分明身心得以利益莫無度用者度法也謂佛物佛用法物法用僧物僧用縱然僧物僧用尤宣清楚如以飯僧物而作僧堂死墮火枷地獄亦不得以此處三寶物而移彼處用亦不得以彼處三寶物而移此處用莫無度用者正明善守義也律云愛惜常住物如護眼中珠如楊岐燈盞寶壽生薑千古榜樣也大凡執掌之人見三寶財物分文升合乃至一鹽一米一草一針不得互用今時易過後世難酬如自己有者謂當如自己物之愛惜不得錯用非許自己侵用三寶財物也或言不得錯用不得當自己物也二違教結罪而反亂眾鬪諍恣心用三寶物者犯輕垢罪亂眾鬪諍者謂不諳毗尼非理斷事故令眾不安也恣心用二寶物者謂不知罪福故以三寶財物恣心自用此則為主不善安眾守物不知用度自損損他有失大士慈和之念故結輕垢既為院主應當慈和一切因果分明無得恣請肆意也此是遮業繇自損損他故制不善滅諍墮事結過不善守物隨用結過若三寶互用自屬盜戒若發起諍事別得性罪若以三聚攝歸守三寶物律儀戒應生慈心善法戒善和鬪諍攝生戒也比丘比丘尼全犯餘五眾未知僧事不犯設充職事亦犯大小俱制惟遮不開第二十六獨受利養戒二初作持止犯三初客來禮接若佛子先在僧坊中住若見客菩薩比丘來入僧坊舍宅城邑若國王宅舍中乃至夏坐安居處及大會中先住僧應迎來送去僧坊即僧所住之寺也梵語僧伽藍此云眾園謂生植佛子道芽聖果處也或云毗訶羅此云遊行處即僧眾遊履之寺院也菩薩比丘揀非聲聞僧眾國王宅舍是王所造堂房以安僧眾處也夏坐安居處者或王臣檀越請僧夏三月安居處也大會中者或月初一日或初八日十五日此三日是西竺每月大會設食供僧更有五年大會為世尊留頂髻故作六年大會為如來苦行故作或佛涅槃會或佛降生及成道會或阿難大會為佛弟故作羅睺羅大會為佛子故作此七會是須達長者敬佛故興或無遮會或僧自恣會等以上諸處利養不論客舊現前有分先住者為主人後到者為賓客既為主者當盡其道迎來以見有禮送去足見道心二供給所須飲食供養房舍臥具繩床木床事事給與若無物應賣自身及男女身應割自身肉賣供給所須悉以與之飲食供養充足其心房舍臥具安慰其身繩牀木床坐臥適意事事給與無有恡惜賣身割肉為客之心至極也言肉尚可割賣況錢財之身外物耶無物尚爾況有物耶男女是兼制謂在家菩薩亦當不惜身命眷屬以供客僧也文中雖云菩薩比丘而聲聞僧亦當預分賓主不可失節也供給所須等句是總結上文謂凡所用物皆當盡心給與不得悋惜也三次第差請若有檀越來請眾僧客僧有利養分僧坊主應次第差客僧受請前明禮接供給此當次第差請也檀越者檀是梵語此云施越是超越謂人能行布施者即便超越貧窮苦海也客僧者無論大乘小乘但十方外來一切行脚僧眾俱無施主者是也有利養分者謂檀越所施或食或衣或襯或普請或限請體通十方凡聖無問賓主悉皆平等故云客僧有利養分也次第差請者謂檀越不能普請大眾限請五人十人廼至三十五十僧坊中應依次差往不得揀選客舊故也無施主尚應賣身供給況有檀越而不依次差客僧耶二違教結罪而先住僧獨受請而不差客僧者僧坊主得無量罪畜生無異非沙門非釋種姓犯輕垢罪檀越請僧原無客舊分別院主私心不差客眾故曰獨受舊眾所受飲食口口招愆所得財物計錢成罪眾人之過皆歸於主故曰得無量罪但知我飽不顧他饑故曰畜生無異沙門者是內道沙門謂勤修戒定慧息滅貪瞋癡識心達本源故號為沙門今違本源貪心獨受故曰非沙門釋種者是佛弟子應當忘身為眾習佛菩提今專心為己上違佛教下損施福內乖六和德體外塞十方僧路故曰非釋種姓此即缺施主平等之心失大士利他之行罪結輕垢此具性遮二業以僧次請僧時凡在界內皆應有分今不差客僧由乖施利故制然獨受是盜戒之等流也四緣成罪一有客謂應得利養分者來在界內二有客想六句二重二輕二無犯三獨受心正是業主四差竟若知僧次的至彼人而不差者但犯輕垢以臨差時界外或有來者尚未專有分故若差竟而別與餘人餘人自知未應受請而受得施主家食襯五錢入手與差者同結重罪若以三聚攝歸迎來送去律儀戒事事給與善法戒次第差請攝生戒也比丘比丘尼全犯餘五眾未知僧事不犯或有時受差分食若偏厚偏薄偏有偏無皆犯輕垢善生經云僧中付食若偏為師選擇美好過分與者是優婆塞得失意罪大小俱制惟遮不開第二十七受別戒二初止持作犯若佛子一切不得受別請利養入己而此利養屬十方僧而別受請即取十方僧物入己一切等句廼總標之辭謂王臣士庶在家出家凡是供養眾僧之物不論界內界外皆不得自求入己也利養者廼有益身心之物也謂檀越發心供眾體通十方一切有分故曰而此利養屬十方僧也由此別受而令彼十方不得利養則遠有奪義故曰即取十方僧物入己也十方僧物奪取自用豈可忍乎罪福報應因果昭然二違教結罪八福田中諸佛聖人一一師僧父母病人物自己用故犯輕垢罪八福田者並有應得僧次利養之義如佛或應迹僧中等餘可知矣又僧得利養䞋施則上供敬田中奉恩田下修悲田若受別請不但取十方僧物歸己亦是奪取八福田中物歸己自用也大士利生普為一切而別受請即迴僧物入己故結輕垢此是遮業由令施主失平等心十方僧失常施利故制三緣成罪一是別請二別請想六句二重二輕二無犯或請受戒說法或知此人非我則不營功德皆無犯三受請竟若以三聚攝歸不受別請律儀戒不取僧物善法戒利屬十方攝生戒也出家五眾同犯在家無受利養事善生經云若優婆塞受招提僧臥具床座得失意罪亦應此戒兼制大小不同制小乘遮別眾食若四人中有一人是僧次者不犯不遮別受請戒本經云檀越來請若至自舍若至寺內若至餘家若施衣食種種眾具菩薩以瞋慢心不受不往是染污犯捨眾生故懶惰懈怠非染污犯不犯者若病若無力若狂若遠處若道路恐怖難若知不受令彼調伏若先受請若修善法不欲暫廢為欲得聞未曾有法饒益之義悉皆不犯第二十八別請僧戒二初作持止犯又二初請僧求願若佛子有出家菩薩在家菩薩及一切檀越請僧福田求願之時應入僧坊問知事人今欲請僧求願出家在家是已受菩薩戒者一切檀越是未受菩薩戒者請僧福田求願者謂道俗請僧必有願求或求生天享福或求解脫輪迴或求長壽安樂或求寂滅涅槃受者當於三寶前宣達其願以令滿足也知事謂受僧所差知眾僧事者如上求願應入僧坊問其知事請主不得自專也二平等福勝知事報言次第請者即得十方賢聖僧而世人別請五百羅漢菩薩僧不如僧次一凡夫僧知事報言者謂知僧事人應當如律為說去彼揀擇之心既到僧中當依僧制故云次第請者即得十方賢聖僧也其賢聖有權有實實者已證四果三賢十聖權者雖是凡夫而已受本源心地大戒修學賢聖之正道故亦名賢聖僧也然僧通凡聖施普十方心行平等福同空界心生揀擇果報有限況聖凡難辯優劣寧測是以賓頭盧被打沙彌不得衣施故知不擇即得賢聖僧也況如來已敕十六大阿羅漢各領徒眾百千皆證四果示跡同凡密受供養令施者得勝果報饒益有情人莫能識一賓度羅二迦諾迦伐蹉三迦諾迦䟦釐惰闍四蘇頻陀五諾詎羅六䟦陀羅七迦哩迦八伐闍羅弗多羅九戍博迦十半托迦十一羅怙羅十二那伽犀那十三因揭陀十四伐那婆斯十五阿氏多十六注茶半托迦世人別請羅漢菩薩僧者羅漢是小乘菩薩是大乘若別請者賢聖即凡夫僧若次第請者凡夫即賢聖僧故云不如僧次一凡夫僧也戒因緣經云毗舍佉母別請五百羅漢佛言毗舍佉母無智不善不得大福若於僧中次請一人者得大功德果報最勝利益無窮問然則五百聖僧不及一凡夫僧耶答須知論田則百千萬倍不及於聖如阿那律昔以鉢飯施獨覺從是已來九十一劫天上人間受福不滅此在心而不論田也又別請則違平等無相法門失廣大圓滿福德不別請則一滴投溟頓同海體也三違教結罪若別請僧者是外道法七佛無別請法不順孝道若故別請僧者犯輕垢罪別請者心有高下也外道法者心不平等故七佛無別請者正顯佛心平等也然經多引七佛為證者欲使信者易明也又並在此娑婆世界應化跡在百劫之內長壽天皆所曾見故一毗婆尸佛亦云維衛此云勝觀二尸棄佛或云式棄此翻火三毗舍浮佛又云隨葉此翻徧一切自在此三世尊皆在過去莊嚴劫出四拘留孫佛或云拘留秦此翻所應斷五拘那含牟尼佛此翻金寂或翻金仙六迦葉佛此云飲光七釋迦牟尼佛此翻能儒或云能文如上七佛尚依僧次何況大士耶不依次請是忤佛逆僧故曰不順孝道也若故別請僧者謂大凡設供當平等布施一有揀擇便違佛制福亦有限是猶敬父而慢母也罪結輕垢此是遮業由分別是田非田其心狹劣不順平等法門故制若以三聚攝歸不別請律儀戒順孝道善法戒僧次請攝生戒也七眾同大小共前獨受利養戒是不差客僧赴請得罪次受別請戒是自受他別請獲罪今戒是自擇請僧而結罪也不犯者非求福飯僧或知識親朋有所言論故別請不犯第二十九邪命自活戒二初止持作犯二初惡心若佛子以惡心故為利養以惡心為利養者顯非見機益物之心也此以惡心為惡事故經云多欲之人多求利故苦惱亦多若以善心為善事者則多生功德也二列事販賣男女色自手作食自磨自舂占相男女解夢吉凶是男是女呪術工巧調鷹方法和合百種毒藥千種毒藥蛇毒生金銀毒蠱毒販賣男女色者謂買年少男女賣與人為欲事也此乃離他骨肉玷人門風不顧羞耻道俗共制自手作食者是躬自炊㸑也自磨自舂者是磨舂五穀也佛制比丘食法尚以淨人授受方食豈得沙門作生活計既失威儀亦長人貪心此事惟制出家占相男女者占是占卜斷人禍福相是察形觀氣皆是妄判男女壽夭窮通也解夢吉凶者解謂說人夢中所見之事善與不善及所娠是男是女也呪術工巧者呪是外道邪呪符籙等能驅神遣將攝八魂魄術謂幻術能變作種種幻事以惑人心工謂良工巧謂巧匠謂是良工巧匠造作精妙之物以顯奇特調鷹方法者謂善調鷹犬以取物命百種千種毒藥者謂取世間一切毒藥和合湯膏丸散以害物也蛇毒者然蛇之毒在頭在尾或取其腦或取精液以傷人也或以惡物和成觸之必死如毒蛇嚙人無有救故生金銀毒者謂生金生銀其性最毒服食即斷命也蠱毒者和合毒藥食則腹脹成蠱也如上所作而得利養自活名曰邪命非大士慈悲之道也二違教結罪都無慈憫心無孝順心若故作者犯輕垢罪都無慈憫心者大士當以慈愛為念憐愍眾生猶己赤子損己利他而反為自活害人猶食子肉故曰無慈愍心也無孝順心者菩薩視眾生如己父母而反以自利傷親忤逆之甚故曰無孝順心也若故作者顯非誤為也為佛弟子守道居貞清淨活命方不壞沙門之表豈得為利販賣種種營求內失慈心外傷風俗罪結輕垢若物死犯重罪此具性遮二業由無慈孝故制然惟販藥二事兼有性罪餘但遮罪損眾生戒攝毒藥且就和合時結輕若害物時隨結重罪調鷹亦爾若在家以呪術工巧醫藥如法自活不傷物者不犯出家以正呪術救危拯厄無求利心亦開問舂磨作食在家寧免答此有二義一為自活非大人所作二為五穀柴米中多有蜫蟲故若不損生非邪求活命出家下二眾亦開若以三聚攝歸不邪命自活律儀戒生慈孝心善法戒不生惡心攝生戒也出家五眾同犯在家除販色調鷹毒藥三種其餘如法自活不犯善生經云優婆塞若須田作不求淨水及陸種處得失意罪亦可攝屬此戒淨水者謂無蟲水陸種處者陸生穀麥等處不須用水致傷蟲也大小俱制不犯者出家人或偶用占相呪術工巧隨機誘物令入佛道非希利心不犯呪術是治病救難所用故大小兩乘亦通有之按經論中邪求活命有五種四種與今戒互出一為利養故詐現奇特二為利養故自說功德三為利養故占相吉凶四為利養故高聲現威令人畏敬五為利養故自說所得供養以動人心是為五種四種者一下口食謂醫藥地理種植田園二仰口食謂仰觀天文日月五星等三方口食謂曲媚豪勢通使四方巧言多求四維口食謂學種種呪術卜筭吉凶若與上相違名淨命食淨命食者復有四種一深山果菜二常行乞食三檀越送食四僧中淨食以此活命不汙心地故名淨命食也第三十不敬好時戒二初止持作犯又二初不敬若佛子以惡心故自身謗三寶詐現親附口便說空行在有中為白衣通致男女交會婬色作諸縛著惡心者是貪求之因自身揀非餘人謗者毀也廼是總標之辭如通致男女等事是毀僧體口便說空等是毀法義不修齋法殺生劫盜等是違佛制故云謗三寶也詐現親附者謂詐現威儀假粧修行之相親近三寶令他信敬以求利養也說空者謂口稱解脫之語而實行謀利之事也為白衣通致者通是通達致是致意謂持男意語女持女意語男令彼此交會也作諸縛著者謂作如上不淨之事皆是自他纏縛於三惡道中流轉生死不得解脫故曰縛著也二好時於六齋日年三長齋月六齋日者四天王經云諸天齋日伺人善惡四天王各鎮一方常以月初八日二十三日遣使者按行人間考察善惡十四二十九日遣太子下十五三十日四王自下命日月五星二十八宿勤察眾生善惡若見修善者多便上忉利以啟帝釋諸天相慶保護國界而言減損阿修羅增廣諸天眾則降善福注祿增算若見修善者少則諸天憂患而言阿修羅種多諸天眾減少降以不祥減祿除算國界多災是故佛言此六日若人修齋福倍餘日年三長齋月者謂每年正五九三月是善月廼帝釋天巡狩之月此天殿中有大寶鏡從年正月則照南洲二月則照西洲三月則照北洲四月則照東洲五月復照南洲如是三番照察人間善惡凡人舉心動念鏡中自然顯現分明如此日此月盡是鬼神得力之日月天王相巡狩之好時正宜避惡修善如此好時不知而反更虧慢犯戒不生慚愧恐懼正所謂惡心也三違教結罪作殺生劫盜破齋犯戒者犯輕垢罪殺生劫盜者謂不修淨行經理塵緣失菩提心斷佛種性是曰殺生說空行有聖道乖違受人信施口口得罪是曰劫盜若實教其殺生劫盜兼得性業自屬殺盜二戒破齋犯戒者在家菩薩於六齋日及長齋月受持八關戒齋以過中不食為齋若犯非時食故曰破齋出家則終身不非時食犯則如上結罪瓔珞經云若菩薩摩訶薩修習六度清淨之法兼修八關諸佛禁法此善男子善女人於六度法具足清淨之行如不修持是曰犯戒親附白衣造作非法損人功德滅人法財自害害人故犯輕垢此是遮業繇經理白衣故制若以三聚攝歸不親白衣律儀戒不謗三寶善法戒不行殺盜攝生戒也出家五眾同制謂一切時中不得經理白衣在家二眾已受菩薩戒者不敬好時亦犯輕垢善生經云若優婆塞一月之中不能受持八戒供養三寶得失意罪大小俱制惟遮不開二勸持如是十戒應當學敬心奉持制戒品中廣明音釋內懷師子之德梵語僧伽彼此云師子大師子吼小師子聞悉皆勇徤百獸潛藏佛師子吼諸菩薩聞增長神力羣魔怖散為佛弟子學佛威儀增長信力當念其德也外現象王之威梵語伽耶此云象象之迴顧舉身俱轉如來大人之相身心專一若有所觀身首俱迴所以人天敬仰羣魔驚惶佛子模範後昆亦應如是不可輕舉妄動也法身偈舍利弗見馬宿威儀庠序生信敬心即便問曰所師者何所受何法宿曰諸法從緣生緣盡法還滅我師釋迦文常作如是說舍利弗聞即證初果愚路即周利槃陀伽此云小路邊生兄授一偈四月不得忘前失後兄遣還家門外啼哭佛觀因緣非聲聞能度是以牽出如來愍之安慰其心即以神力轉彼所誦偈曰入寂者歡喜見法得安樂世無瞋最樂不害於眾生世間無欲樂出離於愛欲若調伏我慢是為第一樂更為授之尋時誦得證無學果無生法忍智度論云理本不生不滅今但言不生故名無生謂菩薩於無生之法忍苦忍樂不動不退是名無生法忍鐵輪五品昔南嶽慧思禪師得六根清淨臨終眾疑師證十地師曰吾一生望入銅輪以領徒太早損己益他惟居鐵輪耳又天台智者大師法嗣南嶽臨終門人問曰不審師入何位師曰汝懶種善根問他功德如盲問乳實告何益吾今為破除汝疑吾不領徒必淨六根為他損己祇五品位耳斯乃圓教外凡五品位一隨喜心二讀誦三說法四兼行六度五正行六度鐵輪是圓教十信位圓聞圓信而修圓行由前外凡增進倍倍深明得入圓十信也根隨二煩惱一根本煩惱即無明惑也謂此根本無明之惑能出生一切煩惱故根有六謂貧瞋癡慢疑見也二隨煩惱隨有二十分三大八謂貪信懈怠放逸昏沉掉舉失念不正知散亂也中二謂無慚無愧也小十謂忿恨惱覆誑諂憍害嫉慳也僧佉論僧佉此云鵂是外道名其人在佛前八百年出世得五通其所造論名衛世師此云無勝有十六萬偈即術數論五明大智度論云一聲明釋詁訓字詮目流別二工巧明伎術機關陰陽曆數三醫方明禁呪閑邪藥石針艾四因明考定邪正研覈真偽五內明究暢五乘因果妙理楊岐燈盞楊岐山方會禪師親近慈明時為監院置二燈盞同參相顧問其所以師曰柱下是常住燈盞公事則用柱上是自己燈盞私事則用彼云何輕常住而重己耶師云公所不知寧以自己油滴在常住盞中不可以常住油滴在自己盞中由此聲布諸方名傳千古寶壽生薑寶壽目寶禪師親近五祖戒時為庫司戒病令侍者往庫取薑煎藥寶叱之者白戒戒令取錢買寶與薑後筠州郡守致書托戒請選洞山住持戒云賣生薑漢住得遂爾聲振寰中磐公宋智磐律師廣弘律學與慈雲懺主四明尊者同時賓頭盧被打賓頭盧此云不動昔西國有長者聞賓頭盧羅漢受佛教敕為末世人作福田即設大會請僧三會不見賓至長者向一年老上座懺悔上座曰我三會皆受汝請汝自使奴門中見遮見我年老衣服弊壞謂是渧沙門以杖打我右額破第二會來復打我中額破不得進第三會來打我左額破言訖不見乃知即是沙彌不得衣施宋沙門慧全有一弟子得阿那含果候全疾因曰闍黎過世當生婆羅門家全曰我坐禪積業豈方生彼弟子曰闍黎信道不篤兼外學未絕雖有福業不能超詣若作一勝會得飯一聖人可成道果當以僧伽黎布施若有須者勿擇長幼全於是設會至施衣時有一沙彌就全求衣全謂是自己弟子云吾欲議奉聖僧那得與汝迴憶前言不得擇人便喜施與異日見此沙彌問曰先與汝衣著不大耶沙彌曰徒不得衣亦有緣事愧不預會全方悟先沙彌者聖所化也毗舍佉此云氐宿謂氐宿星直此月生故僧物造僧堂湖南雲蓋山守顒將僧物造僧堂死墮火枷地獄荷枷求智禪師以堂估值填設供僧師如其言夢顒謝曰生人天中矣地理謂能知地之龍脉砂水行住結實之理以應陰陽之造化亦名堪輿謂地能載萬物如輿故稱擇地人為堪輿也五星謂熒惑星鎮星歲星太白星辰星也八風一利二衰三毀四譽五稱六譏七苦八樂謂此八種能扇人心生於愛憎故名為風也
